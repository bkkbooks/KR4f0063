body:
  text: 無錫宣頴達麗中吳縣徐敦仁愛杉吳城萬夀宮碑銘符録之法盛行於南北朝道家之支駢溢於神仙神仙之旁劇紛於符録符録之用充志一神以通馭萬靈禁劾百物是故道足者氣勝道歉者氣敗聖人用之而周萬世賢人用之而行一方一州庸人用之而囿一術纖人用之而災其軀邪人用之而亂及天下夫黃帝教熊羆貔貅貙虎禹驅蛇龍周公驅虎豹犀象射妖鳥殺水神與後世幻人詭士所行其得失豈不徑庭哉然所以能通馭禁劾之故於理無二制焉惟道大則所成者峻博道久則所流者充長不可誣也吳城萬壽宮者祀敕封靈感普濟之神許真君之廟也真君遺迹遍嶺北而在新建者生米遊帷觀為真君舊宅大中祥符中賜號玉隆改觀為宮政和中加號萬夀故凡祀真君之廟皆號萬夀宮吳城處新建之東北陬北臨宮亭湖其東贛江挾餘鄱二水入之西附山為修水宮亭贛江修水之問有大州隸建昌相傳為真君斬蜀精之地宮亭之東為鄱陽湖北為潯陽江真君分遣弟子斬蛟之地也其地勢悉與吳城相附注是以真君於吳城功最著其食於吳城為最宜先是來蘇後顯二坊之間為萬夀宮祀真君甚庳陋乾隆八年改作之加侈嘉慶十一年復斥而大之為日計八年費錢至八百萬有畸而後竣事蓋江西之人欣戴歌抃願副崇高以為非是不足以飾後觀彰美報也敬權官吳城朔望祇謁殿下仰眙俯惕有以見真君之得於斯民者於是進縉紳先生而告之曰真君之功赫矣自晉至今垂一千五百餘年自大庾嶺至潯陽江及二千里自楚塞至閩嶺及七八百里縉紳大僚牛童馬走婦人稚子無不如親事真君燠其寒飫其嗛又况自今以至千萬年自江西以至薄海振振闐闐日盛日遠此何故也天下萬世之功氣制之天下萬世之氣道貫之道大者德大故肫然而敦溥然而遠及道久者業久故優然而裕綿然而不窮黃帝禹周公之峻博充長如彼真君之峻博充長如此敬常意真君之於道必有望聖人而未及其量率賢人而大得通者故能涵衍古今廓穹天地考真君事不見於正史其雜見晉唐小説者皆瑣異神靈之説而忠孝之事則以設教之名附益焉然未有不忠孝而能餘於道不餘於道而能務於功不務於功而神於術而無害於人者至於寇謙之杜光庭之徒依附朝廷驚駭愚賤張角宋子賢劉鴻儒妄作訞訛毒流無既有斯世之責者方將搔其芽而揠其心窒其源而障其潰豈可隨俗接踵陷於厄阱哉既以語於衆遂書而碑之庭銘曰我來斯宮當歲之更天開地除廣場千尋連翰重牆中周四隅耽耽翼翼扶日掖月上憑天虛之而為禽鄂不為華鑿堅雕疏旌旄委蛇帷帟跐豸連璧環琚投體崩角肩摩跖錯以劬為愈如核而坼如抱而啄如蟄而蘇神威恪儼德意洽浹不鞭而驅大矣聖人天覆地持不異智愚真君得之一體具體合性之初若執不祥變怪之端乃為其餘赫赫明明翼我赤蒼漸濆被嵎天子之命為羣祀神品其牢菹豈如厯朝仍不經言妄附寶書噫嘻後人率土之臣勿誕而誣光孝寺碑銘光孝寺在廣州府治迤西北一里所於晉曰王園於唐曰法性於宋曰乾明於明曰光孝本朝順治十三年東莞長者蔡元真重建其時靖南王平南王剿李定國駐師粵中主其事後碑文以違詔格毁廢垂一百五十七年今皇帝嘉慶二十年陽湖惲敬至廣州沙門齊方暨諸檀那咸以為請敬以光孝寺為粵中大道場多天竺及支那應化之節而大鑒禪師於寺下髮秉戒開最初法浮圖之教大鑒有功力焉可以發明本末分析源流使後世無所倚惑於是為之銘使碑於庭蓋自菩提達摩尊者航海居嵩嶽二傳得大祖而始尊五傳得大滿而始著六傳得大鑒而始大入傳至大寂無際而始變十一傳至臨濟洞仙仰山而始分十三十四傳至雲門法眼而始極大鑒之前皆精微簡直而大鑒有以昌導之大鑒之後皆超峻奧衍而大鑒有以孕括之故敬嘗謂大鑒之於浮圖如孔子之教之有孟子蓋謂此也大抵西域君與師分治主教者不治事故浮圖之教引之而愈高推之而愈徵由律而教由教而宗宗之始至中國也求道之人皆堅持戒律博涉經論然後竭生平之力歸心正法其意識之障積漸銷除故一言指示即契大恉如琴動而弦應山頽而鍾鳴以順得順者也其後江西湖南元風大行人人求一日之悟東西推測皆意識為用故廣設門庭抑之使不得出截之使不得行庶幾塞極而通閉極而剖如鱗羽之化者必蟄其體草木之坼者必固其孚以逆得順者也至於大鑒遇言則鏟遇見則拔縱橫無礙浩汗無極以縛為解以相為空如火之燎不可近如海之泛不可禦兼用順逆者也後世學浮圖之人上下根皆接大小乘俱圓權實皆滙於大鑒此唐宋元明以來其徒所不能易也中國則君與師兼治故孔子之教以下該高以顯該微其傳之後世也戰國諸子亂其緒兩漢諸儒拾其膚宋元人以浮圖之實言附孔子而諱其名明人以浮圖之元言攻宋人而紊其次合之聖人遺經各有得失是故戰國之言通達通達久則生厭而浮圖之律乘得行兩漢之言滯執滯執久亦生厭而浮圖之宗乘得入宋元明之言往復變動往復變動則生疑而浮圖之教乘得以遊衍附託此則陰陽之屈伸人心之往來其互相乘除者也其間有大力者於後世儒者之言必求之孟子之書以定其歸浮圖之言必求之大鑒之書以要其會然後本末可明源流可見夫元魏滅沙門而菩提達摩來李唐立南北宗而韓退之李習之出萬物散殊百為並起庸人逐其迹聖人明其端庸人爭其小聖人立其大庸人排其虛聖人修其實孔子之教明人倫定家國天下雖五大州各師其師各弟其弟豈能在範圍之外哉雖中國自漢以來代有浮圖之教愚者逐其粗智者溺其精又豈能在範圍之外哉故曰譬如天地之無不持載無不覆幬譬如四時之錯行如日月之代明敬故因論大鑒而詳述之焉銘曰有大菩薩來四天力破迷執無重堅巨象行地龍行天有大護法居人王為國驅逆如箠羊劃金銀地還道場有大長者開寶宫浮雲翼霞搖虛空上繼無始垂無終顧山居士目雲漢轉一藏經止轉半以銘為筏筏登岸大道無界住色位大法無著住道位大人無私住法位潮州韓文公廟碑文潮州韓文公廟有二其一在城南宋元祐中知軍州王滌始建蘇文忠銘之今城南書院是也其一淳熙中知軍州丁允元遷城南廟于城西即忠祐廟也自前明至本朝春秋祀事皆行於城西嘉慶二年知海陽縣韓君異葺治之陽湖惲敬為碑文郵之潮州與潮之賢士大夫商公之故且告後世焉公以諫迎佛骨貶潮州去菩提達摩入中國二百八十餘年矣其時關東西則有丹霞然圭峯密河北則有趙州諗臨濟元江表則有百丈海溈山祐藥山儼嶺外則有靈山巔其師友幾遍天下皆以超世之才智絶人之功力津梁後起以合於菩提達摩之傳而公之生也與之同時公之仕也與之同地嗚呼於此而言不惑不其難歟且其時上無孔子之師下無七十子之友老莊之所流別管墨之所出入馬鄭之所未攻孔賈之所未辨嗚呼於此而言不惑不其難歟是故公之闢佛闢於極盛之時宋人之闢佛闢於既衰之後宋人之闢佛以千萬人攻佛之一人公之闢佛以一人攻為佛之千萬人故不易也雖然公之闢佛至矣而佛之教至今存焉何也蓋聖賢之於天下去其甚而已禹抑洪水而水之泛濫仍世有之周公兼夷狄驅猛獸而夷狄猛獸之侵暴亦仍世有之孔子成春秋亂臣賊子懼矣然不避於當時不絶於後世孟子距楊墨楊墨息矣然人或竊其行家或傳其書若是者皆然矣然而孔子孟子之功終天地盡日月不可沒者以人人知其為亂臣為賊子人人知其為楊墨也今天下三尺童子抱書入孰即有公闢佛之説據於胸中甲胄之士耒耜之夫行商坐賈皆習其説其宦成名立才行出人而沈溺教乘者朋友子孫門弟子皆能別擇於其後愚夫愚婦膜手梵唄隨衆經行其心皆知有孔子之教是故公之德揆之孔子孟子有大小純雜之殊公之功揆之孔子孟子有平頗公私之異而得墜緒於前世收明效於後來未嘗不如一也且夫天地之道一而已矣而人事自二三以及千萬焉行之於行見之於言施之於教皆人事也惟聖人與道同其餘皆有出入多寡申不害韓非一術也則傳李悝商鞅一術也則傳孫武吳起一術也則傳王詡一術也則傳張魯鬼道也而亦傳寇謙之杜光庭鬼道之下也而亦傳佛者如中國百家之一耳其徒推演師説下者可以囿凡愚高者可以超形氣故其傳較百家愈遠而愈大屢滅而屢復蓋將與天地終焉是故世有孔子之教則佛之教亦必行此天道之所以為大也世有佛之教則公闢佛之功亦益見此人事之所以為久也自公斥為子焉而不父其父而為佛者知養其親自公斥為臣焉而不君其君而為佛者知拜其君供賦稅應力役未嘗不事其事世之儒者知中國之變而為佛不知佛之變而為中國知士大夫之遁於佛而不知為佛者自托於士大夫人理所同豈能外哉自公之後儒者好為微言渺論或由孔子之書失其恉而反墮於偏或由佛之書得其會而忽反於正是又在乎善學者焉失者不得妄附聖人之遺經得者亦不必諱言佛乘也嘉慶二十年十月惲敬謹記前光祿寺卿伊公祠堂碑銘閩南為儒者世服朱子緒言雖親受業陽明先生之門如薛行人中離于朱子不敢悖本朝安溪李文貞公漳浦蔡文勤公益推而明之文勤授寧化副都御史雷公雷公授同縣光祿寺卿伊公其為學以愼獨為本其推行始於固窮成於成仁取義故其道近而難至其事質重而光明嘉慶十有九年公之子前揚州府知府秉綬為祠堂於學宮之里以祀公門孰堂室皆備諏日升主於室公之配羅夫人祔焉而寓書於陽湖惲敬請銘古者士大夫立家廟祀曾祖以下有功德則專立祠堂於禮甚宜其麗牲之石刻之銘亦應古義惟是敬以後學操簡畢與廟廷之事懼勿任為罪於後世而秉綬請勿暇遂不敢辭公諱朝棟字用侯姓伊氏先世自河南遷福建之寧化縣世為寧化人曾祖應聚官順昌學訓導贈儒林郎祖為皋父經邦俱贈中議大夫公縣學拔貢生乾隆二十四年鄉試中式三十四年會試中式殿試賜進士出身厯官刑部安徽司主事河南司員外郎湖廣司郎中掌浙江道監察御史戶科給事中擢光祿寺少卿通政司參議鴻臚寺卿大理寺少卿光祿寺卿積階中議大夫加封資政大夫豫告後就子秉綬養於惠州及揚州卒年七十有九公久官刑曹持法平素不近要人故無推薦公者以小心供職受知高宗純皇帝不及三年即拔置九列常召見諭曰福建理學之邦汝謹厚守繩尺朕所知也會得末疾未竟其用天下惜焉居家循循然造次必以禮文勤之從子文恭公新常曰居貧實樂居喪實憂吾於伊比部見之羅夫人同縣人有懿行例封淑人加封夫人卒年八十一子二秉綬其長也次秉徽國子監生古者銘廟之辭多紀勳伐至北宋以後始有推本所學為後世經程者今公之學既遠有統宗遇聖天子激揚表暴之誠信不欺如右所紀敬雖淺瞀謹於銘著古今為儒之所以然秉綬謹下丹加額如碑法以告天下後世之有志於學者其辭曰聖貫天地宙合百家蟲人萬千內外精粗如左右腓相互而前漢守秦燼負器抱經壘高而堅性天之説波澀瀾渟纎流涓涓人心蓄靈有隙必通汊為淸言剖精析微沖虛南華意同語元達摩乘之提第一機無聖廓然曹溪始大西江八十眩地熏天帝王民氓至智極愚身重淵韓公舉幡閧市之中一喙獨拳致彼飾詞淡泊儒門棄為蹄筌北宋中葉大儒之生渾渾桓桓就彼所言推之吾書極天地先堯舜開明遞及子輿旁薄綿延性天之説此挈其總彼掎其偏如失盜家復已劫資匡綏室田如逋訟人直已折辭􅔁竄頑姦雖其所言有過不及軌轍無愆朱子勤勤江滙於海杓攜於躔入聖之要下學上達宣尼所傳存之存之隱微持之功該本原傳録漸多遂涉支離溺於言詮陽明間氣振臂一呼力破攣牽此如夏冬以反為成六氣乃宣此如吸呼以斷為續百骸以安上五千載下五千載抑高轉圜新故所代如南北陸如上下弦聖人無我賢者迭勝以扶其顚其中軒輕得失多寡尚可尋沿朱子之弊極於拘曲不溢他端陽明之弊顚倒狂聖反覆坤乾故為儒者必始朱子勿怠而遷資政大夫葉公祠堂銘南海葉氏遷自福建之同安同安遷自福淸其遷南海者曰振德誥封資政大夫欽賜鹽運使銜廷勳之曾祖也資政公命其子姓為祠堂推振德為始遷祖配王氏祔祭第二世曰興邦貤贈資政大夫配陳夫人第三世曰長靑晉贈資政大夫配邱夫人第四世即資政公也配顏夫人嘉慶二十年二月乙亥祠堂成整幄升主如公式陽湖惲敬推明古今之禮而銘之於庭古者別子有二諸侯之庶子別於為君之冡子其後世祖之一也始來此國別於本國之宗子其後世亦祖之二也此立宗法也大夫始祖之廟有三諸侯之庶子始爵為大夫一也始來此國又始爵為大夫二也別子之後起士庶為大夫三也此立廟法也自封建廢而天下無諸侯庶子之宗於是始遷祖之禮起自田邑廢而天下無大夫始祖之廟於是祠堂之禮行資政公世濟其勤黽勉於孝弟以昌大其家克襄於軍旅力役之事天子嘉之錫爵進階顯於祖父施於子孫其得為祠堂以祀其先宜矣自宋以後在朝列者祠堂皆祀及四世資政公祠堂之制如之允孚於今之人勿違替於古昔禮之盛也自資政以後傳之永永則始遷祖之祀宜勿暇益虔蓋古者諸侯與王國之大夫侯國之大夫皆有始祖之廟後世八品即當古之再命而祠堂之祭殺於三廟焉是故聚族而祭始遷祖者議禮之君子許之資政公子三長夢麟刑部郎中次夢龍戶部員外郎次夢鯤光祿寺署正孫十有五人銘曰池東流術環之卜其南㙩為祠翼如堂赫如墀嚴豆籩肅尊罍介爾福無不宜贈光祿大夫陳公神道碑銘自古高望華閥品升於朝門地著於天下振振繩繩世服厥家者其始皆以功德拯其民輔其世以功者多享社茅廟鼎崇高焜耀之奉以德者必有賢者為之子孫顯揚中外不墜其前光今皇帝嘉慶四年高宗升祔禮成覃恩海內於是前賜同賜士出身誥封中憲大夫浙江分巡金衢嚴道陳公加贈光祿大夫工部右侍郎禮得刻銘於神道敬交公之季子守譽因交公之孫椿冠曾孫效曾敬曾於用光希祖希曾皆有雅故遂不敢以不文辭公諱道字紹洙世稱為凝齋先生江西新城人也江西自鄒東廓聶雙江諸先正主陽明之學末流放失羅念葊起而正救之為功於王門者甚巨公始學於廣昌黃靜山永年靜山力主念葊而公之友如雷翠庭鋐祝人齋泉皆主朱子故公之學自陽明入朱子力行以幾於成公之成進士也為乾隆十三年年四十二孫文定公嘉淦欲以庶吉士薦公公辭讓於同歲生之年少者後其人以文章名公當選於吏部以養親辭後詔舉經學亦固辭其在家雍雍如也教子孫甚嚴皆以誠感之不加訶譙在鄉黨於所乏無不給也朋友之急難無不赴也死生貴賤如一靜山官常州為人所排去官旋卒於蘇州公以師禮喪之歸其喪於所籍人齋無子以注禮在公家十餘年生具皆資之有子六歲而人齋始卒其處事遠覩近矚無不周也既成無矜容其言學能別是非而未嘗黨也公年五十有四卒乾隆二十五年八月已亥也配楊夫人副室雷太恭人子五守誠守詒守中楊夫人出守訓守譽雷太恭人出公始封以子守誠官加贈以曾孫希曾官公之先世在宋自江州義門遷新城二十餘傳至縣學生諱一翰為公之曾祖縣學生貤贈奉直大夫諱以汧為公之祖州同知貤贈資政大夫諱世爵為公之父始遷縣西之鍾溪自遷鍾溪而有家之業始大公以為儒顯於世而名始盛公卒後數十年子孫守家法言儒言行儒行各以其列服勤於皇家自立於士大夫且數十人故海內言大家在江西必日新城鍾溪陳氏敬推其所致皆自於公昔漢世碑陰止書立碑姓名而柳子厚為侍御史府君神道并記先友今公之子孫房次科第階職不勝書於碑之體又不應詳書謹記之碑陰以見公之遺澤且為當世勸法而於碑記公之大行因系之以銘銘曰仲尼之道八儒歧之去聖益遐道尊人卑千差萬别迭為盈虧延及有明遂擾而漓公起嶠西肫然其心得師求友馨我蘭襟油油春陔穆穆秋琴家徵人瑞國貢天琛既對大廷羣公拭目翩然南返衣縫冠木我息我遊我磨我錯是非之公昔言是服軌物者義及物者仁蔚然其施逮乎疏親我懷如晝物氣如春百年慕澤千室歸淳明明天道厥後大昌五子登朝孫曾鴈行外分絳節內服朱裳訓承柳郢德紹王祥欺者喪名矯者敗節拘者性梏肆者情裂勤勤躬行以刻為平嘵曉立説以混為别是皆飾已無德於人勉世而已不及後昆惟公和正所蓄有餘一身觚簡奕世簪𥚑凡百君子視此刻書各敬爾儀毋怠毋渝新城鍾溪陳氏房次科第階職記光祿房守誠浙江分巡金衢嚴道誥授資政大夫晉贈光祿大夫子四人長元次奉寬次允恭次觀元子三人長希祖次希曾次希孟奉寬子五人長希賢次希濂次希宋次希軾次希轍允恭子二人長希範次希岱觀子三人長希哲次希顏次希榕希祖子一人紀儒希曾子一人綖儒希賢子一人紱儒元光祿寺典簿誥授資政大夫晉贈光祿大夫奉寬貤贈奉政大夫允恭附貢生貤贈奉直大夫觀乾隆庚子科舉人甲辰科進士工部郎中洊擢江寧布政使誥授資政大夫希祖乾隆丙午科舉人庚戌科進士刑部主事擢員外郎誥授奉直大夫希曾乾隆已酉恩科第一名舉人癸丑恩科第三名進士及第翰