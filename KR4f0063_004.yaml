front:
  text: 前太子少保雲貴總督劉公祠版文嘉慶十有五年二月敬自瑞金以事至南昌前太子少保雲貴總督劉公之孫署餘干縣知縣焜泣而請曰先少保仕高宗朝受殊遇以儒臣節制西封會緬甸兵事方起所遣將失律先少保引罪致其身純皇帝推始終恩禮許歸葬然子孫以先少保未復前資不敢銘墓不敢碑不敢狀于史氏今五十五年矣大懼沒先人之行無以見先人謹惟先少保自述年譜一卷始康熙四十年終乾隆三十一年書事悉如史法吾子其次為文焜將書之祠版焜世世子孫願能坐甲執兵為國家捍守邊徼驅縛狼貙以畢我先少保之志朝廷蠲濯前迹收録後效當世鴻達君子得由吾子之文而闡揚之焜死且不朽語竟伏地泣不能起敬禮不敢辭按譜公諱玉麟字麟兆姓劉氏世為兗州府曹州人曹州升府為曹州府菏澤縣人曾祖捷兗州府學廩膳生貤贈資政大夫祖拱辰父澄淸曹州學歲貢生俱贈資政大夫曾祖妣袁氏祖妣田氏袁氏前妣張氏妣張氏俱贈夫人公年始十五補兗州府學生二十補廩膳生二十三充拔貢生二十五考取八旗官學教習二十六補正藍旗官學教習應順天鄉試中式二十七引見以教諭用二十八選觀城縣學教諭純皇帝乾隆元年公舉博學鴻詞御試列二等第三名授翰林院檢討年三十六矣三十八奉特旨改名藻記名以御史用充順天鄉試同考官三十九充會試同考官升右春坊右中允升侍講轉侍讀上書房行走四十升太常寺少卿轉通政司右通政升都察院左僉都御史自公為檢討至僉都御史皆純皇帝特簡在廷以為榮是時純皇帝御極已五年躬節儉以率天下而海內無事物力充殷公虞有以豐豫之説進者凡園囿燕遊􅉏御之事屢愷切言之純皇帝悉嘉納四十一升內閣學士充順天鄉試正考官充江蘇學政四十三以失察寶應縣學生劉洞罪狀降三級調用補宗人府府丞至京仍上書房行走六月以母張大夫人年老乞養親得允五十奔皇長子定安親王之喪至京賜復內閣學士原銜五十四丁張太夫人憂五十六服闋時純皇帝幸闕里公送駕至德州授陜西布政使公在籍侍養凡十有二年年譜中止載朝廷賜豫並所奉溫旨敬次至此焜復泣曰先少保在養親假中至德州迎駕者二入都祝皇太后萬夀者一始奔皇長子定安親王之喪繼奔孝賢皇后之喪其餘日朝夕侍張太夫人飮食起居皆躬事蓋事親以事君不敢欺如此是時準噶爾豪賊阿睦爾撒納內附復叛官軍剿之公始之官陜西察哈爾吉林兵方由陜西赴軍自潼關廳至長武縣東西八百里設軍臺七所其平道分設車三百輛騎七百匹其山道分設騎千五百五十匹臺設草六十萬斤豆二千石公日與按察使驛傳道釐其事軍行無留直隸送軍前馬萬一百六十匹駱駝千六百頭陜西送軍前騾千二百頭四川送軍前馬千三百九十匹過陜西亦無留明年定邊將軍兆惠遂連戰破賊阿睦爾撒納走死五十七調湖北布政使升雲南巡撫雲南運京銅下四川峽險甚自乾隆四年至二十一年共沈三百十九萬四千一十五斤戶部奏雲南四正運運原額京銅二加運運廣西停鑄之銅而第二運至峽當四五六前後三月江漲之時多失事議分二運于前後五運以避險公以正運乃解官顧船加運自漢口以上即地方官撥船合之不便議併四正運為三運二加運為一運八月自瀘州開第一運十月開第二運十二月開第三運次年二月開加運每年止四運而四五六七前後四月無銅船出峽于避險為益愼奉旨依議六十三署貴州巡撫加太子少保六十四回雲南巡撫任升雲貴總督六十五加兵部尚書銜雲貴西南二面俱鄰緬甸西為永昌南為普洱是時緬甸貴家土司宫裏雁與木疏酋戰敗竄孟坑其妻囊占率衆內附我孟連土司刀派春脅取其資囊占怒殺派春永昌知府楊重穀遂誘誅宮裏雁囊占走煽緬甸諸土司犯邊公方撥土練守永昌而普洱之孟艮土司有族人召散者糾緬甸賊數千攻掠九龍江等地甚猖獗公馳至普洱遣總兵劉成得參將劉明智往剿焉先是公在雲南雲南無事垂十年純皇帝倚任無與比一旦東西皆擾公內不自安而參將何瓊詔遊擊明誥守備楊坤違節制擅渡九龍江大敗潰卒還以三人戰沒告方人奏而三人自緬甸遁還公益不自安當三人逗撓律而純皇帝以三人乃臨陳退縮皆斬奉旨降公湖北巡撫公望闕叩首如禮閉戶作書處後事擲筆抽佩刀自刎時乾隆三十一年二月二十三也年六十六後一月部議至雲南以前事革職公娶徐氏繼娶田氏再繼娶李氏長子本菏澤縣附貢生次子木山西蒲州府同知季子林候選布政司經厯孫焜壬子舉人前知江西南康龍泉縣今署餘千縣次子木出敬於是復于焜曰古者大臣有坐盤水加劍造請室而請罪小罪自弛大罪北面自裁其三公則賜之上尊養牛使者中道因以不起聞若是者雖以禮相切直與取而殺之無異也至蓋寬饒蕭望之朱博皆以下吏就死其畏罪與辱明甚今公始左遷純皇帝遇夙厚可復用而奮不自顧至于如此蓋公事皇上誠至一不得當即以為孤負明恩無以自立于天下此蓋古人所難非蓋寬饒蕭望之朱博諸君子等不可以不銘於是系之銘曰至聖御宇禮及大臣非賄非姦皆釋以恩惟公之咎成于將士天子仁明左遷則已觥觥我公志古臯夔一青不汙星隕山頽命牘抽豪爰攄厥志刻之廷陳告千萬世兵部侍郎銜署直隸總督裘公神道碑銘公諱行簡字敬之姓裘氏始祖萬頃仕宋為大理寺司直自會稽遷新建遂世為江西南昌府新建縣人曾祖琅歲貢生祖君弼刑科給事中父曰修太子少傅工部尚書諡文達妣一品夫人熊氏文達公生子四長麟翰林院編修次師國子監生皆早卒次即公次行恕湖北漢陽縣知縣公年二十丁文達公艱服闋高宗純皇帝欽賜舉人內閣中書推文達公舊恩也旋直軍機處遷侍讀擢山西寧武府知府調平陽府以熊太夫人年老請內用補戶部陜西司員外郎仍直軍機處升刑部福建司郎中本朝之制凡章奏陳達制詔宣降軍機大臣取進止章京行之內閣六部或徑下各直省及外藩公在直二十餘年內􅈺掌故外悉四方之政於是朝野之論皆以為能可大用今上加意人才大臣多以公名舉奏升內閣侍讀學士奉命祭南海是時教匪未靖經略額勒登保公駐略陽公奏請陜西四川帶兵大臣扼衝嚴守使陜匪不入川川匪不入陜然後逼使東竄經略以大兵蹙之可計日梟縛復命後升太僕寺少卿奉特旨偕大理寺少卿窩里額公犒軍公奏請自寶雞至褒城棧道兵卡宜復設且於要害設大營隔賊走路兼通大軍糧運而其時經略引嫌請止舉劾麾下功罪公奏請五路帶兵大臣所統將士皆聽舉劾移書四川總督威勤伯勒保公為陳廉頗藺相如相下之義兩帥大和公論事多中機宜得大體類如此途次鳳縣升太僕寺卿次西安除河南市政使調江寧布政使賜花翎丁熊太夫人艱未禫除福建布政使旋調直隸布政使兼按察使護直隸總督先是天下大政事賑貸轉輸供億皆以州縣為經由藪滙錢穀出入多未釐正高宗純皇帝欲以曠蕩之恩滌之暨今上登極下詔盡免廢負而地方大吏鉤稽簿領束于成格不能一概除豁官民或借以為煩擾之具公以為非淸帑無以塞僥幸去煩苛遂一以淸帑為首事福建布政司册目十有一公于中分子目一千五百有畸於是支解者豪黍皆見吏不能欺得銀若干萬兩直隸民逋議分年隨輪官逋議分年罰繳得銀若干萬兩前後兩省凡淸帑若干萬兩旋奉特旨以兵部侍郎銜署直隸總督嘉慶十一年永定河溢公舟行視堵築九月庚午感急疾卒年五十有三遺表聞豫實授總督恤典賜葬銀五百兩碑銀三百五十兩祭銀二十有五兩諡恭勤配莊夫人禮部侍郎存與公女子六長元善欽賜舉人候補內閣中書次元淳國子監生次元俊副榜貢生候補鹽場大使次元遜候補通判次元穆次元英孫開甲元善出女六皆適名族某年月日元善等奉諭旨葬公于新建慈菰鄉之硃砂岡立碑設祭如禮敬于元善相習知公為詳謹條其大端碑于墓道之左銘曰文達蓄德是延恭勤上品之才如擢寒門截鵠斷犀導鋒微至精心一往用其不二遂涉吏事佩乎靑朱囊封之言天子是俞治戎以和治事以肅大將柔心小胥重足甫授節鉞為方鎮臣祁雨未周已墜其雲幽幽靑原戴吾君賜子孫繩繩于千萬世前四川提督董公神道碑銘高宗純皇帝乾隆四十一年大小金川平頭人七圖葛拉爾思甲布傳送行在純皇帝命軍機大臣問為逆狀對甚悉復言陷底木達時四川提督董天弼將所部二百人抽短兵力戰不可敗夜半領兵頭人以鳥槍數百幹環擊殺之先是在軍諸大臣劾董公失守要隘純皇帝徙公之子聯瑴等伊犂至是赦還復聯瑴舉人原資賜內閣中書聯瑴等乃招魂葬公于城南之兆公諱天弼字霖蒼先世明永樂中自無為州遷太興遂世為大興人曾祖大才祖承詔父其倫皆贈明威將軍母劉氏贈淑人公雍正十年武進士授四川提標前營守備從討占對升馬邊營都司從討大金川軍功加三等升峩邊營遊擊大金川旋請降罷師升章臘營參將調綏寧營再調提標中營率師討巴唐平之升維州營副將小金川與黨霸爭地公單騎入其境諭以禍福兩土司皆聽命郭羅克者黑帳房部落也掠衛藏入貢刺麻僧公奉總督檄出黃勝關察之郭羅克不承公夜合雜谷兵逼賊巢先發鳥槍驚其馬羣馬盡逸賊不得遁生擒其酋麻兹滚布得所掠物事定升松潘營總兵旋賜花翎升四川提督乾隆三十六年小金川酋僧格桑復叛圍沃日土司于達圍公由臥龍關往剿拔密耳賊據斑斕山死守公仰攻八日糧匱士卒拔草茹之不得巳退軍至關大學士溫福公自雲南來亦至關公請統大軍堅守自將重慶兵一千循黃草坪救沃日道由金達山較斑斕之斗峻不可上乃下令軍中求間道得近山得勝溝溝在兩崖間崖壁高數仞賊夾溝設守卡崖上會大風雪公將健卒夜伏馬鞍行溝中賊守者皆不覺遂直抵達圍破賊達圍圍始解乘勝拔日隆關迎大軍會于關下時大軍久不得公軍問諸大臣已劾公逗撓而公以用奇大勝得免死為卒伍將兵五百人守資利寨參贊額駙王色與公論軍事大奇之入請賜副將銜拔曾頭溝升重慶營總兵拔卓克采復賜花翎拔橫梗山梁抵谷葛復繞坎竹溝間道進攻燒大木城一旁擊碉寨數十皆下連拔沒藥山大版昭復迎大軍會于布朗郭宗時南路參贊阿桂公亦拔美諾賊巢僧格桑由底木達賊巢竄入大金川大軍拔底木達是役也公常為軍鋒而得勝溝坎竹溝之捷冒死入險地以迎大軍功為最三十八年純皇帝聞大金川酋索諾木嘗助小金川命溫福公為定邊將軍討之擢公為四川提督守黨霸將軍奏底木達新定乃賊巢且諸軍要隘公宿將宜鎮之與兵五百人守底木達底木達當賊衝勢危甚而將軍復調兵三百赴大營其後路接應兵一千二百亦徹之當是時將軍自屯木果木軍屢勝之後不以賊為意七圖葛拉爾思甲布等千餘人乘軍惰因先後詭降將軍開軍門納之使雜厮養七圖安堵爾等因得入大營誘降人為內應且探知底木達兵弱無後援遂定計先犯底木達道通即劫木果木大營六月初一日賊自山後擁衆來犯公遂遇害年六十二後九日賊劫大營將軍亦死焉公貌瓌瑋美須髯臨陳常身先士卒所向無前有哈薩克二赤驃馬極雄健將軍常索之公曰天弼上陳倚此二馬金川小醜必蕩平俟手梟二逆并二馬上將軍嗚呼孰知公之志以此竟不遂哉後純皇帝命阿桂公為定西將軍進戰皆捷僧格桑死獲其尸攻克索諾木賊巢于葛拉依俘送京師設鎮安營鎮其地如公所預策焉今皇上御極録死事後豫公世襲恩騎尉公配吳夫人繼田夫人子六長聯瑴由中書為淮安府裏河同知次聯理與公同死事次聯璽縣學廩生次聯琛聯珩早卒次聯琯國子監生女七俱適名族公殁三十八年陽湖惲敬為文刻石于公墓之左銘曰天縱高宗收諸逆夷歸四海家將將臣臣罪罪功功栗不敢譁公起遠疏志攫鯨鯢擲之泥沙將尊師微為賊所窺來蹈其瑕生誣幾死死誣不生孰詫而嗟高宗至明死興其孤生高其牙將士感銜皇武所周廓無垠涯公神之行沛然江流勢不可遮二馬尚從厯塊蹴塵上躡蒸霞刻石墓左公顧頷之我銘無夸廣西按察使朱公神道碑銘公諱爾漢字麗江姓朱氏先世自鄞遷餘姚曾祖名進祖大彬不仕父健遷大興官絳州吏目大彬健皆贈朝議大夫前母林氏母熊氏皆贈淑人公神明挺動有識斷能得人死力奴客悉以兵法部之自初入仕即在行間後遂與教匪相終始少時吏于戶部以吏目分發甘肅署寧夏典史再署岷州吏目被議輸資復官借補靖遠典史赴衛藏迎班禪額爾德尼入朝道聞熊太淑人之喪去官服闋赴甘肅候補時平涼鹽茶廳回豪田五作亂公與通判吳君廷芳知縣黃君家駒守靖遠城賊仰攻一日引去靖遠回豪哈得成等一百三十有八人期夜半為內應公鈎得賊情令守者悉登無驗不得上下漏初下乘馬至哈得成之門陽科其穀餉軍因拘焉所分遣捕賊人亦誘擒城下餘賊而賊雜守者在城上且數十人縣胥鐵光保最為劇賊公登城紿使獻刀即反接以布襪其口直掖下城遂令鳴角城上捕賊人聞角聲皆拍賊肩曰視地賊視地則扼而反接之于是無脫者夜將半城外賊復引向城公呼語之復引去於是公以知兵聞升署隆德縣事諭底店據寨降回徙之補隆德縣知縣升直隸涇州知州預擒教匪頭目劉松并其孥升鞏昌府知府嘉慶元年教匪起陜西白河湖北當陽亦起二年賊大入四川總統宜綿公駐達州檄公參軍事是時賊渠王三槐拒總統于方山坪白岩山者極險固賊渠林亮工樊人傑屯山上與方山坪為聲援將軍舒亮公提督穆克登布公屯山前之韓彭坳公將成都兵三百募兵三千屯山後之排亞口排亞口之上曰金鳳觀曰草店曰鴨坪公一日盡攻克之復進有木柵當隘不見賊唯一犬號號然我兵有躍而攀柵者賊乃自崖旁引刀斷其指我兵擲火焚柵賊鳴鑼掣所樹旗左右招賊賊大至公慮斷後路退師時九月九日也先是與韓彭拗為師期而韓彭拗之師中道而綏賊得專力山後我兵不能克十月奉節賊千餘人援白岩公敗之擒賊渠邱廣福十一月白岩賊久困欲走傾巢來犯戰一晝夜不得路仍退至屯公以親博戰創甚回鞏昌道遇河州總兵保興公曰君文官乃能爾吾輩當何如後保興公與王三槐戰于三滙遂死事三年公運甘肅麥十萬石餉軍行至成縣賊渠高均德將衆七千窺麥公與涇州知州沈君淸都司馬君良棟敗賊于格樓霸生擒賊軍師李得勝四年賊渠張漢潮犯秦州公赴成縣會剿而鞏昌警至馳還賊已據城東鴛鴦河公夜掠賊卡至城守始固賊不敢攻以功升鞏秦階道生番鐵布者世居西傾山中凡十餘萬人乘教匪猖獗時出盜內地主兵內怖四川教匪謀留軍剿鐵布公以鐵布未叛亂且地險一搆兵非數年不平鐵布奉回教公召其阿渾諭曰鐵布非反者然為惡不已且移軍至奈何其不為惡知盜蹤者速來首於是來首者踵至公一日出姓名𥿄一曰此鐵布盜也復出圖紙一曰盜巢及出沒要隘盡于此分遣一百數十人捕之其來首者助之縛悉就擒鐵布乃定六年陜西湖北四川教匪捕斬略盡餘賊多竄甘肅公將千六百人遮尾之前後數十戰而西河寨東溝堖南家渠卷洞溝硝崖厰睡佛洞諸戰皆大勝生擒其渠八年甘肅教匪平上功狀第一賜花翎公用兵常分數隊迭前迭後賊不知衆寡隊各就地勢結敶槍箭不妄發賊近在三十步始發之賊陳動則追殺不動結敶而待賊攻則彼此互援常以此獲勝其助戰者鄉勇侯達海侍衛李榮華武舉劉養鵬千總銜鄒桂攀桂皆操刺健兒也旋調肇羅道升廣西按察使署布政使十二年三月十八日卒于按察使任年六十有三配江淑人子長浩江西候補知府次沅浙江候補運判女長適天津知縣黃德棻次適陜西候補縣丞陸溎公葬通州里橋之祖塋銘曰教匪之至以萬衆先公所部兵極于三千摧孱蹈弱遂無重堅大將倚之如臂在肩斬蜀之棼決秦之阻敶如撒星戰如集雨手撫瘡痍目馴貔虎帳合千旌城堅萬杵皇帝眷功以擢以褒貂蟬之錫出于兜鍪善哉始終無有瑕尤子子孫孫蒙國之庥太子少師體仁閣大學士戴公神道碑銘嘉慶十有六年四月戊申朔太子少師體仁閣大學士戴公薨事聞皇上軫悼己酉榮郡王奉命奠甲寅皇上親臨喪次奠爵三戊午贈太子太師諡文端祀賢良祠壬申禮部遵行諭祭禮是年十二月甲子公之喪至南昌越一年十一月甲申公之子嘉端遵行諭葬禮葬公于南昌岡前嶺之兆立祭葬碑如令式而神道之左禮宜銘先是公以省墓歸南昌敬見于丙舍公慨然久之仰視日舉酒曰吾身後文屬子矣子無辭時敬起立負牆曰願吾師為富鄭公文潞公曾幾何時公遽捐館舍言之為憮然然敬與弟子籍最先在京師視公含斂今復襄窀穸之事其敢自外謹次公之事如左公諱衢亨字荷之一字蓮士曾祖時懋由江都遷大庾誥贈通奉大夫纍贈光祿大夫曾祖妣傅氏周氏梁氏誥贈夫人纍贈一品夫人祖佩贈官如曾祖祖妣溫氏贈封如曾祖妣父第元太僕寺少卿誥授涌奉大夫纍贈光祿大夫妣彭氏誥封夫人纍贈一品夫人公年十七本省鄉試中式二十二應天津召試欽賜內閣中書直軍機處乾隆四十三年公年二十四會試中式賜一甲一名進士及第授翰林院修撰旋充湖北正考官復命後奉旨仍直軍機處充江南副考官督山西學政繼丁內外艱服闋充湖南正考官督廣東學政升右中允纍擢侍講左庶子侍講侍讀學士嘉慶元年皇上登極凡大典禮諸巨製悉出公一人公之受深知膺殊眷內贊緝熙之業外宣康定之猷蓋于是乎始二年賜三品京卿銜隨軍機大臣學習轉少詹事升內閣學士補禮部右侍郎轉戶部四年高宗純皇帝賓天朝廷黜陟誅賞之事甚殷公夙夜攀慕且趨事遂疾乞假假滿兼夷部左侍郎五年轉戶部左侍郎六年教習庶吉士升兵部尚書十二月教匪平加太子少保世襲雲騎尉八年調工部十年調戶部充會試總裁直南書房十二年協辦大學士充經筵日講走居注官翰林院掌院學士充順天府鄉試正考官十三年奉命視南河豫假省墓十四年皇上五旬萬夀加太子少師十五年授體仁閣大學士管理工部事務十六年三月皇上以綏懷西北屬國幸五臺公扈從臨發送敬于正寢之門復理前丙舍語敬愕然不敢對辭去閏月回蹕公途次得疾至正定疾甚奉命歸京師治疾馳至圓明園邸第敬往問公不語二日矣是日遂不起年五十有七敬允惟唐宋以來羣輔肩背相望然或賢矣而不得其時則節耀而功不暨得其時矣而不得其主則業豐而禮不終若夫功暨禮終朝野動色而世有先賢之狀家藏舊事之録褒揚過溢漸至攘誣斯亦古者大臣之心所必不敢承者也惟我聖淸一家作述太祖太宗肇造丕基世祖聖祖并包寰海世宗高宗以勤以養訖于無外厯溯國家創業守成諸大臣皆匑匑粥粥如不勝衣其庥懿之謨鴻讜之論敷陳密微者朝廷時布之遠邇以為天下光蓋有道之世進退之權毁譽之柄皆自上操之道固如此前教匪戡定皇上以公知無不言言無不盡詔天下公薨復申繹之而公所面取進止雖同直勳舊大寮及公之親屬無有能知其説者於是而知公之為國家非淺近所能測識不可沒也公性淸通無聲色之好朝退四坐皆士大夫言人人殊公不置可否而朝廷設施有見之數月數歲之後者其燕間之論則以為先代黨禍皆驟加摧落有激而成若以事漸去之必無他變論度支主減費守常賦論治河主謹隄防不改道而論三省教匪則以為小醜跳梁無遠略當以忠勇將帥驅殄之勿使文臣支格其間此即公立朝大指也公娶陶夫人子一嘉端徐宜人出年始十一欽賜舉人世襲騎都尉銘曰王澤之和萬物承之芃芃盎盎在于所施河收其洶山斂其崿篤生哲輔如磨如錯始對大策遂冠仙瀛出馳使車入奉樞庭皇上龍飛試之心膂操圓循規引方合矩蕩乎而升芒乎而作景星在天靑狼自落雲駛月運舟行岸移扁之當楣為萬事儀如何徂謝曾不崇朝丹旐南來霜冽風蕭兼金之純大玉之粹巧鏤萬變其真則貴九州四隩視此刻辭後世之公敢告不欺張臯文墓志銘張臯文名惠言先世自宋初由滁州遷武進遂世為武進人曾祖采祖金第父蟾賓皆縣學生母薑氏臯文生四年而孤薑太孺人守志家甚貧臯文年十四遂以童子教授里中十七補縣學附生十九試高等補廩膳生乾隆五十一年本省鄉試中式明年赴禮部會試中中正榜例充內閣中書以特奏通榜皆報罷是年考取景山宮官學教習五十九年教習期滿例得引見聞薑太孺人疾請急歸遂居母喪嘉慶四年今皇帝始親政試天下進士加愼臯文中式時大學士大興朱文正公圭為吏部尚書以臯文學行特奏改庶吉士充實録館纂修官武英殿協修官蓋臯文前後七試禮部而後遇年三十有九矣六年散館奉旨以部屬用文正復特奏改授翰林院編修七年六月辛亥以疾卒年四十二臯文淸羸須眉作靑紺色面有風稜而性特和易與人交無賢不肖皆樂之至義之所在必達然後已其鄉試中式文正以侍郎主考臯文自出其門未嘗求私見以所能自異默然隨羣弟子進退而已文正潛察得之則大喜故屢進達之而臯文齗齗以善相諍不敢隱文正言天子當以寬大得民臯文言國家承平百餘年至仁涵育遠出漢唐宋之上吏民習于寬大故姦孽萌芽其間宜大伸罰以肅內外之政文正言天子當優有過大臣臯文言庸猥之輩幸致通顯復壞朝廷法度惜全之當何所用文正喜進淹雅之士臯文言當進內治官府外治疆場者與同縣洪編修亮吉于廣坐諍之亮吉後以上書不實遣戍赦歸田里臯文則竟死矣方臯文為庶吉士時今皇帝加上列聖尊號盛京太廟舊藏寶例遣官磨治篆所加尊號刻入之臯文以能篆書受廷推言于當事者宜自京師下所司等上上玉刻成遣使奉藏其舊藏寶不得磨治當事者以為然格于例不果奏又言于當事者翰林院乃皇帝侍從奉命篆列聖寶宜奏請馳驛不得由部給火牌亦格于例不果奏已而歎曰天下事皆如是邪吾位卑能言之而已臯文篆書初學李陽冰後學漢碑額及石鼓文嘗曰少溫言篆書如鐵石陷入屋壁此最精晉書篆勢是晉人語非蔡中郎語也少為辭賦嘗擬司馬相如揚雄之言及壯為古文效韓氏愈歐陽氏修言易主虞氏翻言禮主鄭氏元始至京師與王灼賔麓陳石麟子穆及敬友最善嘗曰文章末也為人非表裏純白豈足為第一流哉臯文娶于吳子成孫女適國子監生董士錫銘曰車揱馬攻駕千里隆隆之輪躓于阤勿乎臯文誰訊此銘之幽扄俟來祀舅氏淸如先生墓志銘先生諱環字淸如一字夢暘自號東里居士而淸如之字特著士之能學者皆稱之曰淸如先生先生少時喜兵家言後出入于縱橫家法家最喜道家雄雌白黑之説推陰陽進退人事盈歉其緒餘為步引芝菌神鬼誕欺怪迂之術皆好之為文章峭簡精強必已出讀書條解支劈鑿虛躡空旁抉曲導必窺意理之所至四十後為陸象山王陽明二家之言已又以為未盡反之張子邵子之説蓋先生之學凡五變而精力亦雕涸不足以赴所志矣然好古求是克治強勉為之于天下不為之日有篤老不變者先生教人諄諄必數千言反覆之如刳心著地示以必信如旁翼後推必引之康莊坐之奧室不計其人何如亦時或不置一語而意已可喻先生接人腐生賈客田翁皆欲導之于善而責貴人為甚常言為已一介不可苟為天下計不可守苛節無益于時時獨身至海塘河工度地勢求聖祖高宗之所講明者強䀨之當事一再見屏勿恤湖北教匪初起先生以為嘉勇貝子方以剿逆苗駐湖南苗自守賊不足慮宜急徹兵至湖北期一月掃除勿使蔓溢昏暮走大學士誠謀英勇文成公及大學士忠襄伯之門欲白事門者拒之最後至大學士諸城劉文淸公之門得入文淸公謝不敏遂怒而出而城門巳闔不得巳宿于護軍校之邏舍其拳拳于世如此年二十四補縣學附生二十七補廩膳生五十一充歲貢生五十七本省鄉試中式六十六大挑二等留京師恭與千叟宴七十選甘泉縣訓導嘉慶十一年十一月甲子卒于官年七十七曾祖留耕府君諱垣祖琢菴府君諱章府學生父賓石府君諱之罕府學生貤贈文林郎甘泉縣訓導前母段孺人母卜孺人皆贈太孺人配朱孺人子二長旦興順天舉人以好奇遠遊不知所往次旦勳國子監生女一適袁穀孫良弼國子監生旦興出同産姊一適卜師誠妹一敬母太孺人也先生出滎陽鄭氏始遷祖光遠南唐保大中自歙來丞晉陵遂世為武進人南唐以前系絶無可考其附會皆非也銘曰南宋季葉以儒居奇貿公與卿其下擁徒鈎帶百千或攘而爭有明變學別推波流背古式程于于縫掖為詭為迂大道其盲惟我聖淸束天下術收之朝廷士願而循應科厯官如水地行先生大呼排道學門衆睽且驚如負千鈞夜登崇阿不得征繄聞先子先生之學廢人任已任已之極刻思而一通天地始廢人之極外無應者卒隘于理聖門狂狷不逆所稟行乃不違嗚呼先生至勤言勞知者其誰前臨川縣知縣彭君墓志銘嘉慶十一年皇帝厪念江西吏治簡刑部侍郎金公光悌巡撫其地金公為當世鴻達敏毅君子以好士名天下問士于僚佐僉稱臨川縣知縣彭君淑第一金公曰然然臨川吏民訐其縣官事違格非奏請解所任竟其事無以直縣官十二年三月癸卯朔批摺下軍機處奉旨革職拿問是日彭君遊南昌城南適病寒歸邸舍少飮即僵臥越六日戊申竟不起十八日庚申軍機處廷寄乃至江西金公為不怡纍日臨川多姦蠧素稱難治知縣屢以訐去官前行臺省擇能者以屬君君引疾敬強起之至縣即以法發遣黠吏黃河淸等故為其黨持短長遂敗嗚呼可哀也已君字谷修秋潭其自號也湖北長楊人乾隆三十五年恩科鄉試中式大挑一等分發江西試用知縣委署瑞昌戈陽縣事題署崇仁縣知縣丁本生母劉太孺人憂服除起署瑞金縣事題補吉水縣知縣大計卓異引見奉旨回任候升旋署浮梁縣事調臨川縣知縣凡為知縣十九年行臺省以君年勞題署廣信府同知未及引見而卒年六十一曾祖上達祖廷芝縣學生父商賢本生父祖賢候選教諭妻官氏子二長富柟浙江試用知縣次人檀縣學廩膳生女三長適同縣劉倬次適東湖候選從九品甘淸次君卒後二月乃生側室吳氏出君治縣一意振厲所至皆有聲為人精悍而言笑儻􅛅裘馬室宇皆鮮整酒酣論古今事騰躍揮霍不主故常期可施之于實用詩深峭無近今浮華習氣前署瑞金屏賓佐獨身赴縣途次即擒治惡少年數十輩一日判一百八十餘牘皆竟召學官弟子登縣東山作重九淋漓飮賦敬至瑞金時人士尚能言之不置也銘曰宋元郡縣勢積輕鞭械之外無餘刑顧役久踞姦所并丞簿尉史各意行閭豪偷長交縱橫吏卒逐捕無尺兵誑購得姦縛圄囹所犯十罪九息停其一上言獄不平檄催獻狀流如星或竟置對口與爭垂囊長吏儕黔萌一朝掣挽弓絶弸張趙坐罪皆虧名嗚呼彭君古健者收淚勒此幽臺銘兵部額外主事王君墓志銘君諱育琮字秉玉世為武進人曾祖滋生祖家梓國子監生父光燮以進士起家終福建連江縣知縣母白氏生母黃氏君自為諸生好高吟大嘯不循俗流矩度而內行修潔無疵與人交無城府邊幅乾隆五十三年鄉試中式明年會試中式殿試賜進士出身授兵部額外主事武選司行走部中諸曹故事掌印郎中主可否其次郎中員外郎其次主事若額外主事雖同官以後進嘗嚴事諸僚掾史持牘至視已名署訖不敢問如呈牘于尚書侍郎所隨諸僚刺促行次立俟署已乃退尚書侍郎亦不問一言如未見者君至部意有所否則不署時湖南􅊧捕苗匪上功狀不平郎中以下皆已署君曰吾不能為此尚書命改牘平之諸僚知其誠不忤也京朝官雖倍祿時苦乏君以不治生益困正月朔不能具朝衣冠入殿門陳賀旦日偶驅車過所知駐大淸門外下車九叩首人大非笑之君曰屬者吾發于心不能自已不叩首不能復上車行公等所謂禮非吾所及也噫君之心于朝廷嚴摯如此使得竟其用肯飾纖芥以欺朝廷哉君能篆書為文縱麗自喜以嘉慶元年七月甲子卒於京師年四十一娶吳氏繼娶徐氏再娶黃氏無子以仲弟寶雲之子成錦叔弟育璣之子成鉞為嗣成錦國子監生成鉞順天舉人八年正月丙子葬于城東之原銘曰玉之駹石之硞也無珉之尤也竹之溝節之𦢊也無萑之摎也性一氣行堅直不可煣也琢之雕之鏃之羽之聖人之求也寧都州學正聞君墓志銘乾隆三十一年上命王大臣以身言差天下舉人之久次吏部者一等試知縣二等試學正教諭訓導著為令曰大挑更數年一舉行至嘉慶六年而聞君星杰與焉先是海內殷繁朝廷至行省臺皆法令具備知縣但據案行文書而坐擁脂膏不肖者遂以為囊槖其賢者不日遷去或十年即建旌節於是舉人皆願為一等聞君儒者不以為然當推排位廷中以十人為班主者援筆曰第七可一等即有宣聞君名者聞君久之曰星杰第八耳於是改置二等聞君出語人曰以冒得官雖三公吾不為也十年授寧都州學正十一年十二月初九日壬午卒于官年五十有五陽湖惲敬聞之曰聞君蓋能不妄進者于法宜銘按狀君諱星杰字羽儀世為袁州萬載人年二十七充府學生三十七補廩膳生三十八鄉試中式曾祖歸從九品銜祖達國子監生父望光府學生妣易太孺人生妣王太孺人配王孺人子三宗恕宗旭宗弼弼縣學生銘曰靑原沈沈石隒隒中有幽宮白日掩三公何盈君何歉以禮為室廉為門彼貴苟得非吾倫子孫勿忘視斯文袁州府訓導李君墓志銘君諱步廷字瀛仙姓李氏先世自吉州遷寧都世為贛州府寧都縣人本朝升寧都為直隸州遂為州人曾祖成泰祖國良父榮母邱氏君年二十一補州學附學生三十四鄉試中式三赴會試不第大挑二等選袁州府訓導乾隆五十七年卒于官年五十有二君文辭修飭其行事造次必以禮一門之內雍雍然娶曾氏繼娶羅氏子四長彬州學附學生曾出早卒次楨州學廩膳生次作雲國子監生次振玉州學附學生女二長適彭次適邱皆羅出本朝學校之官府曰教授州曰學正縣曰教諭其佐皆曰訓導以師道為官任儒者多樂居之其不肖者以官冷不可耐常與府州縣官之不肖者比而為熱熱甚或遷而為縣以至為州府官或熱甚而敗或熱未甚而敗而訓導不掌印其熱者常與教授學正教諭之掌印者相掎求其以德藝與諸生切􅽏能其官往往不可得敬自至新喻去袁州百餘里即聞李君賢至瑞金去寧都亦百餘里益聞李君賢皆以為能其官敬分校所取士賴生池有學行復介君之子楨來受經楨復介其從兄諫相見皆知孝友于世事退愼將卜葬李君以銘請敬于是不愧為李君銘銘曰其身康其慮定其趨道也徑故君子為熱不如為冷也車馳奔與禍鄰吾誰歸歸李君饒府君墓志銘本朝取士之制監于有明而遞損益之乾隆五十一年定第一場試四子書文三首五言八韻排律詩一首第二場試五經文五首第三場試䇿五道敬嘗言文者精神之所動才力德度之所見故自將相及有司百執事其能不能俱可于三場決之而老師宿儒硜硜如齗齗如守先王之道待後之學者與聖賢大小純駁不同然皆各有得力老死而不自足嗚呼是亦有取士之責者所宜知也敬充江西同考官得卷呈主考三呈三見屏徹闈後來謁為副榜貢生饒廷訒因得盡讀其文于所謂老師宿儒蓋無愧焉廷訒復以尊府君狀請銘蓋前後五世皆高才生而皆不遇可感也已按狀府君諱珊字仲節姓饒氏先世自靖江遷彭澤之寶梁阪曾祖萬英祖有任皆縣學生父鞏歲貢生雩都縣訓導母賴氏繼母胡氏府君少力學補九江府學生屢應鄉試不得解而子廷訒補九江府學生遂罷舉嘗告廷訒曰仕以利人度不能不如無仕世之仕者未嘗求名夫名不可求也而世乃求利焉何也府君殁于嘉慶二年六月庚辰年六十有四娶歐陽氏生子四長即廷訒次廷謹次廷諄國子監生次廷諲謹諲早天女如男之數長嫁府學生曾杰次嫁縣學生周大觀次嫁高鳳次嫁曾瑛銘曰味也者孰知其正色也者孰知其正吾又烏知貴之非賤富之非貧邪又烏知翕翕者之愈而泠泠之反病也噫饒陶南墓志銘狗馬牛皆四足儈牛者察筋骨毛尾蹄角知其強弱之質順逆之性修促之數十不失一然移之馬則不知移之狗益不知移之虎豹犀象則望而走今夫龍亦四足也使龍加首于牖儈牛者驚怖視之其又奚知而四足之外充之為無足為多足其又奚知雖然是儈牛者于牛固十不失一也稍下十而失四五焉再下十而失七八焉蓋天下物不可限惟盡性盡人性盡物性者知亦不可限其餘皆限之類如此彭澤饒廷訒為人端愼能文章最長于江西五家四書文之法奧衍淸瀏無有能得其用意者前後應十五舉不得解乾隆五十三年恩科已得而復失之充副榜貢生以貧授經南昌嘉慶十四年十月二十四日寄死于橋步街藥肆年五十不能殮其友惲子居與同志殮之歸其喪于彭澤為之銘使其子禮葬之廷訒字陶南曾祖有任祖鞏父珊母歐陽氏配宋氏子文敷銘曰以貧死以貧葬以賤死以賤祭一客不弔亦不悔魄歸黃泉魂上天為銘永之千萬年彭澤縣教諭宋君墓志銘江西東南並嶺嶠州縣以十數縫掖之士萬人其著于世者于瑞金曰羅君有高于新城曰魯君士驥于雩都曰宋君華國三人皆以贛鄧自軒先生元昌為本師其學宗子朱子其言守前明薛文淸公本朝陸淸獻公如積矩然後羅君遇家難遁而攻浮屠氏之書魯君奔走令長非其好棄去獨宋君官儒官始終行其意故其為文羅君奧衍而多俶詭之詞魯君端雅自惜邊幅宋君則沖夷如不欲為文敬初至江西三人皆已沒世得其文讀之常推見其為人瑞金陳生蓮靑受業于宋君宋君之子惟駒與陳生交謀宋君窀穸之事因陳生以銘來請按狀君名華國字雨宜自號立崖居士先世由廬陵遷雩都之賴村曾祖敬禧縣學生祖日景早世父啓恩貢生母談氏君年二十為縣學附生明年為廩膳生年三十充拔貢生五十選石城縣教諭旋丁太孺人艱服闋署吉水縣訓導補彭澤縣教諭引疾乞長假卒于嘉慶八年十一月戊申年六十有九配劉氏子二長惟駒舉人次惟駰縣學廩膳生君壯歲而孤家貧授經以養母太孺人忘其貧官石城迎太孺人養署舍朝夕無倦容及太孺人卒適大雨山水驟至壞署舍君號于神太孺人柩卒無損伯兄昌圖艱于子為三置妾竟舉子季弟光國早世君聞其名則掩耳而走終身皆然官石城吉水教士以禮毋怠于其業毋訐訟以為常敬嘗考江西道學之傳子朱子之後一傳為劉子澄黃直卿子澄臨江人直卿久官于江西皆不愧其師説再傳為向浯饒魯已離其宗三傳則多為詭偽之士所託有絶可歎詫者自軒先生奮于百世之下追而從之君與羅君魯君同事自軒先生乃各有其所就蓋志氣之強弱性情之緩急天時人事之推禪皆于學有消長進退異同之故其始甚微而其積甚巨大賢以下皆然不可不察也敬于羅君魯君止讀其文于君兼得考其行事以為喜幸爰不辭而為之銘銘曰以問學為入以文行為出其于道也至則如晝之日不至則如夜之月然聖人之教不越路不由徑者車行地無異轍人行地無異迹也不循其轍不蹈其迹是為無行地之説噫如君者其知之其能知之寧都營參將博羅里公墓志銘公諱博羅里字祥卿國拉記氏鑲藍旗富明阿佐領下人聖祖仁皇帝康熙十三年發關外精勇實京師公之曾祖松窩羅隨檄入關早卒祖阿里瑪父史達驍騎校母那拉氏公以將家子為護軍擢護軍校護軍參領先後凡三十八年高宗純皇帝歲幸熱河獮木蘭圍場皆從其他幸所亦從今皇上嘉慶元年兵部舉年勞引見奉旨發江西以參將補用是年署建昌營遊擊三年隨剿義寧州教匪有功旋署寧都營參將營制把總以下升授巡撫總兵官主之干總以上總督主之江西營屬兩江總督故總督兵房吏權極重與副將以下為兄弟稱公于例當即補寧都營參將兵房吏以書通公罵其使曰吾皇上領兵大員如苟且何面目見皇上若主胥也吾與若主何兄弟兵房吏遂托事掎之不得補四年署袁州營副將十年署撫標中軍參將十一年復補寧都營參將去前署寧都營八年矣公曰此命也吾何尤公短小須眉稜起不讀書天性剛介其嫉惡如不勝如不欲容之于世然能改則歡然相從曰當如是也在官不以家纍從自寢室至廳事掃除必潔器必整犁旦即起自拂牀榻盥潄畢衣鞾危坐日出治軍書接賓已復危坐日晡射矢十日入即息以為常奉入之外不侵將士一錢亦不令他人得侵之故將士皆敬公終日侍無懈者凡遇總兵官過所部公出奉銀二百兩葺垣舍峙芻茭以所餘置頓曰朝廷將士冒風雨寒暑來豈可不一餐外此吾不敢所屬都司守備欲助公公不允曰吾多所餘諸君有身家身家安乃可為皇上盡力勿以吾故令諸君乏也戰守兵亦有身家諸君能諒之足矣總兵官聞之常先造謝待以殊禮寧都有在籍大官甫識公輿厚儀以進公曰視友之饋無不可雖然若未知吾何如人不可饋吾不知若何如人亦不可受少遲之異日定交後可耳牙中兵夜直千總營千總姣之兵走訴公公訶曰何得汙長官逐出千總喜明日公坐便坐呼軍吏具申文劾千總廢弛請革職而以前訴別書稟同函申三日後千總知上劾闖然至堂皇大詬一營皆不平請杖之公曰彼有老母劾其官罪當矣以此事得杖何面目復生是殺其子母也于是寧都民大悅公出皆擁觀以得見誇于人刑部尚書金公光悌巡撫江西聞公名調署撫標中軍參將公進退以禮會有急獄繫四人發中軍其一人當繫未得指揮後呼囚止四金公斥之公曰參將不知獄情大人指揮繫四人參將不敢五也如參將面從受大人斥是長大人過大人何用千里調一面從參將為中軍是日金公下演武廳試騎射公拍刀侍甚久金公勞之曰少休好參將也十三年復署袁州營副將十四年以疾乞長假十五年四月五日卒于南昌私館年六十七是日尚危坐日晡始就臥曰吾不起矣時敬在南昌視公含斂加詳公娶母氏之黨生子玉福禮部祠祭司拜唐阿孫喜忠喜明七月二十四日玉福來江西扶柩歸京師敬因次公行事素所見知者俾志公之墓銘曰狷之絶物自高如狂而遇所施先峻其防失至于隘我與公同盛明之朝人亦見容啓手啓足公行不復我愧沾沾云何其淑張府君墓志銘敬始官江西新喻即聞永豐張瓊英有行能學術新喻鄰永豐而瓊英官瑞金縣學教諭去千數百里不得見及敬調瑞金瓊英已官安徽天長縣知縣而瑞金士大夫皆賢之飮酒必舉瓊英所居曰鶴舫先生時臨我出其詩曰此所贈也少年必相尚曰我鶴舫先生弟子也後敬以公事赴南昌道出吉安時瓊英以疾去官歸授經靑原山中相遇今年復相遇于南昌瓊英棄知縣願就府教授敬以此高之瓊英以尊府君狀請志銘敬不敢辭按狀府君名奏勳字匡世縣學廩膳生敕封修職郎瑞金縣學教諭世為永豐人曾祖眉友縣學生祖睿干父振皋拔貢生雩都縣教諭母郭氏府君性和易喜為文章教子弟有禮法生平不佞佛亦不斥佛曰吾為儒儒之道自盡而已凡道書丹經皆不觀曰修身謹疾而已天下豈有仙人嘉慶十一年七月二十八日卒年七十配聶氏敕封孺人十二年七月十八日卒年七十一是年九月一日葬于東坑之原二十九日聶孺人袝焉子三瓊英字珩賓嘉慶六年進士饒州府教授次瓊芝次瓊荃皆縣學生銘曰二氏溺人遍大九州盡未來際居貴當富冀延福命惑同婦寺其中賢智好談精渺雲縱波肆肌血貫注如父子性師師弟弟豈知律教溢為禪悅義外立義上升不驗遁言尸解守尸尸敝全真之説以仙援佛類彼非類而為儒者後身先口以諍而誶吁嗟大道為識所界萬端破碎府君持論能平則正勿謂近易刻之堅石永永無泐爰告後世刑部主事曹君墓志銘君諱德華字迪諧一字山甫姓曹氏宋寶慶中兵部尚書彥約自歙遷都昌十傳至廷賓自都昌遷新建之蘆坑三傳至文寶自蘆坑復遷魯江君曾祖家甲福建龍溪縣知縣祖繩柱福建布政使父頴先候選州同知妣萬氏君年十九為南昌府學生次年為廩膳生乾隆四十八年江西鄉試中式五十八年會試中式六十年殿試賜同進士出身以內閣中書用是年考取軍機章京嘉慶二年補內閣中書三年充山東副主考四年充方略館纂修七年升刑部江蘇司主事九年充方略館提調十一年總辦秋審十二年二月初九日卒于官年五十有七配彭氏子二紳業綈業女長適候選從九品熊文濬次適太學生彭邦彤君貌豐下須眉羅羅然進止語言甚溫雅而耳重聽語非促膝不聞所官內閣及刑部皆繁要又督攝皆天子親信才德重臣故少年厲鋒頴求合反多不得當君以重聽聞于勳舊諸老先生皆加意察之然君從容十餘年無一事齟齬者憲皇帝雍正五年設軍機處論者以為如宋之樞密院然樞密院止掌兵事與中書省並重而已本朝軍機處主受天下之成如宋中書平章事主內制如宋翰林學士主徵發賞罰功罪如宋樞密使三者惟明之內閣兼之今內閣在午門不能常見止熛擬進呈軍機處在乾淸門大臣每面取進止益嚴重故軍機章京常急速趨事以為能然君亦從容十餘年無一事齟齬者嗚呼諸老先生能容君與君能見容于諸老先生足以稱矣先是純皇帝南巡君獻賦行在賜緞二匹後君外舅彭文勤公元瑞直內廷純皇帝淸問及之朝士以為君成進士必賜及第而竟列三甲內閣侍讀員缺例用內閣中書一人軍機中書一人故行走者皆洊陟侍讀會直隸總督題十三州縣被水復題誤為十二君正之皇上嘉其勤朝士以為君必擢侍讀而竟以平教匪議敘升主事若是者其命邪然非君能安之何以及此君能詩善篆分不恆作行書正書皆精能畫山水學南宋溢為花鳥人物草蟲得其意然多偶然為之不殉貴遊請屬自君之曾祖祖以進士起家羣從悉貴盛而君從父文恪公秀先以待從官六卿君生長世胄始終淸素自守有寒門所不能者君殁後一年紳業綈業自京邸扶柩還新建將卜葬以敬與君為鄉試同年生請銘銘曰收視者明返聽者聰餘于道則其事習其藝工故形之選非德之充也外舅高府君墓志銘府君姓高氏名光啓字曙初世為武進人曾祖爾傅江浦縣教諭祖閭江西萬年縣縣丞父希準敕封文林郎妣程氏敕贈孺人文林君推産兄弟洎府君長而家益貧文林君磊落不為意程太孺人常早起無可炊則危坐鼓琴府君聽之凄然傷不能養脫身走京師就太孺人之弟文恭公景伊于邸第已而太孺人卒因移家依文恭文恭淸厲自守無所餘府君則藉客授所入以養親前後七應順天鄉試不得解四庫館謄録考滿選山東菏澤縣縣丞署定陶武城齊河縣事調汶上縣縣丞擢掖縣知縣考最署平度州知州其時大吏有以縱恣伏法者連僚屬多人法至死戍其中有不幸者而府君適以失囚幾上劾急捕得免曰疇官之法可知矣吾豈可危吾親遂乞養歸府君之弟沅陵縣縣丞桂在湖南并呼之歸曰吾宦雖不成然視入都時足以養矣與弟共之可也歸五月而文林君即世又十年府君終不出卒于家嘉慶五年八月丙寅也敕授文林郎掖縣知縣例授奉政大夫候選同知年六十有五府君性淳篤未嘗以聲色加人而吏事修舉人不能欺少日往來文恭邸第十餘年其時同州如劉文定綸之淸愼錢文敏維城之警健莊侍郎存與之淵雅皆朝廷偉人文恭則以長者在崇班中能持正無所阿徇府君請益諸君子而言行則性近文恭故能善其始終內外如此敬赴江西時常拜府君于庭後歸而見府君同産妹之夫趙甌北先生翼觀其文章議論邁往無等追思府君之為人溫然盎然與先生若有徑庭而終身相厚善蓋各安其中之所獨至者使敬得侍文恭其志意氣局又當何如而惜乎其未及見也府君娶孫宜人繼吳宜人子二長德英候選府通判沅陵君子府君子之繼府君卒次德洋候選知縣吳宜人出女三長歸子敬次適國子監生徐士爔次適劉焜望二十年九月戊子卜葬于城東五路橋之原銘曰宜于已宜于人譽兄弟繩子孫兆于斯奠幽室以寧為天靈為日天昭日明永無極楊貫汀墓志銘明南京國子監博士楊淡餘先生以任為瑞金文學儒者其七世孫曰縣學廩膳生元申字貫汀能文有行檢敬初至瑞金貫汀學焉兄五人其三人前卒曰元棗字美汀曰元芻字牧汀皆縣學生敬皆得交美汀不久卒敬以計吏入都及返而貫汀已卒問牧汀牧汀亦卒嗚呼瑞金如貫汀方可進于古之學者而兄弟相繼頽落如此淡餘先生年三十五未竟用世之志著述未畢業今貫汀亦年三十五不大可感歟貫汀卒于嘉慶十五年九月十九日曾祖方堅祖于昭皆縣學生父其恂母張氏貫汀娶于賴子會九銘曰殤非天彭非修如其然吾何尤徐恭人墓志銘嘉慶八年五月甲辰朝議大夫南昌府知府楊君煒之恭人徐恭人卒于治所之內寢九年子鼎高書高以朝議之命歸葬于陽湖城南之原恭人世為武進人曾祖永寧大理寺左評事祖朝柱內閣中書候補主事父熊占福建福州府通判前母楊安人母高安人繼母楊安人恭人年十八歸朝議自朝議為庶吉士及知縣于柘城商邱固始平鄉同知于南安袁州恭人皆從其卒年五十有二敕封孺人進宜人恭人子二鼎高太學生考取實録館謄録書高太學生女四長適商邱拔貢生陳彬次適仁和太學生金孝集次適同縣鹽運分司湯貽恩其季字吳縣太學生張昆元朝議狀恭人曰恭人嫺婦儀事繼母得其歡心逮事先大夫浯州府君而事先太恭人陳太恭人二十餘年以禮如一日好讀書尤悉于史事豫性戅當官無所避常讀馮道傳詆之恭人曰長樂老名節掃地矣雖然其所遇之人何如哉虎豹蛇蝎而能使之皆馴當必有道矣惲子居曰大哉此言天下為君子者能知所以處小人之道則下無鉤黨之禍上無棄賢任佞之敗然惟有名節者方可議處小人而能處小人者其名節又必如泰山大河磊落汪洋可信于天下後世之匹夫匹婦方為善耳恭人不可不銘銘曰婦德愈愈氳兮若蘭玉珮鏘鳴以肅以歡紘綖大帶及于􅎵􅔱蒸蒸之化視斯則已有美碩人宜于厥家敬相夫子如輔在車立朝之要一言日益憎主詢多毋搆于隙鳳凰不擊鷙鳥革心麟之般般嶽嶽在林凡百君子其敬聽之貞珉不泐永此刻辭甘宜人袝葬墓志銘甘宜人奉新人曾祖諱汝來太子太保吏部尚書諡莊恪祖諱禾禮部主事父諱立功翰林院編修母熊氏浙江巡撫諱學鵬女也宜人年十九歸南昌曹君庠業曹君以拔貢生授玉山縣訓導厯知浙江武義錢塘福建龍溪諸縣遷知廣西新寧州奉特旨知四川直隸茂州調瀘州署夔州府事先宜人卒宜人卒于嘉慶八年六月二十三日年四十有五以十一年二月己丑袝葬于新建城西曹君之兆子二長熊舉人候補內閣中書次熙女二長嫁南昌候選從九品塢宣諭次許嫁吳縣國子監生蔣兆鄂江西入本朝大家之守家法者于南昌府所隸曰曹曰甘曰熊曰彭曰裘皆起家侍從至大僚而曹氏自地山先生秀先以重厚端實為朝廷大君子甘與熊兼著治幹風節宜人熊之自出教成于甘而女于曹故才質德行皆有儀法昔韓退之志京兆韋夫人援詩碩人之義以敘宗親蓋大家子孫顧惜門第而女子益為繩矩約束多適于禮者敬爰按中書之狀比其事以銘宜人之幽使後有所考焉銘曰膝下婉婉服于聲詩不幘之言王母色怡言歸于曹重闈是養緌纓有節燠寒無恙割田而貸脫珥而輸姻族熙熙以義為腴夫子之型子也是式勿為秋霜煦之以日綿綿荒原松檟永存宜人之德施于孫孫薑太孺人墓志銘本朝之制命婦不得以節旌門所以教士大夫之家守禮明讓也張臯文曰聖天子整一海內激揚大典輕重以倫法備矣若為子者之心以為有列于朝吾母不寵旌門將以邀天子之命不幾于以子之貴加母之節歟其罪與沒親之善等臯文成進士改庶吉士其明年當以高宗純皇帝升袝禮成覃恩海內因亟呈牒禮部為母薑太孺人請旌門事下府縣然後復呈牒禮部如庶吉士例賜孺人始卜日改葬臯文師友多大官為文章宗師顧以敬之言為不欺後世屬之銘嗚呼臯文可謂能事其親者矣按狀太孺人武進人父本濰縣學增廣生母胡氏太孺人年十九歸臯文尊府君同縣府學廩膳生蟾賓二十九而寡貧甚日不得一食卒守志不易撫孤以訖于成人乾隆五十九年十月十八日卒卒年五十九子二人長即臯文名惠言孤始四歲翰林院編修次翊遺腹生縣學生女一人適國子監生董達章銘曰之死難寧飢死而不死尤難而甘之及三十年宜其子之賢也李夫人墓志銘嘉慶十年四月乙丑前資政大夫巡撫廣西南康謝公啓昆之叔子學坰葬其嫡母李夫人之柩于新建大山之原去夫人之卒十有九年矣先是資政之仲子學崇與學坰議葬事既定于正月赴都下補官而孟子學增早卒其孤振晉傅重與季子學培皆幼故夫人之葬惟學坰釐其事加詳且以兄學崇之命為辭請敬為之志夫人資政同縣人曾視執中歲貢生祖上謙父逢湛國子監生母王氏夫人年十五歸資政于南康後三十五年為乾隆五十二年正月甲申南昌私第火夫人卒年五十誥封恭人晉贈夫人子四學增二品蔭生候選主事繼室劉夫人出學崇嘉慶七年進士翰林院庶吉士學坰候選員外郎皆側室盧孺人出學培候選府同知衛孺人出孫振晉二品蔭生夫人生女一盧孺人生女一管孺人生女三高孺人生女一自資政為庶常編修夫人常從及資政外為鎮江知府移揚州寧國亦從其卒也資政以寧國府知府家居用五行家言緩葬後資政由南河河庫道擢浙江按察使遷山西浙江布政使最後巡撫廣西皆遠宦間以上事道出南昌不及葬逮資政卒用形法家言不合葬夫人素賢能逮下及見學增學崇之生學坰學培皆後夫人之卒始生而學坰竟克葬夫人亦夫人之賢其得于子義與命宜如是也銘曰夫邪子邪貴邪富邪夜宮其晝邪已焉哉董孺人權厝志吾常董潯州思駉以戶部員外郎出守卒于官恭人高氏與敬妻為同高祖姑姪恭人之女董孺人歸國子監生楊鼎高鼎高從其尊府煒守南昌而孺人殁于官舍日者言歲陰所在于法不宜葬遂卜日權厝于城南之原孺人年十七于歸殁以嘉慶八年正月甲子年二十有九去姑徐恭人之喪不及一年去先後丁孺人之喪逾一年蓋南昌與鼎高及鼎高之弟書高二年之間相繼遭此變故是可哀也已而孺人之母高恭人居本貫鼎高亦以事回里均未得臨孺人之喪子三嘉寶應寶三寶女一皆幼小失所恃重可哀也已敬以姻族知孺人之賢教于室而宜于楊氏之家爰為之銘曰生慈于姑死從之心勿悁也先後之不年天為之不知其所然也母也天只勿損所安也吁嗟所生惟夫子怙之勿棄捐也亡妻陳孺人權厝志孺人武進陳氏名雲父士寧母鎮氏孺人年十九歸同縣惲敬日纑高昌棉十兩織日得布一匹自先大人太孺人與敬悉衣之二十六敬赴試禮部遂留京師太孺人以孺人多病禁勿織孺人撚雜線蹙之為菊牡丹鳳子雞數十類俱創意不襲舊式或綴雜綾絹為之率三日可得白金一兩助甘旨暇則讀論語孝經蓋如是者十年敬終不成進士就知縣始從官于富陽二年調江山旋聞先大人之喪孺人以疾歸遂不起年三十九時嘉慶二年閏月丙辰也生子以道女玉嬰皆不育烏乎可哀也已先是敬官富陽時大吏非意侵辱敬以禮拒之適湖南苗擾辰沅間因急檄使護銀十五萬兩餉軍道出賊中孺人聞檄至驚得胸膈疾而代者日求敬公事缺陷欲擠之以快大吏不得則以小事惱敬家口孺人畏憤疾益篤及敬餉軍役返上事江山常小差後卒以是疾死烏乎人孰不願其夫之仕者然未仕不過勤苦而已既仕乃至如此此豈可盡委之于命邪敬蓋自尤之不暇而暇他尤邪以是年十一月辛未權厝牛車之西阡敬喪先大人始祥禮不宜有所撰著然事恉有非他人所可言者沒之又不忍禮亦宜許自言遂為之銘曰名乎有詭成者矣而願之乎而不願之乎宦乎有巧達者矣而善之乎而不善之乎遇乎有日豐者矣而獨歉乎抑吾之歉而歉而乎其若是儉乎噫女嬰壙銘惲敬子居之女嬰生于乾隆四十八年七月八日時敬館陽湖橫林之徐氏三月後一歸視之明年正月往京師又二年敬方遊太原五月十六日嬰以痘殤葬居西師子墩屬武進縣通江鄉九月家問至太原後嘉慶二年嬰之母陳孺人卒無子敬蓋年四十矣感奔走之苦身世無所就而焭恤如是追埋銘于嬰之壙前前五步志永傷焉銘曰吾未見嬰之生也而死亦然以是為天屬其疑于薄也盍悔旃國子監生周君墓表敬治新喻之三年召鄉三老求孝弟于家恤于里黨者旌其閭于是國子監生為琳縣學廩膳生為瓚狀而請曰先人之棄琳瓚在嘉慶五年二月丙申八年十月乙酉葬于西郭之北原分宜林大任銘諸幽今明府君陳高義激揚吾喻之人能哀先人而表其行是賜先人以不朽也敬惟昔者歐陽文忠公為乾德令表屯田員外郎李仲芳以石隄捍水有功于縣民應山處士連舜賓賙貧匱者卒後二十年文忠公亦表之遂不敢辭按狀周氏世居吉水之泥田十七世祖長卿為新喻教授遂家新喻君諱志濂字江臣入資為國子監生處父母兄弟能歡為祠堂祀元公為始祖祭器衣服皆備祭田若干畝贏以周宗之人縣有緱山書院燬于火君復置之率縣人修孔子廟以餘力為屋十二楹館縣之試行省者縣漕二萬四千石君以倉隘增徙之復請于縣為社倉于雲路門至今貧者得貰其穀蓋君之力于事以施其德多如此曾祖天民祖可從父廷標母傅氏君卒年八十有二娶同縣廖氏子為琳女適縣學生胡繼良繼娶山陰祁氏子為瓚女適縣學廩膳生萬介齡敬既次周君之行乃揚于衆曰人之善性也雖然為之者必視其分焉世嘗有秉均軸擁摩節所行得罪于天下後世而鄉之人懷其惠尸而祝之者是不明于大小公私之分而已夫有天下之任者以利天下為善有一州一郡縣之任者以利一州一郡縣為善有一鄉之任者以利一鄉為善如周君所為令秉鈞軸擁摩節者為之無增于其身之善亦無減于其身之惡何也大小公私不相敵也今周君處下竭其才量為善于其鄉皆視其分為之且周君為其分之所宜為訖有事實功效垂之永永蓋非虛辭揖讓取長厚名者所能至其足為為善者坊乎遂書之碣而列于墓左浙江分巡杭嘉湖道陜西候補道李公墓表國家倚東南財賦而浙江居十之三大府總督浙江福建者行部過浙江所取州縣公使銀且二十萬州縣力匱則盜正帑應徵索而歲稽其上供之數以後歲所供掩之自前協辦大學士覺羅吉慶公巡撫浙江躬廉潔率屬歲裒所餘益帑總督徵索悉不應其爪牙支格者悉以禮遣之行之數年而浙江之財賦大贏其時左右吉慶公提綱舉凡使衆畫一者曰分巡杭嘉湖道李公翮警敏強毅君子也公山東金鄉人字逸翰曾祖怦祖爾傑皆縣學生父來鵬副榜貢生妣周氏公以乾隆三十八年進士補祠祭司主事升儀制司員外郎郎中改福建道監察御史升禮科給事中轉吏科掌印給事中除分巡杭嘉湖道署布政使一署按察使再以周太恭人年老乞養歸後服闋赴部奉旨發陜西以道員用旋以疾歸卒年六十有六公在禮部以淸謹聞充雲南副考試宫以能得士聞為御史給事中以敢言聞有列卿之子冒得官公發其罪同官有庇囚者公亦發之高宗純皇帝常下特旨奬其伉直巡視中城北城明科教肅姦宄平道塗飭市城衆不敢犯赴官陜西抵留霸廳教匪大至公募鄉勇拒守七晝夜賊始退留霸獲全移駐興安奏記領兵大臣請鄉勇各守堡無調發有警則互援自是鄉勇心始固教匪不能侵多解散者在行間與衆共甘苦上下山谷皆單騎厯險阻忍飢渴以致得疾不竟其用論者尤惜焉始公之在浙江也吉慶公知公賢事皆取決而總督以前事銜公會公復署按察使義烏民何世來等倡邪教相署置造違禁物有以急變告者公曰此愚民耳白吉慶公毋以兵過江自馳至義烏檄府縣官次第縛之以邪教奏而總督得守備報具反狀奏之且擁重兵自福建向浙江揚言浙江縱反者當窮治吉慶公大撓公曰福建摺過浙江屬耳今浙江急驛以邪教所署置及違禁物續奏可先達至尊至尊知福建邀功不録也後得旨令總督還福建毋妄動終公去職總督未嘗能以聲色加公後一年總督之事遂敗敬初仕浙江公已交替嘗謁公公貌循循然如無所能者而浙中大小吏言及公之抗總督皆動色以為不可及嗚呼屬官不敢犯大府虞其以法相中耳一嚬笑一指揮不敢逆而公乃驟禠其公使銀至二十萬其毒公當何如然大府之技充之至以黨逆中人止矣而公脫然始終名高身泰雖公之智計足以投抵間隙摧落機牙然非宸扆之抑邪昊穹之右善何以至此其至此則人理天道之的然可見者也世之俯首終身如檻羊紲犬者亦奚為哉亦奚為哉且敬嘗計之一行省可減二十萬十行省即可減二百萬歲歲儲峙不外靡不私沒朝廷內撫諸夏外御屬國用何患不充事何患不理用充事理則有司取之于民何患不平况乎不徇大府之欲僚屬必不敢汙不屈大府之威政事必不敢暇一事就軌萬理咸備敬均可為天下決之公之行甚修事甚辦而此一事所係極重又敬仕浙江時所習知者故推論以表公之阡使後世有所興起焉公配周恭人繼配周恭人側室朱宜人子四庭芬國子監生候選州同知庭禧拔貢生南城兵馬司指揮庭業優貢生正白旗官學教習庭英幼女三長適候選縣丞周嘉謨次適周之勉次適候選知縣楊大勳嘉慶十五年十一月初九日庭芬等葬公于金鄉小樓莊之兆陽湖惲敬謹表王盛墓石記嘉慶元年浙江富陽縣知縣惲敬解餉軍銀十五萬兩至貴州銅仁交納役旋經江西豐城隨行民壯王盛物故葬之城西高原五年赴任新喻為立石墓次盛亦殁于王事也後之君子勿侵毁焉可也鸚武冡記惲子居上新喻助前事陸允鐸公錢二百餘萬允鐸報以鸚武一架相隨十年瑞金受代居新建貍撾鸚武傷髀而死余伯維葬之園中紫檀梅花樹下賢愚經曰須達長者有二鸚武一名律提一名賖律提聞阿難説四諦歡喜持誦後為貍所食展轉生天凡七返復生人中得辟支果嗚呼佛經三藏蓋十之八如賢愚經焉祭張臯文文維年月日謹于新喻之崇慶寺設位致祭于吾友張臯文之靈曰四瀛茫茫日月何遒目眢心忳已矣誰儔吁嗟臯文産豫同州有唱豫和有酢余酬豪攢英族子拔其尤前攀愈翺旁睨師侯百世之行萬人之學雷絶電歇河截其流吁嗟臯文作噩之春同謁文學揖豫于門宛兮淸揚其神則尊豫弱而狂一語未申單閼之舉子罷豫解北上折翼嗷于中野歲舍四遷厥宮巨蟹子偕郡計卸車都下逆旅相值比戟交弓秦齊一馳屹乎西東志合心齊如金在鎔澄沙汰礫以精為同聚散之迹垂載十五遇蓼求甘得薺慮苦春官駮放歸途載阻共職四門艱屯可數籧篨搆屋月僦半千土炎炎石炭親然其塵刺鼻漲地熇天瀦水橫堂敗壁臨筵雞栖有車駕􅐒以俟伸指論值計錢當里均茵而乘斂衣覆履搖搖凌淖艅艎在水待假而裘待質而炊不肥斯臞母覦于危簸今而友揚古而師一語脫唇萬目暌睽豫吏于浙子憂去官視豫富渚開余以寬綿綿疾疢言與死鄰子決為活冀道之伸豫葬先子子官于朝白璧耀光匪襲可韜公卿側席首乎羣髦豫亦來都注官于曹渝水官符朝下夕赴送豫闉闍頓軛而語誰知死別成此終古訃來當食投箸吐哺無為為善斯言太苦吁嗟臯文人孰不貴仁義如子之勉焉勿棄豫知其難易皚皚之白勿拭則滓吁嗟臯文人孰不願富貴如子之儳焉勿及豫知其得失滔滔之轍勿詭則躓吁嗟臯文生不昏惰死其有知千里行匶勿淹勿危妻單子稚內外誰支念此零丁惻愴肝脾葬子崇岡二甫能力伐石之辭惟豫是職尚饗
