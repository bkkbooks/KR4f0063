敢辭敬觀班孟堅范蔚宗傳循吏皆推本儒術或列所治經舉其科可謂知為政之要矣然所載多郡國二千石縣令惟蔚宗傳王渙一人任峻附見傳中且以明發姦伏為未充德禮之教夫德禮苟不相應則姦伏之心侈矣何明發之功可紀哉縣令官卑其權不足攝下故為縣令視二千石為難而德禮之效則以能明發姦伏為治縣符驗能如是未有不為良二千石者也公諱夢琴字虞揮姓鄧氏曾祖國挺自南城遷浮梁祖文諫貤贈朝議大夫父以忠贈朝議大夫母石氏贈恭人繼母吳氏公年十八補縣學附生二十一為廩膳生二十二鄉試中式三十會試中式以進士候選吏部授四川綦江縣知縣縣人相沿呼大府胥吏為老上司橫甚公察其尤者先豫杖後申請治罪遂俱斂貴州遵義有巨盜亡命過縣公遣捕人迹至二千里外之萬縣獲之以能署江津江津民宋志聰者與楊在位爭博負在位毆之仆死置尸黃君相之門江津前政比君相殺人罪已庾死矣公鈎距得獄情讞之前政因推事官巧請於按察使掎其獄公力爭按察使遂怒此初獄也而前政在江津事多率爾民周景康盜樹為樹主斫顱左旋以他事與周秉魯爭傷腹下乃死前政以比樹主公請復診之腹下傷重罪當比周秉魯而按察使挾前怒欲如前政比以傾公此繼獄也當是時前政已因宋志聰獄去官公復持此獄甚急於是諸黨按察使有氣力者為蜚語以為公好排人人已墜坑陷尚下石按察使雖知公直而必泄前怒幸其言公勢危甚會公還綦江定遠民談學海被殺不得主名縣攝民六人笞服之至府皆不承公奉府檄廉知諸偷鄧理瑤等實殺人一訊獄具此最後獄也公白府分功定遠定遠得免議諸大府益信公非排人者適按察使權布政使周景康獄乃如公讞焉丁吳太恭人艱服闋以贈朝議年老請養家居十二年後服闋選授陜西洵陽縣洵陽處萬山中流民賃山種稞自立下手書曰稞莂取木石耳曰耳莂燒炭曰炭莂黠者不立期遂多訟公令種稞期五年耳炭期三年民安之山南州縣地日墾大府歲檄升科公言流民開荒食數年之利不可使失所他徙國家賦額已定徒飽吏胥耳終公去洵陽不報升科旋署岐山調寶雞寶雞臨棧道轄陳倉東河二驛冠蓋旁午驛馬多疲損前政以給里民需其值曰領馬有急復摟私馬應官曰里馬公令領馬皆交見馬驛遂充非大差不撥里馬逆回田五作亂陷通渭公斷仙靈谷石道為守計後馬文熹屯底店公料丁壯登陴賊未至而罷旋擢商州知州署西安府擢漢中府知府護漢興道因事鐫級大府以教匪方熾奏留公後病濕纍上記乞休年七十五矣始公家居時知浮梁黃君泌治頗辦而性卞急請益於公公曰聽訟末也雖然有本焉古之人先治已之好惡矣至聽訟則察人之好惡為好惡焉夫天下固有得其辭而失其意者豈有舍其辭而得其意者哉當官難於愼守官難於和緩求其難焉可也自公為州為府所屬皆喻以此意而公持大綱不苛察故皆治公年二十四陳恭人來歸孝謹守婦道年七十有二先公十一年卒子一傳安進士福建羅源縣知縣女一適國子監生吳篤照孫二世疇世畬皆縣學生公為學自少時以小學近思録洛學編為宗後從座主蔡文恭公新遊窺閩中道學源流終身守師説所著有楙亭文稿十六卷詩稿八卷銘曰養魚勿煩治民勿殘勿煩者淸其池勿殘者察其辭池濁而漚浮魚之仇也辭差而聽惑民之賊也登山不可趨學道不可愚如公者儒術之所與也國子監生錢君墓志銘君諱伯坰字魯思自號僕射山人曾祖安世南和縣知縣祖枝起歲貢生工部營繕司行走父勳著國子監生母莊氏繼母高氏君未成童即孤露力學以至於有成敬幼聞君名後遊京師與張惠言皋文交始見君之書若詩書學顏平原李北海詩學杜陵兼學誠齋石湖有傳君捐館者張皋文曰魯思必不死何也魯思事繼母孝今中歲未有子天豈使之長往傷孝子心哉已而果不死敬再娶於高君之繼母為敬妻之祖姑敬妻嘗言祖姑之來君扶輿行祖姑下輿則執蓋隨之嚶嚶如孺子語嘗日坐臥抑搔之必得喜語方止弟辛才感末疾君在吳中聞之一夕鬚髮盡白辛才卒大慟曰吾何以慰吾母乎後莊太孺人以九十五卒君年逾七十舉三子矣君性邁往多飮酒高步雄視知交遍天下不問賢不肖皆交之然有為非禮者未嘗與君從叔父文敏公維城享大名呼吸可致人靑雲君自少依之歉然自退終於國子監生嘉慶十七年六月十七日卒年七十五娶莊氏無出子三山簡小晉又男側室潘氏出銘曰醇行其陳仲弓乎何氣之不可壓也隱節其梁伯鸞乎何與世之狎也書人歟詩人歟何言之狹也孫九成墓志銘君諱韶字九成自號蓮水居士先世浙江餘姚人曾祖父光官廬鳳兵備道始遷江蘇上元祖必榮官終廣信府知府父蒲上元縣學生妣徐氏君年十八補縣學生為人和易喜交遊所交皆名公卿而能自矜重無詭隨之習為詩以淸雅有藴蓄為宗嘉慶十六年十月二十日卒於江西巡撫先福公署中年六十公自守黃州即與君交至是殮君助使歸葬君娶楊氏子若霖江寧府學生君少時嘗及錢塘袁枚子才之門子才以巧麗宏誕之詞動天下貴遊及豪富少年樂其無檢靡然從之其時老師宿儒與為往復而才辨懸絶皆為所摧敗不能出氣且數十年敬遊京師時子才巳年老頽退矣而天下士人名子才弟子大者規上第冒膴仕下者亦可奔走形勢為囊橐酒食聲色之資及子才捐館舍遂反唇睽目深詆曲毁以立門戶聲氣盛衰至於如此亦可歎也子才久寓白門君生長其地垂髫束紒即以詩名不能不為子才所鑒識君為詩不學子才亦未得子才絲粟之力上階雲霄然君至江西髮已斑白常推子才為本師不背其初敬與君無間然每見君君必先言子才之美以拄敬平日之論説嗚呼此可以見君之所守不以死生而易師門友席推之君父之事豈有異耶敬前自江西歸常州與君別於章江之濱後返江西過上元聞疾甚恐有不幸至章江而君之喪已東下矣追惟往昔深用恤然如君者亦吾同好中不數數然者也會若霖以狀來將卜葬爰為銘以詒若霖使納君之扃焉銘曰嗇其遇昌其詩子居友子才師淄澠之別誰能之莊經饒墓志銘莊經饒名雋甲陽湖人曾祖柱浙江按察司副使祖存與禮部侍郎父通敏左春坊中允母錢氏經饒以縣學生乾隆五十一年鄉試中式屢赴會試不第大挑一等試知縣不就改教諭選歙縣教諭在官六年辭歸歸三年卒年四十五嘉慶十三年十月乙亥也與同歲生張惠言皋文交皋文言黃叔度漢末第一流在郭有道之右若經饒者可以觀古人之概矣娶汪氏子縯濟繽澍銘曰其視端然其立頎然其行圈然其色夷然骨月斃於下陰為野土魂氣則無不之也萬物之爭百世之日積而成此經饒之所知也而又何所疵乎林太孺人墓志銘林太孺人諱桂福建閩縣人祖及父母皆早世無兄弟幼依族姑之寡者屢徙居稍長求其系姑老耋不復省記遂亡之年十五為前恭城縣知縣陸君廣霖側室三十年而恭城君即世又三十年而太孺人卒年七十五嘉慶十有四年六月二十二日也敬與太孺人之子繼輅交繼輅次年譜請銘按譜恭城君以進士官福建廣西屢起仆太孺人所以事恭城君者甚敬恭城君劾官處患難甚勤長子女甚愛理婚嫁喪葬甚肅祭祀甚誠教繼輅甚嚴皆有事實可紀繼輅泣曰繼輅無似無以顯揚太孺人吾子之力足以及百世者也願備書之無遺敬謹對曰此太孺人之常德也書之譜足矣若大節則請為太孺人大明之何也太孺人歸恭城君嫡正夫人莊宜人已沒三年矣太孺人六十年中未嘗干嫡正之禮至屬纊時尚以勿斂正寢為命此始終於禮者也古者人君不再娶夫人卒娣升於嫡其嫡死不更立者祭宗廟則攝焉夫先王之禮一而巳矣何以或升於嫡或不升於嫡哉蓋媵之末及事女君者得為夫人如聘嫡未往而死媵繼往是也白虎通所謂立其娣尊大國也媵之及事女君者不得為夫人如元妃死次妃稱繼室是也白虎通所謂明無二嫡防篡殺也太孺人不及事女君矣殆可升於嫡者歟雖然太孺人非娣姪也敬蓋又質之於禮焉古者大夫士皆媵娣姪大夫為貴妾緦此娣姪也士妾有子則為之緦此不必姪娣而視娣姪也太孺人有子且賢殆可升於嫡者歟自春秋時以妾為夫人皆其君夫人之然其端必由妾之自僭始太孺人之志以為強附於禮之變而求榮不若退守乎禮之常而去辱於以成恭城君之賢為子若孫之令望此閨門之理所以正推之家國天下而皆順者也太孺人生子繼裴嗣恭城君之弟廣森次即繼輅本省舉人女三長未嫁卒次適儲次適黃恭城君初娶高宜人生子三繼娶莊宜人生女三皆太孺人成立之銘曰治於讓亂於僭中闈樞蠧不可㼭家如爛魚腹中陷以禮已僭宜吉祥恭城之後今其昌萬孺人祔葬墓志銘孺人姓萬氏先世於宋政和中由進賢遷南城之靑綏柳塘遂世為南城人曾祖維淙祖國寧康熙五十一年武進士仕終福州左營遊擊父選廣西潯州府同知母崔氏孺人年十七歸同縣建昌府學生鄧君渶二十九鄧君卒孺人矢志撫諸孤成立嘉慶十六年九月丁丑卒年八十越明年八月乙丑祔葬於洛硝石羊角山鄧君之兆子三人樹槐國子監生樹齡縣學生樹梅國子監生女三皆適名族古者女史以成法書后夫人之行後世史家外戚傳列女傳其遺意也周秦以來婦人有彝鼎之銘有針有歌頌其卒也有葬記有題墓有石闕而志銘之用最廣宋人入家事頗有巧縱不應程式者唐人用漢碑法以美言泛頌之夫婦人教於父母無違於夫宜於家貞於一以順成於子孫言之從同同爾敬故次孺人家世生卒志之石而不為溢辭焉樹齡之子熾昌從敬遊有才行因并以告之銘曰是維五十一年守節萬孺人從夫之穴四正四維應之子孫其有興焉者乎卜孺人墓志銘孺人姓卜氏世為武進人曾祖一夔祖起鳳父夢齡母賀氏孺人年十九歸同縣鄭旦興敬舅氏淸如先生之子也旦興負異才有大志舉於順天再會試不第單車出都欲遊天下厄塞訪奇士遂不知所之時孺人之子國子監生良弼甫六歲舅淸如先生及姑朱孺人已老而家甚貧淸如先生為儒一錢不義不取其治家儉而急如吳康齋婁一齋之為人孺人恆與婢僕之下者同甘苦有加甚焉方暑煬於竈婢僕反得淸甚寒扣冰滌器色怡然未嘗使婢僕以為舅姑之人也其順於舅姑由於中之誠孺人亦不自知為順也自旦興去家垂三十年未嘗敢言其夫於舅姑之前有告以蹤迹所在者色喜而中夜常與良弼飮泣積久內傷晨起方舂目眩黑抱杵仆地遂失明尚時時舂不止也與敬母太孺人相得太孺人嘗慰之孺人曰命也能與命爭乎且性亦安之無苦也年六十卒嘉慶十五年八月丁酉也淸如先生前已捐館舍惟朱孺人在堂哭之慟復念旦興亦失明是年十一月壬戌良弼葬孺人於河北之祖塋銘曰夫之生不可知夫之死不可知舅殁姑病不可死而竟死吾之子孰恃之黃太孺人墓表番禺之有學行者推張維屏子樹一日子樹奉行狀頓首於當􅎝曰此家君所次先祖妣黃太孺人行狀也家君主講新會道遠不得遽至命維屏為謁以乞銘更月家君歸治祭事當謹持謁謝敬以子樹賢不敢辭按狀太孺人姓黃氏錢塘人曾祖曙府學生祖鍾官廣州守備始籍番禺父騏國子監生母陳氏太孺人生六年而孤二十四年歸張君元山陰人也張君始娶於王亦山陰人無子早卒張君侍父載呂府君廷望客番禺後亦籍番禺太孺人歸三年而張君卒於潮州卒十日而訃至是時子炳文生十日矣太孺人號踊絶而蘇逮張君之喪至復號踊絶而蘇始終以載呂府君之命撫孤故不死後八年載呂府君卒期功之戚無可倚遂攜子居母家共室而自為爨母及兄軫之以為言則涕泣曰吾母子依吾母吾兄惟母兄保護之然苟不自食此髫齡者長無立志矣且張氏之祖宗子孫何以為門戶乎如是者十二年始異居嗚呼可謂知大體矣太孺人卒於嘉慶十有六年三月二十五日年八十有五奉聖旨旌表節孝建坊於門子一炳文嘉慶六年舉人孫二長即維屏嘉慶九年舉人次維翰國子監生敬又按狀太孺人卒之年十有一月葬於番禺柯木朗之原訖今四年矣禮不可埋銘世有刻銘於祠堂者非古也婦人無外事又無表墓之法然古列女之賢者天下皆繪畫之鐫於廟垣刻於墓闕凡以風示後世而已碑碣之禮取可風示後世者表之今太孺人不使其子食於外氏以長以成使張氏至今有卓然之氣此可為不幸依外氏之式矣能自太孺人之意推之凡行於鄉黨交於公卿立於朝廷其不可苟然而食者皆自此始故特表之以告後世之有志者嘉慶二十年十月壬子朔陽湖惲敬謹表南儀所監掣同知署揚州府知府護兩淮鹽運使李公墓闕銘高宗純皇帝御極之初年大臣以淸直重者在山右曰孫文定公嘉淦其在聖祖朝曰于淸端公成龍文定起家侍從天下知其淸而誦言其直淸端以外吏顯天下知其直而誦言其淸皆朝廷偉人也文定同年生而為婚姻者曰南儀所監掣同知李公暲李公之孫曰今廣東按察使鑾宣按察亦以淸直聞於時懼同知之事勿永述於後之人且沒勿章具狀請敬銘之墓闕敬不敢辭按狀公諱暲字暗成姓李氏明洪武中始祖茂欽自南直隸鳳陽遷山西靜樂縣遂世為靜樂人曾祖耀然祖室明光祿寺署丞父之檀高郵州知州崇祀名宦鄉賢母劉恭人生母楊恭人公幼有至性長益以孝友自力年二十六鄉試中式三十七以例授汀州府同知旋以采買洋銅輕重不如格吏議革職世宗知公淸參本上即日特旨授太平府知府榷蕪湖關調池州改調淮安府河決復革職高宗亦知公淸發江南以同知用補揚州水利同知調南儀所監掣同知署揚州府知府旋護兩淮鹽運使乞長假歸二年卒年六十有九公為監掣及榷蕪湖關人皆視為脂膏之地公歲嬴悉歸之官前後且數十萬無入巳者湖北解京木出蕪湖夾私木公如令式稅之其人飾辭訴於湖北巡撫遂劾公奉旨置對欲以侵課罪公使健吏求之無所得後數年公復榷蕪湖關大府令求前事侵課狀公力白之其廉而不刻皆如此守太平時所屬於歲終持金來謁出之槖其封皆布政司印也曰此縣中養亷非取之民者願酬知我公笑曰朝廷以此養公亷今餽我是養吾之貪也飮之酒而歸之太平治當塗官中謂之首縣嘗朝夕見後其令調含山為舍山民所訴公奉臺檄治其事令以舊屬遺家奴為公女治奩公曰汝主貨我巧矣吾發之則含山事雖虛亦實吾不為也速持去無汙我嗚呼人之能保其節豈易言哉自有史傳以來凡以賄始終者餽者必飾其辭為可餽之説受者亦必飾其辭為可受之計是故位可以日增罪可以日脫使權可以日巧取貨可以日工若號於人曰吾行賄曰吾受賄此行道之人所不為也如公者可以為居官之法矣敬聞淸端暮年餽人參少許者必受公有故人子餽之公辭焉蓋淸端天子大臣宜通下情且數十年取大信於天下無敢干以私者公則自守峻絶不可弛即謂之善學淸端可也公娶閻恭人繼娶孟恭人子三長翼偗次念祖皆陳孺人出冀偗副貢生嗣公之兄長楊君恂念祖候選州同知娶于孫為文定公女次學夫沈太恭人出候選司務司務亦娶于孫為文定公之弟國子監丞揚淦之女是生按察故按察嘗私淑文定焉銘曰府於縣如家人近則習習則親涅不緇磨不磷宜民人昌子孫浙江提督李公墓闕銘嘉慶十有二年十二月壬辰浙江提督李公剿洋匪蔡牽於廣東潮州之黑水洋卒於行間皇上軫悼封三等壯烈伯諡忠毅豫祭葬十四年公舊部王得祿邱良功殲蔡牽於浙江溫州之黑水洋洋匪平二十年前揚州府知府寧化伊君秉綬以公之事請敬銘之墓闕公諱長庚字西巖福建同安人也曾祖思拔祖崇德父希岸皆贈建威將軍母王氏贈一品夫人公乾隆三十六年武進士由藍翎侍衛補衢州都司升提標前營遊擊太平參將樂淸副將因剿林爽文入福建護海壇總兵緣事革職公罄家財募精勇捕洋匪獲戕參將張殿魁之林明灼陳禮禮以遊擊起用署銅山參將丁父憂去官服滿補海壇左營遊擊時浙江福建洋匪北接山東西通廣東西三面數千里皆盜出沒其內地曰洋匪蔡牽最大朱濆次之外地曰夷匪多中國人挾安南人為之鳳尾最大一艇載數百人洋匪曰匪艇夷匪曰夷艇夷艇至輒數十艇蔡牽百數十艇朱濆亦數十艇其大較也五十九年夷艇始入福建之三澎公敗之嘉慶二年升澎湖副將浙江定海總兵三年擊洋匪於衢港及普陀敗之四年鳳尾引夷艇入溫州洋敗之賜花翎五年浙江巡撫阮公元以公可任奏請總統浙江福建水師得俞旨公申號令嚴標識束部伍信賞罰自偏裨至隊長柁工水手耳目皆一於是水師皆可用能立功鳳尾引夷艇入台州松門遇颶風覆溺幾盡登岸者悉就俘獲安南偽侯倫貴利磔之自後夷艇不敢至鳳尾不知所終是年升福建水師提督調浙江提督先是匪艇皆高大我軍仰攻殊失勢而匪艇用晉石及蜂脂浴帆禦火箭帆下渴烏車發水及數丈滅餘火其舷以餳傅之不能傷故不易敗公與阮公議造大艇凌匪艇上至是成名曰霆船連敗蔡牽於岐頭東霍獲匪目張如茂徐業兵威大振其明年以霆船大敗蔡牽於定海牽南走福建乞降是時牽已窮蹙糧盡艇亦朽壞公窮追不日可擒而總督以令箭止公兵牽得以其間修艇揚帆去是役也功垂成而中廢天下皆惜焉蔡牽畏霆船厚賂福建商人造大艇高於霆船出洋以被劫歸報牽得之大喜渡橫洋劫臺灣米數千石分餉朱濆遂與濆合九年戕溫州總兵胡振聲公追之及於馬迹敗之至盡山復敗之牽以大艇得遁去委敗於朱濆濆怒於是復分公與阮公議禁商人造大艇牽計不行是年敗朱濆於全厦調福建提督十年敗蔡牽於龍灣復調浙江提督十一年蔡牽合大隊攻臺灣別部屯仔尾州沈舟鹿耳門阻官兵公至不得入諜知南汕北汕大港門可通小舟遣金門總兵許松年澎湖副將王得祿乘澎船攻仔尾州敗之其明年復敗之二月已卯朔松年夜率鋭師跐海水登仔尾州焚其寮牽反救公遣師出南汕自後焚其舟松年出仔尾州㚒擊大敗之庚辰復㚒擊大敗之牽棄仔尾州屯北汕以鹿耳門沈舟自塞走路也甲申潮驟漲沈舟漂起牽奪鹿耳門遁去奉旨革翎頂是役也許松年為軍鋒前後奪舟大小數十焚寮及舟無算殺賊數萬人尸橫數十里臺灣獲全公所將止三千人耳是年蔡牽復合朱濆走福寧追敗之皇上知公臺灣功復翎頂十二年敗蔡牽於廣東之大星嶼復敗之於福建之浮鷹十二月率福建提督張見升追牽是時朱濆已為許松年所擊敗死其弟渥降牽亦屢敗羣黨散沒止三舟矣初公以謀勇耐辛苦受皇上深知屢立功軍事悉主阮公福建忌之故主招撫後被紿益恚怒而阮公又以事去浙福建益撓阻公公以聞皇上逮治總督代以阿林保公阿林保公初至福建劾公逗撓皇上以問浙江巡撫淸安泰公公得直於是皇上眷公益厚敕福建不得撓阻責公專擒蔡牽與世職蓋公天性忠勇皇上拔之廢棄之中推心委任不使節制大臣得掣其肘至是而公不得不死矣蔡牽雖止三舟皆百戰之餘合死力拒公於黑水洋公自將親軍當蔡牽大艇公前後臨陳多親搏戰至是自攂鼓合戰良久冒煙火麾火船挂蔡牽大艇將焚之忽炮彈掠過傷公喉血湧出不可止遂仆而張見升見中軍舟亂引師退牽得走安南蓋見升官福建每戰必自全其師不敢縱也然公雖授命後卒遵公部勒滅蔡牽故言水師良將皆推公第一既明日潮州知府至舟斂公得載槥蓋公之誓死非一日矣公無子嗣子廷鈺襲爵葬公於同安之祖塋銘曰妖鯨叩天飛駁雲長鼉大黿紛輪囷刳胸剔腹搜其羣手提雙桴桴不歇天狗奔空襲明月誰甕貯之烈士血煌煌前績銘旗常五等之錫邦家光子孫保之噫勿忘朝議大夫董君華表銘君諱大鯤字北溟姓董氏系出唐吏部侍郎甲子孫世居銀城自銀城遷婺源者曰成祖至明而族始大曾祖世源登仕郎祖起豫拔貢生考授州同知父正台歲貢生誥贈朝議大夫母祝氏誥贈恭人君兄弟八人次居第三兄弟之子孫皆盛而君之子孫取科第厯中外者數十人居東門是為東門董氏敬與君之孫潮靑同舉於鄉後與鍊金交因過婺源去君之卒四十七年矣鍊金以狀請書君之行於華表敬作而曰太史公為萬石君傳記一二小事耳其諸子乃記建之誤書慶之數馬訖今盎然諄然之意尚見於數千年之後蓋孝謹之行纍書之皆無奇者也要在得其意而止後人反油然而動焉若後世史家別為孝義傳事事實之則無所餘矣敬觀董氏羣從皆恂恂如不勝衣於父執進退唯諾必以禮猶可想見朝議之家法而門巷之外朝夕有言朝議之德者董氏之盛不其宜乎且敬行天下故家未有不以浮薄敗而以質行興者則請條朝議為人之大綱而詳書子孫名爵於左方以實朝議之所以能裕其後亦古者表墓勸善之遺意也按狀君少補縣學生自祖父為素封家君擇人任時而資益息凡長者之事皆力為之以行其德有天幸終不至損其資資且至逾萬而德益行事親定省之節中衣厠牏之役數十年如一日兄弟至老相愛如幼稚時娣似皆能喻其意撫幼弟及孤兄弟子尤有恩遇性喜下士同縣汪君紱江君永為儒有盛名皆折節交之所著有十三經音畫辨訛二卷春秋四傳合編三十卷喪服圖考一卷二十一史編年十卷卒年七十八乾隆三十五年也例授朝議大夫候選知府配戴氏封恭人子三兆熊縣學生候選衛千總兆鳳附貢生兆謙例貢生銘曰雙桓之間朝議之阡也知其德者過而下之其孝謹可賢也兆熊房孫四人邦超候選布政司理問鍊金舉人授太常寺博士邦和國子監生朝偉附貢生曾孫十六人桂秋候選從九品桂山舉人揀選知縣桂中桂先皆縣學生桂丹國子監生桂洲優貢生候補訓導桂標國子監生桂莊附貢生桂時桂文桂堂桂海皆國子監生元孫二十三人來孫五人兆鳳房孫五人國英縣增生邦直國子監主潮靑舉人揀選知縣朝紱廩貢生銅陵縣教諭朝勳縣增生曾孫十四人桂森舉人揀選知縣桂林拔貢生鑲黃旗教習分發山西知縣桂臺縣增生桂敷翰林院編修桂新翰林院庶吉士桂科縣廩生桂開候選從九品桂春桂榮皆縣學生元孫二十二人惠笙産彬皆縣學生來孫七人兆謙房孫二人之屏例貢生朝端縣學生曾孫十一人桂攀桂煌皆縣學生元孫六人翰林院庶吉士金君華表銘君諱式玉字朗甫姓金氏世為歙人曾祖茂宣候選州同知祖長溥吏部主事以君從兄應琦官巡撫贈榮祿大夫父杲國子監生以君官庶吉士封文林郎以君之仲兄應城官禮部主事封朝議大夫前母黃氏母鄭氏皆贈恭人君以國子監生應嘉慶五年順天鄉試中式考取景山宮官學教習明年會試中式殿試賜進士出身改庶吉士是年六月三日卒年二十有八配黃氏子二長讓恩縣學生次書恩金氏自同知公徒步萬里輦親骨於甘肅之蘭州遂以孝聞於時吏部公與其兄奉直公長洪孝而甚友用閎濟其宗蓋有至性而兼能取富貴者也君之伯父養泉先生雲槐以侍從起家檠齋先生榜繼冠多士推文附質引義合禮而君之尊甫朝議公墍茨丹艧贊佑華盛蓋不忘其祖而能庇其子孫者也自君之羣從外陟方面內奉省闥玉珂金車照耀門第而君獨單衣陋食誾誾粥粥從事於竈觚蠧簡之間乃未遂其志而君竟死矣君美風儀善談詠其學悉宗本師張惠言臯文君之子書恩為敬弟敷之子壻敬久交於臯文及君於養泉檠齋兩先生皆有淵源之誼今過君之里而君之卒十五年矣朝議公尚康寧君之伯兄應瑔叔兄應圭已前卒仲兄官京師弟日瑩日璡應玕黽勉侍養敬心為恤然爰作銘於華表銘曰朗甫其有知乎朗甫其有知乎銘君者陽湖惲子居也是亦君魂魄之所期而凡親君者之所悲也無錫宣頴達麗中吳縣徐敦仁愛杉
