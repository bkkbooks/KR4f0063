body:
  text: 陽湖惲敬著卷一目錄原命喻性說地說山三代因革論一三代因革論二三代因革論三三代因革論四三代因革論五三代因革論六三代因革論七三代因革論八西楚都彭城論辯微論續辯微論釋夢釋拜釋弁一釋弁二釋弁三釋鈎駮史伯璿月星不受日光辯駁朱錫鬯書楊太眞傳後雜記雜說張眞人府印說得姓述卷二目錄九江考康誥考上康誥考中康誥考下周公居東辯上周公居東辯下顧命辯上顧命辯下匏有苦葉說雄雉說桑中說蝃蝀說有狐說黍離說雞鳴說鴟鴞說讀晏子一讀晏子二讀五帝本紀讀管蔡世家讀魯仲連鄒陽列傳讀張耳陳餘列傳讀貨殖列傳讀霍光傳讀論衡孟子荀􅀸列傳書後古今人表書後三國志書後諸夏侯曹傳書後鈐山堂集書後金剛經書後一金剛經書後二楞伽經書後一楞伽經書後二天發神讖碑跋乙瑛碑跋孔羡碑跋卷三目錄與紉之論文書上秦小峴按察書上曹儷笙侍郎書荅曹儷笙尙書書上汪瑟菴侍郎書上陳笠帆按察書答吳白厂書答蔣松如書與湯編修書明儒學案條辯序五宗語錄删存序子居決事序先塋記石橋灣惲氏祠堂記東湖書院記新喻東門漕倉記新喻羅坊漕倉記胡氏學田記重修萬公祠記遊羅漢巖記東路記遊翠微峯記一遊翠微峯記二重修瑞金縣署記東麓先生家傳后谿先生家傳少南先生家傳香山先生家傳衷白先生家傳遜菴先生家傳南田先生家傳羅臺山外傳謝南岡小傳二僕傳後二僕傳紀言書山東知縣事書王麗可事書獲劉之協事先賢仲子廟立石文新喻文昌宮碑銘文昌宮碑陰錄都昌元將軍廟碑銘海會菴放生河碑銘劉先生祠堂壁銘并敘卷四目錄前太子少保雲貴總督劉公祠版文兵部侍郞銜署􅀡隸總督裘公神道碑銘前四川提督董公神道碑銘廣西按察使朱公神道碑銘太子少師體仁閣大學士戴公神道碑銘張臯文墓志銘舅氏淸如先生墓志銘前臨川縣知縣彭君墓志銘兵部額外主事王君墓志銘甯都州學正聞君墓志銘袁州府訓導李君墓志銘饒府君墓志銘饒陶南墓志銘彭澤縣敎諭宋君墓志銘甯都營參將博羅里公墓志銘張府君墓志銘刑部江西司主事曹君墓志銘外舅高府君墓志銘楊貫汀墓志銘徐恭人墓志銘甘宜人墓志銘姜太孺人墓志銘李夫人墓志銘董孺人權厝志亡妻陳孺人權厝志女嬰壙銘國子監生周君墓表浙江分巡杭嘉湖道陜西侯補道李公墓表王盛石記鸚武冡石記祭張臯文文右大雲山房文稾初集四卷目錄瑞金陳蓮靑雲渠排次讐校凡雜文一百六十篇嘉慶十有六年五月刻于京師琉璃厰工穴雜不應尺度且未竟九月補刻并修治于常州府小營前以稾本篇自爲葉不用漢唐寫書首尾相銜法爲日若干而竣二十年三月武甯盧宣旬幼眉改定二十篇入外集復刻于南昌甲戌坊附通例于後惲敬子居自爲序錄曰惲氏著于南宋自方􅀡府君十一傳而至明湖廣按察司副使東麓府君巍東麓府君三傳而至典儀正敬于府君紹曾敬于府君入本朝四傳而至子渭府君士璜子渭府君生先府君輪子渭府君好讀書飮酒鼓大琴先府君無所嗜好于世事無所阿三十年教授窮山中敬生四年先府君敎之四聲八年學爲詩十一學爲文十五學六朝文學漢魏賦頌及宋元小詞十七學漢唐宋元明諸大家文先府君始吿以讀書之序窮理之要攝心專氣之騐非是不足以爲文于是復反而治小學治經史百家凡先府君手錄天官地志物理人事諸書亦得次第觀之然未有所發也時于一二日中得一解而油油然數十日中得一解而油油然至索之心誦之口書之手仍芒芒乎搖搖乎而已先府君曰此心與氣之故也不可以急治當謹而俟之減嗜欲暢情志嗜欲減則不淆雜情志暢然後能立能立然後能久大自是之後敬不敢言文者十年旋走京師遊中原南極黔楚與天下篤雅恭敬之士交竊窺其言行著述因復理先府君之言欲有所論撰而下筆迂囘細謹塊然不能自舉嗚呼天地萬物皆日變者也而不變者在焉不變者所以成其日變也文者生乎人之心天地萬物之日變氣爲之心之日變神爲之神之變速于氣之變而迂囘之弊循循然而緩謹細之弊切切然而急于神皆有所閡焉敢不力充之以求所以日變者哉然而有不可變者典論曰學無所遺辭無所假史記曰擇其言尤雅者著于篇可以觀矣雲渠所錄皆嘉慶建元以後論譔謹以年次其目錄庶得失進退有以自考焉其改定入外集者目錄皆删之所存如左嘉慶元年在富陽四月往貴州十月至江山得文七首與紉之論文書東麓先生家傳遜菴先生家傳南田先生家傳紀言劉先生祠堂銘王盛石記二年八月至常州得文二首亡妻陳孺人權厝志女嬰壙銘四年在常州九月至京師得文十一首讀晏子一讀晏子二先塋記石橋灣惲氏祠堂記后谿先生家傳少南先生家傳香山先生家傳衷白先生家傳書山東知縣事書王麗可事兵部額外主事王君墓志銘五年在京師六月至新喻得文九首喻性三代因革論一三代因革論二三代因革論三三代因革論四釋弁一釋弁二釋弁三釋鈞六年在新喻七月至南昌十二月還新喻得文十六首說山釋夢九江考康誥考上康誥考中康誥考下周公居東辯上周公居東辯下桑中說蝃蝀說有狐說讀論衡三國志書後諸夏侯曹傳書後上秦小峴按察書答蔣松如書七年在新喻得文十三首駁史伯璿月星不受日光辯張眞人府印說匏有苦葉說雄雉說黍離說雞鳴說鴟鴞說東湖書院記新喻東門漕倉記新喻羅坊漕倉記胡氏學田記張臯文墓志銘祭張臯文文八年在新喻得文六首鈐山堂集書後與湯編修書新喻文昌宮碑銘新喻文昌宮碑陰錄徐恭人墓志銘董孺人權厝志九年在新喻六月至南昌得文七首金剛經書後一金剛經書後二二僕傳甘宜人墓志銘李夫人墓志銘饒府君墓志銘國子監生周君墓表十年在南昌四月至瑞金得文四首遊翠微峯記一遊翠微峯記二書獲劉之協事姜太孺人墓志銘十一年在瑞金四月至南昌十一月還瑞金得文十一首雜記顧命辯上顧命辯下楞伽經書後一楞伽經書後二上曹儷笙侍郞書答吳白厂書東路記謝南岡小傳後二僕傳舅氏淸如先生墓志銘十二年在瑞金得文六首答曹儷笙尙書書重修萬公祠記遊羅漢岩記海會菴放生河碑銘前臨川縣知縣彭君墓志銘甯都州學正聞君墓志銘十三年在瑞金五月至南昌六月回瑞金十月復至南昌得文十五首原命說地駁朱錫鬯書楊太眞傳後讀五帝本紀讀管蔡世家讀魯仲連鄒陽列傳讀張耳陳餘列傳讀貨殖列傳讀霍光傳孟子荀􅀸列傳書後古今人表書後上汪瑟菴侍郞書上陳笠帆按察書子居決事序袁州府訓導李君墓志銘十四年三月還瑞金七月至南昌得文九首三代因革論五三代因革論六三代因革論七三代因革論八雜說得姓述重修瑞金縣署記饒陶南墓志銘彭澤縣敎諭宋君墓志銘十五年在南昌十一月至常州得文十首天發神讖碑跋乙瑛碑跋孔羨碑跋先賢仲子廟立石文都昌元將軍廟碑銘兵部侍郞銜署􅀡隸總督裘公神道碑銘甯都營參將博羅里公墓志銘張府君墓志銘刑部江西司主事曹君墓志銘鸚武冡石記十六年在常州二月至京師八月還常州得文十四首西楚都彭城論辯微論續辯微論釋拜明儒學案條辯序五宗語錄删存序羅臺山外傳前太子少保雲貴總督劉公祠版文前四川提督董公神道碑銘廣西按察使朱公神道碑銘太子少師體仁閣大學士戴公神道碑銘外舅高府君墓志銘楊貫汀墓志銘前浙江分巡杭嘉湖道陜西候補道李公墓表凡文之事曰典典者所以尊古也若單文無故實則比于小學諸書當時語據制詔及功令是也曰自已岀毋勦意毋勦辭是也曰審勢能審勢故文無定形古之作者言無同聲章無同格是也曰不過乎物不過乎物者必稱其物也言事言理言情皆以之請以質當世之君子大雲山房文槀通例一雜著文諸子家之流也故漢魏以來多自書子集中皆書字用王子淵法也序記文多自書余宋人稱人曰賢自稱曰愚亦入之序記集中皆書名碑志文漢魏本文不入撰人名集中入撰人皆書名用韓退之法也傳文後書論曰用班孟堅法也一大傳本史書體故韓退之傳陸贄陽城不入本集後人有入本集者或自存史槀或爲史官擬槀而巳集中無大傳其小傳外傳傳中必書名祖父及傳中所及之人雖貴且賢必書名祖父賢始見子孫亦然妻妾有故始見傳非碑志體也官與地必書本朝之名紀實也爲異姓作家傳非正例集中同姓家傳名書諱某不書姓不書所籍子孫之言也傳中所及之人書某公某名某君某名儒者書某先生某名與祖父交尊之也存其名記事之體也遠祖家傳所交之人止書姓名世不及也一大傳書名書字不書號史法也儒者於傳中事別書稱某號先生亦史法也外傳小傳或書號或書別號道號者性情也古者幼名冠字故於名下書字世人加字於名上者非也集中名字并書者字皆在下號或取地或取所居始六朝之稱淸溪大山小山禪者亦稱南獄靑原至宋人人稱之世人止稱號而加於名之下是稱其人而後綴其地及所居亦非也集中名號并書者名皆在下別號如漫郎醉吟先生道號如華陽眞逸無垢居士集中有故則書一傳目自漢書以下皆書名史記或書名或書字或書官或書爵集中家傳皆書號書先生外傳小傳皆書字或書人所稱如曹孝子是也一碑志文較史傳例稍寛集中凡文中所及之人書某官某姓公或某姓君再書名其滿州􅀩古不紀其氏者書某官某名公或某名君用元色目人例也紀其氏者書如漢人一碑志文目書階官書職官書爵書諡仳通古今例也古人集多不畫一者集中止書職官其階爵諡於文中見之書石則目具階職爵諡用當時法也一集中碑志文目監司以上書公以下書君成一家學者書先生所尊書府君友書字婦人書所生之姓姓所以別女子也其夫之姓文中見之一集中碑志文目止書某公某君某府君其妻之合葬者文中見之以合葬志非古法也祔葬志書祔葬從夫之義也一集中遺事述書法如碑志行狀行略書法亦如碑志書事之書法如傳一墓表有列銘及詩者變例也集中皆不列銘及詩碑記列銘及詩者正例也集中皆列銘及詩壁記則無之其壁銘有序者書并序以別於壁記也一碑志文有序有志有銘記作文緣起序也記事及葬年月志也詠歎之銘也集中志文有作文緣起者目書并序餘不書其有志無銘者目止書志志略者目止書銘碑文皆書碑銘不書并序碑以無序爲正例也一爾雅歲名歲陽二章曰歲在甲歲在寅而以閼逢攝提格名之太史公律厯志書閼逢攝提格而年表書甲子後儒謂年不書甲子者謬說也然尙書春秋皆書年數各史書因之故記事之文以書年數爲是集中從之一碑志文書甲子則不書日數書日數則不書甲子正例也集中有書日數并書甲子者以之别疑表信變例也書越三日戊申越五日甲寅其法也一集中碑志文書始遷祖及曾祖以下其高祖有功德則書書母書前母繼母生母不書曾祖母祖母其書者變例也書妻書子書女不書孫以孫應書其父之碑志也有故則書集中有應書之人而不書者必有當絕之道焉此春秋之義也傳中亦用之一集中碑志文必書葬月日及地不書者乞文時未卜月日及地也必書曾祖以下及官名其書某官某名止從某某者狀失體不官不名或失體不及其上世也一集中碑志文曾祖以下有官者書職官卒後贈職官亦書至子孫貴封贈官止書階官以不治事也一集中傳文止書某年進士舉人不書某科史法也碑志文書鄉試中式會試中式殿試賜進士及第岀身同出身詳之也一集中序文地名據今時書之官名亦然其或書古官者自唐以後人多稱古官至今沿之存當時語也碑志文述人言書古官者亦存當時語也書上書言事皆與序文同記文不書古官紀實也一集中書上書目皆書姓書官座主舉主及所受業稱先生其目書官文中書先生者非所受業也友書字其書號者或其字不著或其字不應古法如號之取地取所居也漢人友稱字唐人稱行宋人稱官於所學稱號自明以來及門俱稱號矣時爲之也一集中書上書首必書某人閣下足下執事末必書某月日某謹上以別於尺牘也一禪悅文古人入外集以爲佛家言也集中辨正經論者仍不入外集辨正道家言亦然一史記漢書載四言詩歌行晉唐書以後載五七言古近體詩此史法也文家載詩則格下集中載詩者皆入外集詞曲不載一集中文格近者亦入外集一詩目唐人或書行或書名或書字或書今官或書古官或書所官之地宋元明人或書號或書世所妄稱之官如總制宮諭是也集中書號書古官不書所官之地號亦地名不可與所官之地相沓也不書妄稱之官懼雜也一人再見不書姓遷官者改書官其年數六朝以後皆書甲子集中從之一詞目以曲名爲目次行低一格注題不注題者皆無題也大雲山房文稾二集目錄陽湖惲敬著卷一春秋說上春秋說下讀大學一讀大學二讀孟子一讀孟子二說仙上說仙中說仙下釋舜釋荍釋鳴鳩釋蟪蛄大過說小過說困說明夷說一明夷說二相鼠說東門之枌說北山說碧玉說散季敦說得姓述附說得姓述附說二卷二姚江學案書後一姚江學案書後二崇仁學案書後靖節集書後一靖節集書後二靖節集書後三李氏三忠事蹟書後朱贊府殉節錄書後卓忠毅公集書後維摩詰經書後楞伽經續書後壇經書後一佚壇經書後二文衡山詩稟跋黃石齋手札跋張子實臨徐俟齋手札跋醴泉銘跋佚記蘇州本湻化帖上董蔗林中堂書上舉主陳笠帆先生書上舉主陳笠帆先生書二答伊揚州書答伊揚州書二答伊揚州書三答伊揚州書四答趙靑州書與宋于廷書答張翰豐書答鄧鹿耕書答鄧鹿耕書二卷三瑞安董氏祠堂記陳白沙先生祠堂記重修松竇菴記重修松竇菴後記望仙亭記艮泉圖詠記遊廬山記遊廬山後記舟經丹霞山記遊六榕寺記同遊海幢寺記遊羅浮山記分霞嶺記茶山記酥醪觀記遊通天巖記子惠府君逸事前翰林院編修洪君遺事述前濟南府知府候補郞中徐君遺事述楊中立戰功略卷四吳城萬夀宮碑銘光孝寺碑銘潮州韓文公廟碑文前光祿寺􅀸伊公祠堂碑銘資政大夫葉公祠堂碑銘贈光祿大夫陳公神道碑銘新城鍾溪陳氏房次科第階職記刑部尙書金公墓志銘漢中府知府䕶漢興道鄧公墓志銘國子監生錢君墓志銘孫九成墓志銘莊經饒墓志銘林太孺人墓志銘萬孺人祔塟墓志銘卜孺人墓志銘萬太孺人墓表南儀所監掣同知署揚州府知府䕶兩淮鹽運使李公墓闕銘浙江提督李公墓闕銘朝議大夫董君華表銘翰林院庶吉士金君華表銘右大雲山房文槀二集四卷目錄凡襍文九十六篇嘉慶二十年八月長洲宋揚光吉甫刻於廣州西湖街爲日若干而竣二十一年自贛往歙武進董士錫晉􅀸復爲排次增定十篇叙錄曰昔者班孟堅因劉子政父子七略爲藝文志序六藝爲九種聖人之經永世尊尙焉其諸子則別爲十家論可觀者九家以爲雖有蔽短合其要歸亦六經之支與流裔至哉此言論古之圭臬也敬嘗通會其說儒家體備於禮及論語孝經墨家變而離其宗道家陰陽家支駢於易法家名家疏源於春秋從橫家襍家小說家適用於詩書孟堅所謂詩以正言書以廣聽也惟詩之流復別爲詩賦家而樂寓焉農家兵家術數家方技家聖人未嘗專語之然其體亦六藝之所孕也是故六藝要其中百家明其際會六藝舉其大百家盡其條流其失者孟堅已次第言之而其得者窮高極深析事剖理各有所屬故曰修六藝之文觀九家之言可以通萬方之略後世百家微而文集行文集敝而經義起經義散而文集益漓學者少壯至老貧賤至貴漸漬於聖賢之精微闡明於儒先之疏証而文集反日替者何哉蓋附會六藝屏絶百家耳目之用不發事物之賾不統故性情之德不能用也敬觀之前世賈生自名家從橫家入故其言浩汗而斷制鼂錯自法家兵家入故其言峭實董仲舒劉子政自儒家道家陰陽家入故其言和而多端韓退之自儒家法家名家入故其言峻而能達曾子固蘇子由自儒家襍家入故其言温而定柳子厚歐陽永叔自儒家襍家詞賦家入故其言詳雅有度杜牧之蘇明允自兵家從橫家入故其言縱厲蘇子瞻自從橫家道家小說家入故其言逍遙而震動至若黃初甘露之閒子桓子建氣體高朗叔夜嗣宗情識精微始以輕雋爲適意時俗爲自然風格相仍漸成軌笵於是文集與百家判爲二途熙甯寶慶之會時師破壞經說其失也鑿陋儒襞積經文其失也膚後進之士􅀼聖人遺說規而畫之睇而斵之於是經義與文集幷爲一物太白樂天夢得諸人自曹魏發情靜修幼淸正學諸人自趙宋得理遞趨遞下卑穴日積是故百家之敝當折之以六藝文集之衰當起之以百家其高下遠近華質是又在乎人之所性焉不可强也巳敬一人之見恐違大雅惟天下好學深思之君子敎正之嘉慶十七年正月至南昌三月往瑞金八月復至南昌十二月至吳城得文七首朱贊府殉節錄書後記蘇州本湻化帖上舉主陳笠帆先生書重刻脈經序重修松竇菴記重修松竇菴後記萬孺人祔塟墓志銘十八年在吳城十二月至南昌得文三十一首讀大學一讀大學二維摩詰經書後壇經書後一壇經書後二上董蔗林中堂書上舉主陳笠