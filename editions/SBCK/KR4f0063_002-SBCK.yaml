front:
  text: 九江考禹貢九江之說有三陸氏德明音義引潯陽記曰一烏白二蚌三烏四嘉靡五􅅵六源七廩八提九箘緣江圖曰一三里二五州三嘉靡四烏土五白蚌六白烏七箘八沙提九廩五州卽􅅵三里卽源也一名白蜆此一說也其地在潯陽江之北又引太康地記曰九江劉歆以爲湖漢九水入彭蠡也一鄱二餘三修四豫章五淦六盱七蜀八南九彭九水八入湖漢通湖漢爲十水此一說也其地在彭蠡湖之南曾氏旦曰楚地記巴陵在九江之閒今巴陵之上卽洞庭也羅氏泌曰山海經洞庭之山在九江之中吳錄岳之洞庭荆之九江也一沅二漸三潕四辰五敘六酉七澧八資九湘朱子則去潕澧二水易之以瀟蒸此一說也其地在洞庭湖之南按蔡氏沈書傳曰潯陽九江屬揚州此言非也漢之濤陽治今黃梅縣九江始于鄂陵終于江口㑹于桑落州鄂陵在武昌縣江口在黃梅縣皆荆州也惟桑落州在德化縣爲揚州然至此已合爲大江矣其不合禹貢者導水曰過九江東迤北㑹于滙今彭蠡在潯陽南數百里以潯陽爲九江則禹貢之文歧導山曰至于衡山過九江至于敷淺原今衡山迤東北至敷淺原而潯陽在敷淺原之北西亦數百里以潯陽爲九江則禹貢之文益歧是以曾氏羅氏不從別主洞庭之說至彭蠡九水源委皆在揚州于荆州無可附㑹不足置辯敬嘗考之潯陽之九江秦始皇之九江也彭蠡之九江王莽之九江也洞庭之九江禹貢之九江也秦九江郡仍楚都治壽春兼有漢九江廬江豫章三郡地而潯陽以大江界南北之中故舉九江而通郡得其要領如治吳而舉會稽治粤而舉蒼梧皆相距百千里此秦始皇之九江也漢分潯陽屬廬江王莽改九江爲延平豫章爲九江而潯陽仍屬廬江非豫章所隸遂以彭蠡九水爲九江是莽臣之諛也如移衡山于天柱卽名南岳移恆山于大茂卽名北岳是也此王莽之九江也光武興郡國悉還漢名于是彭蠡之九江無聞而潯陽甚著且漢初儒者卽以爲禹貢九江于是地理志郡國志諸書皆主之蓋以今冒古以己意冒聖賢以所知冒所不知說經大率如是曾氏羅氏始大反之今揆之經文洞庭在彭蠡西南于導水之文合衡山並洞庭趨敷淺原于導山之文亦合是據經以折傳據三代以折漢唐不可謂之叛古也故曰禹貢之九江也康誥考上馬氏融王氏肅皆以康爲國名與孔傳合孔傳僞不足信馬王說不可廢也惟鄭氏元說康爲諡有不可通者二焉左傳祝佗曰命以康誥而封于殷墟如康爲諡是生而賜諡也史記曰康叔卒子康伯立如康爲諡是父子并諡也若是則康爲國名無疑路史曰康叔故城在潁川水經注曰潁水東厯康城寰宇記曰陽翟縣康城少康故邑其諸康叔始封因其地歟管叔封管今鄭州廢管城縣蔡叔封蔡今上蔡縣曹叔封曹今曹縣郕叔封郕今濮州皆在紂封東南與康叔相去不過數百里其諸東方諸侯助殷抗周武王俘之以其地分建母弟歟馬氏王氏皆言圻內之國其諸殷之圻內後世因周都洛誤以爲周之圻內歟逸周書作雒解曰建管叔于東建蔡叔霍叔于殷地理志曰􅅠管叔尹之衞蔡叔尹之邶以封武庚孔晁曰霍叔相武庚霍叔所封在今山西霍州三監蓋去其國而爲殷之監歟作雒解曰王子祿父北奔俾康叔宇于殷詩譜曰成王殺武庚以殷餘民封康叔于衞其諸武王封康叔于康至是始封衞歟夫以千載之下推明千載之上其事勢皆可以理驗之宋儒自胡氏棫謂武王封康叔于衞後之言書者幷爲一辭而不知不中于理夫武庚尙奉殷祀三監分治殷都及下邑武王何所奪殷之地而封康叔耶是故封康叔于康武王之事也封康叔于衞成王之事也此不易之論也康誥考中康誥武王之書也曰孟侯朕其弟曰小子封曰乃寡兄朂皆武王之辭非周公之辭也酒誥梓材成王之書也曰王曰封不曰小子封君臣之辭也曰故我至于今克受殷之命天下終定之辭也曰和懌先後迷民用懌先王受命殷民畔而服服而不復畔之辭也皆成王之辭非武王之辭也然則三誥之相次何歟惲子居曰武王封康叔于康所以誥之者治國之要法聖戒惽之說蓋詳哉乎其言之可以治康卽可以治衞成王與周公無以加也惟朝歌紂都爲逋逃藪數十年奸人負釁藏匿結黨幸禍一旦竊發皆以予復爲辭而其人皆有朋家之助沈湎之習是以爲惡必始于羣飮今武庚已誅十七國九邑已定微子已封天下大勢已必不可動其人不過跳浪􅑧號之徒而已故成王沒其予復之言以安四海之反側正其羣飮之罪以除商邑之奸宄乃事勢必然不可緩者後世說酒誥疑聖人無如是過重之刑何哉至政令法度武王立三監之時已極詳愼周公平殷亂復整齊之康叔因之可也潤澤之可也此梓材之義也是故康誥之言詳而法酒誥之言嚴而隱梓材之言婉而仁是三誥也周公蓋于作雒之日命康叔治衞之始推當日事勢及成王所以望康叔之意爲酒誥梓材二書以告之而武王之書則康叔終身所受命者也故史臣以康誥冠酒誥梓材均次于大誥之後後世不察謂三誥皆成王之書致義疏割裂幾不可解宋儒復盡反之至元金氏履祥以酒誥梓材與康誥均入武王克殷之年妄爲編錄葢不詳之過也夫酒誥之首曰明大命于妹邦明康誥之非爲妹也若康誥爲妹言史臣當書爲妹誥與粊誓同例矣康誥考下康誥文曰惟三月哉生魄周公初基作新大邑于東國洛四方民大和㑹侯甸男邦采衞百官播民和見士于周周公咸勤乃洪大誥治蘇氏軾曰此洛誥之文當在周公拜手稽首之上按召公相宅周公營焉作召誥洛誥惟二月旣望至庶殷丕作度邑之辭也太保乃以庶邦􅃁君至用供王能祈天永命召公奉幣因周公陳戒成王之辭也周公拜手稽首曰至公其以予萬億年敬天之休周公自洛伻吿吉卜于豐成王諾之之辭也拜手稽首誨言周公達太保奉幣之戒成王納之之辭也今以康誥之文入召誥洛誥之閒于前後文何所當邪其言作邑與新邑營重文其言朝眾與取幣重文其言大誥治與朕復子明辟及以圖及獻卜不相統是蘇氏之說非也金氏履祥曰此梓材之文當冠于篇首召誥曰周公乃朝用書命庶殷侯甸男邦伯命庶殷之書多士是也命侯甸男邦伯之書梓材是也桉多士曰周公初于新邑洛洛邑已成也召誥自庚戌攻位至甲子用書十五日耳洛邑未成則用書非多土之書也梓材曰王曰封是誥康叔也召誥洛誥無康叔之文則用書非梓材之書也金氏之謬一也王曰封之文金氏以爲孔傳僞文當以周公曰冠之詭稱伏生大傳梓材命伯禽之文今大傳言周公康叔伯禽商子之事而巳無此文不知金氏所據何本金氏之謬二也梓材多殘闕王啟監至惟其塗丹艧原王封衞之意在安定衞也今王惟曰至永保民原王封衞之意在安定衞以徠天下也此梓材大指也金氏皆以爲程役之辭支離附會而終不可解金氏之謬三也是金氏之說非也自東漢儒者說經始改易經字以從己言宋人遂至刊落本文移彼續此一皆委之錯􅂤康誥今文書也如其􅂤錯于伏生以後則鼂錯諸人受天子命數千里受書不應率爾若此如其􅂤錯于伏生以前則是時秦未焚書先王之風未遠天下博士數十百家伏生大儒何至一無是正讀是誤書至篤老而不倦如其􅂤錯于元成之時則劉向方以中古文天子之書校正三家經文何以獨不加是正于理皆不可通是故康誥之文仍之于康誥而已蓋周公始以流言居東後迎歸攝政卽東征武庚授首之後又以徐奄不靖往反安定至是方徙封康叔于衞康誥此文所以序周公代成王收集東士艱勤王室迨太平之日復建邦啟土爲永永年所之計史臣親見其盛揄揚詠歎不能以已故其文詳備雍容若此此史臣所作三誥之序無可疑也堯典之曰若稽古帝堯禹貢之禹敷土隨山刊木奠高山大川盤庚之率􅈼眾戚岀矢言皆序也噫史臣旣序之矣孔子又從而序之哉
