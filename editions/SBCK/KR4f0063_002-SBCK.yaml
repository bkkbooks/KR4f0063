body:
  text: 自記曰書序乃爲僞者增益史記文爲之不知史家敘述古書自有此例觀王莽傳可見鄭元馬融王肅諸儒以書序爲孔子作觀疏中依緯文而知一語已瞭然爲緯家之附㑹矣周公居東辯一書金縢周公乃告二公曰我之勿辟我無以告我先王周公居東二年則罪人斯得僞孔氏傳曰辟法也我不以法法三叔則無以成周道告我先王周公旣告二公遂東征之二年之閒罪人斯得夫書東征而沒之曰居東古無此書法也此飾說也宋歐陽氏從之朱子詩傳亦從之漢鄭氏詩箋曰周公遭管蔡流言避居東都宋蔡氏書傳曰二年之後王始知流言之爲管蔡斯得者遲之之辭也元金氏履祥從之朱子文集亦從鄭氏是二說如聚訟而鄭氏之說爲長何也史記周本紀言周公奉成王命東伐魯世家亦然如成王方疑周公而周公卽東征是矯王命也不然則迫取王命也聖人不爲一也本紀又言唐叔得嘉穀成王以歸周公于兵所是東征之時王于周公無閒然理當在迎周公之後二也且周公避位而出古書多可證者蒙恬傳曰王乃大怒周公旦走而出奔楚竹書紀年曰元年周公岀居于東越絕書曰周公乃辭位出巡于邊竹書紀年越絕書雖戰國秦漢所雜記然與史記合不可盡謂無稽三也是故金縢周公避位之書也大誥周公復位而討亂之書也康誥酒誥梓材周公旣平東土建侯之書也其相次有然七月周公攝政敎成王之詩也鴟鴞周公釋䜛之詩也東山破斧周公成功之詩也其相次又有然詩書之言明白條貫如此何疑于避位之說邪至唐孔氏穎達謂居東待罪則又不然何也周公宗臣也其避位也必假國事以行也是故于奔楚之說吾知周公有以固南陲焉于出巡之說吾知周公有以和東國焉後此淮徐之興祿父之難不能煽荆舒佚陳鄭皆是故也周公內以紓成王及二公之疑外爲國家集厚其􅀔使患至而不至于大壞聖人之德用深博葢如此若自投遐遠閉戸􅁍掃君臣之閒如吳越人之相伺而國事益窳敗何如束身司冦之爲愈哉此治鄭氏之說而誤者也曰成王于周公旣疑之矣何以知其尙與國事耶曰金縢言未敢誚公君臣之禮始終未替可決也彼􅀩恬之言傳之過甚者也周公居東辯二東都洛邑也周公居東之時洛邑未營鄭氏以爲避居東都何邪葢殷之圻北負大行南及于南亳西固于黽洛邑所孕也武王伐紂收圻內地祿父封于朝歌其餘皆王官治之而洛邑實爲天下阨塞周公障東事非是不得形􅀔其岀巡也殆以之楚爲始事而以之洛爲期會歟出巡則地不一故冒東言之書言居東詩言自東同義也一則書地矣王來自奄太保初至于洛是也是故疑其跡則曰奔楚紀其政則曰出巡括其地則曰居東三書之言皆是也明茅氏坤從僞魯詩之說謂周公避居于魯近日方氏苞從王巽功臣之說謂周公避居于周若是則與臧孫紇之居防商鞅之居商周勃之居絳其跡何異邪舅氏鄭淸如先生謂周公居文王之墓以寤成王文王葬畢在鎬西豈居東邪是故周公居東居于洛邑也成王迎周公亦親逆于洛邑金氏履祥曰成王以袞衣歸周公而俟于郊夫俟于郊不得爲親逆明矣金縢曰天大雷電以風曰天乃雨反風皆閒日事也周公之歸非閒日所能至也成王不得俟于郊以數周公之至又明矣是故書王出郊非駐于郊也明王首路而天意大明也書二公命邦人明王往東都不在鎬也夫東都去鎬七百餘里耳卜洛之後歲朝㑹諸侯皆集于此況迎周公之事萬萬非尋常朝會可並說者乃慮七百里勤成王而謂俟于郊邪有以知其不然也僞孔氏曰周公旣誅三監留東未還成王遣使者迎之夫挾近逼之親居讒疑之閒負不世之功推刃同氣之兄弟而􅏌然擁兵待人主之致禮周公而非聖人則可周公而聖人也豈爲之哉又有以知其不然也顧命辨上或問顧命所書禮歟曰禮也蘇氏子瞻以爲禮之失何歟曰蘇氏所言非先王之意也由乎蘇氏之說則顧命所書非禮矣本朝顧氏甯人從而爲之辭曰顧命蓋有闕文焉狄設黼扆綴衣其前皆成王崩之事也其後皆康王踰年卽位之事也非柩前卽位也其間有闕文焉顧氏之意以爲踰年卽位則禮也喪服可釋也可反也柩前卽位則非禮也喪服不可釋也不可反也夫喪服釋之反之于始成喪與踰年之喪皆未除喪也有以甚異乎無以甚異乎亂聖人之經以附後世之說莫此爲甚敬請先抉顧氏之妄以定經之本文經之本文定而蘇氏之說蓋可徐理矣顧氏之說曰未沒喪不稱君今書曰王麻冕黼裳是踰年之君也卒哭而祔今書曰諸侯岀廟門俟是旣袝之後也天子七月而塟同軌畢至今書曰太保率東方諸侯畢公率西方諸侯是旣塟之後也顧氏之說大者此數端而已敬按公羊傳始終之義一年不二君故未塟稱子臣民之心不可曠年無君故踰年稱公孝子之心則三年不忍當故諸侯于封內三年稱子天子亦然雖然顧命者布之天下傳之後世者也卽位之首稱子以臨可乎文元年春王正月公卽位定元年夏六月公之喪自乾侯戊辰公卽位是踰年未塟稱公也昭二十二年夏四月乙丑天王崩六月塟景王劉子單子以王猛居于皇是已塟未踰年稱王也是故卽位不書子則顧命不得不稱王逆予釗稱子王麻冕黼裳稱王皆禮也孔氏曰廟門路寢之門也成王之殯在焉故曰廟且古者寢與廟有同稱焉爾雅曰室有東西廂曰廟是也廟門之說何疑于旣袝乎蘇氏曰諸侯蓋以問疾至者顧氏以爲不然是矣雖然王畿之內非㑹塟遂無諸侯之至者乎其至者皆領于二伯者也諸侯之說何疑于旣塟乎抑塟袝之說顧氏爲踰年卽位證也而于經有不可通者作諡而塟塟而祔禮也成王三十七年四月崩塟當在十一月塟則舉諡而曰新陟王何歟曰命作册度曰御王册命册命者册康王爲天子之命自皇后憑玉几至用答揚文武之光訓是也書之册而史臣宣之之辭也成王崩卽爲此册遲至一年宣之何歟踰年卽位見于祖廟承先王先公而止陳皇后之命何歟三宿三祭三咤說者以爲奠于殯禮之哀而殺也見于祖廟而行之何歟然則顧命之書非踰年卽位之書也非踰年卽位之書則爲柩前卽位之書無疑矣而何所謂闕文􅁘葢古者始死東方正嗣子所以別其尊旣殯柩前立嗣君所以傳其統踰年朝廟改元所以愼其初三年諸侯朝于天子天子見于諸侯所以明其治葢至是而親政矣三年之禮于高宗諒陰明之踰年之禮于春秋書卽位明之柩前之禮于顧命明之皆折衷于孔子始死之禮于士喪禮明之大夫士庶人同者也顧命辨下然則春秋不書柩前之卽位何歟曰始死正嗣子之位全乎子者也三年朝天子見諸侯全乎君者也且位之定久矣故不書踰年卽位必朝廟朝廟必改元改元君之首事也故書柩前卽位不改元故不書定公卽位柩前其書者以改元也是故始死全乎子則全乎喪者也三年全乎君則全乎吉者也惟柩前卽位與踰年卽位喪也皆以吉行之葢先王之制禮也自一人㫄推之一家自一家㫄推之一國自一國㫄推之天下自天下而上推之治天下之一人自治天下之一人而上推之于祖推之于天于是乎有尊尊之義自一身上推之于父于祖于曾高祖下推之于子于孫于曾孫于元孫其㫄推之也視所出爲等殺于是乎有親親之義尊尊者天下之事也親親者一身之事也一身之事可奪于天下天下之事不可奪于一身卽位者尊尊之事以人君爲統服喪者親親之事以人子爲統故天子之服可以天下釋之且天子使天下之人得其生故尊于天下天子之父使天子治天下之人以得其生故尊于天子天子之祖以天下傳之世世子孫使治天下之人以得其生故尊于天子之父天則無不尊者也禮者上可以廢下下不可以廢上故天子之父之服可以天與祖釋之雖然反喪服而持之終喪則親親之義亦伸矣是故短喪者非聖人所許也曰然則蘇氏之言何如曰蘇氏之言非先王之意也其引冠子有齊衰大功之喪因喪而冠此言非也冠之禮從乎子者也子不加父故不能加于已之齊衰大功以喻卽位不幾于無等乎其引葬晉平公諸侯之大夫欲見新君叔向辭之此言亦非也大夫之欲見新君前不及柩前卽位後不及踰年卽位則賓禮也不可行矣是故舍卽位之禮喪服無時而可釋可反也匏有苦葉說衞之賢者知宣公之不可仕而爲此詩一章言徒濟也二章言車濟也四章言舟濟也匏有苦葉言所持不及用也濟有深涉言所遇不可嘗也深則厲淺則揭言治進亂退也雖然有冒然赴之者焉以爲吾之車足恃云爾殷之膠鬲周之正大夫凡伯其不濡軌也幾希葢內淫者必外亂外亂則賢者無所用其賢才者無所用其才此濟盈而聞雉之說也夷姜烝宣姜奪故三章以歸妻之禮言之本正則無不正矣夫匏可游車可乘舟則可絕流矣然非我友則舟之害甚于車與匏焉王陵周昌之于漢五王之于唐可以觀矣後之君子庶幾其愼之哉雄雉說此刺忮求之詩隘人之進則忮冒己之進則求忮求生媢媢生嫉嫉生讒讒生亂亂生亡亡者忮求之大積也其端則堯舜禹湯文武之世皆有之不使達而已夫文明者君子之外也而易耀耿介者君子之內也而易午故詩人以雄雉興之耀與午則阻非自詒耶身之計家之計國之計噫危乎哉所謂實勞我心者此也百爾君子不知德行葢如巷伯之卒章諷之耳非勉之也桑中說小序曰桑中刺奔也衞之公室淫亂男女相奔至于世族在位相竊妻妾期于幽遠政散民流而不可止子朱子曰樂記曰桑間濮上之音亡國之音也其政散其民流而不可止也桑間卽此篇東萊呂氏曰鄭康成曰濮水之上地名桑閒師曠所言亡國之音于此水岀焉桑閒乃紂樂非桑中之詩也惲子居讀之而嘆曰吾于桑中見所謂發乎情止乎禮義者焉云誰之思思也期我乎桑中思乎期焉要我乎上宫思乎要焉送我乎淇之上矣思乎送焉古人之爲詩也以思言之若曰若是其越也抑之可也後人之言詩也以事言之若曰若是其亂也絕之可也以思者比乎情以事者比乎欲比乎情禮義之所能制也比乎欲非禮義之所能刷也國風言情之書非紀欲之書也如以事言之彼三孟邪無以爲叔季解也姜弋庸其妻妾于衞邪無以爲諸姬之在室者解也桑中上宫淇上皆淫舍邪無以爲迭至而迭去解也故曰國風言情之書非紀欲之書也溱洧之士女刺相謔而已過此則不逾閾者也蝃蝀說蝃蝀謂之雩虹也雌曰蜺蜺曰挈貳日之煇五色衝雨則見爲虹陰陽之亂氣也氣亂則有物乘之故有飮于釡飮于井者非虹也物之乘焉者也山之蠱爲虹蛟蜃之氛亦爲虹此詩爲女子之懷婚婣者而言夫婦之父母相謂曰婚婣男女之以禮合者也雖然有信焉二姓之言不可渝有命焉夫婦之恒不可妄雖然婚婣矣行矣父母兄弟其遠乎豳之女子所以及同歸而悲也懷之則奈何父母之命未及也媒妁未至也而有速行之意焉葢不勝其燕眤也夫淫者人之所能知也懷者人之所不能知也雖然天地之陰陽亂則虹升不勝其燕眤則人之陰陽亂而有善感之容色故詩人以蝃蝀刺之夫懷之是朝叔而暮伯也故曰大無信也懷之是援姬而避姞也故曰不知命也詩之辭止于此而已言詩者曰淫重之曰淫奔豈詩人意邪雖然懷婚婣者不必淫而可以至于淫淫者不必奔而可以至于奔是故刑禁之于已然禮制之于將然詩防之于未然先王之道行則夫婦正矣此蝃蝀之義也有狐說有狐刺非禮也之子其無裳乎無裳非禮也其無帶無服乎無帶無服非禮之至也先王之制禮也以辨夫婦爲君臣父子兄弟朋友之本以明廉恥爲辨夫婦之本以裳帶服爲明廉恥之本無裳無帶無服是禽獸之道也故憂之噫寡而欲爲室家康成氏之說曷爲來哉石絕水爲梁投亂石絕澗也澗絕則水冒梁而爲瀨梁之隘可施橋焉瀨有廣輪如裳之有幅故以興無裳厲履石渡水也水冒梁則于梁置砥葢步爲一砥焉以達于津其延如帶故以興無帶側懸厂也懸故以興無服世之儒者于名物勿辨也而妄逆古人之意則益疎也已黍離說黍離作于已亂者也故其辭哀雖然亂未艾也故其思深其曰謂我心憂何也昔者幽王之禍三代以來所未有也晉文侯衞武公鄭武公輔周而東天下以爲王室復定矣然其時楚起于南齊橫于東秦萌芽于西鄭伏于肘腋天下有潰裂之勢而平王一以高拱揖讓行之不至凌夷以至子亡不止憂也者憂此也不然宗周已棄矣過其城者傷之可也何憂之足云哉其曰謂我何求何也昔者平王之君若臣葢有辭焉作洛之志始于武王平王從先王居諸侯宗之以言君父之仇則犬戎已逐矣以言朝會之故則昭夷以降已不能及遠矣尙何求哉尙何求哉葢國削必苟安苟安必諱禍其泄泄有如此者作于將亂者爲魏風之園有桃已亂則其人懼將亂則其人偷謂我何求懼而疑也偷則斥之曰士也驕耳已亂則中材之士皆寤矣將亂非上智不能知黍離之詩人曰知我者曰不知我者得半之辭也園有桃之詩人曰其誰知之是國人皆失日也葢世之將亂也天下知其是非進退之謬而朝廷視所施以爲皆宜敵國伺于外權臣伺于內奸臣伺于下而朝廷晏然康樂以爲吾國家無可乘之隙其憒憒有如此者其所以如此者則園有桃所謂彼人主之彼人者如皇父之專是已如榮夷之好利是已然而黍離之詩人不暇責也一則曰此何人再三則曰此何人此何人葢卽指晉文侯衞武公鄭武公言之何也幽王事起倉卒君滅國殘然四方及畿內諸侯無恙也三君者能同心討賊滅之絕之修城池建社稷宗廟而守之周可以不東而卒東者由鄭桓公死難武公內怛不敢與犬戎抗晉文侯衞武公去西都千里各顧其國不爲王室圖久遠也夫皇父榮夷斵之于方茂者也然且纖才侈欲容悅之徒而已若三君者天下仰望爲聖賢豪傑王室所倚重而乃至于此不重可責邪此黍離詩人之意也雞鳴說賢妃之御其心瞿然虞晏安之溺焉雞鳴未明也蒼蠅之聲則將明矣將明故蠅聚而爲聲寐而瞿然曰雞鳴不知已蒼蠅之聲也是遲而誤言早也東方明已明也月出而能有光則未明矣寐而瞿然曰東方明不知尙月出之光是早而誤言遲也葢心之警者其情事之惚恍如此不然蠅無夜聲且蠅之聲非雞鳴可􅀋也詩人之比物豈若是邪是故君子先度物而後言詩鴟鴞說爾雅鴟鴞鸋鴂郭注曰鴟􅀋而已玉篇始有鵂鶹之說案爾雅列鵅鵋䳢注云江東呼鵂鶹爲鵋䳢是郭未嘗以鴟鴞爲鵂鶹玉篇之說非也方言陸蔬釋文正義皆言巧婦鳥以詩言綢繆牖戸推之其諸不甚謬歟鴞如鳩一名鵩一名流離是也土鴞食母一名梟鴟是也鴟鴞如雀一名鸋鴂是也鴞土鴞鴟鴞俱名鴞如五鳩名鳩九扈名扈故郭曰鴟􅀋也鴟鴞鴟鴞鳥自呼之聲爲鳥言者皆自呼姑惡姑惡是也取子毁室指下民言之此詩書僞孔傳以爲作于東征之後詩鄭箋以爲作于東征之前史記以爲旣迎周公遂東征東征西歸乃作詩貽王今取詩言繹之予惟音嘵嘵是成王未寤也成王未寤則史記謂迎周公之後非也曰予未有室家予室翹翹風雨所漂揺是東國未定也東國未定則史記僞孔傳謂東征之後皆非也周公作此詩當以鄭箋爲信然鄭箋謂取子爲成王誅周公之屬黨毁室爲絕其官位奪其土地則甚非夫周公聖人也二公亦聖人也成王大賢人也周公聞流言義宜避二公當周公之避義宜調護朝廷成王者葢不能釋然于周公耳曾是三聖一賢而君臣之間如晉之于荀寅士吉射秦之于穰侯商君乎哉是故旣取我子取管蔡也其時管蔡未誅取者管蔡已外比武庚也周公葢傷之也毋毁我室者東國有叛志周公虞之之詞也徹土捋荼蓄租周公居東輯侯封繕王旅以障東國也拮据卒瘏周公之勤也夫二公以勳舊勤勞于內周公以太保冡宰出巡旣親且賢勤勞于外故武庚內引管蔡外引徐淮兵興幾半天下不旋踵而埽除之知此則鴟鴞之詩所以開諭成王思往慮來之故皆可以觀矣讀晏子一晏子春秋七略錄之儒家柳子厚以爲墨子之徒爲之宜錄之墨家本朝四庫全書錄之史部崇文總目曰晏子春秋八篇今無其書今書後人所采掇其言是也如梁􅏀據高子孔子皆譏晏子三心路寢之葬一以爲逢于何一以爲盆成适葢由采掇所就故書中歧誤複重多若此而最陋者孔子之齊晏子譏其窮于宋陳蔡是也魯昭公二十九年孔子之齊至哀公三年孔子過宋桓魋欲殺之明年阨于陳蔡絕糧皆在定公十年晏子卒之後今晏子乃于之齊時逆以譏孔子豈理也哉其爲書淺隘不足觀覽後之讀書者未必爲所惑然古書奥衍遠出晏子之上而悖于事理者葢多有之不可不愼也讀晏子二吾州孫兵備星衍爲編修時常校刊晏子春秋釐正次第補綴遺失于是書有功焉而敘中有不可從者二是不可不辯春秋昭公十七年有星孛于大辰史記十二諸侯年表書之于魯左傳昭公二十六年齊有彗星杜注云不書魯不見年表書之于齊葢史記之愼也左傳昭公二十年十二月齊侯至自田晏子侍于遄臺景公有據與我和之言飮酒樂景公有古而無死之言史記齊世家孔子世家及年表俱書田書入魯境在書彗星前六年此事之的然者今兵備據晏子謂遄臺之遊與論禳彗星乃一時事甚非也其謂彗星實在昭公二十年則益非彗星地氣所騰耳非如經緯星有行度纒次可推何以二千載之後逆知爲二十年之事非二十六年之事邪且謂二十六年因陳氏厚施之事追言災祥陳氏豈至是始厚施邪古今之書眾矣當求可依據者而從之其依據不可考則視著書之人之德與學與其書之條理明白者而從之今舍左邱明司馬遷信後人采掇之晏子吾不敢云是也史記越石父賢在累紲中晏子岀遭之塗解左驂贖之呂氏春秋新序云齊人累之累縲古通卽縲紲也晏子越石父反裘負薪息干塗側曰吾爲人臣僕于中牟見將歸古者惟罪人爲臣僕爲臣僕之罪皆可贖史記之言與晏子無異也今兵備據晏子謂越石父未嘗攖罪以非史記吾亦不敢云是也讀五帝本紀古者有氏有姓別姓者其初皆氏也太史公五帝本紀于黃帝曰姓公孫明其非氏也夏本紀曰姓姒氏商本紀曰賜姓子氏周本紀曰別姓姬氏明其以氏爲姓也然猶虞後人之略之也于是于五帝本紀之未發其凡曰自黃帝至舜禹皆同姓而異其國號以章明德故黃帝爲有熊帝顓頊爲高陽帝嚳爲高辛帝堯爲陶唐帝舜爲有虞帝禹爲夏后而別姓姒氏契爲商姓子氏棄爲周姓姬氏嗚呼可謂愼矣而鄭漁仲詆之不亦淺之乎言之哉後之人于本三代之姓當如太史公之書姓公孫于別三代之氏爲姓當如太史公書夏商周之姓則文得其所矣讀管蔡世家太史公著管蔡世家始書曰武王同母兄弟十人母曰太姒文王正妃也其長子曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰霍叔處次曰康叔封次曰冉季載最少末書曰伯邑考其後不知所封武王發其後爲周有本紀言管叔鮮作亂誅死無後周公旦其後爲魯有世家言成叔武其後無所見霍叔處其後晉獻公時滅霍康叔封其後爲衞有世家言冉季載其後世無所見以後世史例言之同母兄弟不宜書于周本紀而魯世家宜書太史公不書其懼傷周公之心歟然必書之管蔡世家者所以見聖人之不幸也且管叔蔡叔均罪而管叔無後不得有世家太史公不書曰蔡世家而曰管蔡世家葢聖人之處兄弟也盡乎當然之仁義而已使管叔有後如蔡仲周公必言于成王如蔡仲之封豈有異哉太史公之智足以知聖如此故曰紹明世正易傳繼春秋本詩書禮樂之際也讀魯仲連鄒陽傳太史公以鄒陽附魯仲連傳自索隱疑其時代懸隔後人不得附傳之故遂疑漢書鄒陽說王美人兄以解梁孝王之難與魯仲連解邯鄲之厄同夫王美人之事宵人由竇者所爲豈足以辱仲連先生敬葢讀是傳而知太史公之傷之也夫翕訿者據高位愚賤者服先畝天下之士不能待死牖下又不能通籍于天子之庭則挾技以游于諸侯間耳而諸侯者方且曰是吾故豢之是吾故不妨辱之殺之是故如仲連者飄然遠舉不受羈紲爲可耳不然能不如鄒陽之受禍哉今去太史公之時二千年矣凡客游者不如仲連以策干卽如鄒陽以藝進輕爵祿則如仲連之高懷恩私則如鄒陽之辱由是言之彼四公子之門其擾攘何如當有不可以意推者矣故君子之就也擇地而不違子義去也審幾而不傷于仁讀張耳陳餘列傳穀梁子曰君子之于物無所苟而已石鶂猶且盡其辭而況于人乎故五石六鶂之辭不設則王道不亢矣古之作史者辯于物析于事愼于文辯于物故名正析于事故理順愼于文故勸懲明史記張耳陳餘列傳廷尉以貫高事辭聞上曰壯士誰知者以私問之壯士意其可以私問也中大夫泄公曰臣之邑子素知之此固趙國立名義不侵爲然諾者也上使泄公持節問之立名義不侵爲然諾不可以私問也使泄公具告之曰張王已出因赦貫高貫高喜曰吾王審出乎貫高之心惟知有王故問岀王不問赦高也泄公曰然泄公曰上多足下故赦足下泄公之心惟知有高故􅃨言赦高不言岀王也至貫高絕肮死太史公斷之曰當此之時名聞天下如是而已何也家臣知有家而不知有國諸侯之臣知有國而不知有天下皆大亂之道如貫高者足以聳動激昻入人肝膈然而君子不以仁義褒焉孟子曰孔子成春秋而亂臣賊子懼于此可以觀矣讀貨殖列傳作史之法有二太史公皆自發之其一留侯世家曰所與上從容言天下事甚眾非天下所以存亡故不書此作本紀世家列傳法也而表書亦用之其一報任少􅀸書曰究天人之際通古今之變此作表書法也而本紀世家列傳亦用之史記七十列傳各發一義皆有明于天人古今之數而十􅀋傳爲最著葢三代之後仕者惟循吏酷吏佞幸三途其餘必力異于人者不歸儒林則歸游俠歸貨殖天下盡于此矣其㫄岀者爲刺客爲滑稽爲日者爲龜策皆畸零之人是故貨殖者亦天人古今之大㑹也鍾伯敬謂補平準書所未備可以操治天下之故其義乃推而得之其諸非太史公之本義歟讀霍光傳此傳七千餘言所書者四事耳其一受遺輔政其二殺燕王葢主上官桀其三廢昌邑王立宣帝其四霍氏謀反伏誅而已孟堅之文整贍得大體卽此傳可見而著光之罪則微而顯焉何也昌邑羣臣坐無輔道之誼陷王于惡光悉誅殺二百餘人岀死號呼市中曰當斷不斷反受其亂是昌邑羣臣謀光光因廢王殺羣臣耳光懲于此故立宣帝以起側微無從官及强婣親爲黨也爲人臣而如是卽無弑許后之事豈有不滅族者哉禹山雲皆少年愚騃非能爲惡者孟堅皆詳書之而篇末載徐福抑制霍氏書所以責宣帝不能全功臣之後載謁見高廟而斷之曰霍氏之禍萌于驂乘所以見不臣之罪不始于禹山雲而在光故曰良史也讀論衡吾友張臯文嘗薄論衡詆爲鄙穴其問孔諸篇益無理致然亦有不可沒者其氣平其思通其義時歸于反身葢子任稟質卑薄卑薄故迂退迂退故言煩而意近其爲文以荀卿子爲途軌而無其才與學所得遂止此然視爲商韓之說者有逕庭焉卑薄則易近于道高强則易入于術斯亦兼人者所宜知也孟子荀􅀸列傳書後敬十五六時讀史記以孟子荀卿與諸子同傳不得其說問之舅氏淸如先生先生曰此法史家亡之久矣太史公傳孟子曰受業子思之門人曰道旣通葢太史公于孔子之後推孟子一人而已而世主卒不用所用者孫子田忌戰攻之徒耳次則三騶子湻于髠諸人其術皆足以動世主傳中所謂牛鼎之意也而孟子獨陳先王之道豈有幸邪荀􅀸者非孟子匹也然以談儒墨道德廢況孟子邪葢罪世主之辭也其行文如大海泛蕩不出于厓如龍登􅀇雲遠視有悠然之跡而已孟堅蔚宗不能至也然世主所以不用孟子者何也陷于利也而不知卽所以亡故以梁惠王言利發端又引孔子罕言利以明孟子之所祖是以荀􅀸形孟子以諸子形孟子荀􅀸故題曰孟子荀􅀸列傳若孟堅蔚宗當題孟二騶湻于列傳矣此史記所以可貴也後見敬讀文選曰汝知從横之道乎言相並必有左右意相附必有陰陽錯綜用之卽從横也敬思之竟日仍于先生之言史記得之于是讀天下之書皆釋然矣嘉慶十一年敬年五十于南昌道觀爲余生鼎言之十二年于瑞金官舍讀陶菴先生文乃知淸如先生之所本遂書之兼以寄余生古今人表書後漢書古今人表始太昊宓羲氏終于董翳司馬欣而漢之君臣不與焉顔師古曰但次古人不表今人者其書未畢也惲子居曰顔氏此言非也孟堅爲漢人于漢之君臣將如何而差等之是故次古人卽以表今人也哀平之閒葢多故矣孟堅于身無事功而爲弑與􅀍弑􅀍滅者列之第九等之愚人而有事功者列之第八等所以著哀平王莽之罪也身爲弑而列第七等者惟崔杼慶封陳恒葢莊公下淫景公廢嫡亂不自下始也是故覆漢祚者平帝可原哀帝不可原推而上之成帝亦不可原齊桓公列第五等秦始皇列第六等而高祖武帝可推而知老子列第四等而文帝可推而知葢古人多以絕人之才識百慮千計而筆之于書讀之者委曲推明尙不能得其十五太史公曰非好學深思心知其意未易爲淺見寡聞道也敬以此法讀三代秦漢之書自魏晉以下則知者鮮矣書三國志後秀水朱錫鬯氏稱陳承祚削魏氏受禪碑而詳書漢中王武擔山卽皇帝位文并羣臣勸進表爲以統與蜀此承祚意也後人讀史不尋始末較其書法所在據一端之偏卽深文斥之如謂史記尊黃老三國志帝篡竊古人豈任此邪敬反覆觀之復得數端可以發錫鬯氏之說史記漢書之法曰傳曰志曰表曰論曰贊承祚作史有傳無志表何也彼三國者不足當一代之制也蜀得國最後失國最先吳據江表魏以篡終始故皆奪之然蜀用漢儀法無志表亦傳若吳魏之制皆不傳矣此奪之至也其以評易論而無贊何也吳魏之君若臣皆亂世之雄耳贊之是長亂也蜀以討賊號天下故于楊戲傳載蜀君臣贊以別之是正于吳魏也其目書曰武帝操明帝叡何也與先主備吳主權同書也明魏之非帝而已魏非帝而蜀之宜爲帝人無有知之者故于蜀書曰先主備而于吳書曰吳主權不稱先主權吳者非蜀儕也吳非蜀儕魏又何得以蜀爲寇敵邪此與之至也春秋之義微而顯志而晦史記葢得其意幾十之六七漢書得四五三國志得一二自晉書以下戛戛乎幾無有焉五代史知此法而不能用故書法必自爲論以道達之此史之所以不古若歟書諸夏侯曹傳後武帝紀注引曹瞒傳及世語以操父嵩爲夏侯氏之子于㥫爲叔父後人謂承祚合傳夏侯曹以此此殊乖刺按傳太祖以女淸河公主妻㥫子楙而淵子衡亦尙太祖弟海陽哀侯女尙適室又曹氏女也操雖鬼蜮何至汙亂若此邪葢二氏世爲婚婣㥫淵有開國勳與仁洪休眞等及其亡也爽與元先後誅夷大權始盡歸司馬氏故合傳之以觀魏氏興衰之所由乃作史定法也賈詡卑雜因諫易世子安卮所係乃得與二荀同傳其諸亦此義歟書鈐山堂集分宜萬􅜁岡上遴以鈐山堂集見遺凡若干卷其詩文庳陋無足言者序凡十餘皆忸怩之言而湛若水爲最以唐順之之才識所言亦無殊異焉嗟乎士生晚近世而號于天下曰能文其不受此辱者幸也閻立本以畫水禽爲恥章誕題凌雲臺榜至自悔絕筆法以今視之孰若此辱之甚哉金剛經書後一金剛經凡六譯今多行鳩摩羅什本通五千二百八十七言敬嘗誦言及之張臯文以敬言爲儒墨混敬何敢然邪且佛氏非墨也凡敬之爲言以明孔子之道如是佛之言與後之爲佛者竊孔子之言以爲言皆莫外乎孔子之道而已因書于是經之後以考其岀入焉經曰應如是住如是降伏其心曰應無所住而生其心曰應無所住行于布施三言而已中庸之言曰經綸天下之大經立天下之大本知天地之化育夫焉有所倚所謂無所住非邪曰肫肫其仁淵淵其淵浩浩其天所謂生其心非邪子貢曰如有博施于民而能濟眾何如孔子曰何事于仁必也聖乎所謂行于布施非邪大學之言曰心有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正所住之過如此曰心不在焉視而不見聽而不聞食而不知其味不生其心之過如此葢天之生人均是髪膚耳目心志其于道也皆一本焉故心之本然聖人能知其故而言之者佛與爲佛者亦能知其故而言之特不能如聖人之中且正而得實譯者又多以意比附故諸經之言或明或晦或詭或法而是經亦多覆沓卑􅇎之辭至其精審未有不與聖人之言相當有如此者慧可曰我金剛經書後二金剛經曰若有善男子善女人以七寶滿恆河沙數三千大千世界以用布施得福多否須菩提言甚多世尊佛告須菩提若善男子善女人于此經中乃至四句偈等爲他人說而此福德勝前福德此言財施也又曰若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施如是無量百千萬億刼以身布施若復有人聞是經典信心不逆其福勝彼何況書寫受持誦讀爲人解說此言身施也孟子曰中天下而立定四海之民所性不存焉金剛經言受持卽所性也言施財施身卽中天下而立定四海之民也故其福德不侔如此雖然猶有進于布施必言無住于受持金剛經必言無一法可得孔子曰巍巍乎舜禹之有天下也而不與焉葢于道庶幾矣其異于聖人者聖人以能充本然之知爲用故循性以達情而五倫序萬事備佛以不撓本然之知爲體故返情以合性視五倫爲外附之物而決去之而萬事懈渙矣聖人言物言事而至微至幽者在焉佛以言理言道爲大障而求其無障者故自言而自非其言且自非其非言之言如脫繫蹏而繫益堅如推拲手而拲益酷敎乘宗乘未有能出乎此者此不可不知也楞伽經書後一周萬載伯藹前令星子于廢招提得楞伽經記明沙門德清戌粤東時所著也其記漫衍頗有不附經旨者敬假之伯藹自南昌至甯都輿中讀之訖一過書後歸之凡佛經之說其辭旨無甚大異此經不立一義而諸義皆立悉與金剛經相比惟艱晦過當達摩至中國埽除一切文字以此經付慧可大師葢艱則難入晦則難岀難入則意識無所用難岀則怡然渙然者皆得之自然乃卽文字中斷文字障法也至鴻忍大師易以金剛經簡􅀡平易人皆樂從故道法大行而禪復流于文字此五宗語錄之所以歧互也經中開卷斥百八句皆非則全經語句無著爲最勝處葢金剛經先說法後說非法此經先說非法後說法一而已矣其言不離妄想卽見正智與楞嚴無始生死根本無始元清淨體義同與法華經是法非思量分別之所能解惟有諸佛乃能知之義亦同佛法豈在多求邪德淸記此經有四千卷此十分之一以驚愚者耳楞伽經書後二德清曰楞嚴以阿難入淫舍故唱斷淫楞伽爲夜义王說法故唱斷肉今檢經語疏斷肉之故十有七其義皆陋而最妄者謂一切眾生從本已來展轉因緣常爲六親不應食肉使生怖憫夫親想肉不應食非親想肉應食耶展轉因緣有色無色有想無想皆有之而佛聽穀食并食蔬果何也葢佛經多爲無識者附益故陋而且妄如此天發神讖碑跋嘉慶十五年六月丙午歙汪古香于南昌市中購得天發神讖碑摹本二一自藏一詒建平龔西原時西原攜酒飮陽湖惲子居齋中子居書其後此碑相傳爲皇象休明書按吳志趙達傳注象廣陵江都人幼工書時有張子並陳梁甫能書甫恨逋並恨峻象斟酌其間甚得其妙逋卽庯之借通陠屋上平也平曰陠險曰峻此碑書險絕亦恨峻不知休明之斟酌何在官帖中休明文武帖能斟酌逋峻之間書斷言休明八分亞于蔡邕邕八分亦無過逋過峻者則此碑非休明書也金陵瑣事以爲蘇建書書史會要稱建書與皇象同今建書國山碑與此碑殊不相入後之君子闕疑其庶幾歟乙瑛碑跋右張子潔所藏乙瑛碑頗有神采其整暇暢美爲唐人分書作嚆矢矣宋張穉圭定爲鍾元常書隸釋考元常生卒與立碑歲月不相及然仳碑韻勝處視元常正書行押書亦相發二王風流始于元常葢東漢之末其風氣漸及六朝可以觀世變也孔羨碑跋右魏孔羨碑殘本常熟嚴相君故物相君藏全本身後散落書賈得其三之一以詒陽城張子潔摹搨尙佳可藏也全碑置百石卒以守衞之卒上缺一字隸釋作吏卒後人因漢有百石卒史二百石卒史遂以隸釋爲不然敬按百官表二百石以上爲長吏百石以下爲少吏卒史者將卒之史卽吏也卒者更卒正卒也其不將卒亦稱卒史者五經卒史文學卒史秩比卒史也此碑卒史將守衞之卒止書官稱卒史書官並書所將可稱吏卒故三國志亦書吏卒而乙瑛百石卒史碑碑末書造作百石吏舍可互觀証焉明人跋此碑多罪魏氏父子乃史論體耳金石之學至本朝大明考正字畫則通㑹小學參次年月則推明史事故其學斷不可廢若如史論讀史足矣何必爲金石耶隸釋于金石有功此碑之說則謬甚魏氏立國殊不足道而隸釋以爲味素王之言行六經之道不止鼎峙之業是奬篡也其論又在明人下矣無錫宣頴達麗中吳縣徐敦仁愛杉姚江學案書後一世說新語愍度道人始欲過江與一傖道人爲侶謀曰用舊義往江東恐不辦得食便共立心無義旣而此道人不成渡愍度果講義積年後有傖人來先道人寄語云爲我致意愍度心無義那可立治此權救饑爾按此術明儒多用之嘗立一義以動天下其才力不及者亦必于師說少變焉如止修諸人是矣而開其始者陽明先生致良知之說也夫言致則不得爲良言良則不得爲致致良知之義豈可立哉孟子兼良能言之愛敬卽能也陽明先生去良能言之良知之義亦不可立矣于是一變而爲良知卽未發之中未發豈有知耶再變而爲良知卽天理天理豈有知耶及無端自言之則曰人心靈明而已是良知不能該良能矣不能該良能必不能該性與情也又無端自言之則曰是非之心而已是良知不能該惻隱羞惡辭讓矣不能該惻隱羞惡辭讓必不能該性與情也其後及門更多支駢互相矛盾皆由于此大抵先生才高氣盛不受漢唐宋以來諸儒籠絡故能懸旌立幟奔走天下而議論偏窳才氣又足以拯之東擊而西馳南攻而北走不可端倪捉搦及至合前後之說相較其不能相應固有如此者然天下及後世才力聰明之士皆喜徑惡曲喜簡惡煩故爲先生之說十嘗得八九其斷然能別擇先生之是否者累世不􅀗一焉若夫守陳腐之言循迂僻之行耳不聞先儒千百年之統緒目不見士大夫四海之淵源而曰吾主朱子吾主敬齋吾主敬軒欲與爲先生之說者力抗至則靡耳况朱子敬齋敬軒揆之聖賢又有其過不及哉雖然黑固不可以爲白也夜固不可以爲晝也是在學者善觀之而已矣姚江學案書後二本朝陸淸獻公深斥陽明先生爲禪而欲廢其從祀夫陽明先生之學是非可得而微辨焉若以從祀言之聖人之門豈若是之小哉敬嘗觀禪有近於朱子理在氣先之說者如魯祖茶盞在世界前之言是也有近於朱子知在行先之說者如仰山行履在何處之言是也有近於朱子之論性與氣者如趙州有業識無佛性之言是也有近於朱子之論體與用者如潙山有身無用有用無身之言是也此皆議論之時枝葉波流偶然相及非爲學之本源故雖甚近不可據此謂同於朱子若達磨所言淨智妙圓體自空寂大鑒所言眞如自性起念六根雖有見聞覺知不染萬境而眞性常自在此皆本源之言與陽明先生良知之說無異故先生之學不得不謂之禪然而有與禪異者亦言戒愼恐懼亦言愼獨亦言禮亦言仁義亦言孝弟此則其異者耳至朱子之學其榘度繩尺與聖人之敎皆一轍焉惟兢兢然孑孑然自㧞於禪甯言之實而不敢高甯言之紆而不敢徑甯言之執而不敢通遂有與聖人不相似者敬嘗謂朱子本出於禪而非禪力求乎聖而未盡乎聖葢此故也夫聖人之道固極其正者也異端不得而混之然其大則如天地之持載覆幬焉冉有宰我之過後人爲之宋儒所必擯也而以言語政事爲高弟子曾子明孝道其後有吳起子夏好論精微其後有莊周七十子之徒有顏子驕施子恒琴子張諸人若是則聖人及門固非若一人之言一人之行者豈得謂聖門之雜哉天地之道固如是也今觀浮圖之有功力者葢異於衆人矣况其精大者乎是故釋迦達磨大鑒諸人茍世與孔子相及當有所以待之者而謂高朗博大如陽明先生必不收錄在弟子之列此敬之斷不敢信者也崇仁學案書後康齋先生其聖門之獧者乎平生刻苦自立所著語錄多返責之身心無後儒恣睢之習其聖門之獧者乎至與弟訟祭田一事世儒多爲先生設辭以解者此未得先生之意也先生爲宗子守祭田而弟鬻之以爲弟得罪於祖若父己不得私焉而巳大抵獧者必褊隘自律嚴律人亦嚴所見一有所執其潰裂必至於此夫家事與國事有不同者管蔡危社稷周公不得不奉王命以討之若家事則以恩彌縫之而已豈可較短長哉事過之後先生必有所欿然也靖節集書後一􅀡齋書錄解題載蜀本靖節先生集有吳斗南年譜一卷張季長辨正一卷今坊間本止存年譜一卷而已疎謬處甚多而最悖理不可不辨者則以先生爲受桓元之辟此先生出處大節豈可誣之按昭明太子序曰素愛其文不能釋手故加􅊧校粗爲區目是先生之詩並無先後次第也斗南見始作鎭軍參軍經曲阿一章在庚子自都還阻風規林辛丑赴假江陵夜行塗口二詩之前意先生庚子辛丑起官可謂固矣又意其時桓元方當事乃以鎭軍歸之而桓元傳並未爲鎭軍將軍遂意殺殷仲堪後代其任不知仲堪傳止進冠軍又辭不受並未加鎭軍也是曲折求通而終於不可通也况戊戌七月桓元反陷江州己亥十月桓元反陷江陵皆在庚子辛丑前庚子三月加督八州辛丑十一月桓偉鎭夏口明年桓元大敗王師遂入建康豈先生而爲之參佐以奬逆哉此必無之事也然則先生庚子至都何耶曰先生飮酒詩言遠遊言飢驅言營一飽則非仕事矣其言阻中途卽阻風規林事也是先生以遠遊至都耳乃瞭然者也先生辛丑赴假江陵何耶曰先生本傳曰州召主簿不就先生旣抱羸疾召主簿必以疾乞假至滿則赴之而終以疾辭故本詩言投冠言不縈好爵是也先生江州人州召主簿應赴江州而赴江陵者是時桓元領江州刺史駐南郡是先生以辭主簿至江陵耳亦瞭然者也合前後觀之先生不汙於元可信矣而斗南於千餘載之後誣之誠何心哉是故先生爲鎭軍參軍當以文選李善注元興三年甲辰參劉裕軍爲是裕建義旗先生從之故自題始作蓋幸之也其經曲阿則裕本始事丹徒當更有收集之事耳庚子辛丑先生未仕則辛丑遊斜川癸卯懷古田舍二詩俱可通不必如斗南改辛丑爲辛酉改癸卯爲辛卯矣宋人讀書好武斷斗南至改年歲以就之可謂怪誕之甚者矣季長辨正他日當更求閱不知與敬所見同異何如也靖節集書後二宋書傳靖節先生言自以曾祖晉世宰輔恥復屈身後代自高祖王業漸隆不復肯仕南史亦同此言此得先生之心矣然未悉當日事勢也何也先生生于晉哀帝興甯三年及壯當安帝之初其時王國寶司馬元顯桓元相更代故先生無宦情一起爲州祭酒卽自免去徵主簿不就蓋不欲與諸人之難也至元興二年桓元簒位三年劉裕復京邑行鎭軍將軍追桓元過潯陽先生乃爲其參軍年四十矣先生附義旗而起以劉裕爲可安晉室耳明年劉裕從兄劉惟肅爲建威將軍先生爲其參軍其秋卽令彭澤敬思先生與劉穆之王宏徐羨之謝晦同在劉裕幕府其差池不待言而劉裕之懷異志穆之等之附裕先生必微窺得之于是晉室之安無可望故自鎭軍參建威自建威令彭澤然後脫然遠去永遂其不臣二姓之志耳先生去官時劉裕尙未執政以爲王業漸隆者非其實矣先生處已之高見機之決進退之裕皆于此可見其詩淸微通澈雄厲奮發如其人如其人焉楊吳江夢孫亦潯陽人徐知誥表爲秘書郞夢孫乞天長令去其庶幾聞先生之風者歟陶靖節集書後三敬嘗遊廬山求所謂栗里者得之其地西南距柴桑東北望上京廬山之陽谷也先生始居上京後遷柴桑暫居栗里復還柴桑年月遺落前人考求頗未當敬就晉書本傳並先生詩文推正之遊斜川詩在辛丑懷古田舎詩在癸卯是辛丑至癸卯先生尙居上京無疑甲辰夏爲鎭軍參軍乙巳春遷建威參軍其秋乃令彭澤爲鎭軍詩言與田野疎言返班生廬爲建威詩言田園夢想言懷歸舟皆未遷居之言也本傳先生謂親朋曰聊欲􅃶歌以爲三徑之資可乎歸去來辭曰三徑就荒曰攜幼入室葢先生未赴縣時遷家累於柴桑當乙巳之秋至冬罷彭澤遂居之歸田園詩言宅言屋言後園言堂前卽柴桑宅也還舊居詩則自柴桑偶還上京故言周故居而已以爲自彭澤還上京者非也若遷栗里乃在戊申之秋觀遇火詩移居詩可見乃倉卒事耳意其時故人龎通之等居栗里故先生往從之以爲在庚戌者亦非也且不久卽還柴桑觀庚戌西田詩丙辰下潠田詩亦可見也五柳館當在上京先生未仕時事歸云來館當在柴桑先生休官時事今栗里有二館後人之企附也夫古人之事往矣其流傳記載百不得一在讀書者委蛇以入之綜前後異同以處之葢未有無間􅂩可尋討者若是則古人之事大著可由其事以求其心焉及古人之心大著可復引其心以斷其事此尙友之道也若任情肆意爲之雖今人朝夕共處之事且不能得要領矣况古人哉李氏三忠事蹟考証書後宜興李慶來鹿采集其先世三忠事蹟爲考証一卷而以諸名人所爲傳志雜文冠之皆明永明王時殉節者也曰用楫官兵部侍郞肇高廉雷瓊巡撫拒大兵於合浦戰敗自沈於靈山之勞家池曰耒用楫同產弟官監軍道大兵敗李定國於肇慶耒走死德慶州曰頎用楫同姓祖父行官江西道監察御史與大學士吳貞毓等十八人謀召李定國誅孫可望可望遣其黨鄭國殺之隆安之馬塲謹案本朝於明三王死事之臣悉仍其官予之諡所以勵名義也用楫耒抗顏行以死死而未及達其名於本朝議禮之官諡不及焉然其皎然之意如日月也若頎之死則有不可不詳辨者定國可望始皆流賊也繼皆張獻忠養子也其在賊無異也可望流入雲南貴州定國流入廣西皆奉永明王其歸朝亦無異也舎可望就定國於義何居焉葢當日者永明王再返肇慶可望邀秦王封先發難大罪一及走隆安可望下兵貴州脅乘輿大罪二擅殺嚴起恒楊畏知大罪三馬吉翔等謀畫堯舜禪授圖大罪四改國號易印文大罪五此五大罪皆不可赦者也可望劇盜耳其勢不及王彌秦宗權於曹操司馬懿不能爲其奴隸也然而刼遷易衞殺人望加殊禮皆已爲之矣是故可望必誅者也欲誅可望非召定國不能十三鎭在湖南定國於隆安尙近宜召一湖南兵次第敗散定國能敵可望宜召二各降將朝暮反側定國知尊朝廷宜召三此三宜召皆不可易者也若是則永明王雖無詔書尙當以安國家利社稷爲之况當日之奉命行事哉自江介自立南服播遷諸臣多結黨藉援搆災煽亂馬士英倚黃得功而左良玉反於楚金堡主何騰蛟而鄭芝龍叛於閩吳楚之黨內訌黔粵之師外潰皆由私意彼此流禍無窮若召定國一事則大義所在國統攸關非諸臣反覆者比也後此可望反於貴州遂降本朝定國始終求出永明王於緬甸不克而死若定國者其可謂晩葢者歟朱贊府殉節錄書後南城朱茂才以六世祖新城贊府延忠殉節錄求士大夫記載歌詠之茂才從祖父新城校官元錫所􅁧也徴傳于敬敬吿以大傳非文集體復徴書事敬吿以文集與府縣志不同若累累言忠節乃志體耳而茂才請不已遂取其錄書後歸之贊府聞李自成陷京師棄官後以不下髪被逼自殺其死正矣敬獨悲其未死時巳見夢於妻姜孺人言得從崇禎皇帝此忠臣魂魄死生一致而一家之中其誠足以相及之騐也江右前明殉節諸臣吉水李左都􅀖華宜春袁僉都繼咸峽江曾文淵櫻淸江楊東閣廷麟爲最著諸君子忠謀亮節照耀寰宇贊府以位卑所行無他表見然歸命君父如水之百折必東與諸君子艱危戰守死而猶視豈有異耶士大夫幸生平世當求贊府所以能自立之故則知伊周可與龍逢比干易地而所成之事其大小高卑於性分葢無二焉卓忠毅公遺稾書後瑞安林監州從炯蒐次卓忠毅公遺稾并附各文及詩之傷忠毅者爲三卷刻之而徴辭於敬敬以名與忠毅同不敢附於篇末監州謂古者旣塟而諱恐傷生者之心耳非如字之尊名後世不達此指以不斥名爲禮傎矣又諱必及其世今已去忠毅四百餘年且非臨文之義敬遂不敢辭謹按忠毅授命於建文四年其生平經濟氣節前人已表章之如日月之著矣敬所惜者劉忠愍所作原傳載忠毅著述有遺書十卷詩文五十卷今止存數十首忠毅門人黃潮光所作年譜行狀今悉不存夫古之大人具葢世之氣全不世出之節者其生平無不謹小愼微事事得其所處若跅弛之士感激一旦竟成其名史書及府縣志紀錄則有之必不能千百年之後人人變色動容有一百折不屈之人如在其心如出其口若忠毅方學士鐵尙書者也故敬嘗喜於詩文集求古人性情之所在年譜行狀求其瑣屑不經意之事以觀其學問之所至而惜乎忠毅之竟歸散落也李將軍名將子長記其被􅀗卧兩馬間張都督百戰保江淮退之記其不忘名姓段太尉手擊朱泚子厚記其鬻馬償債皆其人精神意氣流露於不及覺者故可以爲觀人之法忠毅本學宋儒其言行必精密有步驟而竟無可考証豈不重可惜哉然忠毅遺文遺蹟雖散落幸有此數十首及忠愍所作原傳讀者能一一推之未嘗不可以測忠毅此後監州其益蒐次之或更有所得則益幸也維摩詰經書後此經亦鳩摩羅什所譯大乘經史稱與釋道安相合白太傅曰證無生忍造不二門住不可思議解脫莫極於維摩經葢指其中精語言之行文則弇陋平襍不足觀也其經之全恉在注明維摩詰示疾爲緣起葢佛敎人出家而維摩詰以居士見身故此經佛道品言煩惱泥中有衆生起佛法乃卽病與藥耳然執藥治病藥卽病矣故下章入不二門品盡掃除之所以爲大乘經也如此義諦惟佛地位能决之諸弟子並大菩薩豈任問此疾耶葢全恉皆出於佛而筆授者非過量人雖釋道安鳩摩羅什無如之何也楞伽經續書後盍亦觀車之行於大塗乎引而之乎千里者馬也視乎險夷曲􅀡者人也其載則車也人之心譬之車而載與人馬皆具焉是故性之五情之七心之載也知爲心之人能爲心之馬善不善爲心之險夷曲􅀡其至爲心之千里若是者盍亦觀車之行於大塗乎性善者也情善而之乎不善者也知之體洞然無善無不善者也而其用能知善不善能之體充然可以爲善可以爲不善者也而其用或專於善或專於不善是故孟子性善之言以性言性而舉其全荀子性惡之言以情言性而要其末揚子善惡混之言以情言性而混其末與初韓子性有三品之言以知能之用言性而忘其體惟浮圖之言則能舉知能之體焉而能者有畔岸者也故多舍能而言知曰常惺惺曰活潑潑皆知之體也以此爲性故其言曰性無善無不善程子朱子引常惺惺活潑潑之說而附之以儒言失其旨矣此經六識分見第七識合見第八識爲性海皆由知之用以推極知之體六識第七識卽楞嚴生死根本也第八識卽楞嚴常淸淨體也其義宏深浩渺細極無際大含無涯陽明先生終身言良知無出是範圍者其徒雖屢變他說又何從出之哉故其言曰良知包括天地夫知之體宏深浩渺如是若於能之體尺寸推之必有可敵楞伽斯義者而惜乎律家所言不能盡也壇經書後一大通禪師偈曰時時勤拭拂不使惹塵埃大鑒禪師反之曰本來無一物何處惹塵埃今壇經所言皆拂拭之功何耶蓋圓頓漸三敎未有不終身拂拭者也未悟之先拂拭導之旣悟之後拂拭養之宗門宿德皆如此然滯於拂拭有漏之因耳故大鑒以無一物救之滯於無一物亦有漏之因耳故大滿以未見性救之湼盤經言佛性常諸法無常大鑒乃言佛性無常諸法有常皆以解黏去縛而已惟如此方可以言拂拭之功壇經所言非止爲接引初機設也壇經書後二大鑒禪師臨涅槃次傳授之世自摩訶迦葉尊者至菩提達摩尊者凡二十有八而吉迦夜所譯付法藏記止二十四至師子尊者而絶宋沙門契嵩據三藏記著傳法正宗論定爲二十八祖是矣然契嵩咎彌遮伽多等七尊者無師弟子傳授之義則非也敬觀佛書記師弟子傳授大約附會成之甚鄙誕不可訓不止如朱子所詆用中國音韻聲律而已浮圖稍有識力如元沙備徑山果必不爲是言况諸尊者之超然哉故壇經止次其世無綴辭焉後之人可以無惑於附會之說矣文衡山先生詩册跋陽曲李巽宇同年藏文衡山先生詩稿四册揭陽鄭總制家故物也曾歸眞定梁蕉林相公總制官􅀡隸故歸總制凡爲古近體詩若干首皆淸瀏雋上書法則出入顏褚極率意處皆有法可尋眞蹟也古大家名家所作自性情流出故生氣坌涌大小高下如其人之生平贗者支支節節爲之則索然矣衡山先生託志高尙而此册有不可遏如之勢朱子讀陶詩而歎其凌厲葢隱士匈中之氣皆如是也夫事功較之文章異矣然未有不本之性情者總制以治才著乾隆中蕉林相公在聖祖朝委蛇黼黻極一時之盛二人匈中其亦有不同於俗未易以淺近窺測者歟巽宇必以敬之言爲不謬也巳黃石齋先生手札跋汀州伊墨􅀸太守藏石齋先生手札一通與熊魚山書也詳書中所言當在崇禎九年先生起官之後時魚山以事降官牢落在外故辭多隱約耳書後歸心丹訣其有所託而爲之歟古者忠義之士如顏平原及先生皆學仙而得明騐於授命之日者也富鄭公丹訣一匣康節舉而焚之曰先去一大病善學古人者可以互觀焉醴泉銘跋佚張子實臨徐俟齋尺牘書後右陽城張子實臨俟齋先生尺牘并三家跋語作一卷敬愛其雋宕淸超假歸案頭一月餘第八行爲下食婢汙損數宇不可治因書後歸之敬今秋至南昌首見左忠毅史忠正手札次見董文敏初入翰林時家書次見俟齋尺牘皆眞跡也忠毅之言如苦行沙門眼超語峻必證上果忠正處分軍事謹密當事機俟齋隨手作書莊語謔詞具見格調如接王劉諸人談嘯文敏皆家常語耳劉豫州聞之當自卧百尺樓上矣於此見士大夫性分風尙各有所近而所處之世緩急治亂亦可尙論焉忠毅忠正手札藏桐城左氏俟齋尺牘查守樗自廣東攜歸京師文敏家書爲子實所藏因并識之記蘇州本湻化帖嘉慶十一年十月敬在南昌於彭臨川處見板本湻化帖十卷卷數下有臣王著摹四字檢卷後仍摹奉聖旨摹勒上石篆書則卷數下四字爲賸矣士大夫必不至此其爲市井所爲僞本無疑十四年八月復於南昌見之知爲瑞州吳司馬故物後至京師見多鬻之者旋過蘇州則賈人以數帙􅋑賣焉然後知爲蘇州本也六研齋筆記王文肅所藏湻化帖卷數下四字與此同又第二卷鍾繇書第三卷孔琳之書增多處亦同惟文肅本裂文八處此本或見或不見文肅本莆田陳知古王俊刻等字此本皆無之據此則此本爲翻刻文肅本亦無疑文肅於此事雖未見深嗜其家庭門館多知者何至弆此贗物豈賈人先饋之爲聲價歟抑文肅好廣而漫購之歟文肅本鈎摹不知何如吳司馬本俗則甚然尙是百年前拓本今市中本則更下也上董蔗林中堂書中堂大人閣下敬前在都不及見吾宗宛平君宛平君有孤女二人中堂爲猶子娶其少者敬欽風義之日久矣然處卑賤不願自通於左右後令富陽爲中堂鄕縣以禮至邸第一投謁而中堂辱存之侍坐之頃妄測淵雅之衷宏通之量葢庶幾唐之張子夀宋之王子明者是用益不敢苟然致􅀗咎於大君子葢十五年之間未嘗一日忘未嘗一事干此則敬之所以自立於天下士大夫而中堂之所深知深知者也雖然上之於下也知其識知其才知其守皆有迹可求者也故雖以􅀸相之尊欲知草茅初進之士難矣而實易下之於上也有奏狀之言有制詔之辭有朝議之公有輿論之詳易矣而實難何也彼在上之庸淺者葢亦有之矣而不爲庸淺者識至遠而不見其識才至大而不見其才守至堅而不見其守皆無迹可求者也而以庸淺測之則惡乎知惡乎不知是以敬之於中堂不敢以庸淺測之則請言敬之所能測者曩者敬以官事久羈浙中中堂歸富陽一切以古禮自處而人人所道者入官寺如甘甯過里中如石建敬以爲此自好者所能不足以見中堂敬所竊窺者其時海內無事而中堂獨居念之深念之至深處若忘行若遺在堂則循階在室則繞柱且中堂立朝素不以辭色從人者及自富陽至天津至京師而不惜委蛇行之行之而無所圖則向之念之深念之至深者何爲也行之而有所圖則向之念之深念之至深者何不聞一親者之與聞一智者之與議也及數年之後朝廷施大賞用大罰而後使敬渙然而意得之此則中堂之不見其識不見其才不見其守有如是也然而敬尙不敢信以爲如是也及往歲侍坐微及古今相業有旋乾轉坤者中堂悚然惕然言何敢承何敢承而後益信爲必如是也敬所能測中堂者此一事耳而已如是推之則中堂輔佐兩朝垂四十年其中識之遠才之大守之堅而無迹可求者豈易更僕數哉豈易更僕數哉敬生有狂名而所守皆獧者之事惟好觀古今之大人察其人人之所不諒者此則分外之想分外之志其世人所謂狂歟然性之所喜不能以已敬座主戴文端公於中堂淵源最近道義最深其忠愛勤勞亦有深隱不可驟識如中堂者敬文稿上書一首神道碑文一首庶幾得其大凡不可不呈之中堂古者語必以􅀋故詳敘敬之所以測於中堂者以先之惟畱意焉正月十八日惲敬謹上上舉主笠帆先生書笠帆先生閣下前者旌斾自江西移湖南士聚於庠商吿於市民要於野願一叩首馬前先生豈人人被之澤以要結之哉心之所及足以相信有如是也而其中能詩文者復揄揚其事以獻之左右先生亦深慰藉之後敬追隨至九江先生問獨無詩若文以言别之故敬對而未悉也古者贈送詩若文多規戒之辭至明而盡出於諛悅葢不問其人若何而皆有以諛之悅之者其升擢朝覲則諛悅之辭從同同是故敬集中無是也且詩文集序及題辭亦無之何也五尺之童未知丁倒卽有集此誑科第耳遺種之叟萬事瓦裂亦有集此無聊賴耳富貴酣養欲爲淸流亦有集此乘豪橫耳序者纍纍焉題辭者纍纍焉一言以爲知一言以爲不知此不必更附其後也况禍福之端一人造之一人當之已末不稱本若以從他人豈不大可惜哉是故敬集中亦無是也先生文章事業出於人人不在鯫生之揄揚敬事先生與人人殊不在隨人人爲揄揚故先生之去亦無之惟先生之去亦無之而後四海之大百年之久無有再以贈送之詩若文責敬者而集中之義例遂如金城之不可攻湯池之不可越矣然而有白之先生者故九江之對請以書進幸得畢其辭焉蘇子由曰古之君子不用於世必寄於物以自遣敬之庸劣不敢附於古之君子霑竊微祿近二十年不敢謂不用於世然今之天下人才衆矣任鈞軸者有人任􅆠埸者有人任河渠者有人任漕輓者有人任百執事者有人皆循循然奉功令赴期會較其貴賤則有相懸者矣論其賢不肖之相去其間豈能以寸哉是何也世亂則才勝法世治則法勝才太平旣久無異政無殊俗豪傑與凡庸同功正􅀡與詭隨並譽如洪鑪熾則金鐵雜投而皆鎔大海泛則淨穢疾下而同化也若是則敬雖服卑官二十年豈敢謂用於世卽等而上之再等而上之又豈敢謂用於世哉若是則寄於物以自遣之說敬何敢辭焉且夫操觚之臂可引六鈞習於射也超距之足可越三丈習於踊也測理之心可達于聖習於文也敬自能執筆之後求之於馬鄭而去其執求之於程朱而去其偏求之於屈宋而去其浮求之於馬班而去其肆求之於敎乘而去其罔求之於菌芝步引而去其誣求之於大人先生而去其飾求之於農圃市井而去其陋求之於恢奇弔詭之技力而去其詐悍淘汰之播揚之摩揣之釁沐之得於一是而止是故質諸鬼神而無疑百世以俟聖人而不惑竊有志焉而未逮也本朝作者如林其得正者方靈皋爲最下筆疎樸而有力惟敘事非所長再傳爲劉海峯變而爲淸宕然識卑且邊幅未化三傳而爲姚姬傳變而爲淵雅其格在海峯之上焉較之靈皋則遜矣其餘諸子得固有之不勝其失也是固有之不勝其非也敬才駑下終其身而已矣若夫文之堅毅者必能斷文之精辯者必能謀文之有始終者必能持正則所謂鈞軸彊場河渠漕輓百執事葢無二道焉然或寓之文而充然寓之事而未必不欿然者則又存乎其人存乎其時而巳敬非敢自矜也􅃼􅃼千古如驅羊如履狶如害馬不力辯焉則此事皆爲謬種矣惟先生諒之八月二十一日惲敬謹上上舉王陳笠帆先生書笠帆先生閣下本月十六日接奉鈞諭辭恉精審以敬爲可敎而諄諄示之言藝如是言事言道必悉如是此古人所以能日進之道也而簡末及于亭孝廉則知幕府賓從皆見敬前書而幸正之先生知交遍海內幕府之盛幾於裴丞相錢畱守敬以言藝進當始終盡其愚并以質之諸君予焉書日之法始於尙書而詳於春秋春秋書魯大夫之卒穀梁言日者正也不日者惡也公羊則以不日爲遠今考公子牙以後二十三人賢與不肖卒皆日則不日者以遠失之公羊爲是故古者金石文卒皆書日也左傳衆父卒公不與小斂故不書日孔疏以季孫行父等證之是君臨宜日也文端碑書甲寅皇上親臨喪次其法本此至賜諡賜祀賢良賜祭春秋無明文可比然不日則疑於與臨喪同日矣故謹書之春秋於喪之歸皆書日桓公昭公是也故文端之喪至南昌亦謹書之塟之日不日公羊有渴塟漫塟之說而以不日爲正然春秋書魯公之塟夫人之塟各十皆日則他國之不日者亦以遠矢之非如公羊之說也故文端之塟亦謹書之數條皆金石文通例也若書三代封贈之法其以一筆書者必官封無異焉今筤圃先生有官階不可沒彭太夫人受夫封亦不可沒是以前後詳書而中以如曾祖如曾祖妣變文以隔之此亦金石文通例也其所以必三代排比書不合書有官無官有封無封而一筆以封贈結之者抑更有說此文自嘉慶元年至如公式以日排比書舉人中書以文端之年排比書賜及第以後以國家年號排比書而於賜及第書文端之年爲上下轉捩葢前後數百言皆排比法以見謹也若書三代獨不排比則爲文體不純矣史記漢書有排比數千言者其後必大震蕩之此文實在前虛在後所以如此者因通篇不書文端一事故用排比法敘次家世科名官位然後提筆作數十百曲皆盤空擣虛左囘右轉令其勢稽天匝地以極震蕩之力焉此法近日諸家無人敢爲亦無人能爲也東坡司馬公神道碑虛在前實在後所以如此者由一切事業不足以盡文正故竭力推闡在前後列數大事止閒閒指示如浮雲如小石此文正人之大東坡手筆之大也文端雖賢必不敢自儕古人敬才弱不敢犯東坡因顚倒其局用之至變化則竊取子長嚴整則竊取孟堅也自南宋以後束縛修飾有死文無生文有卑文無高文有碎文無整文有小文無大文韓子詩曰想當施手時巨刃摩天揚南宋以後止於水航之尺寸粗細用心而不想施手時故陵夷至此也婦人稱太始於太姜太任太姒戰國始見太后之稱漢晉以來有太夫人之稱其夫在不稱太乃定制於北宋至今沿之而夫婦皆亡則仍不稱太與厯代升祔不稱太同文端爲修撰之時筤圃先生夫婦相繼而逝故封一品時應去太字于亭之言是也如尙有未當祈卽續示爲幸十月十一日惲敬謹上答伊揚州書秋水先生閣下不見二十餘載矣天下不過此數人耳何日忘何日忘今年在椒邱舟中得二月二十二日書喜甚開椷讀之知在粵東見敬文稾過􅀩奬借不安殊甚惲子居他日何以副朋友之所期耶不日進卽日退恐文質無所底愧見諸君子則今日之詅癡符亦終歸於覆醬瓿貯敝筐而已藹如其言昱如其光皦如其音先生視敬有一焉否也淸夫徴士時時於往來中知其爲人其文必有過人者往歲敬北下章江先生爲故人子所發書並淸夫徵士集均未寄到至下籖之說敬何人斯敢當斯語然有可復之先生者曹子建云後世誰相知定吾文劉彥和云善爲文者富於萬篇貧於一字歐陽永叔文成卽黏壁時時讀之蘇子瞻用事必檢出此數人者其用心可以觀矣是故文者私作也必以公行之文者藝事也必以道成之固有賢人君子窮極精慮之所作述而一得之士可以議之者然則淸夫徵士之集敬請得因先生之言而一一籖之天下當不以爲􅆫也已敬於孟詞爲鄕試同年生孟詞卒後未聞其一事心嘗恤然其生平學問又未得其要領所命云云皆敬心中所朝夕念也然如何而可以不負孟詞惟復命之聞先生明歲有江右之行當可作數日遊所欲言者無窮極也七月初七日惲敬謹復答伊揚州書二秋水先生閣下前奉韶州手書七月中作復并文稾四部由瑞金楊茂才國芸寄李汀州處矣如未達可向署瑞金邵君促之甚便也八月下旬淸夫徵士之少君蘭芳來寓手書并淸夫文集一部始知遲遲之由蘭芳事已與料理矣敬前復書蘭芳錄本奉呈想已達也淸夫爲今之作者先生來書何言之謙耶貴省近日古文推朱梅厓先生淸夫得之梅厓梅厓始終學韓公者也大抵韓公天質近聖賢豪傑而爲文從諸經諸子入故用意深博下筆奧衍精醇梅厓止文人而爲文又從韓公入故詞甚古意甚今求鍊則傷格求遒則傷調自皇甫持正李南紀孫可之以後學韓者皆犯之然其法度之正聲氣之雅較之破度敗律以爲新奇者已如負靑天而下視矣淸夫猶是也敬與淸夫所學不同若强淸夫之文以從敬是猶毁鼎􅂜而鑄刀劒舍琴瑟而聽鼓鼙後者未成先者已棄鄙意欲於其目録之不劃一者齊之稱謂之不相當者易之當時語之不合法者删之如是而已望寓書淸夫視所見同否也九月初五日惲敬謹復答伊揚州書三秋水先生閣下前月得舍弟書知過嶺修謁重􅀩嘉惠感謝感謝舍弟蹉跎二十年不得已請書於先生從此或有遇合以成其用皆先生之賜也目下尙在瑞金望後方可至章門所賜家南田畫未得展玩而心之欣然已不成寐矣惠書舍弟先附來昨又得九月二十七日書所以慰藉期待敬者良厚不敢當不敢當敬近日觀尹河南范忠宣所以處患難之言褊心暴氣似有銷釋之漸其餘世事俟大定後與世之大君子權之不敢求進亦不敢言退也光祿公人倫模楷專立祠堂頌述功德敬得附名其間可謂幸甚惟來示命以作記敬思記體謹嚴唐宋諸名人雖破體爲之不過抑揚唱歎以遠神激蕩而已氏族官位旣不能詳列學問事功又不能實載是以改作祠堂碑銘可以用大筆發揚用重筆結束太夫人祔廟亦於體得書矣先生必以爲宜然宜然也古者講學之人祠堂記多稱號稱先生今用祠堂碑例宜稱官稱公至惠州之事例不宜書太夫人生平之事例不宜書孫曾銜名例不宜書先生亦必以爲宜然宜然也道學異同若入碑文中少涉筆則不透徹多涉筆則辨體論體矣不涉筆則通篇之文如玉巵無當玉盤缺角故起首推明朱子之學後列高宗之諭及文恭之論君友共証明之遞入銘中可以縱橫往來使銘辭瀏然􅃀然與碑文相照耀乃變法中正法也鄙意如是必屑屑自明者敬以後學爲先進作碑文庶幾愼之又愼或免咎戾先生亦必以爲宜然宜然也敬爲飢寒所迫秋來又病腰脚明春得暇淸夫之文當卒業焉或天假之縁得朝夕晤對則可益盡其愚淸夫必不鄙夷之也龔西原署瑞州周雨亭署南昌同知皆時見巳致盛意矣方茶山在遠未得見也冬寒一切爲道自重不宣十月初五日惲敬謹復答伊揚州書四秋水先生閣下二十二日舍弟自瑞金至南昌盛言先生兄弟之樂子姓之謹精神之固問學之勤爲之欣然可以觀所養矣又言秋水園古樹數章修篁數十畝池館位置得疎宕之意兼有近石遠山引人着勝先生何修而得此耶敬在千里外已神游化人之宮矣能繪一圖來當以小賦或小記償之庶幾此山之靈欣然解顏也所惠香山老人畫是其晚年之筆意境超遠體勢雄厚皆以篆籒法爲之惜神已敗矣縁懸挂積年爲塵土所侵裝潢家又以低手壞之也敬過眼雲烟幾數千軸大約以俗冒雅者貴以雅箴俗者賤以邪干正者賞家多以正排邪者賞家少小道尙如此如何奈何光祿公祠碑銘先生當自書之或用靑石大碑四統如表忠觀碑書徑三寸字四圍以石柱石押束置一處可得五百年不毁五百年後必有再刻之者如此則此碑之獨雄宇內無窮期也先生銜名例應􅀡書已書之矣今人作文卽不書名一節已成大謬也光祿公之曾祖司鐸何地望示知可塡入拙集中不宣十一月二十五日敬謹上答趙靑州書味辛先生閣下往歲在鄕郡敬將返江右而先生有關中之行千里饑驅彼此同之所慮者敬少壯於先生江右一水可通無多勞勩先生則未免車馬之苦耳今歲十月得印山大兄書知道體違和有南轅之意尙未深悉十二月中孟巖廉使詣部始知其詳并得手書知左手足枯重急切未愈昔之名人多有此疾當由性情耿介中懷時有所不然又多危坐讀書血氣不行所致然關右風高可愈積濕何遽至如此將毋爲甚寒所中耶若是則湯散不可專補血氣也先生自作輓匾輓聯雖佳甚然豈得便議此自靖節自作輓歌近代名人沿結習爲之或數十年後尙康强逢吉不幾於欺謾當世後世耶閱書至此當乙之以一笑愈疾可也敬嘗觀之古人其畜道德能文章者饑寒之外復多變故或家室違異或朝廷歧阻或毁敗於讒譏或展轉於疾病使厯睽變之人情發幽沈之已志故一旦事權會屬則智力所詣適中機牙而牢落一生者其遺文逸事法書名畫皆能曲折精微鴻懿絶特不􅀋乎人人之所爲孟東野曰身病始知道道尙可進其他所得甯有旣哉甯有旣哉大集之序乃後死之事比之元晏愧何敢當然元晏之才實不及太沖當時皆耳食耳􅃼􅃼天下作者幾人知者幾人此後先生卽不徵敬文敬亦有以報也續刻文稾於原刻多改正附呈一部祈是正之五月六日惲敬謹上與宋于廷書于廷孝亷仁弟足下獻歲擾擾過從未盡所欲言居陋意蕪致足下與漁橋登舟北行不及一執手迨正月垂盡因雨霽赴江干旌斾久已東發矣今年會試聞言路又先事及之當事者必加意束縛或藉此可得眞讀書人若是則足下及諸與敬相知者􅀗雋必倍蓰也敬近况如相見時家慈巳來章門子寬尙在吳城爲舉債計終恐無益耳西原太守時時來夏首可署撫州見懷詩淸宕可諷誦中引嵇中散事極相肖若戴九江事則鄭漁仲所誣也敬久欲雪此言今因足下詩輒分疏之案通志敘次小戴記斥之曰身爲贓吏子爲賊徒而引漢書何武傳爲證敬求之漢人他書無有言九江事者故漁仲於何武傳之外亦未引他書今止據此分疏可無漏落傳曰九江太守戴聖禮經稱小戴者也行治多不法前刺史以大儒優容之及武爲刺史行部録囚徒有所舉以屬郡聖曰後進生何知乃欲亂人治皆無所决武使從事廉得其罪聖懼自免原文言多不法言得其罪未嘗言受贓也此如以意决事不守功令期會或過誤賞罰科斷乖背皆是觀刺史所舉九江尙敢廢閣殆倚聲望傲然爲之致積愆過而已不當二千載之後懸入以受贓使如漁仲言貢禹以職事爲府官所責公孫宏以罪免皆可日受贓矣傳又曰後爲博士毁武於朝武聞之終不揚其惡而聖子賓客爲羣盜得繫廬江聖自以子必死武平心决之卒得不死原文言平心決之則武非縱盜也武非縱盜則九江之子非盜黨也此葢漢法連坐其子之賓客爲羣盜故子繫廬江縁漢人市好客名多通輕俠耳漁仲斥之曰賊徒如斥九江受贓失事實矣可哂也北宋以後儒者喜刻深而讀書又不循始終卽妄爲新論專以决剔前人瑕累爲快如諸葛忠武文中子皆詆毁無完膚况九江哉至明程篁墩拾漁仲謬說遂有罷祀之議廢已之耳目隨人之是非益可哂也冉子有聚斂端木子貢貨殖南宮子容載寶而朝皆記載明􅃀以親受業聖人不敢議於九江則正史所不書者以意加之儒者之言宜如是歟且九江父子果大惡則容贓吏袒賊徒蜀郡何君公何以爲賢刺史也敬前過栗里考陶靖節事知吳斗南言靖節仕桓元甚非事實今九江事得敬此書當大白矣如後此有數十年暇日當遇事爲古人分疏勿使漁仲諸人陷溺昔儒詿誤後學也近十二章圖說首服圖說兵器圖說已定稿寫畢當呈請是正三月十六日惲敬謹上答張翰豐書翰豐仁弟足下爲別三載矣中間時一通問不盡欲言遼濶之忱如何能置春間書來乃聞蘭畦先生之訃近園孝廉亦前後書來事至於此奈何奈何然悠悠之人至欲歸咎診候藥物長安居眞不易矣五月中近園復有書來以志屬敬敬義無可辭辭則無以對蘭畦先生矣屬草稾之後有知舊者謂不宜作如是言宜言國家恩遇門地貴盛終世無過嗚呼知舊其愛敬者歟然此無過之志銘長安貴人能操筆墨者不下五百人何必江南惲子居千里嘔心起古之揭日月泣鬼神者而質其然否也敬嘗謂南宋以後爲志銘者如塐畫工凡傳之師授之徒者知衣冠佩帶而巳他非所知也是故所爲顏閔之容無甚相遠也所爲飮光鶖子之容無甚相遠也爲志銘者官閥之外言其和於家言其勤於朝言其惠於朋友千百人皆此數語耳安眉於目上植須於頷下頎頎然團團然去衣冠佩帶孰辨爲顏閔飮光鶖子哉若是者皆可以無過者也夫天下有生平煦煦嘔嘔言行無可指訾而死後不得爲君子之徒者或衆所忌怨生平所爲有得有失千載之後必有仰企之論焉此無他觀其大體而巳敬於蘭畦先生本其性情得其形貌故讀之終篇如見轉盼而思厲聲而呼高步而望倚几而指揮至於朝廷知人之明用人之當層叠皆見則知舊所謂無過者或亦庶幾焉然而揭日月泣鬼神者未嘗不可見仁弟詳觀之其有以告我秋中彥惟當北行見時爲道念六月十五日惲敬謹上答鄧鹿耕書鹿耕先生明府閣下前􅀩惠書所陳皆古人之義敬何敢承知卽日舟赴章門可面罄一切未及作報嗣悤悤奉謁先生益有以奬借之敬益用自愧然何幸得此聲於天下士大夫此後不敢不自勉矣使來復奉書及多儀愧甚愧甚尊甫大人名儒循吏伐石之辭敬得操筆墨以揄揚盛美方懼不稱所使何敢濫叨嘉貺詒誚古人然却之則非先生事尊甫大人之心因先生之美遂忘鄙人之陋謹再拜登之前鶴舫先生曾以蟾蜍大研孔雀補見賜亦不敢辭其於他人則未之敢受也古者文人集中所刻時與石本不同皆由年力俱進積漸更定故致如此尊甫大人志文敬因作意部勒故用筆未得自然下語亦不能堅定心常嗛嗛近塗改數字删易數語較呈西原太守本畧似整齊然未敢信也謹鈔錄奉寄如已諏日可先付鉤摹敬有更定自存集中可也先生論史筆不難於簡難於有餘最爲高識名論敬更有復之先生者王右軍冩樂毅則情多怫鬱書畫讚則意涉瓌奇黃庭經則怡懌虛無太史箴又從橫爭折此如太史公傳儒林循吏皆筆筆內斂與游俠酷吏不同是以敬於尊甫大人志文不敢縱宕行之遂致神太迫氣太勁若儒林循吏神與氣何嘗不有餘此古人之不可及也先生以爲何如江廣文十載知交札應卽復敬性疎脫過甚竟忘其別字不敢隱於相知又不敢率爾作世俗之稱望示明後報之北上何時路過吳山必留數日是幸不盡及八月十二日惲敬謹上答鄧鹿耕書二鹿耕先生明府閣下昨奉賜書知尊甫大人大事誠信無悔敬不能隨執紼諸君子與觀盛禮又葬期在旣禫之後不得復有所附達將其慺慺之忱而先生諄諄然致過分之言愧甚矣承示塋兆形勢極慰意此事自古有之觀孟堅所志各書可見其理與周禮九州爾雅四極相通貫皆氣之變爲之棄骨裹而足疾平穴蟻除而脅疾愈生死一理而已惟小人棄本求末不務脩德止求吉塟無論天道人事不能得善地卽得之必有物以敗焉若君子思安其親其爲造化之所福無疑也鄙見如是先生當必以爲然敬近况如常家慈精神如五六十人惟向爲濕氣所苦近飮木瓜酒漸輕除矣大箸周禮條考尙未寓目因西原太守於長至日丁內艱不能索觀也古人詩文必各自成家先生儒者之言以和平愼密爲主敬前盡其愚不以見責而反褒之敬何以自安耶壽田茂才進境何如敬與先生交非尋常而賜書過爲謙下敬何敢當自後斷不可見外也十月初三日惲敬謹上無錫宣頴達麗中吳縣徐敦仁愛杉與秦省吾前過府中悤悤就道所言未盡別後復思如有物在匈急欲吐露而棹聲已過梁溪之口矣蓋緣寄暢園中山水淸佳應接不暇侯君妙才同攜遊屐是以遙情違興蒼莽而來而入理切情之言反不能暢也侯君文淸瀏見底波折皆岀天然以初作膽未堅神未固此事如參禪必須死心方有進步所謂絕後再蘇欺君不得及當觀時節因緣是也若止於行墨中求之則章子厚日臨蘭亭一本書格能不日下耶敬甚愛侯君文苦無暇細檢止評數首所言不出行墨中恐侯君止於此等處用意故爲仁弟言其大端侯君見此書必能萬丈深潭不呼而出千㝷高樹放身而下矣敬事事掣肘而陳明府處三數減爲一數復未知何時事成要之天下豈有餓死惲子居哉仁弟亦信其必無也與李汀州八月初一日得手書擲還手版命此後并此去之敬當如命去之去之然書中舉􅂤堂之號繼以先生之稱不敢當不敢當自隋唐學禪者以山名寺名稱其本師南北宋道學諸儒踵行之各舉本師所居之地爲先生之稱後漸行之於非受業者近則公􅀸大人之門皆此稱矣宋人于朋友稱官漢人稱弟稱兄此亦古法也閣下以爲何如甯化雷副都未得親炙亦未見其著述惟彭二林集中見其事述朱梅厓集中見其墓銘不足以傳學問所得未知其淺深何如墨􅀸太守雖以詞翰名然大德信其無出入故繼副都言之閣下并孟詞進士爲之等差不護交不背友可敬也羅臺山與二林交最久旁涉佛氏乃二人性之所近是以二林作臺山身後文持論或過或不及蓋由耽心禪悅障閡未除過推其虚反没其實也顧亭林先生斥明之學者岀入儒釋如金銀銅鐵攪作一爐以爲千古不傳之秘此病今尙遍天下臺山二林皆其人也然趙大州陶石簣諸儒何嘗不立氣節何嘗不建事功何嘗不敦倫紀襍則有之庸則免矣楊鴻臚謹愼無過然非岀格人其近體詩古詩具見雅飭古文則非所長江右乾隆間古文家如魯潔非宋立厓皆識力未至束縛未弛用筆進退略有震川堯峯矩薙而已鴻臚更未辦此也上杭丞誠如尊見然鄙見責已則攻短論人則取長前書止言其讀宋儒書并涉釋典不及其他可以知敬之置辭矣拙集文旣不佳刻復粗惡祈是正之内羅臺山外傳其人真性情也有宜書之而不書者竊用微顯志晦之義閣下當瞭然焉與李汀州自往歲八月下章江時時念先生不能置得手書又五閱月矣春間病足幾百日夏首腹疾綿痼不及作答書非敢懈也先生切磋以千秋之事敢不敬循始終敬前書可謂刻劃無鹽唐突西子矣鹿耕大令來知治益淸文益潔敬賀敬賀士大夫得世間富貴未必可賀此則眞可賀也伊揚州二次書來止達後書其前書不知沈閣何所祈一訊之稚存編修惕菴郞中遺事述不可不呈之左右褒貶不敢卒然編修貶在褒之中郎中褒在貶之外求如其人而已至事蹟多取年譜並折衷上諭不敢妄飾先生裁之以詒伊揚州何如近詩數首并呈伊揚州祈卽達是幸與莊大久爲別十三載不得音問七年然私心拳拳如終日侍左右也大兄勤學力行老而彌篤神明之用能不衰耳目之官可以不變未知齒髪尙如昔否敬少而弱壯而病今幸恆言不稱若僭較之稱孝章已爲永年矣酒肉漸漬清虚日往膚充乳發如少年屠沽兒唯有時舊疾復發則吐如銀者數聲手足戰掉胷背寒重爲可虞耳子振改外實出非意大兄于世事得之如雲之來失之如雲之去然恐後日之雲且挾風雨而至子振將車如失落車轍中大兄必洗其泥淖整其韅方可就道尊性斷不耐此然鄙意必欲大兄耐此也中州人物與本朝初年何如懷慶當太行黃河之阻朝夕瞻眺定多勝賞何時當入都或南歸敬匏繫江西智竭于胥吏力屈于奴客謗騰於上官怨起于巨室所喜籬落畊氓市墟販豎尙有善言去秋東歸雖臥具未質優于從前然十月無裘則與在都時平等矣正月入都三月引見四月當復出都老母精神如五十人大兒已生孫殊雋快秋間山妻尙有生子消息但得噉飯處世間升沈是非一切不較矣與李愛堂夏間春明得遇暢寫生平幸甚幸甚旌斾南行之後賤體抱暑疾愈後爲出都事勞弊是以不及通問頃由金閶返棹忽奉手書喜慰無任仁弟交道之篤處事之精開椷具見敬之疎狂能不俯首自愧􅁘令子之變言之動心然達人用情斷不可過仁弟方在壯年福祿之來未艾勿介介也春麓先生乃天下後學典型不止仕宦上流而已敬初至浙江卽蒙異賞今先生身後得操筆墨以論次功德何樂如之惟是墓表之法止表數大事視神道碑廟碑體不同視墓志銘體亦不同墓志銘可言情言小事表斷不可神道碑廟碑凡崇宏寛博之言皆可揄揚墓表必發明實事故墓表之善最難今止表浙江二事其二事自爲首尾文卽以之爲首尾而中間櫽栝諸事以隔之此法史記漢書常用之而能使人不見韓公偶用之卽見乃才之大小淺深也昔歐公志尹河南不知者頗有他說歐公至爲文力辨今敬表春麓先生自謂舉一羽而知鳳覩一毛而知麟世閒下手存買菜之見者仁弟必能斥其不然所可慮者指爲忌諱耳然其事皆已奉上諭見邸鈔非一家私言可與頤園先生商之再行上石何如答方九江前過九江留數日視署舍如山居僚屬循循如如文學掌故甚善甚善然席間時以言挑敬欲觀其酒狂敬前者在浙當事以言利之事魚肉府縣官故與之爭至江西當事决大獄不平且欲芘梟惡無狀之人使久爲民害故與之爭若酒塲花局詩席文壇敬方折節天下士大夫醒固不狂醉亦如醒也遊廬山序格殊卑竟流元明游記習氣然無可奈何如此奇境若圖高簡不下手暢寫山靈有知後日遊山必有風雨之阻矣詩數章并奉呈祈是正之靖節集書後二篇千古之􅁈雪矣先生必爲之大快書楞伽經後附呈如此下語人以惲子居爲宋學者固非漢唐之學者亦非要之男兒必有自立之處不隨人作計如蚊之同聲蠅之同嗜以取富貴名譽也秋色漸佳觴詠之興何如旌斾過吳城當攜㕑人并佳醖來庶不至敗興耳與報國寺沙門無垢前月天池之遊生平未有茶山太守雪鷺茂才雨阻均不得與亦有數存乎其閒耶天池雲最奇松最古石最靈慧特向此中開山當未忘山水結習然􅋧頭鷄足又何說處之大師勿笑惲子居傍葛藤樹爲戲論也吁江茂才鄧過庭高才博學其畫由白厂居士來兹送竹一幀乞換靑精一枝爲同參木上坐何如與陳薊莊承示絳州重修孔子廟記考明趙子函石墨鐫華記乃宋李垂􅁧集右軍書子函言懐仁聖敎序集墨蹟故能師後世此記集石刻止形似然敬觀此本并形似失之矣蓋宋人不尙聖敎序此記及晉祠碑亦不行明人尙聖敎序此記及晉祠碑大行故此碑宋人無題跋明人多有題跋也大行故多翻刻敬前開帙卽言明人鈎摹以神理得之記後重立字其證也賈人顛倒其辭截去年號詭作古帖求善價可笑之至今坊中有全碑搨本視此本更下可校對整齊之卽以敬此札書後何如與黃香石昨日奔走至日夕方還飯罷相知來談至三鼓今晨草草作同遊海幢寺記又爲客所曠幾一時午後始脫稾無鈔錄者謹將原槀送呈希飭貴高足鈔錄後卽見擲並無底本也此文儒爲主中主禪爲主中賓琴與詩爲賓中主畫與棋與酒爲賓中賓其序次前五節皆以禪消納之爲後半重發無和尙張本而儒止瞥然一見如大海中日影大山中雷聲此子長河渠平凖書伯夷屈原賈生列傳法也海幢形勢佳勝先于獨遊時寫足入同遊後不必煩筆墨此子長項羽本紀李將軍傳法也敬古文法盡出子長其孟堅以下時參筆勢而已所以屑屑自表者諸君子遇我厚庶幾留古文一支在海南勿使野牛鳴者亂頻伽之聽耳作詩賦􅇎文其法亦然舍是皆外道也足下當不以爲狂答姚秋農得沙井建昌兩書知首路平安幸甚敬別後泛月渡江至家始三鼓宅崇大識賓主分義相安已一月矣五兄夢中題孔子廟櫺星門柱聯有泰山北斗景星慶雲之語敬意如此者士之望人之瑞一代不過數人然揆之聖學俱未入門止涉櫺星門耳敬三十後徧觀先儒之書陸王固偏程朱亦不無得此遺彼之說合之大學中庸覺聖賢與程朱陸王下手有偏全大小之分佛道二氏之書不足言矣所稱士之望人之瑞較中天下而立定四海之民如行潦之于河海邱垤之于泰山况所性耶其爲門外斷斷無疑然能于門内有所得則二者皆門内矣來示說先天圖簡明包孕極妙極妙漢人納甲之說以月之升降方位配八卦雖可比附乃術家之一端假易以傳不知卦氣之自然尊見先天圖位上應日􅄤之說較納甲用月爲近理大要與卦氣出入總之由陰陽推之四時由四時推之四獸由四獸推之日􅄤自然吻合無間今人之學者言先天圖則詆之言卦氣則附之不識其匈中何等疆界也子寛到京萬望屬其不可高興乃兄五十無聞屈首下僚子寛亦已三十六矣内反爲要何興之可高耶曉帆處不及作書到瑞金再發也與姚秋農六月中得手書慰甚因未得來􅀸書且聞鍾刑曹將歸必有託寄之信是以日復一日不及作答不意鍾刑曹竟因河淺至十月六日方歸亦未攜五兄及來􅀸書敬甚爲懸念九月中知奉山左主試之命爲彼都人士慶幸又知决意不外轉則爲五兄慶幸將來且爲天下蒼赤慶幸也七月中五兄五十誕辰堂上康强門内雍睦子舍競爽可賀可祝而鄙人之意以五兄言行無愧前人處事則思力深厚能行於逶迤之中庶幾呂聖加之在宋彭純德之在明乃可賀可祝耳薄儀當俟妥便寄呈勿弞也與姚秋農敬江右之事如治亂絲千萬頭緒止一人手力是以寓書王奉新之後並未發書往歲十月自􅅬王閣放舟東下十一月三日抵家老母康强小大均安善毋勞遠注十三日接奉手書具知一切中州人文淵藪昔聖先賢流風在人五兄課士之外必有提唱發揮守先待後之事其餘如考古磧捜碑刻聚周漢器物今世士大夫優爲之然五兄亦不可不爲之其中亦有一種學問也來􅀸本屬異才又五兄家世多陰德何慮不成其一時弛蕩敬于前八年早知之曾有書至粤中反復數百言五兄當尙能記憶又前還浙過新喻子由子寛歎其雋上敬卽寓言深規并吿以所􅂝已多不可復加此處不再加膏秣意欲阻其豪興來􅀸亦尙能記憶也總之聰明子弟不能無過差在能改不能改耳來卿多好而易動五兄如攜之寓維揚尙有約束或京中士大夫有强􅀡者託之防閑庶知顧忌今遠離膝下上無嚴師中無益友下無幹僕且市井之人引之多事便于銷算故至於此耳敬行年五十有五止一嗣子才雖中人頗能孝謹非但不加責備且未嘗厲色疾言時以不能延師敎之并衣食不使如願爲愧來􅀸女壻相隔千里別經十年豈能代五兄訓飭耶此不敢承亦不可承之說也敬二月十六日至都二十三日騐到三月初間可引見後事當續報志意漸􅁅鬚眉漸老功無毫髪過有邱山又不能豐草長林與麋鹿共息如何如何五兄當原之諒之也與姚來􅀸得正月書後久不得書念甚念甚今歲秋闈未知何如瑞金僻地􅀡隸江南浙江錄均未見然不佞所聖于吾壻者爲文章事功道德中人科名遲速聽之可也蘭畦先生陳柏府皆不佞所願見然趨走之人滚滚塞門乃外官常局不佞俟稍定當請事也正月中家慈五弟歸常州恐有離任處分故先爲此使老人不受驚恐八月中三弟􅂝弟媳歸明歲春間内人或歸或接家慈來江西暫寓南昌葢瑞金接近閩廣時虞意外又近數年間州縣有一交代則前後相齮齕并及其眷口不如住南昌爲愈耳惟官帑私債累累相附不知何如處置然不佞鄙性易則使兩弟爲之難則自理如在浙不使五弟算漕帳在江不使三弟送交帳皆是也今瑞金所入不及溝渠曰用必須江海甚難著手非不侫身任而誰其濟則家慈之福其不濟則不佞所自召也豐城極弊之區彭秋潭敗于臨川深可鑒戒或有以不調豐城爲不佞迂闊者此不權禍福緩急大小之數也蓋一至豐城必擔捐襍一萬有餘合之瑞金不下二萬再累數年非五萬不已而民之刁惡足敗官之守决官之防是名與利兩失所得者重耗酷刑之孽如何可行不佞凡事主退不主進主苦不主甘實亦􅂙透世情也八月二十一日不佞復舉一女行第六矣所謂此亦天地蒼生無可開口而笑亦無可㱀眉而歎三女四女五女强項如其父不知將來如何敎成吾壻如有湖州之行可􅂝小女至常州見家慈或單車至江西與不侫商確古今亦快事也與來􅀸去步十月曾兩次作書由提塘至京想已收到十一月甫囘任有福建脚子過瑞金立等作書已寫大綱付寄想亦收到矣家母生齯齒髪落復生可喜之至餘一切詳大女書中近作後二僕傳兹寫送一通可釋然其事此種不可入書事體以無大關係也僕人止可作小傳若將陳明光緣起叙入亦非法且筆下糾擾矣吾壻細審之其法皆自史記漢書來無他謬巧不過安放妥當耳觀此便可知前明及國朝諸家僕人傳之非法也張彦遠名畫記曰失于自然而後神失于神而後妙失於妙而後精精之爲病也而成謹細自然者上品之上神者上品之中妙者上品之下精者中品之上謹細者中品之中不佞之文其精與謹細之間乎然名畫記不列中下品以下者卽所謂近今之畫煥爛而求備錯亂而無旨者是也晝如是文可知矣上曹侍郞書一通亦寫送吾壻并觀之可也與來􅀸吾壻來書望尊公得江表一道可相近盤桓商訂古文不佞觀之如有外放之事大半當在廣東相去亦不遠也或得湖北湖南學差亦可至古文之訣歐陽文忠公已言之曰多讀書多作文耳然必有性靈有氣魄之人方能語小則􅀡凑單微語大則推倒豪傑本源穢者文不能淨本源粗者文不能細本源小者文不能大也吾壻干性靈氣魄四字上均不讓人勉之勉之在有恆而已至體裁所在亦不可忽宋景文曰文章必自名一家然後可傳之不朽若體規畫圓准方作矩終爲人之臣僕五經不同體百家奮興類不相沿前人先得此旨景文此言誠哉作文之要也雖然易有易之體書有書之體各經皆然不相雜也卽百家之體亦不相雜若一切妄爲之豈可藉口景文之說耶譬之橫目縱鼻穢下潔上者人也必橫鼻縱目潔下穢上新則新矣奇則奇矣恐非復人形也凌雜之文何以異是大抵意可新不可奇詞可新可奇文之體文之矩矱無所謂新奇能善用之則新奇萬變在其中矣不佞嘗吿陶南明經以爲字字有本句句自造篇篇變局事事捜根古人不傳秘密法也淸如先生捐館合世間又少一讀書力行之人矣如何如何答來􅀸劉會昌至十二月始到任得手書并各件俱已知悉前冬有信寄都下想亦收到秋闈之事前數年常與内人言不在此科不佞與吾壻非世間戚屬可比又不佞頗有知人料事之鑒豈不預知之吾壻當早信之也來書需批本韓文知有事于古文矣然不在乎批本蓋批本卽滯于一隅不如不佞略舉學韓文之指吾壻自繹之如一人獨行其衢路曲折皆􅍓􅍓可記隨人行則恍惚也作文之法不過理實氣充理實先須致知之功氣充先須寡欲之功致知非枝枝節節爲之不過其心淵然于萬物之差別一一不放過故古人之文無一意一字苟且也寡欲非掃凈斬絕爲之不過其心超然於萬事之攻取一一不黏著故古人之文無一字一句塵俗也其尺度則文心雕龍史通文章宗旨等書先涉獵數過可以得典型焉若其變化之妙存乎一心而已不佞就韓文言之平淮西碑是摹書詩二經已爲人讀爛不可學南海廟碑是摹漢人文亦不可學如書字摹古之帖若復摹之乃奴婢中重臺也送李愿序淺而近俗與于襄陽書俳而近滯釋言窠臼太甚上宰相書亦有窠臼其後兩篇夭矯如龍矣學韓文先須分別其不可學者乃最要也此外可學者大都識高則筆力自達力厚則詞采自腴而其用意用法之巧勝有不可勝求者略舉數篇以爲體例如汴州水門記節度使是何官銜隴西公是何人物水門之事則甚小若一鋪敘不成話矣故記止三行詩中詳其事業于水門止一兩語􅀧過此是小題不可大作也有大題亦不可大作者李習之拜禹言是也禹之功德從何處贊揚故止以數言唱歎之知此雖著述汗牛充棟豈有浮筆浪墨耶如殿中少監墓志竟用點染法韓公何以有此種筆墨蓋因少監無事可書北平王事業函蓋天地若不敘北平王于理不可然輕敘則不稱北平王重敘則少監一邊廖落諠客奪主矣是以并敘三代均用喻言使文體均稱翻出異樣采繪照耀耳目且恐平敘三代有涉形跡是以將納交作連絡存沒作波瀾眞鬼神于文者也如膝王閣記有王子安一篇在前其文較之韓公乃瑜珈僧之于法王㓂謙之杜光廷等于仙伯何足芥蒂然工部所謂當時體也其力亦足及遠旣有此文不可不避故韓公通篇從未至滕王閣用意筆墨皆烟雲矣如貞曜先生施先生墓志不列一事以貞曜詩人施先生經師止此二意便可推衍成絕世之文若列一事體便襍也又如曹成王碑許國公碑盡列衆事以二人均有大功于民生國計其事皆不可削須擇之部署之鋪排之以成吾之文若一虚摹文與人與官皆不稱也以上意法引而伸之可千可萬可極無量歐公蓋能得之而盡易其面貌故差肩于韓公若各大家各名家均有所得不如歐公所得之多也倘不如此看則歐公之文與凡庸惡軟美之文何別哉吾壻極聰明人能留心於此終身不閒斷定將上下五千年縱橫一萬里望之望之答來􅀸來書言每日讀古文一篇知其法而不知法之所自岀此言可見近日功候然由求之過深反不得灑然稍繚緩之則所自出可知矣又言著意合拍著意收束欲法古人而爲古人所攝伏此言甚是南宋以後文人皆爲此病所誤不過爲古文之見存耳治之之法須平日窮理極精臨文夷然而行不責理而理附之平日養氣極壯臨文沛然而下不襲氣而氣注之則細入無倫大含無際波瀾氣格無一處是古人而皆古人至處矣看文可助窮理之功讀文可發養氣之功看文看其意看其辭看其法看其勢一一推測備細不可孤􅀒古人讀文則湛浸其中日日讀之久久則與爲一然非無脫化也歐公每作文讀日者傳一遍歐文與日者傳何啻千里此得讀文三昧矣今舉看文之法爲吾壻言之譬如史記李將軍列傳匈奴驚上山陣一山字便是極妙法門何也匈奴疑漢兵有伏以岡谷隱蔽耳若一望平原則放騎追射矣李將軍豈能百騎􅀡前且下馬解鞍哉使班孟堅爲之必先提淸漢與匈奴相遇山下亦文中能手史公則於匈奴驚下銷納之劍俠空空兒也此小處看文法也史記貸殖列傳千頭萬緒忽敘忽議讀者幾于入武帝建章宮煬帝迷樓然綱領不過昔者及漢興四字耳是史公􅅐次真如龍伯國人可塊視三山杯看五湖矣此大處看文法也其讀文之妙則無可言當自得之而已答來􅀸四月中得書知小女舉男子喜甚當卽專差囘常州報家慈矣今年吾壻入闈手筆不必求高官卷中無甚出色者有書有筆緊切題目便可望中瑞金私磺之案未知福建曾否咨部望寄信來今年各用更加困乏春閒有諸相好勸刻書彌􅀘尙未動手目下真屬萬難五月至章門蘭畦先生以爲狷者各人便多排擠蓮士先生囘籍不侫無一語干求而各人復多排擠夫知縣之升遷不過同知通判若調美缺不過攘君奪民不侫雖不及古人何至與今人相軋因此速返瑞金幸簾差得免稍爲遂意耳柏府諄諄下問然政事何可盡言言亦何可盡行不佞非前明諸君子惟以訐􅀡爲事者然柏府之意則厚矣子寛在都未知何如竟無一書寄江西何也前年所寄各銀物詢之經手之巡捕錢君據稱交南城縣温君帶入京而詢之温君又稱專差家人送至鐵門如未收到必係其家人乾没耳人情如此可笑然大富貴人所爲亦有同此者亦可笑也與來􅀸往歲新建余生來中州曾寓一書其時公私之迫燕遊之困詩文之煩并來是以屬草稿令余生自寫之余生天質吾壻必深賞嘆然氣未醕學未實于尊公之鑒未知何如余生本有山東河北之行今馬首已東矣便中望一詳蹤跡自前年冬至今不得小女書懸懸之至小女性雖孝謹而負氣好高恐胷中積念深思有不能形之􅁓筆者遂爾疎濶吾壻以爲何如十一月十三日得尊公書辭甚憤激不佞不得不婉辭致復恐小女聞之不樂故也其事不過八千金古之鴻達君子擲若箇物有之矣然吾壻不可爲此言何也裴公所助者乃張徐州范公所助者乃石學士其人事業文章􅂞出常輩此爲用財得其當若郭公太學之事必其人氣象風格足以照人故不問姓名而與之至事後終得其報非如滔滔者也不佞常言宋明以來士大夫以儒林之聲氣爲游俠以游俠之勢力爲貸殖以貸殖之贏餘復附于儒林若輩心術事爲盡于此數語吾壻豈可爲所惑耶况市井之人以飮食歌舞爲交遊以鑽營把持爲才智較前所云云之人更下數格吾壻豈可爲所惑耶前過新喻往浙江不佞不助行資反有撙節之言并言枚臯十七上書古人有先我者折吾壻喜心盛氣蓋知吾壻心性豪奇必有出流之事故痛下鉗錘耳此種作用不佞幾于石霜圓昭覺勤子由子寛不能卽尊公亦不能也然自此知謹於用財明于擇交則可若一變而爲迂鄙之夫非不佞之願矣二月十六日同子寛抵都劉編修芙初處得手書痛自抑損後幅書跡潦草恐因不得意所致不知少年人改過宜急不宜因有過而頽唐進取宜緩不宜因難進而衰颯以可聖可賢可忠可孝可學人可才人之資而以貨財科第之心敗之自待不太小乎望元聞甚英異尊公鍾愛異常不佞引見後當由河南繞道一看小女兼識望元或仍窘乏則先往維揚部置子寛當來河南也答來􅀸八月中得南昌郵筒中書並行省公事狀具知一切因摒擋下省未作復書至省後又無河南差可託帶文稾者遂至遲遲今文稾托硝差生米司巡檢常州丁小山二兄帶行約明年六月到河南恐吾壻懸懸是以仍由南昌遞復書也敬去年出京後竭力求退閑地步請金蘭畦先生書二函欲于蘇州借銀還常州親友並廖復堂先生祈諸事一淸在揚州坐書院可仰事俯畜誰知在蘇州無成而常州言及退閑竟無可借貸不得已仍爲下車之馮婦可謂無謂之至正月至江西三月還瑞金家慈並眷屬留省中以家慈欲避瑞金山嵐濕氣也五月有調南昌之信已而中止入月至省陳笠帆先生護院委署吳城同知此地稍可息肩養親之暇讀書吾之素願也瑞金前後交務積算一淸應交尙可措置吾壻聞之亦爲我欣喜也家慈濕氣漸輕耳目如前山妻往年之疾悉愈慶官從周先生與七弟竟知用力讀書和尙兄弟頑劣異常柔官姊妹讀書其名頑劣則本色也小婿亦安善唯瀼泉親家捐館廣中渠家事甚掣肘耳五弟在常州與戸外事不佞設法使在揚州不意秋間卽囘常州聞又管開孟河事非吾意也三弟謹愼家用無多易料理也望元認字可卽以說文爲形之本廣韻爲聲之本則長成後易爲學問宜孫腹中食積三弟能治之小女分娩是否得男可寄信來伫望伫望不佞閱厯多年大抵人在世途有一分聰明享一分聲名有一分度量受一分福澤而根柢自在孝弟其孝弟之道日處于薄者不過偏執已見誤聽人言惟有聰明度量則諸事歸于厚矣能于此用力則天下事業舉而措之可也與二小姐前年得手書後至今未得心甚懸懸吾十月十三日江西開船各帳未淸人間非笑之然爲知縣者窮庶自愧處少富則自愧處多吾窮至此無怨悔也十一月初三日到家由奔牛至於巷祖母大人甚是喜歡然見子孫窘迫不能不動念初八日至城汝母居高二舅家卽日賃房玉帶橋移居唯妹妹太多朝夕􅅶擾柔官略知人事申官瑞官仍居舅家小瑞官甚伶俐與柔官隨汝母過日十三日祖母至玉帶橋悤悤過年今擬同汝母移居顧塘橋管宅矣慶官性情平和吾以官事多故耽誤他讀書然自此有安靜之日未嘗不可用功也去年四月一家寄居娑羅巷巷對門失火家中孩子方岀痘子驚荒奔走致長孫陳孫夭殤言之可憫所幸汝弟媳安靜能辛苦次孫滎孫相貌英發聲音宏朗或可有成子由弟鬚全白精神則如四十餘人方官巳娶親汝二弟媳亦安靜唯方官信意胡行而子由又極力管敎吾以爲方官本無知不可責之太急也五弟家都好歡喜寶三寶從賀先生讀書弟婦生一妹妹名璋官戚姐生一妹妹名蘭官俱聰明三弟婦亦好唯家事􅃈碎耳吾正月十三開船二月十六日到京高二舅借一千二百兩應用寄江西一百兩饋親友二百餘兩留家中七十兩製皮襖一百餘兩還家中債及賃房過年二百五十餘兩又在鎭江兩次耽閣各用開發之後止餘一百五十兩上路目下又虧空矣來􅀸科名心急而屢次失意必多鬱結此大不可鬱結則氣不舒氣不舒則與五行之衰氣合非但科名不稱意一切皆齟齬矣吾卽前車之鑒也大抵下塲不中式能平心處之反求諸身其人必不久飛騰而去切記切記又官卷難中人人所知然則官卷者皆受國家深恩享祖父餘福若稍存屈抑怨望之意則上背國家下背祖父于科名更有礙此理動而數隨之騐也來􅀸聰明以此書示之不久則中式矣五弟同至京得中式固答董牧唐前月胡黃海書來道及盛意愧悚無已昨白香處得手書有進於黃海所言者敬何以得此聲於朋好􅁘益愧悚甚矣先生處已之高進道之勇同志往來久飫聽聞乃以敬之無似而先生千里殷殷欲引而教之計其出處虞其乖合敬不可不一一陳之左右以當介紹之先覼縷之辭幸勿掩耳也敬門族單微先世執君子之行讀書講學不妄干時其時人心和厚百物繁阜爲儒者仰事俯育可以充繼及敬之長而事漸迫矣不揣迂薄欲求升斗之祿以贍其家又恐州縣之官不容疎戅遲之者數載大父棄養先府君抱疴暑無室可淸寒無衣可禦親知勸駕遂赴微官不意二年之間遠役黔楚遂換須江上事一月聞先府君之訃雖官錢官穀銖粒無虧而前後相持逗遛半載此則呼搶之所不能通竹素之所不能罄也葬事未舉旋至悼亡骨肉戚好亡喪相繼乞米百家之聚求衣五都之庫弟兄奔走不救饑寒半􅒡之屋以推叔氏十畝之田歸之小宗孑然三人餬此百口先生觀之敬豈羨九􅀸之榮冀封君之富者乎不得已耳元黓之夏注官渝水丞尉生􅂩中部致嫌一牘可以十翻一檄可以百下他人得以扼吭紾臂摶裳奪食初以入闈爲停官之計繼以調繁爲遠貶之法此四年之中所以無一晷之安一事之定也㫋􅀩之春東上象湖士女盛殷禮文亦富中間求盜亭父法獵貧民功令所牽解官就質乃復一夫發難羣懦就殱寺門橫尸都亭流血老母驚爲盜賊入室大府疑爲反側復生自此之後歲上省臺呼之不敢不來揮之不得不去此五年之中所以奔走如救頭然俯仰如止心也一舉治行五鐫首功都吏舞文意尙未足春明之轉官無望金閶之貸粟復虛無田可歸有債難避所以摒擋家室復上西州犯坑火而夜行攀繩橋而朝渡也大扺敬自服官以來並非作意與世相午不過率性行之以古人之所能望之今人以士夫之所能望之市井至數四齟齬之後卽不必齟齬之人不必齟齬之事而亦格不入矣事勢至此百舉皆廢馴至烏喙之毒發於繞根鷹視之憤􅂥於側翅奴隸之所揄揶禽獸之所蹈藉豈一日故哉奇正相循輕重相停極嚴之後必極怠大勝之後必大敗自然之理也然而反身之訓聞之弱年怨天旣不敢尤人又不能冬間料量一切奉母東行行此之機聽之天毁譽之口聽之人而已至敬少喜讀書謬思作述行年五十未得要領先生所推非所敢任也拙集復更定數處意欲并二集及詩改刻之今先呈原刻以求大敎舟車甚便時惠德音伫望伫望答董牧唐往歲奉手書并徵拙藳適無刷本候西原太守南康來索得一部寄呈並附報書由周西麋處交貴縣俞君澄炯轉寄想采覽矣先生結廬山水勝處嘯歌古人仲長統樂志之言稽叔夜養生之論兼而有之敬從塵埃中仰望眞如天際乃昨者白香見過擕所惠臘月八日書復拳拳於不佞何處已之高而待人之恕如此耶令兄春江孝廉遺詩格正氣和可想見其爲人何以中道淹忽不勝愴然敬幸附靑雲而生平未得一見猶幸得見遺詩於身後如朝夕相接也王悔生係在都中兄事之人觀其序可以知交春江之道矣敬四十後方學作文海内大君子碑銘以朋􅃇之故不敢辭然較之古人眞所謂無能爲役朝議公墓志如不棄鄙賤卽寄狀來近作伊光祿祠堂銘錄本奉寄過不及處祈示之今年正月中遣五舍弟侍家慈囘常州秋間或有黃山之遊當圖相見也與胡竹村昨論及劉君端臨攝齊釋有不可解者二說文攝引持也􅒥緶徐鍇曰鍬衣下也此爲攝齊正釋劉釋攝爲整與引持義不逕庭􅁘論語何不書整齊而書攝齊􅁘古者衣與裳皆有齊衣有大帶束之再加鞶帶齊止掩裳腰不待整裳正幅襞積下垂亦不待整此劉釋于字義不可解也劉釋此章引聘禮今考聘禮賓執圭自門入三揖三讓皆執圭若于公升二等之後賓忽伫立自整其齊此于儀得毋傎耶且聖人左執圭耶右執圭耶此劉釋于禮文不可解也近世學者說經多此􅀋敬􅀼有疑焉聖人之經豈在立新義耶敢以復之執事惟留意焉與胡竹村二蒙詳示劉君端臨攝齊釋學問之事貴相往復來示何言之謙􅁘敬說經不敢有偏見不敢有爭說請陳其愚惟是正焉士冠禮再醮攝酒注猶整也整酒謂撓之有司徹司宮攝酒注更洗益整頓之有司徹不言猶者蒙士冠禮也是整爲攝借義非正義也凡文正義不可通方用借義酒不可言引持故以猶整釋攝以撓釋整撓于整義不應故復以洗益申之古人釋經精密如是豈可搴擥一借義附之他經耶齊則可引持矣論語何取乎借義􅁘若可以猶整釋攝齊撓與洗益亦可釋攝齊耶此所不敢從也又士冠禮有司徹攝酒下皆注曰今文攝爲聶蓋聶有就義故與攝通就有附義故與䐑通若展轉引之豈說經之道耶此所不敢從也聘禮記賓入門皇升堂讓將授志趨下階發氣怡焉再舉足又趨注皆引論語正文此劉君所據也然有不可解者五玉藻賓入不中門不履閾鄭以聘禮言之曲禮大夫士出入君門由闑右不踐閾鄭以朝禮言之是論語此章首節非專爲聘禮言也首節非專爲聘禮攝齊二節何以專屬聘禮不可解也聘禮記執圭入朝鞠躬焉疏入廟門也鄭不引論語以廟門與公門不可混也是論語此章首節益非專爲聘禮言也首節益非專爲聘禮攝齊二節何以專屬聘禮不可解也過位一節聘禮記無其文以論語次第言之若釋首節爲入廟門則廟門之内賓主皆在位不得言過位若釋首節爲入大門則與鄭注入廟門之釋不應且聘禮庫門内卽東行不過外朝治朝之位過位節指何地不可解也賓入門皇注皇自莊盛也自莊盛不得釋圭而整齊升堂讓注讓舉手平衡也舉手平衡不得釋圭而整齊不可解也聘禮記記升堂之儀如此之詳不記攝齊不可解也記下階與降一等不同文記再三舉足則趨與沒階不同文雖强比之可通其義焉然聖門何必爲此强比之經文不可解也鄙意儀禮各記以爲出于子夏者未必然自以顔氏七十子後之說爲信夫曰七十子後則通秦漢言之矣其作述豈能與論語本經抗行卽如論語以入公門章爲朝執圭章爲聘甚次第自聘禮記勦入并作聘禮致出降一等之下又追記執圭次第全紊雖注家强爲分別而罅隙顯然論語最精密無此法也其諸古者朝聘之儀多相通故聘禮記勦入公門節并攝齊二節其不相通者則不可勦故過位一節無文也高明以爲何如耶至劉君發此解亦潛心讀書而得之敬指爲立新義者此章包注主朝禮包氏建武時人在鄭氏前二百年自唐宋元明至本朝諸儒皆承包義故謂鄭氏于包氏立新義劉君于古今各注家立新義耳惟留意焉無錫宣頴達麗中吳縣徐敦仁愛杉
