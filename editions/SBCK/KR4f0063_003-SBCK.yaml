front:
  text: 與紉之論文書紉之吾宗足下敬與紉之同出于提舉公蓋二十餘世矣不可謂不遠雖然吾宗之能學者不數人能學而行復有儀矩者益不數人敬于紉之心之近之也久矣昨者相見敬所以望紉之者甚博而紉之以古人之所以爲文者問焉紉之之志止乎是􅁘抑敬之所知者不足以越乎是邪甚非敬之所望也文者小道也而人喜爲之爲之而復喜言之本朝如魏叔子姜西溟邵子湘諸人皆累累言之矣盡矣敬復何所言邪等而上之元明之人言之矣宋之人言之矣如和鼓然其聲無以甚異也敬復何所言邪雖然紉之之意不可無以應也且敬所謂甚博者未嘗不可于言文推之紉之愼擇之可也夫後世之言文者未有如退之之爲正者也退之之言文則吿尉遲生李生爲最吾少之時蓋嘗讀而樂之若柳子厚李習之與韋中立王載所言視退之相岀入者也紉之求之乎是焉足矣雖然退之子厚習之各言其所厯者也一家之所得也于天下之文其本末條貫有未備者焉敬請合三子者之言爲紉之申言之其是邪其未是邪紉之擇之可也孔子曰辭達而已矣孟子曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮古之辭具在也其無所蔽所陷所離所窮四者皆達者也有所蔽所陷所離所窮四者皆不達者也然而是四者有有之而于達無害者焉列禦冦莊周之言是也非聖人之所謂達也有時有之時無之而于達亦無害者焉管仲荀􅀸之書是也亦非聖人之所謂達也聖人之所謂達者何哉其心嚴而愼者其辭端其神暇而愉者其辭和其氣灝然而行者其辭大其知通于微者其辭無不至言理之辭如火之明上下無不灼然而跡不可求也言情之辭如水之曲行㫄至灌渠入穴遠來而不知所往也言事之辭如土之墳壤鹹瀉而無不可用也此其本也蓋猶有末焉其機如弓弩之張在乎手而志則的也其行如挈壺之遞下而微至也其體如宗廟圭琮之不可雜置也如毛髪肌膚骨肉之皆備而運于也如觀于崇岡深巖進退俯仰而撗側喬墮無定也如見其可以爲能于文者乎若其從入之途則有要焉曰其氣澄而無滓也積之則無滓而能厚也其質整而無裂也馴之則無裂而能變也退之子厚習之能之而言之者也敬未能之而言之者也天下有能之而言不能盡者矣未有未能之而言能盡者也紉之益申之可也十月十五日敬謹上上秦小峴按察書小峴先生閣下往者敬居京師知先生善詩古文及官富陽先生分巡杭嘉湖三府敬以屬吏見所言者官事耳其他未之敢言何也詩古文者藝事也縣官非言藝之官且敬于先生非故舊也則未知大人之門以言藝進者相率以言藝歟抑不免視所好而投之以是歟如視所好而投之以是是與操瑟之工獻狗馬之客相去無幾何也且視所好而投之者必有所求縣官于分巡其所求非如操瑟之工獻狗馬之客衣食利益而已也夫是以不敢後先生奉命按察湖南敬知新喻先生道過而辱存之敬所以待下執事者皆天下所謂縣官之事也何也敬于先生知之未深則未知先生于敬亦深知之歟不深知之歟則爲敬者天下所謂縣官而已矣及先生以爲過上事後復移書賜之以善言敬始自悔又聞以引疾去官敬益用自悔何也天下惟賢者能以賢望人亦惟能退者必能進而有所爲是先生非猶夫世之所謂分巡按察而已而敬之兢兢自外淺之乎爲丈夫也蓋敬積十五年而後敢言深知先生其前後審愼如此雖然未之知與知之未深則彼此如途人之偶値可也知矣知之深矣則友也友之道近則相示以行遠則相示以言皆中于道而後可詩古文藝事也而道見焉今先生所爲詩所爲古文業已集而刻之敬之意以爲宜排次之不宜以多多積之也以多多積之則于道多岐先生所與言藝者仲倫惕甫皆敬友也仲倫達心而懦惕甫强有力而自是仲倫之于道也儉惕甫之于道也越其于先生之詩古文燕閒之見必言之盡力矣然二子所見于道未能盡也敬者于道能知之而不能行之于文能言之而不能爲之然義不可以無言也則請卽二子者之序言而下籖以言之先生以爲異于操瑟之工獻狗馬之客歟抑非然歟然今者敬無所求于先生并不如操瑟之工獻狗馬之客有衣食利益之志也則又在乎先生知敬之深也已九月十九日惲敬謹上上曹儷笙侍郞書儷笙先生閣下前者敬在甯都上謁先生過聽彭臨川之言諄然以昔人之所以爲古文者下問侍坐之頃未能達其心之所欲言回縣後竊願一陳其不敏而下官之事上者如古之奏記如牋如啓皆束于體制塗飾巧僞殊無足觀至前明之稟幾于胥隸之辭矣古者自上宰相至于儕等相往復皆曰書其言疏通曲折極其所至而後已謹以達之左右惟先生敎正之古文文中之一體耳而其體至正不可餘餘則支不可盡盡則敝不可爲容爲容則體下方望溪先生曰古文雖小道失其傳者七百年望溪之言若是是明之遵巖震川本朝之雪苑勺庭堯峯諸君子世俗推爲作者一不得與乎望溪之所許矣望溪謹厚兼學有源本豈妄爲此論邪蓋遵巖震川常有意爲古文者也有意爲古文而平生之才與學不能沛然于所爲之文之外則將依附其體而爲之依附其體而爲之則爲支爲敝爲體下不招而至矣是故遵巖之文贍贍則用力必過其失也少支而多敝震川之文謹謹則置辭必近其失也少敝而多支而爲容之失二家緩急不同同岀于體下集中之得者十有六七失者十而三四焉此望溪之所以不滿也李安溪先生曰古文韓公之後惟介甫得其法是說也視望溪之言有加甚焉敬當卽安溪之意推之蓋雪苑勺庭之失毗于遵巖而銳過之其疾徵于三蘇氏堯峯之失毗于震川而弱過之其疾徵于歐陽文忠公歐與蘇二家所畜有餘故其疾難形雪苑勺庭堯峯所畜不足故其疾易見噫可謂難矣然望溪之于古文則又有未至者是故旨近端而有時而歧辭近醕而有時而窳近日朱梅厓等于望溪有不足之辭而梅厓所得視望溪益庳隘文人之見日勝一日其力則日遜焉是亦可虞者也敬生于下里以祿養趨走下吏不􅀗與世之大人君子相處而得其源流之所以然同州諸前達多習校錄嚴考証成專家爲賦詠者或率意自恣而大江南北以文名天下者幾于昌狂無理排溺一世之人其勢力至今未已敬爲之動者數矣所幸少樂疏曠未嘗捉筆求若輩所謂文之工者而浸漬之其道不親其事不習故心不爲所陷而漸有以知其非後與同州張臯文吳仲倫桐城王悔生遊始知姚姬傳之學岀于劉海峯劉海峯之學岀于方望溪及求三人之文觀之又未足以饜其心所欲云者由是由本朝推之于明推之于宋唐推之于漢與秦齗齗焉析其正變區其長短然後知望溪之所以不滿者蓋自厚趨薄自堅趨瑕自大趨小而其體之正不特遵巖震川以下未之有變卽海峯姬傳亦非破壞典型沈酣淫詖者不可謂傳之盡失也若是則所謂爲支爲敝爲體下皆其薄其瑕其小爲之如能盡其才與學以從事焉則支者如山之立敝者如水之去腐體下者如􅀒靑天之高于是積之而爲厚焉斂之而爲堅焉充之而爲大焉且不患其傳之盡失也然所謂才與學者何哉曾子固曰明必足以周萬事之理道必足以適天下之用智必足以通難知之意文必足以發難顯之情如是而已臯文最淵雅中道而逝仲倫才弱悔生氣敗敬蹉跎歲時年及五十無所成就必矣天下之大當必有具絕人之能荒江老屋求有以自信者先生能畱意焉則斯事之幸也附呈近作數首聊以塞盛意愧悚愧悚十月二十日惲敬謹上答儷笙尙書書儷笙先生閣下九月中得手書欣慰無似先生當代大君子乃肯垂念愚鄙之夫所不足者而敎正之先生所以厚待敬者至矣敬且感且奮思竭力自湔濯以副所期先生亦必許其能改也然往歲之事竊有小人之心二端不敢不爲知已吿者敬家貧無可爲生官事支缺多端又待質幾五閱月意欲棄官歸不肖之身于先生庶幾過貴州就一授經之席使俯仰無虞而道藝亦有所益一也士之處下位者入門戸則終身不能岀而可以罷官可以不罷官之時門戸之界也今歲春首有書與知交言不爲熙甯之附介甫亦不爲元祐之附司馬公況在往歲豈敢不愼故甯􅀡無曲甯激無隨二也此二端皆私心妄作言之慚甚豈敢自附于古之强項者邪然先生知其外之强項而有以進之卽知其內之并不及强項亦必不鄙之棄之而復有以進之此敬所以敢披露肝膽于左右也正月中秋潭來書述先生之命徵秋潭詩并及鄙文敬以贈送序多讇諛之辭恐􅀗罪門下未敢率爾執筆三月中聞秋潭被劾四月中而訃至傷哉傷哉撫軍非欲殺秋潭之人而秋潭竟死秋潭非以被劾致病之人其事亦非􅀍劾可致病之事而秋潭竟以病死如之何如之何方秋潭在時人多異議者今秋潭死矣何處復得一彭秋潭惜其子奔走衣食敬三索行述不得然銘墓之辭敬前與秋潭定交曾以後死自任不􅀒此諾也槀本并近作數首奉呈惟暇中正定之書中名帖不敢當不敢當先王德位崇重下交于奔走之吏先生之道益光矣然天下必有言敬之僭者謹附繳惟先生曲諒之乍寒一切爲道自重七月十一日惲敬謹上上汪瑟菴侍郞書瑟菴先生閣下敬奔走塵俗逾二紀矣所治荒遠久不奉敎于賢士大夫竊意迂戇之質百無可爲惟耗升斗祿爲讀書自守之資可以盡年可以長世然未嘗不以弇陋爲懼也古之君子學于古人則思畢其異同學于今人則思正其得失小生之所知下吏之所能其不可自畫明矣然不敢輒以之干人者或好尙不同徒取憎惡或事權所在跡渉梯媒與其過而近毋甯過而遠與其近而人知毋甯遠而人不知此居下之道也然敬嘗觀之古人蓋有自達之于當路者意者或一道歟夫天下未有以自達爲道者也意者或有其不苟者歟昔者退之上盧邁趙璟賈躭書皆誚責諷刺之言蘇明允上韓樞密富丞相書皆刼持誇誕之言及答李習之與歐陽內翰則大伸其性情學問之所得是故一介之士屏人獨處仰而思俯而書無論富貴酣養者不足與其旨甘分其膏澤卽如韓樞密之瓌傑富丞相之重碩文丞相之敦惠若與之抽毫命牘酬酢古今析毫黍之理舉邱山之事恐未能盡其精微周其博大天之生才各有所尙不可强也若是則所謂不可苟者亦有其不可失者歟先生自通籍時卽以好古力學聞天下然而不知者曰是宗漢儒不宗宋儒是喜治經不喜治史敬在下風蓋有年矣區區之忱未能無惑及前日上謁而淵然之容雍然之論所謂異同黨伐古今愛薄之說無幾微見于神志語言而後知前之云云者皆淺人附和未能深窺而性情之平頗學問之純襍非親接不足以得大凡也敬五十之年齗齗此事不日進則日退惟得有道敎正之或可不爲流俗人所限謹錄舊作二首近作五首呈之左右惟先生諒焉九月二十五日惲敬謹上答吳白厂書白厂二兄足下二十一日使至得手書藉悉興居萬福慰甚􅀩惠寄細絹墨竹一幀吳綾仿宣紙墨松各一幀而命敬以一言吿後世之知者敬何人斯敢當斯語邪然常從二兄于舒三白香之所二兄大醉狂呌稱畫則文湖州米襄陽復生詩尙當讓岀一頭地敬觀前人之推湖州者曰富瀟灑之姿逼檀欒之秀而已二兄畫竹堅潤通脫豈惟雁行湖州蓋駸駸乎抗衡齊首而將毋越之襄陽畫擅場人物山水乃二兄所不作者然襄陽自詡謂不使一筆入吳生又謂無一筆關仝李成俗氣是襄陽以高古出塵爲宗二兄畫松作氣滿前如驟雨如旋風當求之張文通以下惟襄陽爲裕陵書屏反繫袍跳躍便捷不爲富貴所懾二兄當之應無愧昔賢耳湖州襄陽所傳之丹淵集襄陽集其詩如工部之文如記室之賦意趣與俗懸别二兄則揣摩諸家而能洗刷之浩浩乎翛翛乎敬常謂乾隆中江右第一信有湖州襄陽所畏者雖然古人極深極微極正之作何如深而可至微而可探正而可感發之作何如可至而仍超遼可探而仍窅渺可感發而不妨恣詭之作何如此則敬所願望于二兄而畜之于心甚久甚久者也敬于此事雖自八歲卽受法于先人然所得無何故律嚴而拘思通而近氣盛而易竭響切而易流其境去二兄遠矣今敢率爾有所言者蓋以古人待二兄不得不以古人自待交友之道貴如是也敬回縣後諸事如蝟毛不可爬梳所幸老母康强細弱均安善無勤遠念前過貴郡本欲至草堂而輿夫出城卽取東道以致相左昔者楊少師西遊僕人挽之而東往日之事得毋􅀋此抑又有可釋之二兄者勝公榮者不可不與飮今無其人不如公榮者不敢不與飮敬今之投刺待見屏息雅拜者皆是也惟公榮可不與飮非二兄而誰則敬之不過草堂後世必有引首慨慕舉觴抽紙以歌詠之者二兄其何憾耶附上畫松歌一首乃章門所作劣甚勿見弞乍寒二切珍重十月十六日惲敬謹上答蔣松如書松如大兄足下三月中兩得書知于往歲來江右無因得見盡心意所欲言甚惘惘復知得交于梅臯太史多磊落之遊甚喜而書中三致意則以所爲四子書文屬序于敬此敬所不敢辭也數月來爲吏事所苦不得暇鹿耔頗與知顚末是以不及作報五月之望復得書以古君子之道望敬而責其不㳟皆切􅀡敬所未至甚愧感然謂敬不屑爲足下作序則甚非事理也敬與足下初接于州中汪氏奉舅氏淸如先生之命而後相見于都中一握手卽相背去幾十餘年復會飮于州東之園亭今又三易寒暑矣與足下蹤跡不可謂不䟽然心甚懸懸于足下者則以足下之爲人敬所願交而不敢失者也願交而不敢失則言宜誠故請得盡其愚序者蓋始于史臣之序詩書漢人著書多自序魏晉崇尙詩文始有爲人序專集􅁼集者唐宋人爲贈送序此謂不經明之壽序考察序升擢序又其不經者也是故漢之所無魏晉有之魏晉之所無唐宋明有之文者因事而立體順時而適用而已唐試帖經無經義文宋之經義文皆附于詩文集故無其序自明以來四子書文皆專行矣專行則宜有專序乃今之號爲知古文者曰不得作四子書文序嗟乎誠使陸敬輿司馬君實諸人生于今日爲四子書文韓退之李習之曾子固諸人爲之序傳之數千載之後其尊于揚雄之僞言劉歆之飾說葢可必也若是則爲足下作序何不屑焉昔者歐陽永叔爲惟儼文集序許其自言曰笞兵走萬里立功海外曰佐天子號令賞罰于明堂後惜其老不得意則曰考其筆墨馳騁文章贍逸之能可以見其志嗟乎惟儼爲浮圖者也永叔序之蓋較梅聖俞江鄰幾有進何也其人非儔人也足下自二十入少年場三十讀古􅇎家言四十與天下之士相角逐必有位置可以自信者若是則足下之文敬將求而序之又何不屑之與有雖然古人之序序著書之意而已故一集不再序後世或爲貢諛或附于有大力者則序至十數焉足下文得梅臯太史之序足矣敬又從而附益之其貢諛歟則敬不敢爲爲附于有大力者歟則敬非其人且無以處足下足下其以敬是書附之集末則足下之爲人與敬之所以交于足下者皆有源委可吿之後世惟高明裁之四月初十日惲敬謹上與湯編修書敦甫先生閣下敬處卑就陋年及五十而無所成常好從天下賢士大夫遊然所交又千百之一二而已往者張臯文寓書盛稱先生高義臯文旋卽捐館舍敬無以自通後秋農自粤過南昌敬以聞于臯文者質之秋農而益知先生之所以自處者敬其可居今之世而不求得當于先生邪臯文爲人其始爲詞章志欲如六朝諸人之所爲而止已遷而爲昌黎廬陵已遷而爲前後鄭已遷而爲虞許賈孔諸儒最後遇先生遷而爲濂洛關閩之說其所學皆未竟而世徒震之非知臯文者也臯文寡欲多思寡欲故言行多行于自然而有爲者鮮多思故事藝皆岀于必然而無爲者亦鮮自然必然二者合之進道之器也然有爲者鮮則于道易近無爲者亦鮮則于道易遠必也有爲者亦歸于無爲則庶幾于斯道乎雖然敬竊有疑焉者宋人之說至明而變至本朝康熙間而復其變也多歧其復也多仍多歧之說足以􅅭惑天下之耳目姚江諸儒是也多仍之說足以束縳天下之耳目平湖諸儒是也二者如掲竿于市以奔走天下之人故自近日以來多憗置之憗置之者非也揭竿于市者亦非也且如彼此之相詈前後之相􅅮益非也夫所謂濂洛關閩者其是邪其揆之聖人猶有非是者邪其變之仍之者是非其孰多邪知其是非矣何以行其是去其非邪敬交于臯文之時臯文未及此也其所得敬未之知而先生者臯文之與學而引之敬者也則敬之所宜受敎也故陳臯文之行以自通于先生而䘚致其所疑焉先生其有以大益之則幸甚不宣三月二日惲敬謹上明儒學案條辯序黄梨州先生明儒學案六十二卷列崇仁白沙河東三原姚江止修泰州甘泉東林九宗而于姚江復分浙中江右南中北方粤閩五宗其崇仁白沙爲姚江之源止修泰州甘泉東林爲姚江之流不相入者河東三原而已若授受在九宗之外者別爲諸儒學案統之表彰前修開引後學爲功甚巨然先生之學出于劉蕺山先生蕺山先生之學大旨悉宗姚江是以先生于河東三原均有微辭而姚江之說則必遷就之以成其是一遷就不得則再遷就三遷就之此則先生門戸之見也敬天禀凡襍人功疏妄于先生蓋無能爲役而少日所聞于先府君及同學諸君子者質之先生之說頗有異同如水之分合脉絡可沿如山之高卑顚趾可陟非敢强爲是非劃分畛域也因謹循此書之前後分條下籖求其公是如不當者不憚移定以盡彼此蓋三厯寒暑而後㑹而錄之可付寫焉孔子曰博學于文約之以禮此河東三原之學所自岀同于朱子者也然不曰四時行焉百物生焉乎孟子曰人之所不學而知者其良知也不慮而能者其良能也此姚江之學所自岀同于陸子者也然不曰明于庶物察于人倫乎子思子曰自誠明謂之性自明誠謂之敎誠則明矣明則誠矣又曰尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮其先後之序並行交致之功庶幾其備焉矣乎夫遊說之士計利而不計害言得而不言失後之人尙引大道以責之若言聖人之道者據其始而攻其終操其末而伐其本則所明者不及所晦之多所守者不及所攻之當何以騐之心身而施之國家天下哉夫善其言所以善其行也請與天下後世諸君子昭然確然言之若攻伐之說敬不敢附惟諸君子諒焉五宗語錄删存序敬年十五卽讀道家書後于吳山道院繙道藏鄙倍不可訓者十之七凡下者十之二周秦以來諸子及所存古注家其善者也若魏伯陽張端伯所述亦道之一隅而已至山右始讀佛氏書行江東西時時至佛院讀之爲鄙倍爲凡下有過于道藏者其精博之說微渺汪洋神生智岀道藏視之蓋瞠乎後矣中歲喜讀諸禪師語録于三乘之言本無差歧而其從入之門與從出之徑無轍跡無依持蓋人心之用不能無如此一境非强爲者也惟傳授漸遠積習日深及其末流幾于優伶之辭駔儈之行此則不可之大者也敬條其可觀者得若干卷行修力積其道自至確然隤然不容一隙者爲第一集機微鋒迅一擊卽解濳魚岀鉤飛鳥墜繳者爲第二集發明天人依附經論渾融包孕條理分晰者爲第三集片辭之設具見性靈一目所存偶涉道要者爲第四集其餘附㑹之陋修飾之工加二十八祖偈言厯代禪師評唱一槪削之以絕龎襍程子曰佛氏之書學者當如淫聲美色遠之夫不涉其藩不登其堂不入其室豈可以斷其是非得失之分數哉朱子曰佛衰于禪禪衰于棓喝夫曹溪之說法豈可謂佛之衰百丈之見大寂臨濟之見大愚豈可謂禪之衰後之君子于此能自得焉而不爲所􅅭奪則可矣子居決事序太史公曰蜀守馮當暴挫廣漢李貞擅磔人東郡彌僕鋸項天水駱璧推減河東禇廣妄殺京兆無忌馮翊殷周蝮鷙水衡閻奉扑擊賣請何足數哉惲子居曰本朝法皆畫一行臺省大吏權不敵漢郡守州縣吏權不敵漢戸賊曹皆謹奉功令無敢恣意者敬初領縣事太夫人敎之曰縣官得自決笞杖而已折責以四十爲限爾當止三十五其五爾母所貰也先大人曰死刑不可減也雖然斬刑必先比絞律不當而後入斬立決刑必先比監候律不當而後入立決敬謹志之勿敢忘然敬福中遇事輒任氣擊斷之晨起坐齋中抱牘進者差肩立敬手畫口指毋畱其應聽者翻竟卽擲下如風雨已坐聽事問數語書牘尾輒數十行意張用濟劉元明不過如是而昔友張臯文過縣曰此酷吏也敬大駴就求其說臯文曰凡天下以易心言吏事者與手殺人一間耳不意此事近岀吾儕敬聞此言爲之愧汗今年五十矣精力志意漸不如前始患過者今未必不患不及天道之盛衰人事之進退不可不防其流失也因類前後所決事爲若干卷以自觀省焉其目曰稟以達上官曰批以受民辭宋史大事奏稟畫黃唐有批勅宋有批答皆朝廷之辭其行之官司不知所自始曰諭卽漢之敎曰斷卽唐之判也先塋記􅀌塵山西厓絕地數十丈鑿厓而􅉎爲十二世祖恢菴府君之兆西向陳孺人祁孺人再繼陳孺人合葬焉其昭兆葬十一世祖贈戸部山西淸吏司主事存省府君謝安人合葬焉􅀌塵山之東曰亭子灣爲十世祖明湖廣按察司副使東麓府君之兆東向蕭恭人合葬焉其昭兆葬九世祖全州同知海亭府君嚴安人合葬焉昭兆迤東葬秀水丞愼所府君敬八世祖也吳孺人合葬焉其穆兆迤東葬愼所府君之弟國子監生良􅀸塋限之外迤東北爲七世祖慶府典儀正敬于府君之兆周孺人合葬焉是爲􅀌塵山東西墓地西兆二東兆五石橋灣惲氏歲祭之石橋灣之北路西墓地爲六世祖縣學生繩武府君之兆西向王孺人合葬焉其穆兆葬方顯府君敬高祖考也高孺人合葬焉其昭兆葬府君之弟達初昭兆之南葬府君之兄赤初穆兆前行夾葬赤初之子文元武元蓋墓位紊矣其故不可考同六世祖者歲祭之石橋灣之西牛車基墓地爲曾祖考燮臣府君之兆西南向巢孺人合葬焉其昭兆葬祖考贈富陽縣知縣子渭府君錢孺人合葬焉其穆兆先府君葬焉同曾祖者歲祭之惲氏自南宋以後著譜者多書葬所然墓頗夷失其未夷失及近􅉎者謹記之如右子孫庶有考焉傅純曰古不祭于墓者明非神之所處也蔡邕曰古不墓祭今朝廷有上陵之禮始謂可損今見威儀乃知至孝惻隱不可廢也是二說者其可以言古今之禮歟石橋灣惲氏祠堂記石橋灣惲氏同出湖廣按察司副使東麓府君副使生全州同知海亭府君同知之􅃁子曰秀水丞愼所府君丞生典儀正敬于府君始居石橋灣敬七世祖也子孫爲房三同知之次子曰良􅀸良􅀸之伯子曰紹先子孫居雷宋村仲曰日森子孫居常州府城之城灣季曰鴻祥子孫居江陰縣之靑陽唯叔子紹憲二傳無後順治中典儀之孫方顯府君招雷宋村紹先之曾孫朝元聯元來居石橋灣朝元之子孫爲房十聯元之子孫爲房五于是石橋灣惲氏凡十有八房乾隆三十八年朝元之曾孫吉滽諏于族爲祠堂祀副使以下嘉慶三年敬葺其楹宇及庭陳祠堂之制始備惲氏譜自副使上推十一世爲宋提舉方􅀡府君其世次官爵里居皆可考證自提舉上推四十三世爲漢梁相子冬府君代遠多疑似者提舉之􅃁子爲紹恩府君次子爲繼恩東麓府君紹恩之後也嘗師友李獻吉邊廷實諸人始以忤劉瑾外補終以忤江彬等斥官在湖廣八年北俘羅山竹山流寇南定彬州桂陽州屢叛猺賊東扼甯王宸濠西潰之師蓋終身皆在艱難讒搆崎嶇戎馬之間而確然守道自立不稍爲俯仰依倚者後之子孫尙其念先德乎哉重建東湖書院記東湖據豫章城之東隅周古步十里有奇東厓爲蘇圃有宋高士蘇雲􅀸之遺迹其南泮翼然亭臨之祀漢徐孺子故言東湖之故必以徐孺子蘇雲􅀸爲先南泮之北沙斗入北佩湖南以南泮爲至環三面皆水也宋嘉定中通判豐君有俊建東湖書院館四方游學之士迨明之初以其地爲縣學而書院遂廢今幾五百歲矣羅山黎君來令南昌復卜地于縣學迤東蓋前事以虧帑没入其宅者黎君歸帑于官爲銀若干諸鄕先生任講堂學舍築削之貲爲銀若干脩腵梁糗膏油舟輦之貲復爲銀若干于是深衣博帶之士揖讓􅁌誦于其中而書院復興夫聖人之道大矣學者必先去其害道者而後事焉孔子曰行已有恥孟子曰人有不爲也而後可以有爲昔者徐孺子不與陳仲舉鉤黨之難蘇雲􅀸當宋播越之餘張德遠欲有所圖而雲􅀸褰裳去之其心皆斷然有不可湼者夫鉤黨爲君子之過且遠之如此況小人歟張德遠處已甚正所圖雖不成其志皆仁人志士所扼腕者且遠之若此況以人國爲徼幸者歟學者能見于此然後依附攻訐之學術苟且之事功不足動其豪末由是而深造之則庶幾矣新喻東門漕倉記三代之時自諸侯􅀸大夫士皆其國人而鄰長里宰酇長鄙師卽同井廬以行相推擇者故下之俗易達于上上之風易究于下天子者稽其成而已漢祖秦設郡縣所命官奉三尺法以裁山海千萬里之民於是上之所行有非下之所任者而治日衰然其時三代之制猶不至盡廢鄕亭之官是也迨唐宋以後爲三老嗇夫游徼者苦官中侵辱多避免因悉改爲輪差歸之保正戸長保正戸長以微民與官絶遠不能通閭里之情于郡縣如鄕亭之官與令丞尉相敎令嗚呼此郡縣長吏所以囂然獨行其意于上而民終不可治也已新喻附城爲五坊坊有坊長鄕爲五十七圖圖有地保坊長地保如保正坊圖皆有十甲甲有管首管首如戸長其輪差之歲則管首迭爲坊長地保獄訟賦稅盜賊皆督之獄訟取居閒及爲佐證盜賊主踐更而賦稅則至時坊長地保以酒食召管首管首召戸丁爲期悉納之坊長地保坊長地保納之官故賦稅無後時者敬蒞縣坊長地保皆以禮訓督之可事事凡縣中有舉置令縉紳先生學弟子諭意于坊長地保揆其平衆從而後行事皆辦漕倉者最初在城之南門康熙閒改建于中城之保房前事鮑君又遷于治之東南隅基峻而隘民不便於是坊長地保以改建請縣中大姓胡萼有第在東門內門堂廡毬場皆宏整􅀡可錢五千緡以千緡售于衆而旁舍及地不取􅀡大姓章美亦以地益之遂復遷漕倉于東門湖北試用州判黎士煊等任其事加勤無私利三閱月而功竣夫漕所以爲國家也爲國家者必不可病民觀于胡萼章美之好義及在事諸君子之所爲天下豈有不可使之民邪然欲使民必自訓督坊長地保始後之人勿以敬爲古可也羅坊漕倉壁記羅霄江自袁東逕臨江入章貢水春夏秋三時得雨漲發萬斛之舟隨流東下疾如弩矢及冬水落瀏然見底散石鱗次而州渚之歧沙石相排擁舟益艱重不可行故袁之屬縣無漕新喻屬臨江漕二萬四千餘石皆道羅霄江自縣顧舟行五十里至羅坊水淺甚自羅坊行九十里至臨江治水差深再下三十里水益深可方舟達南昌兌軍故新喻運漕以羅坊爲便而縣西南北近袁納米多順流縣東附臨江溯流至縣遠者幾百里殊患苦之故縣東納米亦以羅坊爲便嘉慶八年士民請建倉于羅坊凡縣東區若干圖若干米若干納于羅坊倉計縣漕蓋得三之一減運五十里敬與同官計之僉以爲宜於是請于府及行臺省得允十月倉成十一月漕事畢是役也訓導胡君實左右之其在事者縣東縉紳之士及保正等皆有勞績焉爰書名于左方沙隴胡氏學田記新喻之南郭曰沙隴胡氏胡生嶺世家焉生之曾大母傅買田于官田灣得畝四十有八租五十石子孫從師及就試所司咸取給事在乾隆之二十八年越年若干傅卒葬峽江又越年若干爲嘉慶元年生與其宗賣官田灣之田以􅀡買峽江溪瀾之田得租四十四石于前額不符又買沙隴之田得租十四石額遂溢而請余爲之記古者士皆授田自井田廢而田私于農故士遂無授田者後世君子于私田之公于族者曰義田義田之給于士者曰學田儻亦古者士田之遺意歟是非特資其身也蓋將養其廉恥以爲德業之助胡生與其宗勉之可也重修萬公祠記瑞金踞五嶺尾脊東戸入閩而長汀爲汀州府治所㝛重戍扼之故閩非大亂兵無至瑞金者縣西南越汀州之武平以及于粤多石陘荒絕粤有饑擾卽躪瑞金自前明至本朝凡數十至明宏治中賊循陘夜襲城知縣萬公琛巷戰死縣人立祠祀之其事爲最著蓋瑞金遇大亂則東備閩小亂則南備粤其􅀔如此而縣之北爲所隸甯都州州􅀒廣昌左挾石城㝛戍不及長汀其溪谷深雜與武平等嘉慶八年廣昌奸民廖幹周聚衆焚掠甯都石城奸民應之瑞金亦有應者大府以兵馳至始勦絕蓋瑞金于閩粤兵皆外至可臨事偵探其自內起者常連甯都石城必先事部分乃能得要領其勢又如此敬上事瑞金去廖幹周之平一年矣求士夫可與戰守者不可得􅇰後陳君象昭見曰明府君無憂瑞金瑞金聚落無可容五百人起事者若五百人以下聚落中義勇能破之敬行縣時潛勘驗語皆信知可幸無事遂一意吏治暇則以儒術鐫摩之陳君之子雲渠從敬游好治經能詞賦亦喜言兵嶺嶠多好奇之士如陳君父子可尙也已一日酒次與雲渠言萬公祠已就圯雲渠􅁣然任之葺門垣築階陳塗墉壁設櫺楯事竣爲位以祀萬公敬與同志者左右將事咸偲偲然若有所感焉因記其事之始卒使刻石于壁間且詳瑞金兵事緩急難易之數以吿後之有責于斯土者遊羅漢岩記瑞金陳石山之南曰羅漢岩八月望後一日與楊生鍾生遊焉大石翼然下可列坐千人沙門爲佛屋據其廣之半皆庳陋大石之上爲天池水常滿少溢則漉于石之㫳齒閒無徑可登西行繞岩岩盡而北而東登數嶺有石隘入隘數十丈下過石穴聞水聲琤然天池也岀碞背矣法住記言佛湼盤時以無上法付屬十六大阿羅漢各與眷屬分住世界此世所稱十六羅漢也四分律言佛􅄺盤後大迦葉差比邱得四百九十九人皆是阿羅漢阿難以愛惠癡怖見屏後阿難聞拔闍子比邱偈得果在王舍城共集三藏此世所稱五百羅漢也釋氏之言多鄙誕鄙則愚夫婦易知誕則易惑故名山水及荒厓絕壑人多以羅漢觀世音名之嶺北且數十處此其一也觀世音爲三大菩薩之一以普門品言聞聲赴救四天下皆尊事之今士大夫擁高位厚貲不知推所職以及遠而詭談性命相率不讀佛書不奉佛法恐亦未必見錄于孔子也旣以語二生因并記之東路記南昌城下溯豫章江南至贛州東北折溯貢水至瑞金共一千五百里敬上事及赴行臺省期㑹皆由之此西路也東路止八百九十里嘉慶十一年十月二十六日已亥奉回任檄岀進賢門㝛舒白香天香館寢甚安二十七日下晡發行六十里㝛荏港夜大雨二十八日早發泥濘不可行行六十里㝛進賢大風寒二十九日晴早發行九十里㝛臨川署中秦臨川言于淸端公成龍作縣事甚備三十日上晡發行六十里㝛樹亭卽桓山海經註所謂葉似柳子似楝者是也桓音近華華近和漢書尹賞傳注桓表陳宋之俗言桓聲如和謂之和表師古曰卽華表也和又近何俗遂作十一月初一日甲辰朔早發行九十里㝛南城過曾香墅鄧蘭士蘭士從弟薌州初二日下晡發取便道吳白厂草堂在城南不及過行四十里㝛揚村初三日行八十里下晡至南豐王南豐滌硯十一閱之渡河復五里㝛楓嶺初四日行八十五里㝛甘竹雨初五日行三十里下晡至廣昌復三十里㝛竹橋初六日行九十里㝛甯都州初八日早發行八十里㝛葛藤凹雨初九日行八十里下晡至瑞金初十日上事南昌至南城皆平道南城之南始山行麻姑山㫄薄有靈氣其西南隱然浮十峯雲氣界爲三成如仙嶠搖漾不可測􅇰上一成雲氣背落日如紅綃眞奇觀也問之則南豐西之軍封山蓋拔見在三百里之外軍封之南至甯都多石山千幢萬􅒅皆南指然無如軍封山者廣昌之北旴水北流至新建與豫章江會廣昌之南二十里溪皆南流又三十里復北流又三十里復南流皆不可舟四十里至甯都會梅水可舟甯都之南溪皆北流六十里至九段嶺始南流四十里至嚴阬復北流五十里至麻子隩復南流不可舟三十里至瑞金㑹貢水可舟皆東路也貢水至雩都會甯都之梅水至贛縣入章水合爲豫章江卽西路也豫章江至新建縣北入鄱陽湖遊翠微峯記一自甯都西郭外北望羣山有虎而踞者二峯若相負北峯爲翠微峯易堂九子講學之所也背郭十里陟山西折而北過前所望虎而踞之南峯有厓復北有巖夾磴而上西折有岡岡之西爲金精洞北卽翠微峯循岡行有石門木闔背扃之仰視絕壁而已岡之東望果盒山有樓閣於是欲返遊果盒山而闔爲從遊所排遂遊焉過石門有南北厓相去以尺數倚立俯仰相隱閉北厓爲隥以登級三十有六道絶植梯級十有六以出于穴有木構少息爲第一巢復登爲梯隥之級二十有八有巢隘于前巢不可息爲第二巢級十有七爲第三巢級八十有三爲第四巢皆可息至此始出厓日杲杲然射諸峯峯如相蕩矣復得隥八十有三有坪爲易堂已燬廢其北有屋魏氏居之其㫄後無他道復循故道而下魏氏之先爲避亂計故鑿山無左右折上下皆懸身以難其登登山極勞弊無遊覽之勝然九子窮居是山能各有所守不欺其志是則不可沒者九子甯都魏際瑞際瑞弟禧及禮李騰蛟邱維屏彭任曾燦南昌林時益彭士望惟際瑞爲本朝招吳三桂賊將韓大任􅀍難焉遊翠微峯記二下翠微峯南西折至金精洞洞北立石三如古敦甗洞構橫閣之石之奇不見閣前橫術之外石呀然起于櫩際泉自石落散如珠絕境也洞之南石山相倚如服匿地志稱漢仙女張麗英于此上升其言不經下金精洞復西行石山中小者如屋大者皆隱天如鑄精鏐如地不能負渾渾澐澐首銜尾逮肩跂腋附蓋三百步所而北折得平疇數百畝復折而東五百步所出翠微峯之北石山橫蔽之其奇如金精洞之西復三百步所至果盒山石矗起數十丈如冰相附自南而西而北隥而上焉甯都之山界閩粤逶迤不可盡而城西數十里皆石山益奇古駭心目如此余嘗行太行泰山衡山多㫄薄蘊畜如聖賢豪傑舉事不與人以一端窺測若茲山者其俠徒隱士之流歟是亦可以觀矣重修瑞金縣署記府州縣用古諸侯禮大門皆臺門瑞金以閣爲大門爲楹三次內曰儀門其名始于唐之節度使後官寺皆冒焉爲楹三左右門卽漢之閤門三公則黄之次內曰大堂爲楹五有東西廊爲楹二十有四左右列八房以應官其名始于唐之中書尙書省後官寺亦冒焉八房者曰承發古都吏曰吏古功曹曰戸曰屯曰工古戸曹曰禮古議曹曰兵古兵曹曰刑古決曹賊曹也次內曰宅門爲楹三後漢書明帝紀云應門擊􅈀鼓人升堂古者惟路寢有堂鼓其置路門歟應門之鼓曰應鼓其應門亦置鼓歟若是則路門其亦置􅈀如鼓之應歟諸侯其以雉門路門應􅈀與鼓歟鐵磬卽方響南齊代鐘以記漏漏五夜以二十五點節之故名點次內曰二堂爲楹五有東西爲楹四二堂之前皆治官事之地也其後曰上房爲楹七古謂之小寢上房之東南曰東上房爲楹三有東西爲楹二古謂之高寢與上房同周垣古謂之宮牆二堂之東曰庫房爲楹三古者庫在庫門藏車甲後世無車甲所藏貨賄而已故內之乃府也而以庫名焉庫房之東曰東院爲楹三東院之南曰後門房以居典謁西向爲楹四二堂之西曰華廳以燕賓爲楹三有東西廊爲楹六玉篇云廳賓廚也唐以後以聽事之所爲廳傎矣儀禮侯氏聽于天子曰聽事以決事爲聽事亦非也華廳東後室爲籖押房漢曰畫諾君臣同辭唐宋曰畫黃曰押詔君之辭曰輪筆曰判押曰書行臣之辭皆押也宜押者籖之南史籖前􅀡叙所論後云謹籖月日下是也華廳之前曰前華廳爲楹三以上皆燕閒之地也華廳之後有周垣垣以內南北各爲楹三以處賓僚上房之後垣外迤西曰廚房爲楹三自大門至廚房共八十有六楹嘉慶十年四月十一日至瑞金周視多頽損旋葺治之三閱月而功竣後四年去瑞金爲之記以吿後之人焉東麓先生家傳先生諱巍字功甫號東麓宏治十六年進士由戸部主事遷刑部員外郞尋遷郞中時武宗任用劉瑾有急獄瑾必欲置之死先生知其􅁈白之忤瑾意先生在部素廉謹瑾怒無所泄遂以例岀爲湖廣按察司僉事伺其失瑾旋伏誅得免正德六年霸州流賊劉六劉七自河南來入境率師逆擊賊北走其明年賊復來犯先生東擊賈勉兒于羅山敗之劉六劉七乘閒躪武昌執殺巡撫馬炳然掠其家順流趨江西先生旋軍南擊敗之還炳然妻子斬首五百級復旋軍西擊四川流賊藍廷瑞鄢本恕于陜西石泉敗之追至漢中復敗之以功遷按察司副使十二年從湖廣巡撫秦金討郴州桂陽州叛猺龔福全禽之遂合南贛巡撫王守仁攻江西桶岡叛猺藍友貴夷魚黃寒奏食三品奉十四年甯王宸濠反率師趨黃州宸濠敗罷師先生前後在軍凡八年止進一官不自得欲投劾去㑹侍郎吳廷舉奉命赴湖廣與先生治永順宣慰司彭明輔獄彭明輔者與彭惠姻親惠與保靖宣慰司彭九霄爭兩江口地明輔助惠攻殺懼不􅀡以巨金鬻獄先生拒之廷舉素知先生功以此益知先生特疏薦爲湖廣巡撫有幸臣索賄不遂章上不報後一年罷官罷官後八年卒于家論曰先生以拒賄受知于吳侍郎卽以不納賄見抑彼江彬等不足責何宰相無一人若是哉正德當有明中葉天下徼幸無事人但爲先生惜耳如高陽孫承宗者廢棄十年天下瓦裂其又何如哉又何如哉后谿先生家傳先生諱釡字器之號后谿年十七補縣學生正德五年舉于應天十四年試禮部中式十六年丗宗卽位與張璁同賜進士出身知安陸州時議起興獻王陵爲顯陵達官外戚內侍以事至無時有內侍責供帳鬨擊州通判先生令民擁通判去曰罪在知州毋累若也由是內侍在中持事者皆不悅江夏民陰殺人􅄟尸山中讐者訟之民因令兄子竄去反指所􅄟誣讐者殺其兄子獄不得決先生承巡按御史檄鞫之曰若兄子年幾何愕曰二十五矣乃發瘞騐之髪盡白獄遂決先生常有德于衞指揮使指揮使轝盛饌實銀叵羅轝中以暮抵先生先生列吏卒堂下將發轝固請入室不允叩頭復持去自後無干以私者在州二年以憂去後如京師補官張璁爲侍郞方向用欲引先生附已執手謬爲策曰若忤中貴人恐中傷賴天子甚聖若疏其惡暴之渠輩言不得入非特免禍且大用先生以璁等亂政避其黨不對大忤璁復出知均州治如在安陸嘉靖七年擢南京戸部員外郞旋晉郞中調吏部張璁曰吾溫人也溫乏守須得一好官因閱郞官籍指先生名曰是人可吏部卽具疏題補溫州府知府先生至溫一以法治貴游之私人不得逞張璁又曰温海􅀖幸無事守誠好官毋乃屈耶吏部卽具疏題補成都府知府先生聞之不怡曰吾不能枉道幸有先人之廬足容賤子也遂不赴官三十五年卒年七十三論曰漢世孝廉重同歲生至唐進士同年益厚然未有若明之徇者也當日人盡如先生朝廷豈受門戸之禍耶先生守溫境內淫祠檄毁幾盡此非隱微無愧不敢爲張璁乃欲羅致之謬矣少南先生家傳先生諱紹芳字光世號少南嘉靖二十六年進士由刑部主事洊擢員外郞郞中外轉湖廣按察司僉事福建布政司叅議先生性褊􅀡有同縣人改庶吉士者先生曰一爲史官竟置産百萬􅁘後其人位顯爲所中罷官論曰先生在刑部時與李于鱗王元美遊今遺集視七子風尙相似可知得力所自矣香山先生家傳先生諱本初字道生號香山老人年二十一補常州府學附生以例貢國子監居京師三十年不遇崇禎十七年舉賢良方正除內閣中書棄官歸卒于順治十二年年七十先生與遜菴衷白兩先生爲羣從兄弟相師友棄官後更名向畫學董源南田先生少時師之論曰先生之學襍于浮圖老氏遜菴衷白又甚焉至忠孝之際三先生未有以異也自百氏橫議先王之道崎嶇榛莽分裂歧岀後之爲二氏者得援吾道以附㑹襍亂之是故唐以前言二氏與吾道畫然者也宋元明言二氏皆竊吾道之近似以支拄排之者之口士大夫益以爲精微可喜通脫自得從而浮其津造其厓雖學道之士不免焉然而顔淸臣蘇子瞻張子韶諸人大節炳然百折不變不爲虛緩頽放之學所誤蓋五倫之道根于天性順推曲致其力皆足以自遂此以見吾道之自然而二氏之爲矯拂也三先生所得豈在彼哉衷白先生家傳先生諱厥初字伯生號衷白萬厯三十二年進士由行人轉戸部主事天啟元年水西蠻安􅀖彦反先生以兵部主事受上方劒馳至四川督將吏平之二年魏忠賢子良􅀸叙慶陵功蔭指揮僉事先生爲郞中宜署牘乃托辭請外補補浙江按察副使轉福建右參議擢湖廣按察使崇禎二年大淸兵自遵化州入口京師戒嚴先生督鎭筸兵三千人勤王是時各省兵大集糧不繼沿途多逗撓先生獨先至且贏三月糧兵部尙書梁廷棟閱師入奏曰惲厥初非書生大將才也帝遣內侍勞且問方略先生疏陳利害得溫旨然兵部一切調發無如先生言者乃以疾乞休福王稱帝南京召爲光祿寺􅀸先生曰疆場無勝算而朝黨日爭時事可知且江北四鎭分據地隘兵衆左長玉在上游朝夕有王敦桓溫之禍誰爲王謝諸人哉乃不赴召順治九年卒年八十一論曰吾惲氏仕者先生與東麓先生􅆟號知兵然皆未竟其用後先生多爲浮圖言虞山錢陸燦至比之張無盡豈知先生之不得已哉然先生善觀時變與爲進退必籌可爲而後爲之此則先生終隱之意也已遜菴先生家傳先生諱日初字仲升號遜菴祖紹芳福建布政司左叅議父應侯國子監生先生由武進縣學生入國子監中崇禎六年副榜貢生遂久畱京師十六年應詔上備邊五策不報先生知時事不可爲乃歸攜書三千卷隱天台山中三年而兩京亾唐王聿鍵入福州自立而魯王以海亦稱監國于紹興吏部侍郞姜垓薦先生知兵魯王遣使聘先生先生意以監國爲不然固辭不起大淸兵下浙避走福州福州破走廣州廣州復破爲浮圖名明曇已復至建甯之建陽是時大兵席卷浙閩粤三省唐王與弟聿􅟽被執死魯王亦敗走海外湖廣何騰蛟江西楊廷麟等皆前破滅而明遺臣民擁殘旅倔彊走拒遙奉永明王由榔金壇人王祈聚衆入建甯屬縣多響應于是建陽士民數百人噪于先生之門固請先生不得已至建甯見王祈非初志也先生曰建甯八閩門戶建甯守則諸郡安然不得仙霞嶺建甯終不守也欲取仙霞嶺宜先取浦城時先生長子楨自常州至與副將謝南雲先趨浦城失利皆死而御史徐雲兵連入數州縣甚銳先生說令夜襲浦城自督後軍繼進會大雷雨人馬衝泥淖行不能速將至城下已黎明軍遂潰大淸總督陳錦張存仁侍郞李率泰統兵六萬來圍建甯永明王使兵部尙書掲重熙赴援先生復上書重熙請逕取浦城斷仙霞嶺餉道俟餒亂選精卒南下與圍中諸將夾擊之重熙至邵武不能進建甯遂破王祈力戰死先生收散卒走廣信尋入封禁山中糧乏勢益弱喟然曰天下事壞散已數十年如何救正然莊烈帝殉社稷普天率土齧齒腐心小臣愚􅄭謂卽此可延天命今迺至于此徒毒百姓何益遂散衆獨行歸常州久之張煌言與鄭成功圍江甯敗走訛傳煌言弟鴻翼先生門人從師匿縣官將收捕先生色如常曰吾當死久矣旣而事解卒年七十八康熙十七年也先生少時與楊廷樞錢禧交爲文章縱麗于百氏無所不窺尤喜宋儒書時商業于同里張瑋後會稽劉念臺先生宗周爲左都御史瑋副之因介先生師宗周學由是益進先生旣不得已歸常州仍服浮圖服而言學者多宗之無錫高世泰忠憲公攀龍從子也重葺東林書院先生與同志習禮其閒知常州府駱鍾麟屢求見不納去官後與一見言中庸要領喜而去曰不圖今日得聞大儒緒論也先生次子桓幼子格避兵時常從後于建甯被略桓不知所終格自有傳論曰先生以高才爲世家子宜任天下事然前旣卷懷不用矣區區建甯不足當天下千一顧欲藉烏合之衆陸梁進退與天命爭衡先生之知豈出此抑謂據阨死拒割裂畸餘可稍延明朔然大圜鴻覆欲遺一隅何可得也豈忠與知不並行歟抑岀處成敗要由運算有不自主者歟說者斥先生旣改服復爲儒言則一端之論也已南田先生家傳先生諱格字壽平後以字行改字正叔少居城東號東園草衣生遷白雲渡號白雲外史旣老號南田老人先生年十三隨父遜菴先生依王祈于建甯陳錦破建甯􅀍略錦無子其妻子之後從錦遊杭之靈隱寺遇遜菴于塗遜菴因與寺主諦暉謀俟錦妻入寺紿言此子宜出家不然且死錦妻畱之寺中泣而去先生始得歸先生以父兄忠于明不應舉惟攻古文詞其于畫天性也山水學王蒙旣與常熟王翬交曰君獨步矣吾不爲第二手也遂兼用徐熙黃筌法作花鳥自爲題識書之世稱南田三絕宋尙書犖語人曰南田畫吾暗中摹索能辨之世多贗作其至處必不可贗王太常時敏遣使招致先生方出遊不時至至則太常已病喜甚榻前一握手而逝先生家甚貧風雨常閉門餓以畫爲生然非其人不與也卒年五十四子念祖不能具喪王翬葬之論曰昔淮南王敘離騷以爲其志潔故稱物芳蓋深知屈子者先生泥塗軒冕鶉居蟬飮身世之際可謂皭然而世徒以畫知先生末矣然先生之志之潔于畫何嘗不可見哉惲氏作畫自香山先生始遜菴先生以枯墨作山水殊古􅂤然非作家後南田先生負重名羣從子弟皆作畫遂成風尙今畫法多流蕩矣敬謹擇其有意者著之于左珝字相白畫學南田先生源濬字哲長善吹鐵簫號鐵簫老人天津縣丞畫法一準徐熙下筆有芒角生氣坌涌如雲展潮行惜稍俗耳爲人爽邁任氣必踐言去官後卒于天津源景字希述冬官正轉工部主事畫法黃筌官京師垂五十年無車馬塵屋敝幃不見厭苦之色冰字淸于父鍾嶐南田先生族曾孫也冰寫生芊眠蘊藉用粉精絕迎日花朶俱有光適同縣毛生鴻調鴻調不應舉築小樓夫婦居之以吟詩作畫老焉宅仁字原長畫多贗南田先生然質重韻味無絕勝者與三字德三歙縣敎諭能山水華卉筆法淸婉兄弟皆困乏爲敎諭不能贍其家棄去鬻畫京師客雄縣遂卒羅臺山外傳臺山名有高瑞金人父讓生子三長有京次卽臺山年十六補縣學生三十一充優貢生三十四順天鄕試中式四十六卒子之明縣學生臺山少好技擊兼治兵家言後與雩都宋昌圖同學于贛鄧元昌修儒者之業彬彬然適矣其于書無所不窺精思造微湊􅂩而出于道大著遂喜佛氏之書自京師歸忽登樓縱火自焚家人驚救得不死臺山遂狂走入深山數月後乃迹得之服沙門服不下髪趺坐與人言孝弟而歌泣無時下揚子度錢塘過甬東多託迹佛寺中奉化快手怪其服意爲盜合曹輩數十百人篡臺山臺山徒手禦之不可近因詣縣趺坐縣庭與縣官爲禪語縣官憆不解同年生主事邵君洪時家居識臺山乃釋之遂遊普陀寓西湖已復走京師乃歸而卒所著有尊聞居士集行于時論曰敬至瑞金臺山沒二十餘年矣而士大夫多言臺山遺事者臺山于倫甚修所以處之甚厚不得已乃至于如此其諸無愧于爲聖賢之徒者歟昔程子以佛氏爲逃其父欲以中國之法治之夫事在數千載以前數萬里之外又何以知其心之所存與事之所至而爲是論哉如臺山者可以觀矣謝南岡小傳謝南岡名枝崙瑞金縣學生貧甚不能治生又喜與人忤人亦避去常非笑之性獨善詩所居老屋數閒上垣皆頽倚時閉門過者聞苦吟聲而已㑹督學使者按部斥其詩置四等非笑者益大嘩南岡遂盲盲三十餘年而卒年八十三論曰敬于嘉慶十一年自南昌回縣十二月甲戌朔大風寒越一日乙亥早起自埽除蠧書一册墮于架取視之則南岡詩也有郞官爲之序序言穢腐已擲去旣念詩未知如何復取視之高邃古歰包孕深遠詢其居則近在城南而南岡已于朔日死矣南岡遇之窮不待言顧以余之好事爲卑官于南岡所籍已二年南岡不能自通以死必死後而始知之何以責居廟堂擁摩節者不知天下士耶古之人居下則自修而不求有聞居上則切切然恐士之失所有以也夫二僕傳順喜其父孫祥丹陽人賣身于敬族兄用霖用霖賣孫祥及其妻張于子渭府君順喜隨孫祥至始八歲少長一切不肖皆爲之惟事主則勤至岀于至誠先府君臥病十二年順喜日侍至丙夜抑搔折手節解疲肢無倦後與楊和兒溺死采石江中楊和兒河南洛陽人隨董達章超然至京師性戇甚不得超然意遂隨子寛至富陽已復隨至都子寛出都過河間逆旅火跳而行是日覆車于圯幾壓且溺皆仗和兒得免後復事子由嘉慶九年太孺人年七十和兒自鎭江偕順喜溯江來新喻祝太孺人三月二十八日次采石有沙門丐于舟舟人靳之沙門曰生非我有也財何吝邪舟行至中流而沒和兒于羣僕中最善順喜其不肖多同爲之而事主勤至則同死亦同噫二人之不肖無死法也而卒以非命死觀沙門之言其有數存邪然天下有法宜死而反富壽是數之不平固如是邪且天何不能反此數以爲事主者勸也後二僕傳嗚呼民之愛其生性也至不愛其生而以戕賊作亂豈一日之故哉瑞金處萬山民性悍喜邪說敬視事期月矣上下無所感動咎其何辭陳明光者世業塐通符錄與湖陂司巡檢比而不喜典史吏卒嘉慶十一年四月十三日庚寅敬以事赴行省明光之族人明偉有婦何私其族人明讀明讀挈而逃明偉訴于明光達巡檢獲之以何付明光明光亦與何私忌明讀相鬬鬩巡檢執械明讀故陳族人惡巡檢而不􅀡明光二十四日族人閧而至明光知巡檢不足倚以刀至頸取少血卽撲地使其妻劉訴縣縣曹付典史往騐又不􅀡明光而明偉之妻何前爲族人擁去明光旣失何復得不􅀡名于甲夜自起喑噁獨飮酒持刀奔巡檢司殺明讀傷守者一人奔典史署殺皂隸一人傷三人復殺門子一人典史闔門大噪明光反走道縣門念終不得活遂入傷鈴下二人砍閽者孫福傷肩自後戸走避夏淸柳芳避入室無後戸同死方明光殺人時無發聲及與支拒者書手劉懷仁曰其諸爲符錄所禁歟明光赴州審錄于路自恨曰縣官在吾不至是也夏淸仁和人敬知富陽時來從以小失遣去嘉慶元年敬餉軍銅仁道五千里而自武陵以南卽岀入叛苗中幾一千餘里夏淸願從餉銀十五萬兩爲鞘一百五十皆夏淸主之役旋從至江山敬以先府君之喪去官復遣之而敬貧甚左右無一人夏淸復來遂從入都從至新喻最後從至瑞金前􅀍殺一月敬心忽不樂欲遣之不去而死嗚呼命也夫敬上推八世祖秀水丞愼所府君華􅀸年五十二始生七世祖典儀正敬于府君紹曾譜不載所自出夏淸常從除祠堂奉祧主一岀于室敬就視之曰夏孺人神主男紹曾奉祀然後知出于夏也夏孺人侍愼所府君當于官浙時而淸籍浙其不偶然歟然輾轉千萬里以死于瑞金何也柳芳武進人傭書府戸曹不得意嘉慶五年從敬于新喻凡投謁及詩文詞草槀柳芳主之能日書一萬字無塗注前被殺三月已辭去復反而死敬束下素嚴夏淸柳芳皆布衣履言語訥訥然以此得久然卽死因也紀言嘉慶元年敬以富陽縣知縣餉貴州平苗軍五月丁巳次益陽有大星隕于西南聲隆隆然癸亥次武陵一騎自西南來白衣冠聞嘉勇貝子薨庚午次桃源同餉軍者裘烏程世璘曰吾屬在浙貝子方平林爽文凱旋自三衢方舟下嚴陵江舟設重樓陳百戲中流鼓吹競作從官舟銜舳艫並兩岸疾下頃之有嘩于從官舟者乃一巴圖魯與都司飲爭酒佐貝子岀坐親鞫之色甚和貝子曰汝二人何功叩顙曰花翎通諸羅道賜比旋役各進一官貝子曰今天子神聖軍以功返汝二人不知謹虧朝廷體邪然重懲汝非優功盛恉也目左右曰花翎不稱去之二人叩顙下卒不問所坐何事方紹興應逵曰吾聞文武事貝子貝子必優以官頃有府經厯三年至同知試用知縣五年至分守道者鍾慈谿德溥曰吾鄕人嘗事貝子官亦分守道矣往歲貝子輿夫與守備爭毆之傷額鄕人杖輿夫四十貝子曰若忘富貴所自邪何􅏳我也鄕人懼數月不敢見語有閒敬吿之曰吾聞之張臯文張臯文聞之副都御史方葆巖先生維甸先生曰貝子援諸羅時壯勇公海蘭察前行行約百里貝子督師夜繼進大雨天黑如覆盤遇土山駐軍山頂貝子中坐隨軍官圍貝子坐外親軍外正軍皆圍坐賊遊兵近山踐泥濘過火炬千萬賊自炬中上窺山黝黑無所見疑有軍發銃礟擊之貝子令曰無岀聲無動久之賊過盡雨霽天益明壯勇公已入諸羅城捷使至軍始起行無一傷視銃礟子厯落入山腹也先生又曰貝子征衞藏有隘道幾一里賊屯軍守隘北甚嚴大軍屯隘南三十里許貝子調軍伏隘東西而以前軍分五軍攻隘迭退迭進戰一日蓋數十勝負貝子在大軍中前軍軍報沓至不動及二更前軍大敗退不止賊逐前軍岀隘南忽銃礟聲大震火炬盡爇照耀如白晝東西伏軍皆起賊驚退相蹂躪我軍蹙之入隘貝子急上馬萬騎齊足頃刻至隘口前軍伏軍已過隘聞貝子至勇氣百倍大軍乘勢合攻遂夷賊屯追奔五十里而後止書山東知縣事山東知縣者老矣以進士授知縣在縣八年縣之人有讐大姓者誣以不軌列頭目數十人上變于巡撫巡撫下上變者于獄檄按察使督府都司以三百人馳揜之按察使先令健步夜馳三百里密檄縣爲備知縣得檄驚曰柰何此良民也因問健步兵去縣幾何曰昨發度行不過百里今去當二百里耳於是知縣從健步跨一馬疾迎兵于百里外見按察使曰大人所捕反者非反者也知縣能呼之來若兵往不能無驚竄竄則反實矣按察使怒曰此大事縣何脫爾少誤當坐縱反者斷頭知縣叩頭曰知縣在縣久此數十人如家之人耳婦稚耕種牧養能悉數之豈不知反不反哉如一人跳去者願以八口殉非􅀡斷頭也大人其馳使白察院急止兵大人單車來此數十人迎馬首矣於是復上馬疾馳反縣親至諸應捕者家曰滅門矣速從我可活乃羣從至縣按察使亦至縣知縣引而前衆皆跪號哭按察使愕然良久令衆至所司投獄具情白于巡撫巡撫以屬司道府司道府治無一騐悉縱之而斃上變者于獄蓋自始變至事白不及十日大吏遂皆以知縣爲能更一年巡撫按察使相繼遷去會大計主者當知縣年老官勒休書王麗可事陜西華陰縣丞王銑字麗可武進人明御史忠烈公章後也李自成陷京師忠烈公服朝服罵賊死兵部主事金忠節公􅉗亦死御河其後湖廣巡按劉忠毅公熙祚死衡州端禮門世稱武進三忠麗可白晳弱而文以四庫館謄錄監生授華陰縣丞居官貧甚又常以介不合上官嘉慶三年白蓮敎往來擾湖北四川陜西三省官軍次第收捕賊蔓延不可驟滅行臺省督軍餉銀甚急麗可承檄餉經略勒保營祖之日祀忠烈公泣已而謂人曰吾此行死矣吾甯能效他人苟且􅁘二月十三日行至雒南廟溝坡坡迤高二里所麗可已北下坡而家人吳連押後隊踰坡脊未下背望賊高均德大隊雜遝至坡南探騎二縱轡馳上吳連大呼賊來速下馬避麗可回望不應吳連復大呼而賊探騎已至坡脊吳連下馬叩首賊不顧馳下左右夾麗可疾馳去幾一里復勒騎馳回一騎以矛刺麗可破面墜馬一騎就刺􅅐及脅五創皆洞過而死年五十九二騎馳會大隊下坡營平地畱賊五人車帳守麗可尸旣一日無議贖者拔刀殘之而去又二日吳連求得尸凡創五十餘以禮殮行臺省上奏賜祭葬子襲雲騎尉其時經略額勒登保禽高均德送京師伏誅西市書獲劉之協事高宗純皇帝乾隆五十九年敎匪大頭目安徽太和劉之協以訟事赴質洞南扶溝十月十五日丁酉聞陜西白河敎匪事發跨黃驘夜走遂入郟縣聚徒衆作賊自稱天王劉之協於是陜西河南湖北四川敎匪皆起官軍勦捕降斬以千萬計戸部轉輸至萬萬皇上嘉慶五年六月二十八日已卯今分巡吉南贛甯道潾水廖公寅莅葉縣捦之協送京師伏誅西市敎匪旣失本師遂解竄經略額勒登保等以次討滅四省乃平先是廖公長公子以省覲至葉葉居賊衝列兵城門爲守計長公子襍候騎岀五里所于柳樹下見一人貌怪偉露膊坐眉入于鬢即賊黨冀大榮也疑之返以色目吿城門兵朱中林歸署舍脫鞾韈方濯足而大榮已從之協至城門與中林相識踦梱語中林紿使入城大榮指之協曰張掌匱也强之入參飮于肆而陰洩于中林長公子聞報徒跣赴肆中手拉之協佩刀斷其褌繫之協俯護褌遂扼項仆之廖公率吏卒縛之協擁至縣蓋之協敗于鄧州去其衆思迂道入南陽再起故過葉也皇上以廖公功賜花翎􅂤放鎭江府知府旋擢今職河南遷官者數人冀大榮亦賜把總銜今益貴矣長公子者名思芳敬前在南昌長公子不以介紹見下馬入門爽拔之氣照左右曰思芳行天下多願交思芳思芳拒之今聞兄高義故至此思芳不喜讀書毋混我然忠孝大節不敢辱知我也其自命如此惲子居曰敬以屬吏事廖公幾七年厚德退讓君子也及交長公子始知公少時常貯米竹簏負走三十里餉二親創背陰雨常㿇㿇然又聞在河南驕帥有索賄者力拒之拔刀砍館垣斷其刃帥氣懾而去蓋仁者之勇發不可遏知長公子之風爲有所自矣先賢仲子廟立石文嘉慶十六年七月丁丑江西瑞金縣知縣惲敬謹立石先賢仲子廟之庭中而刻文曰昔者仲子仕于衞大夫孔悝衞靈公岀亡之世子蒯瞶爭其子出公輒之國執孔悝以求立仲子死焉後儒竊有異議者敬以爲不然請爲主客之辭以盡其事之勢與義而折其衷于孔子按史記孔子丗家魯哀公六年孔子自楚反衞此去楚之年也十二諸侯年表哀公八年孔子至衞此至衞之年也其時當岀公之六年岀公之定爲君久矣則試問出公之定爲君義乎不義乎則謹應之曰左傳靈公之謂公子郢也曰予無子是靈公未赦蒯瞶也蒯瞶不得自爲赦也曰將立女是靈公不以蒯瞶爲世子也蒯瞶不得自居于世子也然則春秋之書衞世子柰何曰蒯瞶之岀亡以將殺南子也靈公蓋爲南子諱焉未嘗以廢吿諸侯也春秋用史官之法蒯瞶之書世子宜也雖然靈公之心則以爲廢之云爾人子者心父母之心斷斷不宜自居于世子是故蒯瞶不宜立者也宜立者岀公而已立公子郢非法也問岀公之拒父何如則謹應之曰岀公未嘗拒父也衞靈公生于魯昭公二年其卒年四十七而蒯瞶爲其子岀公爲其子之子蒯瞶先有姊衞姬度岀公之卽位也內外十歲耳元年蒯瞶入戚二年春圍戚衞之臣石曼姑等爲之非岀公也岀公長而勢已不可爲矣歸罪出公從君之辭也問石曼姑之拒蒯瞶何如則謹應之曰蒯瞶者非曼姑之所宜拒也蒯瞶得罪靈公靈公可以父絶之岀公不得以子絶之是故蒯瞶不可爲衞之君而可爲衞君之父不可爲衞之君所以定靈公蒯瞶父子也可爲衞君之父所以定蒯瞶岀公父子也孔子曰必也正名乎正靈公父子之名則蒯瞶宜逐宜逐柰何終身不入國可也正蒯瞶父子之名則岀公不宜拒不宜拒柰何蒯瞶在戚岀公以國養可也以是言之出公之定爲君無過也定爲君無過斯仕于岀公者無過也仕于孔悝者益無過也則試問高子之不死何如則謹應之曰高子者公臣也士師也蒯瞶之入高子無軍師之謀故無死事之義無親䁥之任故無從亡之義孔子曰柴也其來以此也則試問仲子之死何如則謹應之曰仲子者家臣也邑宰也以孔悝爲主君視其禍而不知救禮歟孔子之于衞也蒯瞶與其亡不與其爭岀公與其立亦不與其爭是故蒯瞶之入岀公之亡仲子不與也曰太子焉用孔叔曰必舍孔叔知有孔悝而已所謂食焉不避其難也孔子曰由也其死以此也夫以一聖知二賢豈有不揆于義以其愚而決其來以其勇而決其死哉且夫聖人之道五倫而已不辨于君臣則父子兄弟夫婦朋友之倫不序不辨于去就死生則君臣之倫不明君臣之始事去就爲大君臣之終事死生爲大仲子之仕孔悝也君子將以推明乎去就之義其死孔悝之難也君子將以求當乎死生之仁顔淵死子曰天喪予天喪予子路死子曰天祝予天祝予曾是去就死生之不辨而冒然爲之者此後儒之過言也世之爲聖人之徒者其視兹刻焉新喻縣文昌宮碑銘嘉慶六年九月二十六日江西省臨江府新喻縣奉本府正堂牌開爲移咨事轉奉布政使司奉巡撫部院准禮部咨議奏文昌帝君仿照崇祀關帝典禮致祭一摺奉旨依議欽此移咨遵照辦理等因到縣該縣每年春秋祀文昌帝君動地丁銀二十六兩牛一羊一豕一登一鉶二簠簋各二籩豆各十鑪一鐙二帛一香盤一尊一爵三承祭官朝服行三跪九叩禮祀文昌帝君三代羊一豕一登一鉶二簠簋各二籩豆各八鑪一鐙一帛三香盤三尊三爵九承祭官行二跪六叩禮時敬奉檄襄文武鄕試在南昌十二月十一日回縣任事與儒學訓導胡君曁縣中同官屬縉紳先生耆老謀所以安神者於是筮地得吉于虎闞山至聖先師廟之西偏爲門三檻東西塾爲殿三楹序夾室階陳皆備祀文昌帝君少後爲殿三楹祀文昌帝君三代爲位于八年四月戊辰越翼曰已巳落其成斲礱丹雘如禮是日肇祀于新宮牲腯酒馨旌旄從風羣執事給敏以暇終事益䖍環門而觀者忻舞相吿喁喁于廣術皆知神之具醉飽而有以福吾喻之人也敬肅受嘉胙爰揚厥美刻之廟石而系以詩詩曰油油淸渝虎闞其坁倚厓爲牆蕩蕩持持黌門居阽煥乎樓閫其脩五雉畫霞爲畛作宮于㫄維神則宜我父我予協于筵著乃糾乃斂乃削其坪其廷則􅀡乃磶乃楹庖犧肆醴業虡之所自門而階而堂而戸皤皤文學弟子具來役夫不勞不匱于財維神聰明欽其信􅀡登筵憑几强飮强食維吾喻民各服其疇禾麥茂茂滿吾車篝維吾喻民舟車所通伐梓捕鯉以有以豐維神之職厥曰司祿維吾喻士以貞延福天子之德際天並海維神相之便章同軌吾喻一隅如冶待型千山萬水尺鼎先成小大稽首荷神之庥于萬斯年毋怠毋尤文昌宮碑陰錄古者天子祀天地社稷宗廟五祀而已祭法有天下者祭百神山林川谷􅏀陵是也周官大宗伯以疈辜祭四方百物八蜡是也漢用方士之說祀典多無稽後世佛氏日昌所祀神皆託之西域及所謂四天下焉道士生中土祖方士之言效佛氏爲誑誘陶宏景寇謙之杜光廷諸人妄搆眞靈紀官籑職復舉中土君臣之名跡及叢祠淫鬼錯入徵之其說至後世益乖歧無可信考者文昌帝君之祀不知其所始崔鴻後秦錄姚萇隨楊安伐蜀至梓潼嶺見一神人謂之曰君早還秦秦無主其在君乎萇請其姓氏曰張惡子也後據秦稱帝卽其地立張相公廟祠之常璩華陽國志梓潼縣善版祠一名惡子民歲上雷杼十枚璩志終于永和三年在萇稱帝前五十餘年是萇之前已祀惡子矣唐封順濟王宋改封英顯王元以道士之說封輔元開化文昌司祿宏仁帝君於是山經地志稗乘外書附㑹不經之辭布滿天下道士悉刺取之以意牽合録爲化書而學士大夫之好怪者竊其妄說捕聲附影瞶聽瞽說嗚呼可謂不祥也已在前明之季年大臣議禮者以爲宜罷其祀是又不然夫王者受命進退羣神之祀凡以爲民已耳其合乎天神地祗人鬼之典法者秩宗之所掌縫掖諸生之所誦習百世不廢者也其不合乎天神地祗人鬼之典法而能見靈爽爲徵騐捍禦水旱兵革爲天下所奔走王者亦秩而祀之所以從民望也本朝承平旣久上下以休養爲福愚氓積煽遂盜兵戈今全蜀就平楚峽亦靖皇帝以文昌帝君爲蜀之神歸功底定祗閟其祀有司考定禮樂頒之四埏意以天下之集甯則將士之宣力不暇百姓之效順也然以天下之大智者愚者皆赫然于天人之交際百神之呵護則國家之大神百世之所以治安也敬以愚瞀隨肩州縣下吏無以仰輔朝廷之制作竊以私見鄙識窺測萬一如此若夫道士所言如里巫巷祝視鬼造妖以惑蚩蚩者之視聽豈足信哉豈足信哉敬以其行世已久恐爲大蔽爰取其太甚者條辨之列于左方使天下知朝廷所以祀文昌帝君在彼不在此庶幾后䕫伯夷之倫所是許焉
