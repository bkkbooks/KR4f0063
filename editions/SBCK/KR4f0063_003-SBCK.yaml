body:
  text: 王氏見聞錄巂州越巂縣張翁畜蛇令欲殺之一夕雷電縣陷爲巨湫蛇爲陷河神張惡子謹按梓潼嶺卽七曲山華陽國志五丁迎秦女見蛇抴之山崩卽其地也因五丁之說附會蛇爲梓潼嶺之神遂取卭都地陷之說益之卽見聞錄所傳是也考後漢書西南夷傳武帝初置卭都縣無幾而地陷爲汚澤因名爲卭池無陷河神之說卭都至隋始改爲越巂縣見聞錄之言其岀隋唐閒野人歟又明一統志稱神爲越巂人報讐避居梓潼蓋始以神附會爲蛇繼復以蛇附會爲人化書又託之戚夫人趙王如意皆可謂無忌憚也太平寰宇記濟順王本張惡子晉人戰死而廟存文獻通考從之謹按華陽國志元和郡國志俱無晉人戰死之說是後人以秣陵尉蔣子文戰死爲神附㑹之無疑路史黃帝子揮造弓矢受封于張爲張氏詩傳張仲賢臣也箋吉甫之友也化書以張仲著于詩附會神爲張仲且以爲張㝛之精謹按史記天官書張素爲廚主觴客晉書天文志張六星主珍寶宗廟所用及衣服于張氏何與􅁘于張仲之孝友何與耶酉陽襍俎天翁姓張名堅竊騎劉天翁白龍至元宮易百官劉天翁失治爲太山守是張角謀代漢之妖言也竈神姓張名單有六女皆名察以張爲廚故竈神張姓張六星故神六女皆妖言不可從晉書天文志文昌六星在北斗魁前天之六府也四曰司祿司中司隸賞功進與天官書四曰司命五曰司中六曰司祿不同星經又言六曰司法蓋古之言天者以四獸配四時占生殺其附天樞者皆占宮廷命名徵騐取近是而已化書旣以文昌帝君爲魁前之司祿又以爲外垣之上相吾誰欺欺天乎蓋唐宋之時士大夫及進士過梓潼嶺得送者皆爲宰相得殿魁如鐵圍山叢談所記多矣妄者遂有司祿之說其尤妄者證以星之司祿并尊以星之上相以相煽動而不知二星之不相屬也本朝朱錫鬯氏求其說而不得謂文昌祀蜀之文翁何其益誕耶說文魁羮斗也從斗鬼聲臣鍇曰謂斗首爲魁柄爲標也蓋器名耳星象之故北斗南斗小斗中斗同名皆以首爲魁柄爲標於是轉訓爲首者爲魁漢書里魁黨魁是也復轉訓試名之冠其曹者爲魁老學菴筆記宋元憲夢大魁天下揮麈録昌文穆等以大魁至鼎席是也今乃以斗倚鬼爲魁星之神復以文昌在斗魁之前而祀之于文昌宮大可弞也其他如化書所言以白騾進僖宗乃因明皇靑騾入蜀而附會之朱衣神則因歐陽文忠公而附會之不知鯸鯖錄所言乃刺關節者得售以誣文忠不可訓也都昌元將軍廟碑銘天下有形必有神而有血氣者最騐有血氣之中毛羽鱗介並在五蟲而人爲最騐人之骨肉筋血毛髪一體也而心爲最騐人心之神與毛羽鱗介之神推之天地之神昭明肸蠁微分巨合充塞乎無閒是以日月之明山嶽之成江湖之盈其積形之神與有血氣者常往來而人之所接皆以人之事事神爲之像設爲之廟庭爲之牲牢酒醴爲之官爵名號蓋神之依于人道固如此然而神依于人以爲禍爲福而所憑或假之毛羽鱗介者何也其物皆老則血氣聚聚則變其物若有知若無知則血氣專專則通日月山嶽江湖卽以其神之變與通者憑之故聖人能知萬物之情狀而後能知鬼神之情狀都昌元將軍自明洪武中敕封附祀于左蠡山之湖神廟嘉慶十有四年江西巡撫先福公立廟特祀奏請加號敕封顯應元將軍公用古碑法勒部咨于石敬與都昌知縣陳君煦交過左蠡爲碑文言其所以神以發明朝廷進退百神之義詒陳君使立石于廟庭銘曰萬物之動一道所蕃沄沄渾渾根支萬千其分如沙其合如水神哉神哉何此何彼惟元將軍黑帝股肱雲旗干尋指揮鯨鵬左蠡之山據湖三面爰宅將軍爲門爲殿天子之命顯應孔昭萬艘安行五兩蕭蕭水之爲波乃氣之浡以理平之微于絲忽上達九天下通九淵將軍所屆其雲沛然吏走民奔擊鮮進旨鼓鐘谹谹將軍歆此天子甚聖百神是懷滌江障海萬福具來海會菴放生河碑銘金剛經云應無所住而生其心夫生其心亦無所住而已無所住則生卽無生也此法也不取法乃非法也不取非法乃非非法也如此者心之量一切具足包括天地通徹古今聖人愚人善禽惡獸如大海中浮漚大空中飛塵場焰皆吾心之量所攝受順其生死則道通逆其生死則道窒是故無生之法以有生爲用有生之法以生生爲用無生者性之域有生生生者情之倪此大雄氏所以重能仁而楞伽經必以斷殺爲入門第一義諦也嗚呼四生在天下至水族之愚可謂極可悲憫矣而世反輕殺之何哉蘇帝好生極天地殺害生者全生生橫目之民其夀康近自輦轂周環瀛觀物無始互啖食㫄及羽介兼毛鱗至仁惻然不忍言誰徹砧俎袪羶腥其中救一德千萬千萬億命皆圓成公奉德意治江介欲挽殘餮歸淸湻放生之河偶事蕆爲琢貞石垂休銘劉先生祠堂壁銘幷敍敬嘗讀史記倉公傳切辨聲色審經絡藏府皆攝心專氣之言而扁􅍎傳言長桑君趙􅂤子虢太子事殊怪偉不可訓倉公學扁􅍎者也何不同若此哉蓋天下之至神皆天下之至精者也神者不可傳精者可傳倉公傳扁􅍎之精者也唯精者可以至于神其生也岀明入幽如扁􅍎傳所言是矣而其死能出幽入明或食于一鄕或食于一郡一縣或食于天下或時驗或時不驗蓋視其生之時心解之麤密氣用之强弱而應之吾常所祀劉先生雲山者名朝宇江陵人以醫行江淮閒不遇去之都益不遇去之保定遂死死之後見神于常爲人治病多愈常之人事之已百年矣乾隆之五十一年敬遊太原得胃疾脘時張欲裂夢色揚而髯者進飮覺暴下下數日已巳後復下時下時已幾一年而疾除入都以語常之人常之人曰此劉先生也後五年敬還常拜先生祠而銘其壁焉銘曰世之人用心之靈如耳目之聰明以形爲之扄用耳目之聰明如手足之運行以物爲之程故以之爲道不至而爲術不成耳目手足皆腐者也心如耳目手足而欲死而有知此元氣之所不能已乎哉盍觀之先生無錫宣頴達麗中吳縣徐敦仁愛杉同校重刻脈經序晉王叔和脈經十卷隋書新舊唐書宋史各經籍志皆有之此本爲明萬厯三年福建布政司督糧道刋本有袁表後序其卷首列宋熙甯元年國子監博士高保衡等請鏤板劄子並校正及進呈各銜名次列廣西漕司重刻陳孔碩序次列元泰定四年江西龍興路重刻移文并柳謝縉翁序葢此書前後凡四刻矣各序皆斥五代高陽生脈訣歌援勦經說粗工便之致此書傳習不廣此醫學所以日陵夷也袁表後序言第十卷錄載手撿圖二十一部而卷中止復論十二經脈奇經八脈三部二十四脈無手撿圖高保衡劄子言俗本有二其一分第五卷爲上下卷其一入隋巢元方時行病源一卷爲第十卷意者本經第十卷手撿圖已亡後世據所見或分第五卷或入元方書以足十卷之數歟若是則今之第十卷亦高保衡所改定非本經原文也菽原朱君世藏此書沈南昌重刻行世移卷首徐中行書附之後序之左以從時世并於十卷錄下删夾注十二行以註意見後序中不應復列也若夫是書之精微博大足以發軒岐之奥窔通天地之門戸則四刻各家具言之學者可得其要領矣誦芬錄序敬於歸安鄭柳門先生爲年家子先生就養星子折行輩交之甚引重也敬每脩起居先生諄諄以所輯誦芬錄命之序後敬居南昌先生以書促之敬禮不敢辭誦芬錄者錄榮陽鄭氏自浦江遷歸安諸先正之言行也古者譜牒之學以明世系定昭穆爲宗後世稍褒集嘉言善行以附益之於以章前功訓後嗣如史書所載英賢錄官族傳是矣然多出著述家非子孫之言若李繁鄴侯家傳韓忠彥魏公家傳王皞沂公言行錄雖出子孫又止一人之事而已惟明粲明氏世錄崔鴻崔氏世傳則通記一姓之人誦芬錄之體例葢視乎此而所錄言行則以遷浦陽之後爲限斷焉浦陽自南宋以孝友傳家垂數百年義門之名滿天下本源深固支派蕃衍其分散遷徙者俱守義門家法以長其子孫歸安於浦陽分居浙東西風氣相及是以錄之所載大者至兄弟爭死名動萬乘小者推財讓能有益於人以及守一術之微勤一事之細類皆有長者之意不愧其先可謂善矣使鄭氏子孫有得乎此可善其一家若天下士大夫能推而行之相勉以和相厲以節其所成未以可意量也若是則先生之爲此書也其意不甚盛歟敬鄭之所自出系自歙爲南祖之裔與浦陽自北祖者不同然皆望滎陽舅氏淸如先生家法恂謹敬少時私淑焉故敬於是書樂附名其間且推闡之如此嘉慶十九年十月旣望陽湖惲敬序十二章圖說序古者十二章之制始於軒轅著於有虞垂於夏殷詳於有周葢二千有餘年東漢考古定制厯代損益皆十二章亦二千有餘年可謂備矣中間秦王水德上下皆服袀元西漢仍之隔二百有餘年是以諸經師不親覩其制多推測摹擬之辭然搜遺祛妄各有師承考古者必以爲典要至厯代輿服志具載不經之制而冕弁服則兢兢然不忘乎古焉其大臣議禮之說多可采者是故言史不折以經不安言經不推以史不盡也敬自束髮受書頗窺各家禮圖得失今上采箋註下揆史志爲十二章分圖若干合圖若千厯代圖若干附其說於後世之君子其有以是正之則幸矣古今首服圖說序古者有冒有冠有纚纚者所以韜髪也士冠禮緇纚是也纚之變爲幘幘之覆爲巾巾之變爲幅巾爲帢三代加冠於纚後世加於幘若幅巾帢則不加焉帢之變爲葛巾幅巾之變爲幞頭常冠也幞頭之變爲翼善冠自纚至翼善冠凡八物皆非冠也而幞頭翼善則冒冠名焉冠者冠也冠於紒也冠之別一曰緇布冠太古冠布齋則緇之是也一曰元冠周委貎殷章甫夏牟追皆元冠也一曰爵弁士冕也周弁殷冔夏收皆爵弁也一日冕夏后氏收而祭商人冔而祭周人冕而祭皆冕也一曰皮弁三壬共皮弁素積是也一曰韋弁凡兵事韋弁服是也自緇布冠至韋弁凡六物皆冠也而名皆別焉冒者冒也涌典上古冒皮冒之名所繇起是也其制先於冠冕後世庶人無爵者服之北魏朝臣皆服便乘騎也江左君臣則私居服之夫三代之時爲制備矣而首服益嚴觀禮經記載其用劃然者也自漢以後士大夫喜趨於苟簡三代首服之制以意增損之增損旣久與古全乖其燕間所服更無故實牽彼就此以古合今故禮圖所繪不能無失敬考各家經注及史傳參伍始終錯綜正變爲圖說若干卷冠之􅀋從冠以著其儀纚之􅀋從纚以推其等冒之類從冒以盡其便立乎千載之後以言乎千載之前豈敢謂出於盡是然浮假之說歧雜之言則不敢及焉若夫朝祭之用則經史具有明文考古者可自得之矣堅白石齋詩集序靜樂李石農先生爲詩四十年少卽遠遊不遑息曰行行草官西曹曹有白雲亭曰白雲初稾分巡溫處二州曰甌東集提刑雲南曰詔南集謫迪化州曰荷戈集分巡天津曰七十二沽草堂吟草提刑廣束曰訶子林集合爲堅白石齋詩集若干卷陽湖惲敬爲之序序曰言詩於今日難矣哉古近之體備於唐唐之詩人葢數十變焉宋較之唐溢矣亦數十變焉元較之宋歛矣且屢變焉明較之元充矣又屢變焉本朝順治中詩贍而宕康熙則適而遠雍正則瀏而整夫積千數百年之變而本朝諸名家復變焉於是自乾隆以來凡能於詩者不得不自闢町畦各尊壇坫是故秦權漢尺以爲質古山經水注以爲博雅犛軒竭陀以爲詭逸街彈春相以爲眞率博徒淫舍以爲縱麗然後推爲不蹈襲不規摹是故言詩於今日難矣哉夫詩有六義焉兼之者善也其不兼者必有所偏至而詩之患生焉六義者天下人之性情也性情者給於萬事周於萬形故得性情之至者六義附性情而各見於詩雖合古今而契勘之何虞乎蹈襲何畏乎規摹哉且夫性情者撢之而愈深窒之而愈摯者也石農先生自髫年及於中歲室家之近羇旅之遠科名之所際仕宦之所値多處憂患之中卽偶有恬適之時亦思往念來不可終日其匈中鬱然勃然之氣悠然繚然之思要以皭然􅃀然之志而又南極滇海西窮􅄥氾久畱幽燕冠葢之塲遠託吳越山水之地故其爲詩淸而不浮堅而不劌不求肆於意之外不求異於辭之中反覆以發其腴揉摩以去其滓何也性之至者體自正情之至者音自餘也今夫思婦之朝吟必長無律呂以節之而未嘗無抗與墜也感士之夜嘯必厲無聲韻以限之而未嘗無調與格也伯奇行邁之篇簡子憂心之什北山之所怨尤何人斯之所刺詈采葍之孤行弋鳬之獨往揆之皆閎雅之體詠之皆唱歎之音此性情爲之也使彼數詩人者爲遊歌之作燕喜之章何嘗不鏘然如韶鈞蔚然如虎鳳哉是故愁苦可以遣懷歡娛亦可以致感知此者可以讀堅白石齋之詩矣敬於身世之遇未至如石農先生性情亦淺薄無所施惟有生以來不可釋不可言之隱未必諒於他人者有同􅁣焉故因論詩發之且以質於能詩之君子香石詩鈔序敬在江右交順德黎仲廷十年仲廷棄官歸嶺南旋復遊吳越過江右與敬會于百花洲甚相樂也仲廷篋中攜香石詩鈔四卷淸瀏蕩漾遠具勝情於是始知香山黃子實之名而子實之友番禺張子樹陽春譚子晉之詩亦得次第讀之子樹之詩高邁子晉之詩渾逸翁覃溪學士目爲粤東三子者也及敬過嶺首與子實定交始知子實尊甫仰山先生以儒名而先世雙槐粤洲泰泉三先生在明之中葉皆爲儒立朝居家具有風範子實持身亦甚謹不背其先人則又歎黃氏之多賢而子實之能繼其門地也夫聖人之道惟爲儒者可言詩三百篇爲體不同合之易書禮春秋諸經其義無以異也後世爲儒者詩多質勝文詩人則文勝質兩家遂不能相通卽如粤中白沙甘泉之詩世所謂不爲道學所掩者而於近今詩人之意已不能厭飫况其他哉昔仲廷嘗和陸子朱子鵞湖講學詩敬吿以言心性不必爲詩卽爲心性詩不必學陸子朱子此詩葢皆爲此今子實世爲儒善矣而詩又善詩人之詩也由於其爲學也儒與詩分而習之故其爲詩非猶夫爲儒者之詩也夫道一而已矣然必分習之而後得其合故儒可以揚道之華而詩可以旣道之實能如是庶幾通儒與詩兩家之蔽焉請訊之子樹子晉及粤東諸君子若仲廷則夙以鄙言爲不謬者也聽雲樓詩鈔序粤東之詩始盛於南園五先生王彥舉題其集曰聽雨黃庸之搆聽雪篷而題其集曰雪篷葢詩人于蕭閒寥􅞔之時多所􅁣寄故名之如是番禺張子樹題其集曰聽松松之於雨於雪則有間矣其爲蕭閒寥閴則一也陽春譚子晉題其集曰聽雲敬嘗訊之子晉曰此幻也噫天下孰爲幻孰爲非幻哉則請爲子晉畢其辭夫聖人之作也必正名百物焉自百家出而夢可言覺覺可言夢者有之生可爲死死可爲生者有之卵有毛丁子有尾白馬非馬臧三耳皆此說也古人有言爲兩耳甚易而實是也爲三耳甚難而實非也至佛氏之書沿之而音可觀林木可聞焉未已也自文人沿之而天可問風可雌雄焉自詩人沿之而雲可養日月可沭浴焉近世且有以聽月名者若是則子晉聽雲之說何獨不然雖然雲之中萬籟未嘗息也則所聽者非雲也葢淺之乎言聽也夫天下之動者必有聲形與形値則有聲氣與氣値則有聲形氣相値則有聲雲在形氣之間而動者也夫人之耳不可執不可恃也蟻動而以爲牛鬥蜻蝏翼而以爲曳大木震雷發乎前而聾者不聞使䚦俞師曠之徒側耳於氤氳變滅之中必有如水流之翛然如火炎之爆然者矣若是則子晉聽雲之說何獨不然然而聖人必正名百物者何也爲兩耳甚易而實是也爲三耳甚難而實非也是故爲詩必言其易與是者勿言其難與非者焉知此則唐宋元明諸詩人之大小得失見矣說文解字諧聲譜序本朝言韻學者數十家而顧氏炎武􅆟著其古音表析唐韻二百十部而類從之爲十部字以從韻之部諧聲以定韻之字而古音復明江氏永古韻標準之祖禰也江氏析爲十三部後段氏玉裁復析爲十七部其言時時反攻顧氏以自見其學然綱而紀之笵而圍之者顧氏也吾友莊述祖寶琛析爲十九部以小篆寫之寶琛未竟其業屬之張惠言臯文復析爲二十部臯文寫畢復之寶琛題曰說文諧聲譜以小篆皆用許氏原書不增減也敬桉說文卽五百四十部之文解字卽九千三百五十三之字改題曰說文解字諧聲譜而爲之序序曰昔者先王虞書名之淆也于是設官以達之書者有形者也其一之猶易也名者無形者也無形則差數生而一之爲難臯文此書書宗許氏於書蓋顜若矣而名則以顧氏爲大凡後世之音悉排之所趨可謂正矣雖然脣齒之差父不能得之於子焉宮徴之易君不能强之於臣焉輕重相承疾徐相生毫釐之間可以千里况廣之以四海引之以千古哉是故聖人之作爾雅也廣輪之變曰釋言山河之隔都鄙之囿是也古今之變曰釋詁歲月之積時代之遷是也其不變者聖賢所錄方策所傳别之曰釋訓經語史論以義爲重故無所變焉夫釋言之文音之以橫被者也後世於是有方言之書釋詁之文音之以從貫者也後世於是有古今韻之書方言之變有窮而古今韻之變無盡故言韻者必以別古今韻爲要領而方言從之縱得而橫自序之義也夫周公孔子大聖人也子夏諸儒大賢人也而釋言釋詁所收如是未嘗尊雅而屏俗揚遠而抑近也是故言韻者以廣取爲宗用韻者以適時爲大易之韻歸之易詩之韻歸之詩秦漢之韻歸之秦漢唐宋元明之韻歸之唐宋元明爲繇爲頌爲箴吾以從乎易焉爲誄爲銘爲四言詩吾以從乎詩焉爲騷爲賦吾以從乎秦漢焉爲五七言詩吾以從乎唐宋焉爲詞曲吾以從乎元與明焉若夫成一家之絶學求前人之墜緒開後來之精識臯文此書之所得蓋有末易幾及者學者能潛心於是則書與名之學其亦庶幾焉也已戒旦圖序秦臨川以戒旦圖寫眞見示爲女曰鷄鳴說序之此詩漢唐宋諸儒之說不同者三其一序主刺朱傳主美變風雅中朱傳多持此論雖然刺詩有可美者焉魚藻之義是也美詩有可刺者焉佩玉晏鳴關雎刺之是也是在讀者自得之而已其一鄭箋主士大夫朱公遷主士庶人按首章言弋鳬與鴈士大夫亦爲之次章言琴瑟靜好末章言雜佩贈之問之報之此非庶人之事也當以鄭箋爲長其一宜言飮酒與子偕老鄭箋主燕樂賓客朱傳及宋人多以夫婦言之按首章言子興次章言與子末章言知子無歧義也當以朱傳爲長知此三義則詩說與臨川此圖皆可比附焉夫是詩言夫婦各治其事以相和樂而以親賢友善爲保其和樂之本陳義可謂高矣乃毛傳必推之間於政事何哉蓋古之君子上則先國後家下則先民後已先國後家則大倫舉矣先民後已則庶事治矣是故論所操之本末則自身而家而國而天下論所權之輕重則天下重於國故王朝之事先於諸侯國重於家故諸侯之事先於士大夫不問於政事則和樂室家者皆非君子之事也毛傳故推本言之歟臨川自筮仕至令大邑勤勞安靜於所謂先國後家先民後已者兢兢惟恐失墜而其孺人復能輔相焉若臨川者其可以和樂室家者也至末章之義則近致者贈之遠託者問之先投者報之蓋耽於色者必不說於德和於內者必能宜於外是以卷耳之詩及於官人而此章於朋友之際唱歎往復至於如此臨川不妄交交必有道其亦有得於詩所云者乎􅀂臨川者其可以保其和樂者也敬與臨川相處以誠以禮故能知之詳而深信之遂書於圖之後使兩家子姓不忘斯義焉吳城令公廟壁記吳城令公廟者唐御史中丞副河南節度使張公巡之廟也稱令公者自唐之中葉節度使累加中書尙書令其下皆以令公稱之如六代之稱令君後遂爲節度使之稱也明太祖皇帝與陳友諒戰於鄱陽湖得神助歸靈於公封公爲安瀾之神有司以春秋祀至今幾五百年矣漢魏至唐祀宮亭神在湖北之神林浦宋祀順濟王在湖南吳城山之左今祀靖江王在湖中央左蠡山而公之廟在順濟王之右東南北三面臨湖自大門儀門至寢殿凡三成高五十級爲巍煥焉方友諒窺江西劉齊朱叔華趙天麟等皆死之而趙德勝鄧愈力守洪都以待救至是時浙西及吳東屢失屢復安瀾神之祀其諸爲守臣勸歟考舊唐書李翰等論公蔽遮江淮沮賊勢天下所以不亡此猶以功伐言之耳公之告令狐潮曰君未識人倫焉知天道君臣者人倫之首也守官者死官守土者死土公守睢陽六萬人死亡盡不汙賊則六萬人皆人倫中人矣降固非人倫走亦非人倫之至也且走則江淮以南必有屈於賊者不走則關陜河洛聲應氣接各效馳驅而人倫大明於天下豈止睢陽六萬人哉人倫明則天道自定千萬世忠義之士未有不與天地爲一者也敬嘗修祀事於廟故推論之以告後之有志者焉瑞安董氏祠堂記敬前在浙中登胥山遇泰順董正掦睂伯後於江右章江門舟中復遇之意甚相得也及居百花洲睂伯自大庾來朝夕過從睂伯以六世祖龍溪先生祠堂記請焉先生諱應科明諸生國變後坐卧一小樓者二十餘年其時嘉興徐節之先生以避地來隱縣之天闕山相去五里許兩人皆汐社遺老而不往來不通書問至今稱城南兩先生而已董氏子姓以高節推龍溪先生爲別祖爲祠堂祀之所出皆祔凡爲門若干楹堂若干楹乙丙舍若干楹如功令祠堂式昔有明之季吾鄕鄒衣白先生之麟亦終身坐卧小樓隱於書畫而吾宗衷白先生厥初閉戸不通賓客隱於禪其心皆皭然可白於天下者也本朝於前明諸死事之臣與專諡通諡者三千餘人皆有官守言責亡軀湛族者也而􅂽遐榛莽之中引義不屈又多如此可不謂難能而可貴歟然非本朝激揚忠義羣有司奉行得其道諸君子又甯得宴然而爲此歟是故在下可以觀節在上可以觀政也節之先生諱與齡黃石齋先生主浙江考時所取士也睂伯言泰順志逸其事矣子孫何如睂伯至浙中當一訊之嘉慶二十年三月朔陽湖惲敬記陳白沙先生祠堂記新會小廬山下有白沙先生祠卽舊宅也先世居仁會里至先生始遷小廬山大門之外有石坊曰母節子賢次曰貞節堂吳康齋先生爲林太夫人所題也次爲享堂次曰碧玉樓貞節堂碧玉樓名皆始於先生其宇則子孫所葺治也同年李君巽宇宰新會以修祠未有記令子弟導敬謁祠因記之如右有明以來言學者人人殊矣然未有不致愼於五倫者虞書曰敬敷五教在寛中庸曰天下之達道五所以行之者三孟子曰人倫明於上小民親於下聖賢教人如此而已先生自正統十二年舉於鄕十三年赴會試景泰二年亦赴會試後更十五年至成化二年始赴會試此何爲哉蓋明代宗之立所以守社稷也於義本甚正然英宗歸而錮之南內則君臣之禮廢而兄弟之恩絶矣易太子則父子之道舛矣至英宗復辟輔之者幾如行簒焉於是而君臣父子兄弟之倫不可復明遂成一攘奪之天下嗚呼此先生之所以不出也憲宗則序宜立者也故先生復出焉魯定公從亡於乾侯後昭公薨季氏扳而立之與明代宗英宗不同故孔子不仕於陽貨執政之時而仕於季斯悔禍之日若先生則非止避徐有貞石亨也人倫明而後道學正故先生爲大儒李君其以示新會之人且俾先生之子孫咸喻於此義亦教訓正俗之要也嘉慶二十年十一月朔後學惲敬記重修松竇菴記敬始至瑞金卽聞有松竇和尙者在本朝初年以詩名嶺南北求其詩讀之蓋灑然有以自得焉及見黎參議所爲塔銘始知和尙初習禪觀於縣東之烏華山得法後縣人營招提以居之環院宇橋道種松千萬樹其山巖谷深奥日月如竇中仰視故名之曰松竇敬心向之而未得卽往也後陳茂才雲渠來談縣西山水之勝皆遠在數十里外以暑不及遊因同遊縣東之松竇陟岡繞澗盤旋於陂陀曲折中意境頗幽寂可喜及望見烏華之麓則偃仰者不過三五樹餘者久摧爲薪其院宇橋道亦􅂽落矣淸澗者名悟增和尙之三傳弟子也性淸苦亦爲詩寄居南塔寺聞敬遊松竇請復住持而田屋皆已廢斥州司馬楊家騂茂才楊國芸等悲淸澗之志請於敬謀之數年用公使銀葺佛殿及寮房贖其田歸之而淸澗復住持松竇敬時已去瑞金矣喜淸澗能繼其師而諸君子不廢古昔爲嶺南北勝事雲渠聞之當亦快然撫掌作再遊之計也遂記其始末如此松竇菴後記松竇山施於顧廷舉其佛宇衆善成之今存者已葺治其頽廢者附記名題及閒架於左方庶後有能復之者焉常住田皆開山時所買後廢斥未贖者四十一畝已贖者三十五畝亦附記於左方䕶生居三楹有左右廂各一楹田寮東三楹西三楹廚房三楹右共屋十四楹在烏石山下見存大殿三楹殿東怡雲室三楹卽方丈殿西齋堂三楹廚房三楹石香樓五楹殿前甘露閣三楹殿後嶺上藍浮亭左下古月臺右共屋二十楹亭一臺一在烏石山上雍正十三年燬於火民田四十一畝租四十五石右楊姓民田康熙十二年十四年前後買至乾隆五十六年僧達念峻山空階眞皎空仲出賣未贖軍田二十五畝右羅姓軍田康熙十五年頂畊乾隆五十七年達念等出退已贖囘軍田十五畝右乾隆二十四年僧繼慧報墾乾隆五十七年達念等出退已贖還嘉慶十八年八月初八日知瑞金縣惲敬記望仙亭記谷鹿州之東接京家山陂陁峛崺具隈蔚之勝其陽爲觀祀純陽眞人相傳爲宋丞相京鏜舊宅曾有眞人之跡焉住持孫霖因之爲望仙亭亭之址高五尺亭爲再成登之西望江北望羣山東南望則高天下垂行雲無極而已亭之下爲脩廊廊之西爲室如舫舫之西復爲亭篔簹之淸樅檜之嚴楓柳之森疎華之動搖皆若環而侍於望仙者甯化伊墨􅀸太守過而樂之書其􅎝㮄陽湖惲敬爲之記道家之說老子列子莊子所言釋氏之先路也一變而爲徐福欒大再變而爲張道陵三變而爲陶宏景葛洪四變而爲宼謙之杜光庭五變而爲張伯端邱處機然後復歸於釋氏若純陽眞人求之縉紳先生之撰述未嘗言其學於釋氏也而釋氏必牽挽之道家亦以釋氏日尊以爲吾之師亦有其說學術之弊始則妄相別異終則詭相附託歧之中復有歧互之中復有互九流皆然不足怪也雖然純陽眞人固道家所謂得仙者也昔漢武帝讀大人賦飄飄有凌雲之氣謝仁祖企脚北窗下彈琵琶有天際眞人想李供奉可與神遊八極之表如是則斯亭之上所謂西望江北望羣山者其有御風而過之者耶所謂高天下垂行雲無極者其有翺翔而往來者耶若京鏜之生平眞人必聞聲覽氣而􅄩去之以爲有其蹟者當時之讆言也是故五倫之道忠佞邪正之辨千古如一無所謂岐與互焉艮泉圖詠記步􅀩子獨立元覽超然止於浮山之阿浮山者南越志稱浮水所出故名浮與羅山共體故曰羅浮是也徐道覆始有會稽浮來之說袁彥伯以爲蓬萊三島此其一焉艮泉者在浮山山背步􅀩子始搜得之名之曰艮泉山志􅓬布九百道所未及也羅浮四百三十二峯十五嶺七十二石室步􅀩子闢艮泉而廬之如山中梅花千萬樹見爲花之一房而已然一房之中或爲焉或爲萼焉或爲英焉是故曰楓臺曰修篁徑以物名曰砥行巖曰養正廬以行名曰調琴石曰趺霞處曰代葦舟以事名曰琉黎潭曰游龍澗曰雲梁以想名而滙􅓬亭仍以艮泉名夫山可浮九天九地何所不浮泉可艮九天之上九地之下何所不艮􅀩之叟曰昔者莊周夢爲蝴蝶栩栩然蝴蝶也俄而覺蘧蘧然周也不知周之夢爲蝴蝶與蝴蝶之夢爲周與夫艮泉固花之一房也而山中之千萬樹自在也步􅀩子遠矣於是古山道人輾然手其圖而起繼諸君子之詠以賡之焉遊廬山記廬山據潯陽彭蠡之會環三面皆水也凡大山得水能敵其大以蕩潏之則靈而江湖之水吞吐夷曠與海水異故並海諸山多壯鬱而廬山有娛逸之觀嘉慶十有八年三月已卯敬以事絶宮亭泊左蠡庚辰檥星子因往遊焉是日往白鹿洞望五老峯過小三峽駐獨對亭振鑰頓文會堂有桃一株方花右芭蕉一株葉方茁月出後循貫道溪厯釣臺石眠鹿場右轉達後山松杉千萬爲一桁橫五老峯之麓焉辛已由三峽澗陟歡喜亭亭廢道險甚求李氏山房遺址不可得登含鄱嶺大風嘯於嶺背由隧來風止攀太乙峯東南望南昌城迤北望彭澤皆隔湖湖光湛湛然頃之地如卷席漸隱復頃之至湖之中復頃之至湖壖而山足皆隱矣始知雲之障自遠至也於是四山皆蓬蓬然而大雲千萬成陣起山後相馳逐布空中勢且雨遂不至五老峯而下窺玉淵潭憇棲賢寺囘望五老峯乃夕日穿漏勢相倚􅀒返宿於文會堂壬午道萬杉寺飮三分池未抵秀峯寺里所卽見􅓬布在天中旣及門因西瞻靑玉峽詳睇香爐峯盥於龍井求太白讀書堂不可得返宿秀峯寺癸未往瞻雲迂道繞白鶴觀旋至寺觀右軍墨池西行㝷栗里卧醉石石大於屋當澗水途中訪􅂤寂觀未往返宿秀峯寺遇一微頭陀甲申吳蘭雪攜廖雪鷺沙彌朗圓來大笑排闥入遂同上黃巖側足逾文殊臺俯玩􅓬布下注盡其變叩黃巖寺跐亂石㝷􅓬布源溯漢陽峯逕絶而止復返宿秀峯寺蘭雪往瞻雲一微頭陀往九江是夜大雨在山中五日矣乙酉曉望􅓬布倍未雨時出山五里所至神林浦望􅓬布益明山沈沈蒼一色巖谷如削平頃之香爐峯下白雲一縷起遂團團相銜出復頃之遍山皆團團然復頃之則相與爲一山之􅆎皆弇之其上下仍蒼一色夫雲者水之徵山之靈所洩也足以娛性逸情如是以詒後之好事者焉遊廬山後記自白鹿洞西至栗里皆在廬山之陽聞其陰益曠奥未至也四月庚申以事赴德化壬戌侵晨沿麓行小食東林寺之三笑堂循高賢堂跨虎溪卻遊西林寺測香谷泉出大平宮漱寶石池甲子渡江覽湓口形勢乙丑返宿報國寺大雨溪谷皆溢焉丙寅偕沙門無垢藍輿曲折行㵎中卽錦㵎也度石橋爲錦繡谷名殊不佳得紅蘭數本宜改爲紅蘭谷忽白雲如野馬傍腋馳去視前後人在綃紈中雲過道旁草木羅羅然而㵎聲淸越相和答遂躡半雲亭睨試心石經廬山高石坊石勢秀偉不可狀其高峯皆浮天際而雲忽起足下漸浮漸滿峯盡沒聞雲中歌聲華婉動心近在隔㵎不知爲誰者雲散則一石皆有一雲繚之忽峯頂有雲飛下數百丈如有人乘之行散爲千百漸消至無一縷蓋須臾之間已如是逕天池口至天池寺寺有石池水不竭東出爲聚仙亭文殊巖巖上俯視石峯蒼碧自下矗立雲擁之忽擁起至巖上盡天地爲綃紈色五尺之外無他物可見已盡卷去日融融然乃復合爲綃紈色不可辨矣返天池口東至佛手巖行沈雲中大風自後推排雲氣吹爲雨灑衣袂蹊坐昇仙臺拊御碑亭雲蓋重至半雲亭日仍融融然耳無垢辭去遂獨過鐵塔寺而歸天池之雲又含鄱嶺神林浦之所未見他日當贏數月糧居之觀其春秋朝夕之異至山中所未至亦得次第觀覽以言紀焉或有發前人所未言者未可知也舟經丹霞山記自南雄浮湞水而下過始興江口岸山皆卑扈無可觀行六七十里忽舟首橫土岡數重岡趾相附錯岡之背見大石磊落列天際其氣酣古偉岩在十里外登岸望之有平爲嶂者穴爲岫者重爲巘者沓爲崑崙者立爲厓者俯爲巖者心樂之而無徑可往遂返舟舟行附錯之岡趾間迴旋而達石時見時不見於是有始爲嶂而如岫者始爲巘而如崑崙者始爲厓而如巖者其復爲嶂與巘與厓亦如之行數里出岡趾石不復見水繞沙如半環一灘斗落前有峭壁橫截焉舟人放溜恐觸壁以繂逆挽其舟逶迤投壁下故得從容其境頃之壁盡而向之石復見石之下皆石岡也二大厓爲之君過大厓則石峯相累而下控於地自大厓囘望石岡舟向厓而近則石岡爲厓蔽如歛而促舟背厓而遠則石岡如引而長異境也敬聞韶有韶石山虞舜南巡奏樂於是以爲是山之奇勝足當之矣及至州按圖經乃仁化之丹霞山也韶石山在其西益奇勝不可狀夫聖人之心華􅃉鴻遠包孕天地豈若拘儒之規規者哉洞庭可以見天地之大韶石可以見天地之深敬觀於奏樂之地可以推黃帝虞舜之性情矣洞庭前十五年過其東韶石未至蓋先於丹霞山遇之焉遊六榕寺記東坡先生過陽羨書周孝侯斬蛟之橋敬在常時往求遺蹟橋已易名廣濟先生書石刻藏之敗屋中矣過嶺求六榕寺遺蹟先生書懸門之􅎝寺亦易名淨慧廣濟淨慧於先生所名不待智者能决其得失而世人必易之何也六榕已久廢無存院宇爲諸沙門障隔成私寮牆壁縱橫階徑迂曲無可遊憇其舍利塔重建於宋與明頽陋甚先生所書永嘉覺證道歌共四碑面陰皆刻之一碑在塔之左餘三碑不知沒何所可歎也敬前與石農亷訪飮六榕山房語及先生此書後數日過光孝寺天雨新霽望舍利塔浮浮然遂與定海藍􅆢政及二沙門往遊不謂敗意如此東坡先生年五十九以謫過嶺敬休官後至此亦五十九文質無所底於先生何能爲役而石農廉訪擁傳來年五十八方以風節經濟文章自厲求所以不愧古人者若是則六榕山房之必傳於後如六榕寺無疑特未知世人所以易之者又何如耳蓋天下是非成毁之數君子所不能爭亦必不爭而其可信者自在皆如此也同遊海幢寺記順德黎仲廷善琴而嗜於詩與海幢寺沙門江月爲方外之交海幢寺者長慶空隱和尙經行道塲也在珠江南壖西引花田北東環萬松嶺爲粤東諸君子吟賞之地敬至廣州樂其幽曠嘗獨往焉八月之望與仲廷飮於靖海門之南樓隔江望海幢如在天際意爲之灑然仲廷遂邀同志於後三日集於海幢是日至者皆單衫靑鞵蒲葵扇其齊紈畫水墨數人而已南村麥學博鼓大琴爲關睢塞上鴻之操鳳石鍾孝廉以樂書吹笛定其􅁌敬獨卧江月房仲廷起之與蒼厓黃提舉聽雲譚孝廉聽焉而靑厓梁中翰與隱嵐呂明經碁於側若不聞者人心之用固如是歟灃浦謝庶常創意畫元人六君子圖立大石主之其仲退谷上舍及東坪伍觀察墨池張孝廉小樵何上舍香石黃明經爲點筆渲墨隱嵐棊罷亦有事焉灃浦謂石庳不足主六君子退谷增之及㝷丈文園葉比部與其仲雲谷農部謂宜歌以詩於是在坐者皆爲六君子詩且侑之以酒何衢潘比部後至亦爲詩皆性之所近也仲廷香石遂訊子居爲遊記柟山張孝廉書之幀首期後日刻石於方丈之壁間江月空隱下第九世也空隱一傳爲雷峯禔再傳爲海幢無海幢無整齊如百丈靈雋如趙州汪洋如徑山國初龔芝麓王漁洋諸人俱共吟賞焉夫士大夫登朝之後大都爲世事牽挽一二有性情者方能以文采風流友朋意氣相尙至枯槁寂滅之士無所將迎搖憾故嘗有超世之量拔羣之識如海幢無者蓋佛氏上流敬爲儒家言數十年惜乎未得生及其時與之掃榻危坐各盡其所至也遊羅浮山記羅浮山之以致勝者也如見荀奉倩劉眞長諸人如讀張文昌詩如觀王叔明畫山南氣蘊藉如廬之龍眠山山北氣峭蒨如杭之龍井山峯必有泉泉必有谷則二山所無也􅓬布以黃龍洞爲最二泉源于山頂重叠走樹石間至黃龍斗落數十丈而交于山之足其東谷復有一泉勢足相敵惟廬山􅓬布􅀡下羅浮稍迤邐之爲不同耳西爲浮山東爲羅山遊者山南由浮入羅曰龍華寺曰華首臺曰黃龍洞曰延祥寺曰寶積寺曰白鶴觀復東繞山至北由羅入浮曰冲虛觀曰九天觀曰茶山菴曰酥醪觀皆釋老之宮也樹與石甚勝其附近名跡可一一㝷之大率前後不出五十里外爲是山瓤腴之地餘諸峯壑漸裹漸遠漸粗惡所謂羅浮五百里者統外山言之也浮山西南距海百里有畸羅山二百里有畸蓋廣東地勢廣州治已傅海而東地又邪入海中也大率地志山經常有所誇飾釋老二氏之書更多􅂽誕之言愚者往往爲所眩惑以古爲今以虛爲實其一二矯抗之士止求奇偉駭心目者以爲山水之至一邱一壑則委而去之此均非善遊者也三百篇言山水古􅂤無餘辭至屈左徒肆力寫之而後塊怪之觀遠淡之境幽隩潤朗之趣不名一地不守一意如遇於心目之間故古之善遊山水者以左徒爲始知此則羅浮之名動天壤幾二千年必有能得其故者矣敬畱山中十日所作詩無可觀若誇飾之說則未嘗附焉分霞嶺記羅山之北西接浮山有橫嶺高及千丈而盂頂曰佛子隩隩之南連岡叠巘如靑霞拍天左右䧪䧪然其上卽鐵橋也界羅浮二山如懸畛番禺張子樹易佛子隩之名曰分霞嶺於是遊羅浮者皆以分霞嶺目之嶺之背爲入浮山之徑有門甯化伊墨􅀸名之曰蓬萊門徑取徐道覆蓬萊左股之語也蓬萊門徑之內曰玉液亭爲義漿以濟行者亭無泉自南之􅆟高峯曲折數里以筧接渠引之滙爲池上爲濯纓池下爲濯足其側爲庲以煑茶酒蔬脯曰雲㕑玉液亭之右爲靈官殿爲土地祠玉液亭之左爲洞賓仙館祀純陽眞人曰天香室爲憇賞之所種木樨繞之而環分霞嶺種松桄楖梅及千萬樹樹雖稚氣已薄巖谷矣皆酥醪觀住持所營築也夫秦漢方士多鑿空之言而所謂神山玉京閬苑數千載之人如目遊如身踐今分霞嶺則朝夕可至者也諸君子一一名之後世其有未至而思旣至而樂以寤寐歌嘯之者耶住持名本源自號雲濤道人番禺人也茶山記自分霞嶺以西循浮山之陰入第一谷過小溪爲茶山道士曾復高祀王野人因名曰黃仙洞山中以野人傳者有三東晉葛稚川之隸一也其廬在冲虛觀之南南漢禎州㓨史黃勵二也其廬在水簾洞二人皆居羅山之陽唐處士黃體靚三也其廬在觀源洞居浮山之陽今茶山所祀東晉黃野人也始登多小石及山之半樹參天際大石間之隱隱聞瀑聲伫足䏲望白濤走樹間爲枝葉所障或見數尺或及丈落地北行卽前所過小溪也再登得小堂屋再成依厓立堂之右過石澗有瀑懸巖而下長數丈如雙練爲前樹間瀑之源谷􅆟深處也山中之洞大率皆谷耳而以洞名焉茶山􅂽寂杳深蹊徑犖确遊屐不恒至故能全其幽復高棄塵世來山中於山又取其如是者其意可尙也已茶山之西第二谷爲小蓬萊邃而曲第三谷爲艮泉曠而適皆有瀑數十道焉艮泉則步􅀩子黎君應鍾隱居也酥醪觀記茶山小蓬萊艮泉三谷之水滙爲大溪西南奔注曰下陂曰白水砦大溪之中阻與岡阜爲囘合而酥醪觀翼然臨之葛稚川北菴也楹牖廉廡甚飾其樹多松大者數十圍其竹多篔簹龍鍾其花多木芙蓉木犀其鳥多謝豹搗藥鳥時有五色雀集仙傳云安期生與神女會于元邱醉後呼吸水露皆成酥醪此廋詞也取之名觀不知所自始觀之東北隅有樓一楹香山黃子實名之曰浮山第一樓觀之外爲小築亦有樓敬入山居之七日名之曰八龍雲篆之樓觀之前有大坪坪之前有池池有紅白蓮住持度大坪將爲觀門左右益搆丹室焉浮山之勝會於雙髻符竹蓬萊三峯三峯之勝會於酥醪觀自酥醪觀過下陂背白水砦以登於麓羣峯擁之西至分水嶺卽浮山之外山矣蓋浮山東閾分霞嶺西閾分水嶺也復五十里至增城敬常薄暮過之城牒之上山俱作紺碧色山外落日如盤爲五色蕩之其時眞神遊八極之表矣嘉慶二十年九月癸丑陽湖惲敬記遊通天巖記巖岸也岸水厓而高者有垠堮者曰厓無垠堮而平曰汀是故巖岸厓皆際水者也其不際水者曰礹礹石山也通天巖不際水皆石山宜名礹而冒巖名者天下石山蓋皆冒焉巖在贛治西二十里敬自粤返與雩都牛君贛吳君往遊背城過迤岡復過欹嶺見通天巖沓諸石山之上縱橫偃仰不可狀其旁皆谿谷也山瀆無所通曰谿泉出通川曰谷望之益谸谸靑也循山脅行下水以屬于巖蘭若見於林中巖差池相次皆厂也蘭若充之厂人可居也厂之上盤盤然爲墮爲嶘爲崛斵佛像數十百橫爲行叠之甚敦古引而左宋以後諸題名襍鐫下復北而左過主巖巖益盤盤然南折而西有岫出巖背曠然也曰忘歸巖自忘歸巖返登主巖鑿石爲隥如大階以及于頂遠山皆見於羣巖之外小山岌大山大山宮小山小山別大山皆有之雲四塞下垂霆霓發於雲足乃反蘭若宿焉雨大至參飮於碓旁亦厂也二君語及柳子厚諸遊記敬以爲體近六朝未爲至凡狀山水莫善於爾雅而說文次之遂記之如右牛君安邑人吳君敬同縣人也子惠府君逸事金壇進士史悟岡先生所著西靑散記多記山中隱居及四方遊厯瑣事爲詩文性靈往復頗亦灑然其遊孟河則雍正十二年也敬幼侍先祖父子惠府君言先生自孟河偕巢訥齋惲甯溪來善飮酒能畫能作篆分書子惠府君鼓琴多古操卽受之先生者也散記中鄭痴菴常與先府君過從去先生遊孟河時幾四十年矣爲人頎長白須冉攜楖􅌴杖有出塵之表見敬嘗令吟詩時亦點定敬文則大笑稱快甚蓋其時天下殷盛士大夫多暇日以風雅相尙所謂非古之風發發者非古之車揭揭者未之有焉故悟岡先生及其友朋能自逸如此嘉慶十有八年十月戊申望吳城治西錫箔坊火北風大作焰參天際往南走太孺人望火道叩頭忽東風卷火壓山隅隅曠無人居火遂止所全迤南當火道者數百家時敬趨救火還治始知太孺人至懇反火道也太孺人慰勞旋告之曰汝知汝祖子惠府君之德乎往在有明之季七世祖敬於府君遷石橋灣之莊舍其㕔事悉以柟搆飾共九間而三分之乾隆六年四月壬寅㕔事火火初至家人皆避火子惠府君之祖母高孺人年八十矣挾宅劵坐黃荼䕷架中府君冒入屋下求高孺人不得三往始於架中得之􅀒孺人趨而出出而㕔事下頽皆燼焉後至三十八年東鄰火府君叩頭曰吾生平食祖德無不義財火頽牆焦柱矣而忽滅四十年市屋西鄰火亦如之今爲府君祠堂者是也敬思府君生平詆佛法不信鬼神而所感如是此可以觀天事矣前翰林院編修洪君遺事述君諱亮吉字君􅀡一字稚存唐宣歙觀察使宏經綸改姓洪氏子孫世爲歙人君曾祖璟大同知府祖公寀候選􅀡􅀠州州同贅於武進趙氏武進後分陽湖君爲陽湖左厢花橋里人父翹國子監生母蔣氏君生六年而孤家貧苦身力學由縣學生充副㮄貢生常槖筆游公􅀸閒節所入以養母母卒君時客處州弟靄吉不敢訃爲書言母疾甚促君歸君亟行距家二十里舍舟而徒方度橋遇賃僕之父仇三問得家狀君號踊失足落水中流數里汲者見髮颺水上攬之得人有識君者共舁至家久之方甦君以不及視含斂後遇忌日輒不食年三十五順天鄕試中式更十年爲乾隆五十五年會試中式賜第二人及第授編修充文穎館纂修官順天同考官督貴州學政貴州之士向經史之學爲歌詩有格法君有力焉皇上嘉慶元年充咸安宮官學總裁官旋奉旨上書房行走君初第時大臣掌翰林院者網羅人才以傾動聲譽君知其無成欲早自異遂於御試征邪教疏內力陳中外弊政發其所忌隨引弟靄吉之喪乞病假歸後高宗純皇帝升遐坐主朱文正公珪有書起之復入都供職君長身火色性超邁歌呼飮酒怡怡然每興至凡朋儕所爲皆掣亂之爲笑樂而論當世大事則目􅀡視頸皆發赤以氣加人人不能堪會有與君先後起官者文正公並譽之君大怒以爲輕已遂怏怏不樂君於是復乞病假行有日矣畱書上成親王并當事大僚言時事成親王以聞有旨軍機大臣召問卽日覆奏落職交軍機大臣會同刑部治罪君就逮西華門外都虞司羣議洶洶謂且以大不敬伏法君之友中書趙君懷玉見君縲絏藉稟坐大哭投於地不能言君笑字謂趙君曰味辛今日見稚存死耶何悲也頃之承審大臣至有旨毋用刑君聞宣感動大哭自引罪奏上免死戍伊犂明年京師旱皇上下手詔赦君在戍所不及百日自君􅀗罪至戍還文正公常調䕶之君與文正各盡其道蓋如此十四年君以疾終於家年六十四君娶於母黨長子飴孫舉人候選知縣次符孫次胙孫次齮孫君學無所不窺詩文有逸氣所著左傳詁十卷比雅十二卷六書轉注錄八卷漢魏音四卷乾隆府㕔州縣圖志五十卷三國疆域志二卷東晉十六國疆域志六卷詩文集若干卷行於時論曰敬與君同州君多遊四方未得見後敬居京師廢招提中君日晡攜大奴叩戸入曰聞子居在此攜斗酒隻鷄來飮食之不愈於他日酹墓地乎是年君官侍從數往來及出官貴州敬作縣江表至竟未一相遇然君於敬不可謂非深知異待也君之智力足以顚倒英豪激揚權勢獨於名義所在一心專氣以必赴之此非經生文士之所能企逮而惜乎所見止於如此然君不遇聖主受殊恩非伏鑕稟街則襲棺絶域矣吾州多異才敬於君尤爲惋歎焉前濟南府知府候補郞中徐君遺事述君諱大榕字向之先世自江陰馬鎭遷武進呂市橋遂世爲武進人曾祖允榮縣學生祖材國子監生父瓚新繁縣知縣從將軍溫福公􅁹大金川死木果木之難贈兵備道母楊氏君性縱達一切細行多不檢遇大富貴人兀奡臨之如無物者居禮席與少年塲無異興盡則跳去之補縣學生兩試落解遂入都充順天解額乾隆三十七年成進士補戸部浙江司主事旋擢員外郞轉郞中隨原任大學士李公侍堯讞獄湖北李公貴倨有大才而甚奇君才君由是知名君在部有勲家子爲侍郞年未二十以小事斥司官其事不必爭君睨之不發一語侍郞怒君表立益睨之侍郞無可置言起去君曰兒曹長矣不能如若翁待吾輩也同列皆大笑君逋不貲歲除􅆹事悉債家君衣冠出曰色寡人者入室坐錢則無且吾豈久􅀒若者遂鬨而散其玩世若此君雖起家掌計而讞獄最長其思無不入能平心察辭氣盤旋左右忽急赴指其情㑹出知萊州府平度州民羅有良者悍而詐伺其姊之夫張子布外出鬻其姊子布歸索婦鬥於室母庇壻趨救之有良拳子布仆地悶絶懼殺人罪遂蹴母腹下斃之大呼曰子布殺吾母吾報仇挩殺子布矣鄰人至而子布適甦方紛拏時子布不記已力所加格到官遂以殺妻母誣伏獄已具矣君閱原診腹下傷橢方曰吾訊子布跣足鬥而有良納鐵裹鞵今傷橢方乃有良蹴也時行臺省與州官爲首尾反劾君故出入落職下濟南獄君走所親訴之部純皇帝命大臣成之引囚入方嚴冬震雷發於庭聲訇訇數日不止有良盡吐蹴母狀事得白君復原官調知泰安府泰安縣民張培以張子宣爲子娶子婦已而以事積怒子及子婦漸不可解張文成等復間之遂手絞子並子婦磬之桑園以子婦與縣學生薛枝通事發夫婦就縊聞於縣縣如其辭讞之府君曰婦人姦敗死常耳其夫何爲且縊則傷入耳後手絞者無之易辨也移獄至府治之盡得手絞始末發棺診之皆手絞傷也出薛枝抵培等罪巡撫福甯公過府與君言大喜調知濟南府君旣以能讞獄聞又氣高時持人短長卑侮之自巡撫以下無所忌於是凡有疑獄益埤之卒以是敗有爲盜焚殺者指其仇君疑之而行臺省强君連署後􅀗盜君與同讞者三人皆落職行臺省內慙欲代君輸貲復官君闞山東有公使銀應輸京者十餘萬自薦攜之行至京沒其大半以十之一周故舊請於部改郞中盡攜所餘而歸買大宅置姬侍通輕俠少年日撃鮮釃酒弄刀劍鬥蟋蟀䳺鶉數年盡散之欲起官而以痟疾卒年五十七君治事之外不爲雜戲具則碁不碁則作書不作書則爲詩詩至數千首方在濟南獄時山東官吏欲置之死鉗釱之外繫大鐵索苦之方暑環以糞穢君吟嘯自如得詩數十首眞健才也君娶姜氏子維賢襲雲騎尉次維幹論曰君好漫駡人遇禮俗之士未嘗罵翹足搖膝對之或作他語趨去而已所罵者皆鄙妄人也由是觀之君匈中所取與於淸濁大小何嘗無尺度哉世但以跅弛之士目君失其指矣楊中立戰功畧并序吾常州唐荆川先生爲沈希儀敘廣右戰功􅀡躪子長孟堅堂奥而無一語似子長孟堅奇作也江西撫標右營遊擊楊光時官河南時從討教匪以偏裨聽指揮與希儀專制一方戰守奇正得自主者不同故功止臨陣斬俘可紀然觀其處患難及進退之際綽然皆有不易之道焉使得處希儀之地之時深謀警策未必讓希儀獨絶如荆川所書也於其乞休而歸用周勃灌嬰傳法爲戰功畧詒之蓋事勢旣殊文體亦異非避荆川就子長孟堅蹈空同于鱗所尙也楊光時字中立河南唐縣人乾隆四十五年武鄕試中式旋官河北鎭標左營把總升右營干總署衞輝府王祿營守備年四十二歲矣今皇帝嘉慶元年教匪起河南陷新野中立從遊擊揆明戰所將卒斬俘二百人復戰斬五人從巡撫景安戰斬二人從南陽總兵王文雄戰斬三人二年從參將廣福破賊李官橋斬七人破賊都司前斬二人俘四人從參將蔡鼎􅊧內鄕浙川俘三十一人破賊鄷家河斬二人在軍署南陽守備以功加一等時湖北河南教匪次第入陜西陜西教匪亦起王文雄由總兵升固原提督赴陜西中立以河南兵從之在軍升彰德營守備三年將二十五騎探賊遇賊騎斬三人復戰斬二人俘三人合大隊戰盩厔焦家鎭陷敶斬十人戰圪子邨賊銳甚圍官軍官軍排火器四面擊破之斬俘五十人戰尹家衞陷敶斬五人賜花翎戰渭南厚子鎭俘二人戰盩厔板子房斬一人俘一人追賊南鄭黃官嶺斬二人戰褒城廉水險陷敶斬十人俘九人戰西鄕兩河口陷敶斬十人俘五人戰南鄭鋼厰賊張兩翼來犯伏起敶右澗中銳甚別將奮勇八十八人迎擊澗上破之斬五十人俘七人四年戰西鄕二里亞斬持大白旗賊渠一人追斬四人至老鷹厓復斬五人俘二人戰分水嶺斬乘馬賊一人戰牛頭山陷敶斬二十人戰鍾家溝斬五人俘一人戰褒城瓦子嶺斬二人戰西鄕堰河口斬三人俘一人戰南鄭烏亞子斬十人俘一人升陳州營都司五年戴家營賊犯周家坎別將於野貓溝迎擊斬二人賊楊開甲掠喬麥灘合大隊迎擊於洋縣之三岔菴俘二十七人迎擊賊唐大信於節草霸賊踰山遁追戰魏家寨破之竟三日夜追戰萬曲灣火石亞山王廟麻柳灣皆破之戴家營賊合烏二馬五犯西鄕宛豆坡追戰破之斬五十人凡在軍六年戰河南十一戰陜西二十八奏首虜功數如前其未奏者二十八戰首虜功皆沒無可紀前後進官三賜花翎一自中立至陜西提督令將騎每戰當軍鋒素恤士卒糧乏卽以已貲分之至是糧乏四十餘日不能軍兵臨敶失伍歸河南中立追至南陽令歸伍皆大􅂘言等死耳願以潰師伏法無一人肯西向者遂跳身還營提督劾之聽勘軍方惰賊適大至置敶自山梁馳下眾軍仰禦之忽敶動崩下山不可止賊遂殘提督而河南巡撫吳熊光具潰師始末入奏皇上下其事經畧額勒登保經畧知提督軍情欲中立訐其實中立曰軍主已没王事矣豈可以一劾嫌使不保令名自脫罪哉對簿七晝夜無異辭經畧爲動容盡以中立前後恤士卒狀并戰功上之皇上免死革花翎并四品頂戴以都司從軍從經畧戰西鄕西渡河破之從固原提督慶成戰馬灣土地嶺皆破之別將防荼鎭口賊渡漢從提督迎擊斬俘二百三十人六年旋師河南別將赴湖北鄖陽駐南化七年駐小蓮灘以守禦功復四品頂戴十一年教匪平積年資擢江西撫標右營遊擊中立守職勤事上有禮與同官溫溫然未嘗自言功忽不自得投劾去當事惜之不能畱也敬前權官吳城教匪起上江中立將二百人赴湖口陰備之過吳城敬至其舟士卒帶刀立甚整糗糧甲胄旗纛甚備悉藏舟中無知者敬心異之更一年而中立乞休敬適劾官數過從故知之詳如此無錫宣頴達麗中吳縣徐敦仁愛杉
