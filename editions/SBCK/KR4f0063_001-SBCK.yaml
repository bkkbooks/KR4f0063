  text: 原命無形可知乎曰不可知而可知也君子以有形知無形無氣可知乎曰不可知而可知也君子以有氣知無氣夫氣不有嘔然而和者乎穆然而肅者乎其嘔然者非秩然而序無以大其穆然者非攸然而通無以久其序而大通而久者不有其敦然者乎是故仁也義也禮智與信也五者與氣俱者也雖然氣行矣氣之過無以生氣之不及無以生其生形者皆氣之中也人之生形也得中之中得中故無過而仁無柔義無躁禮無飾智無詭信無固也得中故無不及而仁無忍義無葸禮無嗇智無蒙信無岐也是故五者與形俱者也雖然形生矣天有時焉地有宜焉物有應焉氣之淸者湜焉濁者淖焉淸而濁濁而淸者粈焉於是乎有氣之痼雖然形生矣而渾渾焉而胚肧焉而息息焉嘔然者不行而不止乎穆然者不行而不止乎秩然攸然敦然者不行而不止乎于是乎有氣之流是故五者有過焉而柔而躁而飾而詭而固焉且有不及焉而忍而葸而嗇而蒙而岐焉過不及之至五者互相賊而害仁害義害禮害智害信焉相賊之至五者各相反而滅仁滅義滅禮滅智滅信焉是惡也然其所以生皆中也中皆善也善者所以爲命也命者所以爲性與情也是故知命爲仁義禮智信之中而性之善見知性爲仁義禮智信之中而情之善見命性情皆形乎氣止乎形者也而形氣之善見知形氣之善而無形無氣之善見矣故曰以有形知無形以有氣知無氣也喻性孔子日性相近也習相遠也曰唯上智與下愚不移言性者主孔子之言而已孟子曰人無有不善曰乃􅀂其情則可以爲善矣若夫爲不善非才之罪也宋之程子爲之說曰孔子言氣質之性也性之本卽理也孟子之言性善者此也噫性一而已孔子言其一孟子又言其一聖賢固若是乎哉是說也吾不敢以云吾之言性主孔子之言而巳曰然則孟子之言非歟曰孟子之言卽孔子之言也程子之爲之說非也何以言之性者自乎人而言之者也自乎人而言之蓋郛實乎氣質者也善者自乎性而言之者也自乎性而言之蓋萌達乎氣質者也孔子孟子之言皆言此性也何以言之性者具於心者也性之發爲情輔情而行者爲才才者知與能是也是如火然烺然而耀心之知灼然而然心之能炎然而上心之性上者火之性也善者人之性也情則自善而之惡其返也自惡而之善才之所至如其情是故烺然者上行而耀下行而耀旁行而亦耀心之知知善能盡知惡亦能盡也灼然者上行而然下行而然旁行而亦然心之能爲善能達爲惡亦能達也唯炎然而上者抑之下則游障之旁則搖其炎然者得隙則越焉何也其性也是故火之性上行之時其性上旁行下行之時其性亦上也人之性爲善之時其性善爲惡之時其性亦善不爲善不爲惡之時其性亦善也堯舜湯武皆性善也諛蹻蹠者不以爲愚以爲聖蹻蹠受之其性善也若是者孟子之言也其同於孔子奈何曰善也者統乎智與愚言之也近也者別乎智與愚言之也上下也者極乎智與愚言之也其善何也曰性也其近何也曰性也善故近也近故無不善也是故智之性亦善也愚之性亦善也上智下愚之性皆善也其智愚上下何也曰才也其智愚而移何也曰情之遷也其才能赴之也是習之驗者也其智愚上下而不移何也曰才之不遷也其情不能强之也是習之不驗者也性宥乎才發乎情習動乎情竭乎才移不移者知與能爲之也才也非性也是故才行乎情之善其性之善無銖兩之加也才行乎情之不善其性之善無銖兩之耗也故曰善也孔子曰一陰一陽之謂道繼之者善也成之者性也以命言性而善者也孟子曰惻隱之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之以情言性而善者也故曰孟子之言即孔子之言也程子之爲之說非也雖然人之才有智焉有愚焉有上下焉其上下之中抑有大小焉聖與聖十其量賢與賢百其力庸與庸千其用姦與姦萬其爲束藴而庸庸積薪而㷸炥焚山燎原而萬人皆卻走皆如其分之所至而已是火之才也而豈火之性哉曰堯舜湯武蹻蹠皆性善是無差也無差者理也其何異於程子之說歟曰程子之言善離氣質而言也吾之言善不離氣質而言也夫火之炎然而上非火之氣質爲之耶且如程子之說有氣質卽有不善是與於性惡之說也曰然則由子之說謂氣質無惡可乎曰非也向固言之矣言氣質者兼言知與能各有其善惡火之烺然灼然是也言性之善者不兼言知與能火之炎然是也無智愚上下之殊曰孟子之言性皆言氣質乎曰無氣質是無性也孟子曰命也有性焉性也有命焉曰形色天性也是也子思子曰天命之謂性率性之謂道卽孟子之言也曰修道之謂敎則與孔子之言若相發然此傳孔子而之乎孟子者也韓子曰性之品有上中下上焉者善焉而已矣中焉者可導而上下也下焉者惡而已矣是以才言性也戾乎孟子卽戾乎孔子者也以爲祖孔子非也說地凡形附形凡氣合氣土石形也而息氣焉氣液形爲水水亦形也土石水附而地立焉火純氣而見形其形皆氣也凡形之氣亦爲火其合也形不能間則天也形附形是故鳥之翔必止人與獸之走必踐木草之根必植魚泳物也泳於水亦附也氣合氣是故爲土石爲水爲鳥爲人與獸爲草木爲魚其氣皆天也而息焉而液焉而翔且走且植且泳焉雖然上石水形勝而繫乎地者也火氣勝而繫乎天者也萬物形氣均而繫乎天地者也人者首陽而足陰故縱生鳥獸魚腹陰而背陽木草本陰而末陽本陰而末陽故逆生腹陰而背陽故旁生縱生者首繫天而足繫地焉逆生者末繫天而本繫地焉旁生者背繫天而腹繫地焉其繫天合也繫地皆附也是故地之圜九萬里土石附焉水附焉萬物以其陰陽循而附焉說山敬前自京師之泰安將爲泰山之遊旣至郭西二十里停車問逆旅主人泰山所在主人指車前翼然者曰主山也最上爲封禪臺敬以爲不然蓋意中東望海西望秦南望吳門之泰山何止若是至縣同年生華君榕端爲之宰誇其有是山北面指曰何如則向之翼然者而已敬大詫以爲泰山􅀒我已而華君具三日糧而登登三之一城郭人民如垤蟻風翏翏然再登徂徠諸山如土封之偃地五汶之交如帶至封禪臺而雲氣可下視矣蓋天下事期之者過甚大率不能如吾之意而遂卑小之則吾之知將反有所不實焉是故君子不以古人之能槩今人則可以交士大夫不以古人之事槩今事則可以適家國天下之用後以使事自黔返楚舟過彭蠡湖湖之北廬山橫起際天舟行一日山如近接舟首及至星子泊舟支岡下之石隄而山不可見其隄長二里所高數丈舟隱其下爲所障故不復見廬山噫以廬山之高且大拔見數百里之外而障於是隄非舟之近隄過甚歟是故君子無近小人則大人之跡不爲所誣無近小事則大事之方不爲所蔽子由子寛從敬於渝水將就試京師二山皆所道也作說山以吿其行三代因革論一聖人治天下非操削而爲􅈰也求其罫之方而已必將有以合乎人情之所宜是故中制者聖人之法也其不滿乎中制與越乎中制之外者于人情苟不至甚不便聖人必不違之此三代之道也夫五霸㪅三王者也七雄㪅五霸者也秦兼四海一切皆埽除之又㪅七雄者也漢興百餘年之後始講求先王之遺意蓋不見前古之盛六百餘年矣朝野上下大綱細目久已無存遺老故舊亦無有能傳道者諸儒博士於焚棄殘剝之餘搜拾竈觚蠧簡推原故事其得之也艱故其信之也篤書之言止一隅必推之千百隅而以爲皆然書之言止一端必推之千百瑞而以爲不可不然嗚呼何其愚也夫禮樂刑政皆世異者也禮樂之微非百姓所能窺也且行之於天子諸侯者十而五六行之於大夫士者十而三四其在野者略焉而巳是故聖人之制作也則自斷之刑者情之百易者也書之策不可盡也是故與諸侯大夫士斷之政者治亂之紀上與下之統也是故與諸侯大夫士百姓共斷之夫所謂共斷之者何也曰中制者聖人之法也其不滿乎中制與越乎中制之外者于人情不至甚不便聖人必不違之是也吾故詳論之求王政之端而究其同異以破諸儒博士之說庶聖人治天下之道可無惑焉三代因革論二孟子曰公侯皆方百里伯七十里子男五十里周官曰諸公方五百里其食者半諸侯四百里諸伯三百里食三之一諸子二百里諸男百里食四之一孟子周人所言周制也而周官與之互異焉鄭氏衆曰其食者半公所食租稅得其半耳其半皆附庸小國也三之一者亦然是說也公之地其半爲附庸侯伯之地其三之二爲附庸子男之地其四之一爲附庸理不可通且五百里之半爲百里者十有二而餘侯伯子所食與孟子之說均不合惟男食四之一爲五十里而已陳氏君舉曰方五百里以圍言其徑百二十五里是說也男之地徑二十有五里公與伯之地徑百里七十里而餘與孟子之說亦不合惟侯徑百里子徑五十里而已唐氏仲友曰古之爲國有軍有賦軍出于郊者也賦出于遂者也言百里七十五十里者軍制也五百四百三百里者兼軍賦及所轄言之也諸男言百里者兼軍賦言之也噫聖人之書豈若是參錯邪是不可訓之說也惲子居曰古者洪荒之世自民所歸而各立之君其時政刑未備羈縻所及大者百里而已殺于百里者則七十五十里焉聖人準之以差封國之地是故百里七十五十里者聖人之中制也國立矣不能無爭爭矣不能無所并黃帝之時萬國成湯之時三千餘國武王之時千七百七十二國蓋所并者幾十之七八焉若是則保無有百里而爲五百四百里者乎七十五十里而爲三百二百百里者乎聖人于是定之以所食之數使與百里七十五十里之制不至相絕所以折無厭明有制至明順也又使百里七十五十里之國有可以齊于五百四百三百二百百里之制而山川土田附庸之典行焉武王封太公于齊百里之國也益之至五百里成王封伯禽于魯百里之國也益之亦至五百里于是天子得平其威惠諸侯咸勤于功德亦至明順也是故五百四百三百二百百里者亦聖人之中制也蓋諸侯之能并地者若反仁滅義以詐力吞噬將不旋踵而覆亡隨之其能及久遠者必自其先世已有不泯之功德又君臣皆有過人之才民庶皆有順令之用然後能滅國而鄰不爭收土而民不叛逮相襲旣久上下爲一各固其疆聖人必履封而裁之計數而割之則天下亂矣是故夏之季世其諸侯并地大者殷仍其國殷之季世其諸侯并地大者周仍其國若興王崛起親賢夾輔其功皆可享茅土之奉其才皆可任方伯連帥之職聖人于封國之後復大啟其地以收大小相維新舊相制之功故曰皆聖人之中制也雖然是中制者非引繩而􅀡之絜矩而方之布算而乘除之不容岀入增損于其閒也其山川之奥則有畸其鄰國之錯則有畸其都邑之系屬則有畸越于五十七十百里者有之越于百里二百三百四百五百里者有之不滿者亦有之陰陽得其序原隰斥鹵墳壞得其理戰守形勢得其會如是而已故曰越乎中制與不滿乎中制者非人情所甚不便聖人必不違之也是故由吾之說則三代之所以久妥長治可知也不由吾之說則禹湯文武之時已潰裂矣其子孫豈有一日之暇哉此可質之萬世者也
