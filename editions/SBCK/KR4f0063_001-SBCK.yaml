  text: 自記曰韓詩外傳百里諸候以三十里爲采七十里諸侯以二十里爲采五十里諸侯以十里爲采本朝惠半農先生據之謂封五百里四百里其采百里封三百里其采七十里封三百里百里其采五十里欲合王制周官之說其說據外傳而與外傳歧又封采之數五等多寡不畫一不可從三代因革論三孟子曰夏后氏五十而貢殷人七十而助周人百畞而徹曰貢曰助曰徹中制也曰五十曰七十曰百畞亦中制也其名不同其法不同其數又不同惲子居曰先王治田亦有越乎中制不及中制者焉是故貢助徹三者聖人皆先自其國都行之推之于諸侯之可行者而亦行之其不可者待之先代之制其可㪅者㪅之不可㪅且不必㪅者仍之如是而已何以知其然也井田者始于黄帝廢于秦未有井田之前所行者貢而已廢井田之後所行者亦貢而已至行井田之時貢亦不廢者田有不可井與可井而不及井及上世已來已定溝澮之制者也是故五十而貢夏禹治田之法而其時黄帝井田之在焉夏小正曰初服于公田是也七十而助成湯治田之法而其時公劉之徹行焉詩曰徹田爲糧是也百畞而徹文王治田之法而其時湯之助存焉公羊傳曰古者十一而藉是也若是者何也天下至大民人至衆聖人者期于均其利去其害者也周之有天下也定其可井不可井以九一十一推一王之制仍其五十七十以貢助存先代之法民各安其業樂其政下不擾上不勞如是而已然而尙有進焉者貢者古今之通法井田者聖人因時以均民情貢者自諸夏至絕徼之通法井田者聖人因地以均民力是故聖人之世以井田爲上治以貢爲通法上治所以見王道之尊通法所以見王道之大揖讓上治也與子通法也揖讓之名至高于事至順非堯得舜舜得禹不可行井田之名至高于事至順非殷受夏周受殷不可行而貢則無不可行故聖人之行井田也以貢輔之而不責人之必行如是而已何以知其然也齊之內政五家爲軌五軌爲里四里爲連十連爲鄕井田以三起數內政以五十起數使齊之封內爲井田者十之九爲貢者十之一齊能三其田而五十其人乎抑破壤其井而五十其田乎是齊之田井者少不井者衆也楚蔿掩爲司馬度山林鳩藪澤辨京陵表湻鹵數疆潦規偃瀦町原防牧臯隰井衍沃賈逵皆以井數之其說爲誣九地之土惟衍沃可井杜預之說是也是楚之田井者少不井者衆也鄭子駟爲田洫而浸四族田是鄭之田不盡井也魏文侯曰今戸口不加而租賦歲倍是課多也井田非稅畞賦不能加魏未聞有此法乃增其貢也是魏之田不盡井也聖人之行井田也寛大如此豈有方三千里爲田八十萬億一萬億畞之事哉烏乎此求方罫之說也又豈有百里之國必萬井五百里之國必二十五同之事哉烏乎此亦求方罫之說也三代因革論四井田不可廢之法也而卒廢儒者皆蔽罪商鞅雖然鞅之罪開秦之阡陌也彼自關以東井田之廢非鞅之罪也夫法之將行也聖人不能使之不行法之將廢也聖人不能使之不廢神農氏作民知耕而食之誅草萊摘沙礫各治其田而已黄帝因民之欲別而以經界正之因民之欲利而以溝洫通之因民之欲便于耕鋤饁饟守望而以廬井合之是故井田者黄帝之法也所以井田者天下之民之欲也此井田之所以行也而其所以廢者三代之時山林斥鹵積漸闢治足給其民又以餘者爲圭田餘夫之田士田賈田後世餘地日少生齒日衆田不敷授一也三代之時吏道湻古歸田受田無上下其手者後世肥瘠不均與奪不時二也三代之時國之大者不過數百里其田悉可按行而差等之後世地兼數圻憑圖書稽核而已必有不能實者三也三代之時私田稼不善則非吏公田稼不善則非民後世吏不可非而民不勝其非四也抑又有甚者十一不足從而增其征則財匱千乘不足從而加其卒則民煩魯之稅畞􅏀甲晉之州兵原田其見于書者也是故春秋戰國之民其先世享井田之利不可見也所見者身蒙井田之害而已利遠則易忘害近則其去之也速而又日見貢之簡略易從爭趨之以爲便我便我于是急公好利之君之大夫狥其民而大變之蓋井田之行也自黃帝至周之初厯一千有餘年而其法大備井田之廢也自春秋戰國漸澌漸泯至秦之始皇五百餘年而後掃地無餘天道之推移人事之進退皆有不得不然者是故秦者古今之界也自秦以前朝野上下所行者皆三代之制也自秦以後朝野上下所行者皆非三代之制也井田其一也然則聖人處此奈何曰聖人者非所能測也雖然其書具在可考而知焉孔子曰行夏之時乘殷之輅服周之冕而已無一言及于兵與農者何也其事當以時變者也貢之三代因革論五三代以上十而稅一用之力役用之田獵用之兵戎車馬牛楨幹芻糧器甲皆民供之而民何其充然樂也三代以下三十而稅一力役則發帑田獵兵戎則召募車馬牛楨幹芻糧器甲皆上給之而民愀然怫然若不終日者然何也韓子曰古之爲民者四今之爲民者六古之敎者處其一今之敎者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六雖然未旣也一人爲貴而數十人衣食之是七民也一人爲富而數十人衣食之是八民也操兵者一縣數百人是九民也踐役者一縣復數百人是十民也其數百人之子弟姻婭人數十人皆不耕而食不織而衣是十一民也牙者互之儈者會之是十二民也僕非僕臺非臺是十三民也婦人揄長袂躡利屣男子傅粉白習歌舞是十四民也農工商三民爲之十四民享之是以天不能養地不能長百物不能產至于不可以爲生雖有上聖其若之何古者上有田而民耕之後世富民有田募貧民爲傭一傭可耕十畞而贏畞入十取四不足以給傭饑嵗則畞無入而傭之給如故其賃田而耕者率畝入三取一歸田主以其二自食常不足田主得其一又分其半以供稅且困于雜徭亦不足此農病也古者工皆有法度程限官督之後世一切自爲拙者不足以給身家巧者爲淫巧有數年而成一器者亦不足以給身家此工病也古者商賈不得乘車馬衣綿綺人恥逐末爲之者少故利豐後世一切儕之士人人不恥逐末爲之者衆故利減其富者窮極侈靡與封君大僚争勝勝亦貧不勝亦貧此商病也夫以十四民之衆資農工商三民以生而幾幾乎不得生而三民又病若此雖有上聖其若之何惲子居曰三代之時十四民者皆有之非起于後世也聖人爲天下四民日增其數十民日減其數故農工商三民之力能給十一民而天下治後世四民之數日減十民之數日增故農工商三民之力不能給十一民而天下敝矣聖人之道奈何曰不病四民而已不病四民之道奈何曰不病農工商而重督士而已夫不病農工商則農工商有餘重督士則士不濫士且不能濫彼十民者安得而濫之不能濫故常處不足十民不足而農工商有餘争歸于農工商矣是故十民不日減不能夫堯舜之時曰汝后稷播時百穀曰疇若予工曰懋遷有無化居所諄諄者三民之生而已殷之盤庚周之九誥皆然此聖人減十民之法也曰三代之時二氏蓋未行也十民之說可得聞乎曰太公之華士孔子之少正卯孟子之許行皆二氏也有遣戍則已養兵有庶人在官則已顧役有門子餘子則已有富貴之游閒者矣其餘皆所謂閒民惰民是也有天下之貴者其亦于三民之病愼策之哉三代因革論六然則三代之養兵可得聞歟曰可周制六鄕爲六軍六遂倅之此民兵之制也三代皆同者也民兵旣同養兵不得不同何也周官司右掌羣右之政令凡國之勇力之士能用五兵者屬焉鄭氏康成曰選右當于中夫選右則皆兵也曰屬焉必非散之井牧者也非養兵而何虎賁氏虎士八百人鄭氏康成曰不言徒曰虎士徒之選有勇力者夫徒皆食于官者也非養兵而何虎賁氏主環衞然武王用之伐殷矣周官八百人而武王三千是必有倅卒也非養兵而何非􅀡此也古者戍皆更代更代必以期期之內皆不耕者也主芻茭之峙有人主糧糗之供有人主兵甲之用有人主壁壘之防有人與養兵何異乎此兵之守者也周公東征至三年之久穆王西征至萬里之遠皆驅之戰者也與養兵何異乎夫司右虎賁氏周之官也然夏殷不能無勇爵不能無環衛之士可知也采薇出車枤杜周之詩也然夏殷不能無屯守之卒可知也殷餘之難荒服之勤周之所由盛衰也然夏殷不能無觀扈之討鬼方之伐可知也是故民兵旣同養兵不得不同其故何也古者大國不過數百里小國不過數十里疆事之争多而越國之寇少耕耘之氓可以戰守是故以民兵守其常以養兵待其變至春秋而有踰山海之征連諸侯之役戰國之世抑又甚焉秦漢已降萬里一家一起事或連數十郡一調兵或行數千里是故以養兵持其常以民兵輔其變二者交用各得其宜不可偏廢也且人之受于天也古厚而今薄敎于人也古密而今踈故古者士可以爲農農可以爲兵後世驅士于農則士壞驅農于兵則農壞泛令之則詭入詭岀于二役而無用嚴束之則積怨畜怒于一役而不安情勢之所趨則禁令窮時俗之所積則聖智廢也世之儒者以漢之南北軍爲是而八校爲非唐之府兵爲是而彍騎爲非夫南北軍府兵已非三代之制矣何必此之爲是而彼之爲非􅁘况乎郡兵之法未改則八校無害于南北軍屯田之制能行則彍騎無害于府兵宋之保毅義勇明之箭手礦夫則養兵且借助于民兵矣是在養兵者善其制耳不然取後世之民而日以荷戈責之幾何不速其畔也哉三代因革論七然則三代之顧役可得聞歟曰可周官小司徒會萬氏之卒伍而用之以起軍旅以作田役以比追胥以令貢賦貢賦之外皆役事也起軍旅兵役也田田役也役力役也追胥守望之役也後世兵岀召募而兵役廢兵役廢而田役亦廢守望之役亦廢所不廢者力役而已至并租庸調爲兩稅而力役之征亦廢古之役事無有存焉周官鄕大夫之屬比長閭胥族師黨正鄕官也遂大夫之屬鄰長里長酇長鄙師遂官也漢曰三老曰嗇夫曰游徼皆賜爵同于鄕遂之官唐曰里正曰坊正則役之矣宋曰衞前督官物曰耆長曰壯丁捕盜賊曰散從曰承符曰弓手任驅使則役之而且虐用之矣是故鄕官遂官卽後世之民役也其祿卽後世之顧役也周官宰夫八職五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官序以治序八曰徒掌官令以徵令其制厯代皆行之是故府史胥徒卽後世之官役也其祿卽後世之顧役也鄕官遂官三代之時不爲役三代之顧役當專屬之府史胥徒所顧者官役也宋衙前之役如官役之府史耆長壯丁散從承符弓手之役如官役之胥徒其官中之府史胥徒自若也宋之顧役不專屬之府史胥徒所顧兼民役也其民役之事同于官役則有其漸焉自唐之中葉天下擾攘官役不足以周事遂取之于民以助之助之旣久則各有職司職司旣定則各有功過是故其始以民役代官役之事而視爲固然其繼以民役供官役之令而亦視爲固然其後以民役任官役之過而亦視爲固然至熙甯之時而民役不可爲生矣是故鄕遂之末流變爲差役差役之末流變爲顧役差役則民勞而財日匱顧役則民逸而業可常天下無無弊之制無不擾民之事當擇其合時勢而害輕者行之後之儒者以熙甯之法而妄意詆諆非知治體者也曰民役之宜顧則然矣官役顧則久久則爲民害無已時如之何而可袪其害歟曰三代聖人已行之矣賦之祿所以安其身寛之時所以習其事敎之道所以正其向威之刑所以去其私如是而用之豈有虎冠鷹擊蠆螫蜮射之事哉後之治天下者知官役之可顧而宮府修知民役之可顧而閭里甯知官役之可減而苛擾之事除知民役之可盡罷而海內皆樂業矣三代因革論八由是觀之聖人所以治天下之道蓋可知矣利不十不變法功不十不易器此經常之說也三代不同禮而王五伯不同法而霸此便私挾妄之說也雖然有中道焉先王之道因時適變爲法不同而考之無疵用之無弊此權衡乎前二說而知其重輕俯仰者也夫莫大于封域之制莫要于人民之業莫急于軍國之務而聖人一以寛大行之況乎節目之細尋常之用哉夫人之養生也日取其豐人之趨事也日得其巧聖人節其過甚而已如宮室之度求其辨上下可也夏之世室殷之重屋周之明堂其不同者也而民之蔭室何必同如冠服之度求其行禮樂可也夏之毋追殷之章甫周之委貌其不同者也而民之裋褐何必同俎豆之華疏不同于廟干戈之琱塗不同于師車旗之完敝不同于朝粟帛之純量不同于市是故聖人之治天下有二倫物之紀名實之效等威之辨授之以一成之式齊之以一定之法天子親率諸侯大夫士以放之于民者必使如絲之在繅陶之在甄無毫黍之溢減而天下之心定焉若其質文之尚奢約之數或以時變或以地更故養生不至于拂戾趨事不至于迂囘于是首岀而天下歸之三代聖人蓋未之能易也彼諸儒博士者過于尊聖賢而疎于察凡庶敢于從古昔而怯于赴時勢篤于信專門而薄于考通方豈足以知聖人哉是故其爲說也推之一家而通推之衆家而不必通推之一經而通推之衆經而不必通且以一家一經亦有不必通者至不必通而附會穿鑿以求其通則天下之亂言也已西楚都彭城論自淮陰侯斥項王不居關中而都彭城史家亦持此說後之言地利者祖之以爲項王失計無有大于此者惲子居曰項王之失計在不救雍塞翟三王而東擊齊不在都彭城何也項王立沛公爲漢王王巴蜀漢中而三分關中王章邯于雍司馬欣于塞董翳于翟所以距塞漢王也夫三人之非漢王敵不必中人以上知之項王起江東敗秦救趙遂霸諸侯業雖不終見豈必出中人下哉吾嘗深推其故而知項王都彭城蓋以通三川之險也通三川蓋以救三秦之禍也以彭城控三川卽以三川控三秦是故都彭城者項王不得不然之計也何以知其然也乃者項王自王蓋九郡焉自淮以北爲泗水爲薛爲郯爲琅邪爲陳皆故楚地爲碭爲東郡皆故梁地是時彭越未國地屬西楚自淮以南爲會稽會稽之分爲吳灌嬰傳得吳守是也亦故楚地九郡者項王所手定也軍于手定之地不患其不安民于手定之地不患其不習國于手定之地則諸侯不得以地大而指爲不均據天下三分之一以爭中原于腹心之間此三代以來未有之勢也彭城者居九郡之中舉天下南北之脊關外之形勝必爭之地也故曰都彭城者項王不得不然之計也雖然項王之不取關中何也曰項王非不取關中也乃者漢王先入關義帝之約固宜王者也項王聽韓生之說而都之關中之人安乎不安乎關外諸侯無異議乎項王所手定之九郡將以之分王乎抑自制乎度其勢必自制之矣自制之而一旦有警其將去關中自將而東乎關中者固漢王所手定也舍已所手定之九郡而奪他人所手定之關中旣奪他人所手定之關中又不分已所手定之九郡一旦自將而東天下之人安乎不安乎是故關中者項王所必取之地也取之而名不順勢不便則緩取之取之而名不順勢不便且召天下之兵則以棄之者取之何以知其然也乃者陳涉首難諸侯各收其地而王之矣三王秦之人也以秦之地付三王此秦漢之際諸侯之法也使三王者據全秦之勝扼全蜀之衝包南山之塞窒棧道之陘終身爲西楚藩衞則朝貢徵發何求而不可若其以百戰之燼生降之虜寄仇讎之號令驅鄕黨之儔匹一有擾動西楚廢其主刈其民若燎毛射縞耳指揮旣定人心自固誠如是也漢王不得援前說以爭秦諸侯不得舉前事以責楚名與勢皆順便矣所謂緩取之也所謂以棄之者取之也是故不付之張耳臧荼者不以關外之將相制關中也不付之共敖黥布者不以西楚之將相制關中也陽示天下以大公而陰利三王之易取是故三秦者項王之寄地也其吿韓生曰富貴不歸故鄕如衣錦夜行人誰見之此項王之設辭也非項王之計也雖然關中重地也取關中重計也其取之之次第奈何曰項王之計不急于收三秦之地也急于阻漢王之東而已何以知其然也乃者項王之所忌唯漢王也是故未爲取秦之謀先爲救秦之策三川者救秦之要道也以瑕邱申陽據三川而北函谷南武關絜其要領矣以司馬卭輔三川之北而函谷之軍無阻矣以韓成夾三川之南而武關之軍無留矣二王皆趙臣趙睦于楚故道通韓成不睦于楚不使之國而楚制之故道亦通道通矣然而西楚之都不能朝發夕至則猶之乎未通也彭城者去函谷千有餘里去武關亦千有餘里輕騎數日夜可叩關北收燕趙之卒南引荆邾之師關外可厚集其勢關中可迭批其􅂩漢王一揺足則章邯先乘之司馬欣董翳􅑋乘之西楚傾天下之力而急乘之漢何患不衂秦何患不全漢王且不能保巴蜀漢中豈能移尺寸與楚爭一日之利故曰以彭城控三川卽以三川控三秦都彭城者項王不得不然之計也不意四月諸侯就封五月而田榮反齊是月而陳餘反趙六月而彭越反梁西楚之勢不能卽日西兵而漢王已于五月破章邯八月降司馬欣董翳矣蓋項王止策漢王而田榮陳餘彭越三人非其所忌故有此意外之變此則項王之失計也然使當日者不受漢間東兵擊齊舉三楚之士分兩路㨗走争秦其時申陽司馬卭未敗韓成已廢兵行無人之境函谷破武關必降武關破函谷亦不守淮陰侯挾新造之漢與旋定之秦以當百戰必勝之卒勝負之計必不如垓下以三十萬當十萬之數矣如是則三秦可復三秦復而三川益固九郡益張齊趙燕三國有不折而入于楚者哉而卒棄之不爲此則項王之失計也故曰在不救雍塞翟三王而東擊齊不在都彭城也夫戰爭之事一日十變古人身親其事凡所設施必非偶然不可以成敗輕量也後世如六朝之割裂如五季之紊亂草澤英雄崛起一時必有異人之識兼人之力爲衆所不及者天下大器置都大事曾是項王而漫付之吾故推其所以然以明得失之實如必以項王爲慮不及此彼亞夫者亦非不審于計者地自記曰項王王梁楚九郡史記漢書無明文全謝山先生以爲有南陽黔中楚三郡黔中久入秦非楚地且遼絕西楚不能越九江衡山而有之南陽卽宛亦久入秦非楚地西楚定封時王陵在南陽無所屬又宛漢王所定項王未嘗過兵不能并王始皇二十三年滅楚號楚郡二十六年分楚爲泗水爲薛爲郯爲琅邪爲會稽爲九江共六郡而漢志六安國下注故楚是六郡之外尙有楚郡如謝山之言然漢六安都陳則楚郡卽陳郡秦楚之際書陳不書楚則已爲陳郡矣南陽黔中楚三郡不應列九郡之內姚姬傳先生以爲有陳鄣二郡鄣非秦置劉原父常言之漢王分西楚地自陳以東與韓信是漢收陳爲天子郡故後此會諸侯于陳陳本秦郡甚明宜在九郡之內又灌嬰傳得吳守遂平豫章會稽吳與豫章會稽參列是西楚以吳開國與會稽分郡矣今定爲泗水薛郯琅邪陳會稽吳東郡碭俟博雅君子詳之錢竹汀先生據地理志定秦三十六郡內泗水東郡會稽琅邪碭薛六郡同其郯陳吳三郡不在三十六郡之內卽先生所謂二世改元之後豪傑並起分置列郡也先生亦言有吳郡漢復并省焉辨微論有天下之實人之所樂居也篡天下之名人之所不樂居也可以居有天下之實矣不居篡天下之名可也可以居其實而幾幾乎不能居則進不足以取萬乘而退且至于覆全宗于是乎名有所不顧而篡隨之建安十五年十二月曹操下令曰孤始舉孝廉欲好作政敎以立名譽徵爲典軍校尉意更爲國家討賊立功使題墓道曰漢故征西將軍曹侯之墓此其志也明年正月卽以子丕副丞相去下令止數十日耳十七年而加殊禮十八年而受九錫是故操之爲篡決于下令之時夫篡已決矣而其令如是豈讆言歟非也凡人之志皆自小而之大積漸成之方曹操入仕之初漢祚雖衰羣雄未起度其心亦不過望中外二千石而已及遇亂離則忠主救民策勲拜爵之心人人所同奸人之雄亦人也何必不同乎人情以是觀之曹操之令皆由中之言也如是則破黃巾討董卓豈常有篡之說在其計中哉迨至邀袁術逼陶謙而事一變朝雒陽遷許下而事又一變東縛呂而北并袁紹南下劉表而天下大半歸曹氏矣然謂操之篡決于此時則大不可何也操之强固天下莫當者也提數十萬之衆乘數百戰之威使一旦孫劉順命吳楚內降孔明公瑾諸人不敢一舉手抗拒軍威遐暢訖于嶺海固可下視秦項追跡高光卽不然而赤壁之役絕江破敵窮追而豫州走死疾下而討虜面縛于是收江表之豪傑規山南之形勢巴蜀效圖而納土關隴送質而入朝操卽北面逡巡再三退讓天下誰居操之右者何必害茍彧殺崔椽弑皇后皇子至梟獍狗􅮿之不若哉不幸水師被燬陸路解散鼎足之形巳成席卷之勢巳壞又況兵敗之後內權動搖肘腋之間悉成機械于是而曹操所處非前日之勢矣其令曰誠恐離兵爲人所祻旣爲子孫計又已敗則國家傾危是以不得慕虛名而受實禍亦由中之言也蓋未敗之前曹操有有天下之志而不必有篡天下之心旣敗之後曹操有失天下之疑而不得不爲篡天下之與善取不得則惡求緩圖不得則急攫慕義不若貪利之急求福不如避禍之周故篡之事起于喪師而篡之局成于下令斷斷然也夫王莽無功故東郡平而卽眞其勢定也桓温有功故枋頭敗而廢立其勢不定也勢不定者必求所以定之曹操才大故旣敗之後尙伐吳以作其氣桓温力薄故旣敗之後卽徙鎮以蓄其威皆所以求其定也求定而後篡成篡成而後身固然自是而畢生之行盡爲逆資蓋世之功悉成盜道矣若是者勢也而其中有至微之機焉伊尹歸政數十年周公歸政亦數年無纖微之嫌可疑無毫髪之患可避人人之所知也曹操輔政自比伊尹削平僭亂自比周公赤壁之事勝則以禮制諸侯敗則必以威刼共主而終于不勝而敗者何哉天下爲仁義之言而心懷彼此其言未嘗不仁義也爲忠孝之事而心懷彼此其事未嘗不忠孝也然天道人事必不能使終身爲仁義忠孝之人故必有以激動之使自覆之而自露之如劉裕秦未定而旋師李存朂梁未滅而改號皆是故也是以君子愼于內則防私愼于外則戒僞動四海振千古之事其上至于嫓聖賢其下極于儕盜賊皆于心之至微形之作辨微論續辨微論周恭帝元年正月辛丑朔遣檢校大尉領歸德軍節度使趙匡􅅌率師禦北漢癸卯次陳橋驛將士謀立匡􅅌爲天子李處耘以事白匡􅅌弟匡義及趙普部分將士環立待旦遣郭延贇入京報石守信王審琦甲辰黎明將士逼匡􅅌寢所匡􅅌被酒臥徐起將士擁還汴乙巳卽皇帝位惲子居曰宋之受命太祖蓋授謀于太宗非一日矣不然以太祖之英武豈有軍中大指揮四出而主將獨􅀍酒臥至亂兵入寢尙徐起之事耶是故太祖之有天下太宗之力也而秦王廷美無勲焉此趙普所親與也宋太祖建隆二年夏六月宋太后杜氏殂召趙普入受遺命謂太祖曰周有長君汝安得至此汝百歲傳光義光義傳光美光美傳德昭普卽榻前爲誓書於紙尾署曰臣普記惲子居曰此飾說也夫太祖之傳位太宗以太宗與聞乎禪代也與聞禪代不可以示後世則飾爲遞傳之說遞傳之說不可以示後世則飾爲長君之說不然授受大事太后何事真泠時始及之􅁘蓋此議之定也亦非一日矣是故廷美以無勲之人亦得列于誓書此亦趙普所親與也開寶九年十月帝崩晉王光義卽位太宗太平興國四年五月平太原劉繼元降六月圍幽州與契丹戰敗績軍中常夜驚不知帝所在有謀立德昭者八月師還久不行太原之賞德昭以爲言帝怒曰汝自爲之賞未晚也德昭退自刎六年春皇子德芳卒九月柴禹錫趙鎔楊守一吿秦王廷美驕恣將有陰謀以趙普爲司徒兼侍中察之帝以傳國訪普普曰太祖已誤陛下豈可再誤廷美遂得罪七年三月罷秦王廷美開封尹爲西京留守勒就第五月貶爲涪陵縣公安置房州雍熙元年涪陵公廷美以憂卒惲子居曰人之生未有不愛其兄及其弟者也下愚且然況于上智乎太宗以絕人之資好學深思明于治亂斷無有處心積慮上負其兄下殺其弟者也而至如此者何也蓋先王之所以治天下也曰是曰非是非明而褒者知榮貶者知辱矣曰功曰罪功罪明而賞者不驕罰者不怨矣曰利曰害利害明而趨者得生避者免死矣庸人計利害而不計功罪聖人以功罪制之豪傑計功罪而不計是非聖人以是非權之拘儒計是非而不計利害聖人以利害濟之愚民無所知也聖人就其所知之是非功罪利害以導安之此天下之大防也至聖人之治一家則曰親疏而已夫親疏者不可以是非較雖大舜曾參之爲子不能自言其理也不可以功罪衡雖周公召公之爲臣不能自名其勞也不可以利害惑雖累錐刀至富有四海積鄕秩至貴爲天子皆不足敵吾天屬之愛也此人之所同然也而其壞也庸愚間家庭以利害拘儒薄骨肉以是非而爲豪傑者皆陷于計功罪是故如太宗者其心以爲吾有有天下之功吾受天下于吾兄吾固無愧于天下者也吾兄有一天下之功吾受天下于吾兄而傳之以至于吾兄之子吾尤無愧于吾兄者也觀其怒德昭之言其始念必傳之德昭瞭然矣不意德昭自殺德芳旋卽夭亡于是以爲彼廷美者無尺寸之功何德干之且恐干之而不致之太祖之子孫也于是功罪之念勝而利害益明是非益晦趙普之邪說遂得而入之矣夫兄弟之友愛未有如太祖太宗廷美者也重之以太后之命宗臣之書其要結不可謂不至也而計功一念遂潰裂之如唐太宗之于建成元吉明代宗之于英宗其始亦必無相排之意也太宗讓太子而計化家爲國之功故有元武門之戕代宗迎上皇而計易危爲安之功故有南內之錮彼數君者何常無孝子悌弟之說在性分中哉勢奪其外理敗其中也夫宋太宗者精敏亞于唐太宗宏豁勝于明代宗未嘗不欲歸國于太祖之子孫以成家世之美談朝廷之盛事也是故太祖卽位卽以太宗爲都虞侯趙普爲樞密􅀡學士賞開國之功也太宗卽位卽以廷美爲開封尹德昭爲武功郡王明傳國之次也其事若成豈非超漢軼唐千載未有之統緒哉而惜乎其不遂也惟唐明皇有功宋王成器能讓兄弟乃終身無間言蓋人之功不可忘已之功不可不忘此又不可不知也夫釋夢晉書樂廣傳衞玠問廣夢廣曰是想玠曰形神不接豈是想邪廣曰因也周禮占夢三曰思夢廣所言想也一曰正夢二曰噩夢四曰寤夢五曰喜夢六曰懼夢廣所言因也後人以因羊念馬因馬念車釋因是亦想耳豈足盡因之義哉然則因之義奈何曰因其正而正焉因其噩而噩焉因其寤而寤焉因其喜懼而夢喜懼焉莊子曰夢者陽氣之精也心所喜怒精氣從之其因乎內者歟列子曰不識感變之所由起者事至則惑其所由然識感變之所起者事至則知其所由然知其所由然則無所怛一體之盈虚消息皆通于天地應于物類其因之兼乎外者歟古者聖人明于陰陽之故明以治禮樂幽以治鬼神其所餘者卜龜筮蓍占夢所言亦得原始反終之故是故以覺爲夢之所由生以夢爲覺之吉凶所由見其理中正不可易如此若夢與覺粈襍言之列子莊子與淮南子及近世佛氏之書多有其說不可溺也夫覺猶形也夢猶景也有形而景附之有覺而夢從之以形之必敝以爲如景之必亡可也以爲必敝之形卽景必亡之景卽形此不可也若是則何疑于覺之與夢哉作釋夢釋拜周官九􅉔近世多肊說謹以古義正之說文􅉔首至地古文拜從二手楊雄說拜從兩手下是故拜從首得義也從手得義也說文跪拜也跽長跪也臣鍇曰伸兩足而跪是故跪從足得義也其曰跪拜也何歟古者拜皆跪也其拜皆跪奈何跪卽古之坐跽卽古之危坐言坐不言拜者跪不拜也坐洗爵坐奠爵是也言拜不言跪者拜皆跪也再拜興是也是故言拜則跪見言跪則拜不見然則肅拜何歟鄭司農曰如今之撎鄭說非也撎不跪肅亦不跪肅拜則跪何以知撎之不跪也說文撎舉手下手也儀禮賓厭介介厭衆賓注推手曰揖引手曰厭今文皆作揖疏厭或作撎是故撎與揖皆不跪也何以知肅不跪肅拜則跪也左氏傳卻至免胄曰不敢拜命是不拜也不拜則不跪也曰敢肅使者是不拜而肅也不拜而肅則不跪而肅也旣不拜矣而名曰肅拜是贅其拜不可旣拜矣而名曰肅是隱其拜亦不可是故不跪而舉手下手曰撎曰肅跪而舉手下手曰肅拜謂肅如撎可也謂肅拜如撎不可也然則不言稽顙何歟吉拜凶拜皆稽顙也齊衰不杖爲吉拜先拜後稽顙是故手拱至地舉之又博顙也杖齊衰以上爲凶拜先稽顙後拜是故博顙舉之又手拱至地也拜者爲賓也顙者爲已也公羊傳公再拜顙失國去宗廟故顙非喪非失國無稽顙者其顙非禮也是故顙拜之變也明迫也䭫首頓首空首非拜之變也容皆舒焉其䭫首頓首空首奈何空控也手拱至地首控于手曰空手施之于臣焉說文頓下手也䭫不首也空手而引首至地下于手卽舉曰頓首行于敵焉頓首而不卽舉曰稽首致于君焉䭫稽也說文留止也周公拜手稽首正也王拜手稽首非正也示不臣爾矣振動兩手擊也抃拜也奇拜一拜也褒拜再拜也倚拜持節拜則襍漢儀焉非正詁也是故䭫首頓首空首從首得義也其首皆下衡也稽顙無容變文曰吉拜凶拜不從首得義也振動奇拜褒拜手皆至地從手得義也其首皆平衡也肅拜手不至地亦從手得義也首俯而已容經俯首曰肅坐是也夫三代之儀亡矣漢徐生以頌爲禮官天下郡國有容史頗講求焉然不盡如古也學者何幸而生三代之盛哉說弁一弁說文作㝸象形釋名形如人手之弁合漢輿服志度長七寸高四寸其制如覆桮前高廣後卑銳古者桮俱橢長淮南子曰闚于盤水則圓桮水隨隨讀爲橢是也弁制橢故有高廣卑銳之異有高廣卑銳故如人手之弁合焉後世禮家率圖如覆盂不知桮因不知弁况禮樂沿革之大者其轉而相譌甯有旣邪學者甫涉禮書卽有意聚訟庶幾愼其言可也說弁二周禮弁師王之皮弁象邸注下柢也古者冠冕弁皆冠于髪取其冠曰冠取其俯曰冕取其槃曰弁以弁有柢知冠與冕皆有柢也其有柢奈何凡冠髪者必堅正柢所以爲堅正也漢之幘晉之巾周之幞頭皆自額以上則用通帛焉陶宗儀曰古者冠自額以上後世設巾幘故止加冠子髪此言非也古者斂髪以纚如後世之巾幘焉皮弁止高四寸施之于額無以覆纚與髪知宗儀之妄也說弁三郊特牲委貌周道也章甫殷道也母追夏后氏之道也言玄冠也漢委貌如皮弁章甫母追其諸不相遠歟周弁殷冔夏收言爵弁也詩厥作祼將常服黼冔毛傳夏曰收周曰冕古士以爵弁爲冕冕而祭于公卽爵弁服也三王共皮弁素積言皮弁也噫昔人禮經明正大率如此而後世多紊之皆求深與博之過也說鉤古者大帶以禬結鞶帶以鉤楚辭若鮮卑只注滚頭帶卽鉤也晉語鉤近于袪荀􅀸子縉紳而無鉤帶是也漢鞶帶玉鉤䚢䚢者鉤牝也唐宋定帶銙之制自十三至七爲差然首皆用鉤通考開元中帶鉤穿帶本爲孔宋始周折之是也明制前三銙曰三台鞶帶始廢鉤好事者因以鉤鉤畫今所傳多古帶鉤小者甲帶鉤及佩鉤以爲畫鉤者市井之言耳夫服御以適用而巳後世徒爲美觀如帶之銙于環帶何損益邪君子觀于鉤而知先王之禮樂無虛設者也駁史伯璿月不受日光辯中西法皆言月星無光受日光以爲光儒者言天亦主之惟史氏伯璿以爲不然其辯月光非受日光曰物之影必倍于形地與水十萬里對日之衝影當倍此以天度計之一度二千六百里有奇地影二萬里當掩八十餘度如月本無光則月行在日衝八十度內當爲地影所掩望日及望前後月皆無光矣此言非也凡形在光與光所衝之閒以遠近爲影之大小如徑丈之室置火東堵規形之徑三寸者去火五尺而中表焉其影至西堵倍三寸耳何也光與光所衝相去均也引之令去火二尺五寸則去西堵七尺五寸而影不啻再倍之再引之去火寸則且百十倍之而西堵皆掩矣何也去光近去光所衝遠也若移之去火七尺五寸則去西堵二尺五寸其影如形之徑三寸焉移之去西堵寸影亦如之何也自中表以往去光遠去光所衝近皆如其形以爲之影焉故也今法地周九萬里徑及三萬里日之歲輪距地一千六百萬里又五萬五千里有奇月之歲輪止四十八萬二千里有奇月行在隔地日衝之日地去日至遠去月至近影宜如其形三萬里而月之歲輪其周得三百萬里有奇以不及三萬里之影在三百萬里之中而以月之經緯度與日之經緯度推之地影之掩月暫矣此月所以不恆食食亦止一二時而復也何至有掩八十餘度之說邪其辯星非受日光曰月受日光自一幾而弦而滿以去日遠近爲差經緯星近日遠日皆滿是星自有光不受日光可知此言亦非也今法以遠鏡測太白光時晦時上下弦時满蓋太白伏見輪附日而行在日下則晦日上則滿日旁則􅁌與月均爲受日光無疑辰星小于太白伏見輪附日㪅近晦弦滿如太白而合散無常占驗家以爲變化猶龍者其理有三人之視辯乎大惑于小一也光遠則光所爍得圜體之半近則過其半焉光力勝也二也辰星得水之氣太白得金之氣光爍金常得圜體之半爍水則如無質焉而皆能徹三也金水星與月其歲輪皆在日天之內故各以其度與質受光同不同若此熒惑歲輪去日一千萬里有奇歲星歲輪去日一萬一千萬里有奇塡星歲輪去日二萬四千萬里有奇恒星十九萬萬里有奇皆在日所行輪之外凡在光之外繞光旋行者自中視之所受之光皆滿焉此熒惑歲星塡星恒星無晦弦之故也至星不爲地影所掩亦有說焉凡形在光中其見於光所衝之影必有所絕徑三寸之影法當十二丈而絕地影不及三萬里法當一千二百萬里而絕太白辰星之行附日不居隔地日衝爲地影所不至旣不能掩熒惑歲星塡星恆星之行有時居隔地日衝之舍其距地皆在一千二百萬里之外地影巳絕亦不能掩此地形能食月不能食星之故也今法多出歐羅巴測經緯星大小及相去里數本不可盡信近又改定之而星體及遠近高庳之大概則信焉故據之以質史氏後之君子必有以知其不誣矣駁朱錫鬯書楊太眞外傳後唐書元宗紀開元二十五年四月乙丑廢太子瑛及鄂王瑤光王琚爲庶人皆殺之十二月丙午惠妃武氏薨二十八年十月甲子以夀王妃楊氏爲道士號太眞天寶四載八月壬寅立太眞爲貴妃數事皆大惡皆日之此史家之愼也朱檢討錫鬯據宋敏求唐大詔令謂開元二十三年十二月二十四日册夀王妃二十五年正月二日爲道士號太眞作意與史背敬按唐大詔令非完書傳寫多誤脫其時日本不足爲據又檢討之說于本事皆不相應何也唐制納后凡納采問名納吉納徵皆下制書非册也至册后之日始宣册授册寶卽吿期其日奉迎皇太子親王納妃亦然檢討謂册夀王妃始納采嗣行六禮非受册卽八夀邸此言非也太眞之號以居內太眞宮如歸眞觀在安仁殿後是也太眞爲道士已入宮元宗欲掩人耳目故遲至天寶四載方册爲貴妃耳檢討謂自道院入宮非自夀邸入宮此言亦非也以是考之卽使如檢討之說二十三年十二月册夀王妃二十五年正月爲道士是迎入夀邸已越一年不能爲太眞諱矣況太眞以惠妃薨後入宮惠妃薨在殺太子二王之後豈有四月方殺太子二王而正月太眞先巳入宮之事哉是太眞爲道士實在二十八年非二十五年甚明白在壽邸且六年益不能爲太眞諱矣檢討之說于太眞之節不能有絲毫之益徒使天下之人竊意如是大惡千百年後尙有人綠飾之則何憚而不爲惡是決倫紀之閑而長淫穢之志也又厯志武后永昌元年初用周正以十二月爲臘月建寅月爲一月武后紀皆書正月臘月一月至十月此武后改正法也竇后被殺在長夀二年臘月乃建丑之月檢討謂竇后忌辰在建子正月中宗用夏正卽以建寅正月爲忌辰順宗方改建子十一月其說甚荒謬檢討生平多顚倒舊聞以就已說然此風蓋漢宋大儒所不免以致羣經破碎後學迷誤其可惜千百於檢討所著後之學者可不愼哉舊唐書于二十八年十月不書以夀王妃爲道士而書甲子幸華淸宮卽新書妃爲道士之日于天寶四載八月書册太眞妃爲貴妃太眞道士之號而已稱妃其意益微而顯矣惟舊書事在甲辰與新書壬寅不合蓋新書據下詔之日舊書據禮成之日耳雜記凡彗孛皆地氣騰至冷際以上天氣攝之合爲形故天運而彗孛隨之所繫之次舍不可易天狗流星之屬也亦地氣所騰火沸金金抱土金土就下故不爲天氣所攝激而墜焉雲氣乍聚乍散不繫次舍以所見之地爲占寶氣埋則聚岀則散亦占所見之地不繫次舍晉書張華傳雷煥日斗牛之閒常有異氣華曰是何祥也煥曰寶劍之精上達于天耳因問曰在何郡曰在豐城卽補煥爲豐城令掘獄得雙劍並刻題一曰龍泉一曰大阿遣使送一劍與華華報書曰詳觀劍文乃干將也莫邪何以不至此􅋘妄之說也煥豫章人去豐城百里當以望氣蹤跡得之因干華華托斗牛神其說耳又越絕書楚王使干將歐冶子作劍三曰龍泉太阿工市吳越春秋吳王使干將作劍二曰干將莫邪晉書合之􅋘妄乃至于此嘉慶十一年四月十九日舟過豐城記此世說殷洪喬作豫章郡臨上都下人因附百許函旣至石頭悉擲水曰沈者自沈浮者自浮殷洪喬不能爲寄書郵世說言石頭皆指秣陵之石頭如王敦住石頭蘇峻至石頭是也豫章之石頭見晉書周訪及侯安都傳今世說此條蒙作豫章郡而曰旣至石頭其豫章之石頭歟其時朝野多故豫章大鎮或書有不可達者故託辭爲此抑爲州將者以此聳人聽聞豫絶繫援皆未可知世說列之任誕非也八月二十八日過石頭記此甯都民多立廟祀漢高祖州志言州北八十里爲高祖祖墓故祀之此言鄙野無故實地志之謬多此􅀋也漢書高祖紀贊曰高祖卽位置祠祀官則有秦晉梁荆之巫注范氏世祀于晉故有晉巫范會支庶留秦爲劉氏故有秦巫劉氏隨魏徙大梁故有梁巫後徙豐豐屬荆故有荆巫是漢之先世自晉而秦而魏而豐較然可數于甯都不相涉贊又曰豐公蓋太上皇父其遷日淺墳墓在豐鮮焉是豐公葬豐也太上皇葬櫟陽昭靈夫人葬小黄豐公以前當葬梁甯都無高祖祖墓可斷已漢制郡國皆立廟然必巡幸所至者其時豫章郡治今南昌高祖未嘗至而甯都又未置縣以山谿􅀠雩都益不宜有廟北漢劉晟南漢劉龑皆號高祖然北漢沙陀人南漢彭城人其時甯都爲楊吳李唐所據與南北漢爲敵國亦不宜有廟唯十國春秋載劉龑之祖自上蔡徙閩或甯都爲道所經有旅葬者故後世祀龑歟龑奢虐爲民害數十年然則甯都凡祀高祖者其廟皆可毀也十一月八日過甯都記此襍說西域聞見錄言京師望北斗􅀡北少迤西而已而西域望北斗較京師更迤西按西域在京師西南幾三萬里視北斗應迤東矣而反迤西者何哉蓋地之體九萬里地平之上中國所見日岀入東西不及五萬里而黄道邪倚天中日行自東而東南而正南而西南而西以入于地平凡人在地平皆據向日爲南西域當日厯西南而西之道則西域向日之南乃中國之所謂西南矣旣向中國之西南視日則背中國之東北而北斗岀其右故以爲較京師更迤西夫天地有形質可測者也自衆人至聖人其視于天地無殊目焉而已顚倒轉移若此况人性之深微天道之蕃變衆人之所見必不能同乎聖人者哉故君子觀道必要其備立言必求其安蓋庶幾所見之無􅅭也職方外記言極北有鳥魚國半年無日其地離南陸甚遠日行南陸爲地氣所障改秋分後無日臺郡雜志言海中有暗嶴亦半年無日蓋在地極南離北陸甚遠日行北陸則爲地氣所障也北史稱北方日入尙見博烹羊胛熟日已東升其地當在鳥魚國之南地氣尙不障日而地之圜體漸迤漸小故日行空中之時多入地平之時少耳觀于此知有形者必有所限隔窮極雖光氣至虛亦有限隔窮極焉心之靈如光氣耳記曰雖聖人有所不知是也若知之本體則無限隔窮極當以養復之學者不可不察也眞人府印說江西貴溪縣眞人府印凡大小四其三皆曰陽平治都功印案宋仁宗時安福縣官林積以張魯敗于陽平故印稱陽平治都功聞于朝毁之林君之識非人所及然其言有未盡者魯弟衞敗于陽平時魯在南鄭非魯敗于陽平且治都功未竟其說敬官江西眞人府以三符至故爲說以通之異􅁐錢唐杜明師夢人入其館是夕謝靈運生其家送杜治養之注治音稚奉道家靜室也此印文治義也後漢書百官志郡守有功曹主選署功勞通典督郵監屬縣有南西東北中五部功曹之極位前漢書文帝紀遣都吏巡行注今督郵是也此印文都功之義也三國志張魯傳來學道者初名鬼卒受本道已信號祭酒各領部衆多者爲治頭治都功其卽治頭歟魯之祖道陵本沛人隱鶴鳴山在今四川劍州魯之父衡繼之魯據漢中今漢中府也陽平關卽今府屬褒城縣之陽平驛爲漢中之阨魯旣用鬼道陽平當設治以治之然自魯祖父至魯及子富以降魏入許下無居陽平者惟衞嘗築城于陽平今子孫居貴溪爲其道數千年止用陽平印不可解也其一印中爲交午以達于四際中與四際各圍以朱白圍其方中左右各二左爲文袤置之右爲文平置之有陰陽變化之理乃鬼道符記也夫眞人府所以惑人者印也而鄙誕不經如此其他可知自東晉以來士大夫奉其道者不可勝數皆附會神仙誇飾變異以神其說亦獨何歟得姓述吾惲之初不詳所自岀明洪武中吳沈纂天下姓得一千九百有奇惲姓始著官譜以爲岀于漢平通侯楊惲子孫徙安定遂以名爲姓敬考謝承後漢書平通之孫楊豫自徙所上書乞還本土是未嘗以名爲姓也意者豫之後方易姓歟顔師古匡謬正俗引晉灼漢書音義證楊有盈音意者自楊而之盈自盈而之惲爲音之近歟皆不可知而吳沈之書已五百年舍是別無可依據故言吾惲之得姓必本平通侯敬十世祖東麓府君黃山集載元之季有發冡者得碣曰漢梁相國惲子冬之墓故推子冬爲始祖如是而已不詳其名不詳其仕時不詳其世次東麓府君生明成化中距元亡不百年事當得實而嘉靖中所輯私譜載子冬府君之名曰貞道考新莽至東漢無二名其附會可知載仕時曰諫梁王劉永曰避王莽之難東遷考劉永爲梁王在王莽伏誅之後其附會亦可知載世次曰自子冬至方􅀡凡四十四世然皆一人耳而展轉垂一千二百餘年于理不可信曰二十六世原爲齊平江路總管曰三十七世爲唐洪都制史考元始置平江路唐置洪州無洪都此皆事之不可信者故敬竊意惲姓世次自子冬至方􅀡府君當別爲一表于表序詳辨之而表方􅀡府君爲世次之首方􅀡府君長子曰紹恩府君居河莊爲惲姓北分之祖子孫若而人次子曰繼恩遷上店爲惲姓南分之祖子孫若而人如是則可以示後世矣夫氏族之學自秦漢之世多所淆譌如以國以邑以氏以官爲姓于諸姓中最爲可據然古之民居是國則從其君之姓居是邑則從其大夫之姓所岀已不可問况至後世中外遞更貴賤互易而譜之者必欲强爲之說不至自誣其祖幾何後之事吾譜者庶幾其愼之可也無錫宣頴達麗中吳縣徐敦仁愛杉春秋說上記曰比事屬辭春秋之敎也鄒氏夾氏其爲說不可知矣左氏公羊穀梁三傳皆於屬辭窺聖人之意所謂比事者舉其畧焉漢唐儒者仍之至宋則比事之說漸廣然取其一而遺其二三取其二三而遺其十百故聖人之意未能觀其備以折衷之本朝儒者乃條春秋之文十百系焉於是聖人之意可以事推可以文合敬以其法讀春秋推之合之得數條列之如左桓十一年夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執祭仲突歸於鄭鄭忽出奔衛十二年十有一月公會鄭伯盟於武父十四年春正月公會鄭伯於曹十五年五月鄭伯突出奔蔡鄭世子忽復歸於鄭秋九月鄭伯突入於櫟莊四年夏齊侯陳侯鄭伯遇於垂十四年冬單伯會齊侯宋公陳侯衞侯鄭伯於鄄十五年春齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟於幽三十一年夏五月辛酉鄭伯突卒冬十有二月葬鄭厲公春秋所書鄭事如此中間桓七年高渠彌弑忽立子亹十八年齊殺子亹立子儀皆不書莊十四年鄭殺子儀納突亦不書若是者何哉葢寤生之爲惡也非一日矣至繻葛之戰拒敗王師人人之所得誅也其時天王旣無再舉之師諸侯亦無勤王之議此非惟齊宋魯東大諸侯皆與寤生交也葢出於祭仲之謀焉旣戰之後卽使勞王勞王者有以賄王也問左右者有以賄左右也古者謂遺曰問王不可言問故言勞也以伐鄭始以賄終賄王事未必濟賄左右則事必濟於是寤生之罪可以不討寤生之國可以不夷而寤生之爵可以不削矣故卒葬如諸侯之書雖然突之書名忽之書名何也其時寤生不能有所達於王且以爲不必達焉是故忽之爲世子未嘗命於王之朝突之爲公子亦未嘗達名於王之朝鄭突書突忽書鄭忽而已雖然突書鄭伯何也其時忽在位三月未及請命可知突以爭國歸其速請命亦可知盟武父會曹必已命也書曰鄭伯書曰鄭伯突尊王命也雖然忽之書鄭世子何也其時忽在衞突已受命爲君忽之告周也必以嫡正居長爭國而自引爲世子周之報之也旣不能奪突之爵以與忽又不能抑忽之長以從突亦必以嫡正居長稱之爲世子文告之往來傳之於天下藏之於諸侯三年於兹矣於其歸也書之曰鄭世子亦尊王命也夫如是則鄭之受命於王爲鄭之君者突一人而已忽不得而干之子亹子儀豈得而干之哉夫突出奔者也出奔則絶爲君突入櫟者也櫟亦鄭也入櫟則不絶爲君突不絶爲君彼忽與子亹子儀之君鄭者王不得而命之矣國無二君之義也是故三人之立與弑皆不書亦尊王命也至遇於垂之鄭伯先儒以爲子儀豈有是哉觀與齊陳睦則亦突而已今夫寤生之大逆其子孫皆宜誅者也乃旣赦其身復扶樹其子孫且舍長立幼以亂其國周之政刑可謂傎矣然而失政刑者天下之共主也天下不得不奉其所失之政刑失政刑因以失名號者共主之朝典也史官不得不書其名號一以見權必統於一而不可妄干一以見名必從其正而不可㫄假一以見事必傳其實而不可曲沒且由是推之以寤生及忽與突之敗常亂俗如是而必乞靈於天子之名號以令其衆則主名號者不可輕以寤生及忽與突之乘强肆悍如是而終不能藉天子之名號以葢其惡則受名號者不可恃夫如是則朱子門人所列不書姓不書官不書爵以爲誅絶之例者豈聖人之意哉定十四年秋衞世子蒯聵出奔宋哀二年夏四月丙子衞侯元卒晉趙鞅帥師納衞世子於戚冬十月葬衞靈公十二年秋公會衞侯宋皇瑗於鄖續經十六年衞世子蒯聵自戚八於衞衞侯輒來奔觀於續經知經書會衞侯亦輒也其書衞世子衞侯皆王命也蒯聵命於出奔之前輒命於旣立之後也此之謂愼名春秋說下桓三年九月夫人姜氏至自齊十八年春王正月公會齊侯於濼公與夫人姜氏遂如齊夏四月丙子公薨於齊丁酉公之喪至自齊冬十有二月已丑葬我君桓公莊元年三月夫人孫於齊不書姜氏􅀩上之辭也夫人享齊侯一如齊師一會齊侯三皆書姜氏知此文不書非貶也書於葬後者已至魯而復孫也先儒以爲畱齊未歸則宜書於喪至之前矣不書復絶之也莊二十四年八月丁丑夫人姜氏入閔二年秋八月辛丑公薨九月夫人姜氏孫於邾公子慶父出奔莒僖元年秋七月夫人姜氏薨於夷齊人以歸十有二月夫人氏之喪至自齊二年夏五月葬我小君哀姜喪至不書姜者齊桓公討之絶其屬籍故不得稱姜由齊之辭也葬書姜者魯人請之由魯之辭也夫文姜哀姜之惡至矣爲薨爲孫爲享爲如爲會爲奔莒連類書之而其事瞭然可推豈在書姜不書姜書氏不書氏哉雖然自三傳言之文姜哀姜之淫之弑可擢髮而數之也不自三傳言之則春秋所書曰薨曰孫而已文姜哀姜之淫之弑不可擢髮而數之也聖人之經欲以傳信於後世而爲不盡之辭曰可推而知則推而得者有之推而失者亦有之推之而得其全者有之推之而得其半者亦有之矣聖人之經夫豈若是葢古者史官之掌凡朝廷記載之詳與國文告之繁王朝典章之備皆萃於史官如三傳所言其時故府之牘必且有十倍之數十倍之者韓宣子見易􅁚與春秋曰周禮盡在魯是也然或以年積而放失或以事襍而舛錯是非乖違名實紊亂皆由於此春秋其綱也聖人取其有關於治亂者筆之無當於褒貶者削之由是魯史之放失者可求魯史之舛錯者可正討論之於前垂著之於後而是非大明名實大著故曰春秋成而亂臣賊子懼曰知我者其惟春秋乎罪我者其惟春秋乎先儒乃求之瑣屑之間隘矣是故春秋者魯史之㑹要也魯史者春秋之實錄也魯史存而三傳作三傳成而魯史亡其不亡者附于三傳後世讀而知之其亡者不附于三傳當時讀而知之聖人豈爲不盡之辭哉抑更有可証之於經者僖六年鄭殺其大夫申侯十年晉殺其大夫里克十一年晉殺其大夫丕鄭父二十八年楚殺其大夫得臣三十年衞殺其大夫元咺文六年晉殺其大夫陽處父九年晉人殺其大夫先都晉人殺其大夫士縠及箕鄭父十年楚殺其大夫宜申宣九年陳殺其大夫洩冶十三年晉殺其大夫先縠十四年衛殺其大夫孔達成八年晉殺其大夫趙同趙括十七年晉殺其大夫郤錡郤犨郤至十八年晉殺其大夫胥童齊殺其大夫國佐襄二年楚殺其大夫公子申五年楚殺其大夫公子壬夫十九年齊殺其大夫高厚鄭殺其大夫公子嘉二十年楚殺其大夫公子燮二十二年楚殺其大夫公子追舒二十三年陳殺其大夫慶虎及慶寅二十七年衞殺其大夫􅇞喜昭二年鄭殺其大夫公孫黑五年楚殺其大夫屈申十二年楚殺其大夫成熊二十七年楚殺其大夫郤宛哀二年蔡殺其大夫公子駟夫殺大夫書國書官書氏書公子公孫書名書字其正也有罪無罪皆然美惡不嫌同辭也魯史詳之則美惡見矣或書名或書字從文告之辭名從主人如後世以字行也成十五年宋殺其大夫山不書氏者山殺魚石亡宋無蕩族也襄二十年晉人殺欒盈出亡非大夫也莊二十年陳人殺其公子禦寇昭十四年莒殺其公子意恢不爲大夫也皆顯然者也莊二十六年書曹殺其大夫僖二十五年書宋殺其大夫文七年書宋殺其大夫何哉其必非闕文可知也先儒以爲殺無罪故不名於是洩冶郤宛皆文致之是春秋之書周內之書也其可歟葢無君命也君名其臣臣不得名其大夫陽處父先都箕鄭父胥童之殺必假君命以赴也慶虎慶寅君討始殺之也文八年書宋殺其大夫司馬宋司城來奔何哉其必非闕文可知也書司馬者死司馬之節也書司城者致司城之節也其不名亦無君命也是數條者比魯史讀之則所殺所奔之人見不比魯史讀之則所殺所奔之人不見聖人豈爲不盡之辭哉而惜乎三傳所紀或無傳或有傳而妄設例焉是故古之春秋無待於三傳而自明今之春秋有待於三傳而反晦知此者可以讀春秋讀大學自陽明先生極推古本大學天下學者翕然從之先生有功于遺經矣而其釋格物也曰去欲如宗門所謂不著一物而已其釋致知也曰良知如宗門所謂自性起念而已聖人之學夫豈若是哉今之學者多不從其說聰明之士千枝萬條互相剖辨而言格物致知也大㫖皆以朱子之言爲宗雖然朱子以爲有闕文而補之此則未厭後人之意者也夫大學之條理燦然者也曰誠意曰正心修身曰修身齊家曰齊家治國曰治國平天下皆一一釋之而格物致知獨無所釋者何哉葢致知者不可釋者也夫所謂物者何哉天下國家身心意是也所謂格物者何哉天下國家身心意之理之至是也知者知此也致知者致此知也而何以知何以致大學無一辭焉卽要之曰此謂知本此謂知之至也何哉葢知者至廣極大析精剖微不可端倪者也所入之途千百焉所出之途亦千百焉大小相乘緩急相引若以繩尺加之必有閉焉窒焉者矣必有强智以愚强愚以智而不相及者矣是故致知者任人之用力而已其所以用力者雖聖人不能與乎人也是故致知者不可釋者也致知不可釋而格物必舉其事焉是以大學反覆天下國家身心意相因之實相待之要而一以知本要其至於是天下之人之知皆渙然怡然于聖人之途軌而智者不至于歧愚者不至于㒺高者不至于磒虛卑者不至于閡實矣蓋聖人之于致知也不如儒者之與之梏亦不如異端之决其郛讀大學二夫知之體何如哉人之心五性主之曰仁曰義曰禮曰智曰信七情發之曰喜曰怒曰哀曰懼曰愛曰惡曰欲而輔其情之發以行乎性者有二焉曰知曰能能者所以實其知者也情未發之時其知先耀情旣息之後其知尙渟而能皆退聽焉是故知者周乎內外始終者也異端見之卽以之爲心聖人者知爲心之一端而已而其用足以舉心之內外始終故以致知爲入聖之本夫知之用何如哉咸之九三曰憧憧往來朋從爾思往來者思慮之道也憧憧往來者非思慮之道也孔子釋之曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮知乎此則非思慮之道息矣復釋之曰日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉知乎此則思慮之道行矣義止矣無以復加矣然而孔子繼之曰尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也若是者何如哉蓋屈伸之道有有心者焉尺蠖是矣君子之精義入神如之心至則氣動其知以力進也有無心者焉龍蛇是矣君子之利用安身如之氣息則用神其知不以力進也於是孔子又繼之曰過此以往未之或知也窮神知化德之盛也若是者何如哉葢以力進之知與不以力進之知顯與晦交焉動與靜守焉其積之久也不推所以神而能窮神不求所以化而能知化此非力之所能致也乃德之盛而已窮神知化卽精義入神之至也德之盛卽利用安身之至也此知之用之極也夫有心而知進朱子致知之言已不能盡矣况無心而知亦進又豈言語之所能盡哉故曰致知者不可釋者也知乎此則大學如中庸一以愼獨爲始事而誠意又推本致知其次第均無可疑焉讀孟子一眞西山先生因史記言孟子受業子思之門人遂以七篇之言一一比之中庸此宋儒之勤也雖然聖賢之學有所自則可矣若一一比之不爲後世附託而無實者開一徑歟敬觀中庸求端於天命其終篇所言皆性道教也至末章始要之曰上天之載無聲無􅆨至矣子思此言蓋聖人之至極天地以合萬物以成與異端所言本不同然至此則性道教無可言而歸之命命無可言而歸之天天無可言而歸之無聲無􅆨矣使後人復附益之何怪異端之揚其波而他流煽其焰而㫄燭哉孟子七篇未嘗一言及之者蓋不敢導其波之竇而投其焰之薪也此孟子善學子思而正人心息邪說距詖行放淫辭之本故曰功不在禹下讀孟子二孔子之教曰博文曰約禮曰博學之審問之愼思之明辨之篤行之上智如顏子下愚如哀公教之未有以異也然皆入道之門徑而已非以爲卽道也故復要之曰下學而上達若是則於道豈有不至者邪孟子之教曰學問之道無他求其放心而已矣曰無爲其所不爲無欲其所不欲如此而已矣曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也敬少嘗疑焉陸子耳自聰目自明之言不有相若者乎陽明先生求諸心不求諸事物之言不有相若者乎孟子學孔子者也而孔子之教如彼孟子之教如此是首變孔子醕篤謹愼之尺度以趨􅂤易使後儒之異說得託之皆由於孟子而其末流之弊將有不勝究者也旣而思之孟子言求放心先之曰仁人心也義人路也言無爲不爲無欲不欲輔之曰人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也孟子皆以仁義言之言良知良能亦然則言實矣豈如後儒之無畔岸哉且時至戰國人益夸誕巧强不可控抑其視孔子博文約禮之教必以爲卑陋迂小而不爲故孟子就其心之所達可以導之於聖賢者而示之使之心明意豁翻然有以自悔然後可以反循孔子之教非謂爲學之道可不從博文約禮入也故曰博學而詳說之將以反說約也明儒謂陸子及陽明先生之學出於孟子而盡力附會之亦蔽之甚者已說仙一龍以肉飛信之乎曰信之禽以翼飛魚以鬛飛信之乎曰信之若是則仙之冲舉何不信之與有龍大函天地細若蠶蠋信之乎曰信之布穀爲鷂鷂復爲布穀雉爲蜃爵爲蛤蝮育爲蟬竹爲蛇信之乎曰信之若是則仙之幻化何不信之與有有朝夕爲壽夭者蜉蝣是也有三十日爲壽夭者蟬是也有三年爲壽夭者爵是也有三十年爲壽夭者馬是也有百二十年爲壽夭者人是也有千百年爲壽夭者虎象是也信之乎曰信之若是則仙之長生何不信之與有管子曰人水也夫氷之行皆火也水火相守而物生焉水之需爲肉其堅爲骨而火運焉火之明爲知其炎爲運動而水養焉物之生也氣與形二者而已矣形九而氣一者爲土石形七而氣三者爲草木形五而氣五者爲人與獸形氣等故能行形四而氣六者爲魚形三而氣七者爲禽氣勝形故能飛形一而氣九者爲龍故能藏能見能高能下夫仙純氣也故列子御風而行氣能化形故噓爲風雨畫爲江河氣能固形故高爲星辰堅爲金石然必有不附形而立者而氣始純其諸爲至人眞人化人之極歟說仙二夫不附形而立者其始皆附於形者也今夫火滅燎而滅之火之形亡矣而􅀬不亡蓋久之久之而或息焉今夫水􅂩地而灌之水之形亡矣而濕不亡蓋久之久之而或息焉火與水其形也􅀬與濕其氣也今夫人其形􅄅然者也而其氣則薄萬物焉橫古今焉通物我貫幽明焉何也百夫之長其氣􅙬於百夫合百夫之氣也千乘之相其氣􅙬於千乘合千乘之氣也觀鬬獸者其氣充觀舞禽者其氣豫靈蠢不能閡也癰可潰之以樹疾可洩之以草動植不能間也祭祀而享吐焉卜筮而從違焉微顯不能隔也若是則合之於天地充之於古今豈以大小遠近爲彊域哉若是則不附形而立者何哉與天地凖則與天地闔闢與古今齊則與古今流行而已矣是故理大物博莫不尊親此其上也一行之極通於神明此其次也形蛻矣其氣皆不息者也又其次則行有大小而氣亦有遠近焉形蛻矣其氣或百年而息或數百年而息或數千年而息者也方士之術氣未充則積之氣未永則守之其形不可委也於是芝菌導引行焉充矣永矣夫然後可委而去之其氣亦或百年而息或數百年而息或數千年而息者也所謂刼也夫􅁈之氣不散則存剛戻之氣不散則存取精多用物宏之氣不散則存皆鬼也陰類也仙則陽􅀋也方士之術養形以制氣得氣以變形攝陰於陽者也陰者尙存而况於陽哉此葢不附形而立之一術而已非至人眞人化人之極也說仙三至於附形而立者亦各有其等焉邵子曰百二十年者常數也不及者皆傷也然則聖賢有傷焉者乎曰傷之於天者上古之禀厚中古之禀漸薄也傷之於人者衆人傷於縱已聖人傷於拯人也其不傷者雖衆人亦及數焉能養則逾之倍之惟其力之所至雖然有以養得者卽有以不養得者其骨肉必强固其知其運動必和而勁寶掌禪師李百八等是也此天與之也殊氣也若是者長年而已委形之後有道則合陽而亦爲仙無道則合陰而遂爲鬼氣盛則爲鬼者近於仙氣衰則爲仙者近於鬼因絶則爲鬼爲仙之氣其終皆合於太虛因不絶則爲仙爲鬼之氣其變復歸於萬物天地自然無足怪也若方士之術則以養得之者也其書多廋詞多歧旨芝菌一術也而以爲麟焉以爲鳳焉道引一術也而以爲龍焉以爲虎焉白石之說累變而益陋黃庭之說屢遷而益誣其上者􅁍疾延年而已其下者且益其疾促其年不可救也惟有道之士不藉其術以治氣而假其術以畱形旣得其術以畱形遂卽其形以治氣是爲方士之至道極功而於仙可漸而至焉然而知之者蓋亦廑矣世之爲其術者或附之於天或附之於日月或附之於易或附之於莊列或附之於釋氏各有得以􅅭世之人皆讏言耳君子愼毋爲所惑焉嘉慶十有八年十二月甲寅與建平龔西原說仙因識之釋舜說文舛部舜草也楚謂之葍秦謂之藑蔓地連華象形從舛亦聲按鄭風顏如舜華此舜是也說文草部蕣木堇也朝華暮落从草舜聲按月令木堇榮此蕣是也二物也是故鄭風之舜非月令之蕣也其舜之非蕣奈何蕣之榮如戎葵近黑遠者微有光曜而已以擬女之顏詩之比物豈若是歟舜之身蔓地步以百計焉舜之榮連華英以億計焉紅而暈暈而善惑焉故曰顏如舜華是故鄭風之舜葍也藑也月令之蕣木堇也二物也是故鄭風之舜非月令之蕣也雖然詩之傳固辨於草木者也其傳鄭風曰舜木堇何歟按爾雅椵木堇櫬木堇郭注別二名夫爾雅之別名葢有焉唐􅀩女蘿女蘿菟絲此別菟絲也一物也芣苢馬曷馬曷車前此別車前也一物也皆重文言之椵櫬無重文鶾天雞螒天雞之􅀋耳二物也則未知舜之木堇爲椵歟櫬歟則未知蕣之木堇爲椵歟櫬歟古者白爲椵爾雅椵柂是也赤爲櫬爾雅櫬梧是也蕣白身其椵歟舜赤身其櫬歟是故鄭風傳之言木堇爲舜言之也櫬木堇也月令之言木堇爲蕣言之也椵木堇也其舜與蕣之皆爲木堇奈何葉堇也身木也皆爲釋草奈何爾雅于木之小而弱弱而灌生者草之舜與蕣皆小也皆弱也皆灌生也後之釋者以爾雅木堇爲一物於是椵櫬混焉以月令之木堇釋鄭風之木堇於是舜蕣混焉舜蕣混而舜之名不立矣舜之名不立於是蔓地連華之舜遂以檉河柳當之夫檉在釋木非小而弱弱而灌生者也郭注赤莖小楊卽赤楊也高至㝷丈焉豈蔓地連華者哉嘉慶十六年偕子寛自都還江南見蔓地連華者問之土人曰日及華也江南名河柳葢木堇華名日及椵櫬通焉河柳則誤名也其誤名者日及在江北皆蔓地連花至江南有㝷丈者焉卽赤楊也故牽連及之耳十八年十二月在吳城作此釋正焉釋荍爾雅荍蚍􅗶郭云今荆葵也似葵紫色陸云華紫綠色羅云華似五銖錢粉紅有紫文縷之數說皆是也以名荆葵故北方名江西藾藾蒿也唐十道志江南西道北盡鄂岳南極涪黔皆荆境也以紫色紫綠色似五銖錢粉紅有紫文縷之故南方名藍菊藍言色菊言形也然則以爲似葵者何歟古者茹末大曰葵說文葵菜也爾雅莃菟葵芹楚葵終葵繁露皆葵類也其華之名葵者菺戎葵是也郭云今蜀葵也華如木堇華夫戎葵如木堇與荍懸甚矣以爲似葵者何歟葢華如木堇而五色者曰蜀葵華如木堇而黃者曰秋葵卽黃蜀葵也華如菊而大徑五寸莖及丈者曰黃葵衞足葵也華如菊而大徑一寸莖餘尺者曰荆葵卽荍也似葵者似黃葵非似蜀葵也然則以爲蚍􅗶者何歟其廣其萼蔟如聚蛾子焉故曰蚍􅗶也古今注以蜀葵混荆葵後人求所謂蚍􅗶而不得遂以紫荆爲蚍􅗶謬矣釋鳴鳩鳴鳩鳴鳩也鳴鳩鴶鵴鴶鵴布穀布穀郭公也羽黑翅尾如反舌有紒焉如鸜鵒其鳴多聲聲二十四轉故曰鳴鳩黃鸝十二轉而已其哺子朝從上下暮從下上故小宛之詩以興懷二人焉夫父于之倫正推之無不正矣鳴鳩之詩大矣哉戴勝戴鵀也大如鴿長喙赤黑雜羽而有白文其勝在首度周尺尺有畸兩銳而中楕如五木亦赤黑而白文古者力所能勝曰任任者任其所能勝也故所任之物名之曰勝戴鵀戴所任戴勝戴所勝也西王母戴勝而處西極之地其國俗以戴任爲業耳豈有仙人之說哉後之言勝者至以飾其首非初義矣釋蟪蛄蟪蛄草居非蟬也而似蟬蟬皆木居也蟪蛄大如幺貝身羽足深綠色羣族菅茅中四月應陰氣千百相和而鳴其聲喧沈畱耳中啾啾然故曰違山十里蟪蛄之聲尙猶在耳蟪蛄鳴兮啾啾爾雅􅎒茅蜩注江東呼茅􅎒此蟪蛄也知蟪蛄之爲茅蜩而後爾雅釋蜩可別焉蜓蚞螇螰註卽蝭蟧也一名蟪蛄此景純之誤也疏方言蚞齊謂之螇螰楚謂之蟪蛄此子雲之誤也蝭蟧不居似馬蜩而差小黑黃色其鳴自呼曰蝭蟧夏蟬也非蟪蛄也蜺寒蟬注寒螿也亦木居似蜓蚞而復小黑黃色其聲鏘鏘如舞鐃如鈴故曰螿非蟪蛄也蚻蜻蜻注方言有文者謂之螓亦木居似蜺而尤小靑赤色其聲札札如繅如丁甯故曰蚻非蟪蛄也後人以蜺爲蟪蛄以蚻爲蜺亦謂之蟪蛄轉而相淆豈有旣耶蜺蚻秋蟬也蜩蜋蜩螗蜩蝒馬蜩皆夏蟬也自其蛻言之曰蟬自其鳴言之曰蜩自其采言之曰蜋具五色也自其蝘言之曰唐首正偃也自其大言之曰馬馬蜀胡皆大也蝒之義如蝘大過說大過陽過也四陽居二陰之中曰大過九四棟隆上比五故隆也象傳不橈乎下言比乎上也九三棟橈下比二故橈也象傳不可以有輔言二不能輔也凡卦皆以二五爲位觀全卦之德此卦陽之過在中故以中二爻比二五者與卦同辭焉其卦辭獨取棟橈之義何歟棟說文謂之極爾雅謂之桴棟之本末以受節斵之斵之則弱矣巽棟而兌斵也橈與隆中爲之不在本與末而本末有其責焉隆非初上之功而與有功橈非初上之過而與有過故彖傳言本末弱棟多撓而隆者寡大過之時事多凶而吉者寡也其二與五取夫婦之義何歟二變則爲澤山咸少男少女之感也五變則爲雷風恆長男長女之久也二變則外卦少女不動爲女妻當大過之時艮極而反震爲老夫五變則內卦長女不動爲老婦當大過之時震極而反艮爲士夫大過取義於陰陽陰陽莫見於夫婦夫婦者萬物萬事之始可以觀陰陽之過焉故二爻辭如此老夫女妻陽雖過而就衰過而不過故言无不利而吉在愼始如初之藉用白茅可也老婦士夫陽旣過而方盛過而益過故不言凶而凶在怙終如上之過涉滅頂是也此卦三與四爲對二與五爲對初與上爲對也巽爲楊兌伐爲枯澤潤爲生稊生於下而能成華生於上而不能成茅巽在下涉兌在上也諸儒釋此卦之義多未盡故申之小過四陰居二陽之外陽盛在中陰盛在外陰包陽陽納陰也頤對大過而取養者陰盛於中口食之義也中孚對小過而取信者陽盛於外化􅀖之義也小過說小過陰過也此卦亦初與上爲對二與五爲對三與四爲對如大過大過象棟小過象飛鳥者陽動而過必靜陰靜而過必動也下止上動飛鳥也中陽爲身外陰爲翼飛鳥之象也飛而遺之音則動之至矣音下振而上浮親上不親下抑高從卑所謂宜下也如象傳行過乎恭喪過乎哀用過乎儉也故大吉也大過三四如卦辭取棟小過初上如卦辭取飛鳥陽自內而充陰自外而斂也大過三凶而四吉小過初凶而上亦凶陽過之卦主吉凶半之陰過之卦主皆凶且小過六爻無吉占也二比初陰比陰陽不用事故有過祖遇妣不及君遇臣之象二居地之上卦辭所謂下也故無咎五比上亦陰比陰陽不用事故有密雲不雨之象五居天之下得位可有爲卦辭所謂宜下也故弋在穴三內卦主守如事之過防四外卦主有爲如事之過遇也聖人作易六十四卦三百八十四爻如天行之渾成如地勢之安固諸儒乃於一卦六爻卽割裂之以就其說以致卦與爻不相攝爻與爻不相通敬故累舉其端以明三聖人之意有志者能於卦爻一一推之以求其極言易豈有齟齬耶至以理釋易始於十翼不可蔽罪於王輔嗣歸過于程正叔也困說彖傳曰困剛揜也剛指二五言揜指三上言二五卦主三上揜之一也坎之初二於四象爲少陽兌之初二於四􅁚爲老陽而加一皆陰以揜之二也先儒取坎爲兌揜之義釋彖傳凡陽卦內陰卦外皆可言困矣其諸非聖人之意歟困未有甚於富貴者也故二五以朱紱赤紱言之朱紱君服赤紱臣下之服也二困於三居下卦困未甚神昏於酒氣窒於食而已昏而不敢不飮窒而不敢不食此則貧賤所無也然而不能求息於妻子求息於朋友也何也朱紱且方來焉置傳焉置頓焉饋餼焉饋廩焉困矣然而禍福且未可知也五困於上居上卦困已甚劓何也曰無以爲顏也俯仰皆慙也刖何也曰無以爲行也進退皆危也其爲赤紱者所困如此無以爲顏必有說以爲顏無以爲行必有說以爲行姑徐之云爾徐則意變意變乃善飾也然而榮辱且未可知也困之至者必有鬼神之事以求助焉故二用享祀五用祭祀也三上皆困人者也困人者必自困困人不可訓也故取自困之義困於石前遇險也據於蒺藜後據險也當困之時父子不相諒兄弟不相慰者妻能釋之不見其妻困之至也於葛藟遇柔而困也於臲卼遇剛而困也三困之中故凶上困可解矣故征吉也初與二爲體小民之事也困於株木其止不可也古者危坐任膝安坐任足夷坐任臀株木惟夷坐可任焉入於幽谷其行不可也古者大事以三歲焉不覿則終困也四與五爲體諸侯大夫之事也困於金車如求金求車是矣古者以金車爲上下之禮困於金車困矣其終必至俯仰皆慙進退皆危焉是故困未有甚於富貴者也明夷說明入地中明夷彖傳象傳同辭離爲明坤夷其明二離主五坤主爲義至顯先儒以上爲坤主而統全卦其諸非聖人之意歟地體如丸地之中乃闇之主其上下皆日所繞也上之辭曰不明晦初登於天後入於地指日之繞言之晦者明之漸入於地者登於天之漸明夷之時日方入而出之理在焉故爻辭兼明晦登天入地言之以爲坤主而統全卦其諸非聖人之意歟五之辭曰箕子之明夷何也葢文王繫明夷􅁣然有所感而繫之曰利艱貞其時箕子未爲之奴也至周公繫明夷傷文王之意而不忍言是故二文王也五紂也於紂之最比近者得爲奴之箕子焉繫之曰箕子之明夷微子比干皆夷其明獨繫箕子者於利艱貞之義相附也文王臣也箕子親也文王外諸侯也箕子內諸侯也事益有難言者矣箕子之難見而紂之暴可推紂之暴見而文王之德益可推矣至孔子繫明夷乃達周公之意而曰內文明而外柔順以􅀩大難文王以之言羑里也內難而能正其志箕子以之言爲之奴也於是二與五二爻之義始大白焉三聖人之意葢相條貫如此知此則諸爻之辭可釋然矣明夷說二陽明也陰闇也明之見於天地者日爲之宗日無夷之者故取象於入地明之見於人身者爲目明之見於人心者爲知知之夷不可象也日之夷則全卦象之矣故二四取象於人身左腹者肝與膽之居也肝膽病則目耗此明夷之所以然所謂明夷之心也傳釋之曰􅀗心意也意者心之所達目耗者肝膽病之所達也􅀗之則可出於門庭以復其明耳目口鼻皆門庭也四居坤下日旣入則地之下皆明故取復明之象四大臣之位周公於成王伊尹於太甲皆其象也股者陰陽蹻之所行左病則先入肝膽故二之辭取左股焉讀易如是凡漢宋諸儒所未言者可發其覆所已言者可破其鵠矣自記曰惠松厓先生曰箕子當從古文作其子劉向云今易其子作荄滋其與亥子與兹古音義皆同坤終於亥乾出於子用晦而明明不可息也此論近儒視爲祕義特恐於孔子彖傳有違耳故前篇畧爲別擇此篇復推明爻義以附焉相鼠說此詩一章言無儀三章言無禮禮者儀之幹儀者禮之表也惟二章言無止毛傳止所止息箋云止容止箋別鄭義後儒多從焉夫言容止則一章言儀已盡之矣箋義非也人必忘道然後無儀無儀然後無禮無禮之至則弑君父矣而其禍皆始於無止饜飫之求輕暖之取逸豫之就宮室車馬之擇高爵厚邑不足以償之於是自足恭至於吮癰䑛痔自長傲至於裂冠毁冕自好樂至於上烝旁報自爭權至於刦主遷后皆所謂無止也詩人始窺其端以無儀終要其亂以無禮中發其痼以無止故三章皆以死絶之不然無儀無禮之人遠之可矣何詩人之嚴如此哉終風無儀也新臺牆有茨鶉之奔奔無禮也衞之滅以此故戴公復國國人深戒焉東門之枌說朱傳以南方之原爲地桉毛傳原大夫氏箋云以南方原氏之女可以爲上處簡兮箋上處者前列上頭也毛鄭知南方之原非地者本經言宛邱與蕩同地言東門與東門之池東門之楊同地故一章言國之交會民之所聚不復以二章南方之原爲地也子仲爲大夫之氏原亦爲大夫之氏蓋並舉以刺焉此詩一章言男子歌舞也二章言女子歌舞也三章言男女歌舞且往觀歌舞也視爾如荍貽我握椒其諸風人之風乎惲子居曰吾于此詩得性善之義焉荍芘芣也椒芬也傳之釋止此耳箋曰男女交會而相說曰我視女之顏色如芘芣之華然女乃貽我一握之椒以通情好也夫芘芣紫赤色顏色之美而喻以芘芣左矣葢男女之以禮相接者其授受皆無所慚無所慚者以其無牀第之志也祭享是也男女之不以禮接者其授受皆有所慚有所慚者以其有牀第之志也投報是也慚則顏之色如芘芣矣此一慚充之可以止乎禮義故聖人錄焉不然溱洧之詩前之矣何必復申之哉佗之殺以外淫平國之弑以下淫陳之爲國可知矣而民之是非羞惡無殊焉此删詩之義也北山說此詩刺大夫不均也役不均則飾之曰是賢焉非斯人莫任此也是賢焉而未老而方將而方剛焉非斯人莫任此也於是乎均之說不得入而惟大夫爲之政矣問之王王以爲宜役也大夫以賢之說進王必曰是大夫也忠問之􅀸士􅀸士以爲宜役也大夫以賢之說進􅀸士必曰是大夫也才今日簡書曰某也稅於某則驅車從之明日簡書曰某也稅於某則驅車從之蓋役之發也其令自上而下王而􅀸士而大夫役之僎也其政自下而上大夫而􅀸士而王故曰刺大夫不均也其不均奈何有居息者焉古者倚几曰居有息偃者焉古者正卧曰偃夫居息息偃皆渠渠沈沈者也有當關焉故不知呌號皆庸庸泄泄者也有適囿焉故棲遲偃仰然而未已也爲淫焉爲酗焉則湛樂飮酒然而未已也爲䜛焉爲譏焉則出入風議夫至於出入風議其人之心志面目可知也皆大夫之所狎也于是居息者康而無事賢者盡瘁焉一時之勞也息偃者卧而自恣賢者于行焉則非一時之勞也不知呌號者人不能謁賢者劬勞焉一事之勞也棲遲偃仰者事不能涉賢者鞅掌焉則非一事之勞也然而未已也或以爲怨謗焉或以爲懈弛焉則慘慘畏咎然而未已也士卒之苦共焉僕碧玉說右碧玉搨本嘉慶二十年十月辛巳謁陳白沙先生祠登碧玉樓其裔孫禮所詒也玉以周尺度之厚半寸袤尺二寸首廣三寸二分微羨下射廣四寸剡之去首二寸强爲孔周二寸弱當孔之左右爲兩珥橫出五分强下迤之以放於射玉之質潛􅃀􅀋書所稱甘淸玉色淡靑而帶黃是也非碧玉碧玉南產倭奴西產于闐皆蒼綠色也玉之澤手近之則津其諸記所稱水玉歟謹按周禮玉人大璋中璋九寸邊璋七寸射四寸厚寸此言璋也黃金勺靑金外朱中此言勺也鼻寸衡四寸有繅此合言璋勺也先鄭謂鼻爲勺之龍鼻後鄭謂鼻爲勺之龍口若是則駔琮無勺無龍首經言鼻寸不可通矣古者謂紐爲鼻璋之鼻其以系繅歟此玉兩珥各寸如璋之鼻射四寸如璋厚寸亦如璋當兩珥度之衡亦四寸如璋惟袤逾三寸敬觀湻熙古玉圖尺度多過於古者此玉之袤偶異而已經下文云大璋亦如之諸侯以聘女蓋天子大璋中璋邊璋皆有勺故以淉諸侯大璋無勺故以聘女此玉葢古聘女之大璋也敬前在廣州問碧玉樓之故有言明憲宗以聘先生者及至新會考之志乘無其說白沙集碧玉樓諸詩亦無之先生記夢文在成化三年已言卧碧玉樓而憲宗之聘在十九年其非聘先生之玉無疑義矣先生詩言玉失而復得其諸先人之所畱遺歟唐書五行志上元二年楚州獻寶玉十三其一曰元黃天符形如笏長八寸有孔云辟兵疫按唐笏􅀡宋始弓之笏頭亦微羨與此玉極似唐人妄加之名耳疑卽大璋也宋程棨三柳軒雜識有片玉長可八寸濶三兩指如刀有靶名抶衣古帝王旣御袍帶以此抹腰無褶縐與此玉亦極似二說存之以質之博古者散季敦說婺源董文舫明經言其戚鐵樓程君於江右市中得古銅敦敬因索觀之越二日有健足􅀒巨廂頓於地啟之則敦與汪雲海所作圖在焉圖之上下書程讓堂賢良董小查太史所作識考而搨敦銘於其右文舫登敦于几觀之追然古也其尺寸讓堂言之銘及文不合博古考古二圖小查言之而文舫復以說請說曰文王臣散宜生古注家皆以散爲氏宜生爲名近世釋者本大戴禮堯娶於散宜氏之文以散宜爲氏生爲名今以銘考之其諸注家之說是歟然商周之間無二名者惡來名革飛廉以獸名謂之非名也若是則宜生何以二名其諸初氏散宜子孫去宜氏散歟抑散與散宜爲二氏歟明堂位曰有虞氏兩敦夏后氏四連殷六瑚周八簋釋者皆以爲黍稷器而周禮玉府共玉敦以歃敦之用固不一歟儀禮惟公食大夫言簋婚喪虞特牲爲士禮言敦少牢爲大夫禮亦言敦釋者遂有士用敦之說而於特牲之分鉶簋不可通變言同姓從周制敦與簋之等亦不一歟周禮舍人共簠簋注言方曰簠圓曰簋說文簋方簠圓禮圖言簠外方內圓簋外圓內方鄭許其各據一端言之歟敦以瓦旊人爲簋亦以瓦釋者言天地外神以瓦宗廟以木簋之質亦不一歟其敦簠簋皆以銅始於何時歟自兩漢至今幾二千年學者依經據傳推明古制以必求其是而終不可得况古器之流傳者有時代之異制有眞贗之異物有全缺之異文而欲據一端以定是非此言金石之大蔽也是故君子之於學也舉其大而畧其小用心於有益而不用心於無益焉程君捐舘舍已一年子孫善藏此敦則古者能守之義也已得姓述附說惲氏得姓推本平通無可依據若更他附益非理矣然有可疑者當詳考之亦所以明愼也按新舊唐書藝文志有蔣王惲家譜一卷蔣王太宗第七子也新唐書宗室表蔣王生子十六人第十子爲潯陽郡公爽爽生子三人長爲右長衞將軍森森生子五人第三子爲杭州刺史構構生子七人第二子爲常州司法叅軍稅唐世宗室子孫多籍於官所者稅旣官常州其諸有籍於常者歟新唐書地理志江州潯陽郡本九江郡天寶元年更名是天寶前無潯陽郡也爽爲太宗孫與中宗睿宗同時不應至天寶後始封若是則宗室表潯陽郡公乃鄱陽郡公之誤也稅爲惲五世孫惲旣於皇唐玉牒外別有譜其諸子孫因是別姓惲歟稅爲爽曾孫其諸卽以封鄱陽爲望歟今惲氏望鄱陽而世居常州敬故詳考之如此若十國時楊再惲名與平通同而世較近然史不載所籍俟廣搜之得姓述附說二近世道家刻五岳眞形圖中岳姓惲名無音釋道士僞造也五岳眞形始見于漢武內􅀓乃六朝人所作未嘗言圖中列姓名止言帝藏之而已河圖曰東方太山君姓圜名常龍南方衡山君姓丹名靈峙西方華山君姓浩名鬱狩北方恒山君姓登名僧中岳嵩山君姓軍壽名逸段柯古酉陽襍俎引河圖而不引眞形圖柯古中唐人意者僞造在唐以後柯古不及見歟自緯書造五帝名道書仿之肆無所忌天地百物皆爲姓名以目之鄙倍拉襍不可名狀後又竄入符籙以誑愚􅀩吾惲氏有執姓惲名之說爲典要者非也然後世道敎尊于江右而惲氏望鄱陽意者有慕于其說而易姓從之是亦事之未可知者或謂惲氏著于紹興以後其時士大夫多自北方南渡鄆出于邑渾出于部落㑮出于官皆北方姓而與惲皆相近然各望皆于鄱陽無涉也無錫宣頴達麗中吳縣徐敦仁愛杉大雲山房文稾補編目錄南宋論佚蔣子野字說博婦答莊珍藝先生書與衛海峯同年書上秦小峴按察書二佚上座主戴蓮士先生書上陳笠帆按察書與王廣信書秋潭外集序沿霸山南華九老會詩譜序莊達甫攝山采藥圖序小河馬氏譜序羅坊鄕塾記西園記曹孝子傳書圖欽寶事外舅高府君墓志銘佚朱石君尙書梅石觀生圖頌代張皐文蔣子野字說鉛山蔣心餘先生之孫權伯名其仲子曰志份字子野而言于陽湖惲子居曰說文份文質備也從人分聲論語曰文質份份臣鍇曰文質相半也今論語從古文作彬志份今之人也今之人與其文勝而史毋甯質勝而野乎故從今文名曰志份字子野先生其爲之說子居曰權伯之言盡矣吾何加無已則請陳字說之始末以爲志份進何如古者冠而字字有字辭卽祝辭也漢之後或移之詩或移之文至南宋而字說遂甚行嘗有一人之集多至數十首者夫一世必有數十人能文一人能文必有字說數十首何不憚煩若此哉其美者不乏惡者如腐粟然體敗而精銷亡矣將以爲實乎則是如腐粟者自治之不給而焉能給人以爲名乎則自一世而積之自數十人而積之自數十首而積之嘻溢矣然抽卷則知其名掩而問之士人有不知者若夫匹夫匹婦目不與􅂤牘相接聲不與文章之士相聞至性所爲照耀日月百世聞之皆爲起立是故美言不足以章身美譽不足以飾人君子之道自盡而已心餘先生在乾隆中文質皆有以自見權伯教其子盍於心餘先生求之若吾之碌碌者無足以云感權伯之意故畧陳之如此博婦武進游民陳以博破產朝夕不繼妻頗有姿首嫁時衣飾久償博負矣陳復泥索之不已妻曰存一銀􅆪耳昨落牀下陳卽睨􅇃下得簪笑匍匐入妻隘其出撻之走至母家無何遂死丹陽賀生亦好博妻束氏善持家賀所破產輙陰贖之寄母家後賀產盡從妻之母家居一日于市場縱博輸其裩遂裸而返束氏恥之終身不與言而日治夫􅄿甚謹衣冠皆手料量之夫死攜其子與寄產還賀宗爲富人惲子居曰吾於束氏見陳平狄仁傑之爲人臣焉雖然二君子者委虵以適變堅忍以藏用期於復漢唐之祚而已若束氏者卽季札之於吳叔􅡈之於衞奚以尙焉後之君子遇難處之故毋謂事不可爲爲之且毁吾之節則或幾于道也已答莊珍藝先生書珍藝先生閣下往􅀊八月之下旬得賜書喜甚至所奬云云敬豈敢任邪敬年二十時常有志於古人後年益長大世事益逼頽然俗人耳今又以不􅈺强作吏而諸事叢脞至與負販兒爭短長其何以見有道君子邪敬方自慚之不暇而先生大進之敬不得不易慚爲懼非特慮辜先生且慮吾黨以先生之言爲然而深待敬是先生之言不實於天下也雖然不敢以不勉何也敬二十時不知後此之日下有今日也自二十至今二十五年耳又安知後二十五年不日上如二十時邪是先生之言未嘗不可實於天下也敬不敢不勉也十二月望前回縣行臺省俱以方外待之若束縛少弛敬所以實先生之言將於是乎始春寒惟一切珍攝不盡及與衞海峯同年書海峯大兄足下十月中得所賜書以年伯六十夀序見屬鮑畹香茂才來書亦屢以爲言敬已諾矣因官事不暇及今兩月餘深以􅀒此諾爲愧然不敏之見有不可不爲足下吿者足下如不以爲狂愚請得畢陳之夀序非古也其原出於唐之中葉天子以所生日爲節賜天下酺而臣之諛者臚功德而頌之今世所傳賀生日表皆諛者之詞也浸假而用之以諛權貴有力者浸假而有位大君子亦諛之浸假而大君子亦受此諛以爲固當於是販夫販婦牛童馬走苟有年必有諛者爲之夀苟爲夀必有諛者爲之功德之言此非黃帝蒼頡以來書契之不幸也天下之勢也然自唐厯宋元至有明之初其文無一傳者何也違心之言淟涊齟齬必不能工工矣而羞惡之心不冺則逸之而已正德嘉靖以後士大夫文集始有夀序之名爲詞要無可取震川先生有明文格之最正者集中夀序八十餘首皆庸近之言稍善者以規爲諛而已不諛者未之見也本朝魏叔子多結交淡泊奇瑋之士爲夀序抑揚抗墜橫驅別鶩力脫前人之所爲然不諛其事諛其志要之亦諛而已夫震川先生魏叔子近世所推作文之巨擘也而尙如此其他則又何責焉且今之夀序不經之甚者有二曰名稱曰有事白虎通云伯者長也仲者中也叔者少也季者幼也兄弟長幼之義也父之晜弟爾雅曰世父叔父至漢尙沿之疏廣疏受父子並爲師傅是也晉人始去父稱叔王濟曰始得一叔是也於義爲不可通姪者女子對姑之稱唐人始稱姪男於義亦爲不可通今天下於父之友皆從而伯之叔之姪之同􅀊者年之同官者寅之同學者世之士大夫之口嘈嘈如市儈之相呼不可訓已尺牘往來苟且從俗已不足稱况筆之於序記雜文是何說也天有十日人有十等至賢不肖相去其等不啻累千萬而上下之今夀草野者非嚴子陵陶元亮不足名其高也朝廷之臣非㓂忠愍范文正不足爲其任也彼四人者所遇之時所行之事於今之天下何與哉敬與足下交至厚也故敢陳之如此足下如然之則敬向者之諾非季布也以爲岀蘇秦張儀之口可矣如足下以敬稍知作文次第謂年伯高行宜一表白之則是書之力未必不足以垂之于後惟足下裁之上座主戴蓮士先生書惲敬謹上書蓮士先生閣下敬與弟子籍二十五年於兹矣中更多事從遊之日或及四五年而一遇今且幾及十年前者伏聞騶從南還走千五百里以冀速見在先生久諒其無奔走之習干謁之私敬又非敢妄附古人高義忘其卑陋與國家修政用才之說所以急急如此者何哉竊見先生爲修撰之日有侃然立身之言爲侍郞之日有淵然籌國之言然敬之迂愚未敢遽以爲必如是也及至新喻五年而聞之欣然至瑞金四年而聞之益欣然昔人云欲知宰相賢愚視天下治亂今天下事已定矣敬以朝廷嘉慶七年後之設施推之先生嘉慶五年前之計議如軍籍之賞罰計簿之裒益刑書之輕重吏職之進退均有可意得其苻騐者固知聖神作述權不下移而陪輔遺忘增繼高厚今無有人居先生之右者夫揣測之心可極至微盡至廣天下後世必以爲知言此敬之所願見願見者也且敬之在門牆蓋無以自拔于衆人者見爲才則投之多齟齬見爲德則守之多差池終至名位後人事業瓦散然而先生視之加於顯名高位盛事大業之上一則號於衆曰氣節之士再則號于衆曰鴻達之才往者西山中侍坐終日所以期之于道藝者益進之以不敢承不敢冀之言此敬之所以願見願見而爲之至今不安者也慺慺之忱不覺覼縷惟曲諒之囘縣後事尙平甯惟無暇讀書又筋力智慧皆不如前恐終于無成常深悚愧耳七月十九日惲敬謹上上陳笠帆按察書瑞金縣知縣惲敬謹上書按察大人閣下曩者敬居京師曾於鹿園檢討處一識淸顔今奔走於下吏十三年矣而所至聞數朝廷君子者大人必居一焉自傷悲遠不得朝夕近左右以盡其慺慺之忱及旌節蒞江西喜甚然不敢遽請見者敬之私意竊以爲漢之陳仲舉唐之李文饒使天下爲善者亟亟然如舉旛於市以相附則君子之異於小人又幾何是以不敢然心之望大人知之如敬之竊自附於知大人未嘗一日不往復也今得手教以爲非流俗之人而開之以盡言敬不敢遠爲言請就江西之已事比於大人之問言之且卽縣官之可以興其事而敬之所及見者言之夫水旱感召之說雜家之所言皆附會也不足以取信而儒者又疏濶其言庸迂陳陳相因然于理有可信者和則豐戾則凶故或天地之氣先至而人之氣應焉是以水旱之氣亂政也或人之氣先動而天地之氣應焉是以水旱之政亂氣也今皇上嘉慶之七年江西之旱者南昌瑞州所屬數縣耳其時主議者以爲皇上愛民宜通十府爲緩徵夫歳豐而緩徵民之衣食婚嫁不如􅀊凶之愼也稍溢之則所緩者盡矣至帶徵之􅀊有司必嚴督之故民之財緩徵之時不能有餘帶徵之時必至不足且明明豐矣曰吾緩徵戸部之有餘不足不計也倉塲之有餘不足不計也是故江西之政莫弊於七年之緩徵然而且緩徵不足繼之以請糴請糴則米價之貴可上聞是故請糴者所以飾緩徵也然而且請糴不足繼之以臺估臺估則米價之賤不至於上聞是故臺估者所以飾請糴也大人以爲和乎戾乎迨至戸部以爲誤會計倉塲以爲誤支銷朝廷以及天下之人皆以爲不知事體於是十二年之收歉於七年而勢不得議緩徵矣夫官方懲七年之事而以爲宜徵民又狃於七年之事而以爲斷不宜徵於是督漕者行令如救火辨漕者設法如轉輪而泄泄如故大人以爲和乎戾乎由此觀之敬恐江西之􅀊日惡江西之民日貧江西之政亦日冗不止如今日之事勢也方今天下之民情無勿達也其患在於屈意以達民情又民情旣達而拂之使不得如其情敬請以瑞金一縣計之共三十三萬人奸民不安分者干餘人而已其餘皆耕耘負販取給足則無他求焉無求達之情也其有匹夫匹婦之銜恤者可訴之縣縣不允可訴之州訴之院司今皇上以大智大仁臨馭宇内有朝叩闇而夕得旨者何憂其不達邪敬所謂今之患在於屈意以達民情者蓋三代以上民養生之事未備故能生民養民者爲善政三代以下民養生之事已備故聽民自生自養而不擾之者爲善政今部院懼院司之罋民情也而侵院司之權院司懼府州之壅民情也而侵府州之權府州懼州縣之壅民情也而侵州縣之權於是内而幕中賓客外而吏卒皆竊攘而侵所屬之權夫至於如是則吿訐鑽刺之風大行而奸民之不安分者皆起矣卽如瑞金一縣以不安分之千餘人排笮三十三萬人雖不至遍受其毒然民之失業者不少矣况吿訐鑽刺之風大行則州縣不得不設法以調停之院司府州亦不得不縱州縣設法以調停之遂使民益驕官益弱卽如萬載之部案以大淸之民居大淸之士爲大淸之士本籍士也棚籍亦士也合考已百年矣然而議讞助之曰分考陳言助之曰分考且有詆諆之辭曰羞與爲伍夫科􅀊考可分江西鄕試不可分則舉人伍矣禮部會試不可分則進士伍矣而於生員曰羞與爲伍是萬載之生員知廉恥而萬載之舉人進士皆不知廉恥也此不通之說也而萬載之是非悖矣卽如雩都之部案一以爲翁媳之姦不誣一以爲翁媳之姦不實而雩都之是非惑矣卽如樂安之部案一以爲是竊非誣一以爲是誣非竊而樂安之是非惑矣其時當事者或以煆煉之法行其調停或以調停之法行其煆煉其始蓋由於屈意以達民情故弊不至於此不一也敬所謂民情旣達而拂之使不得如其情者耗羨之過加誰不知能卽已乎搶竊之匿報誰不知能盡發乎顧役之盤踞誰不知能變法乎募軍之驕惰誰不知能改律乎黃次公曰凡治道去其太甚者耳此古今之通論也敬之所欲言者無窮也而所言者又未必皆是然而不可以無言也大人如不以爲戅且愚則請繼自今日日言之大人以爲可用邪不可用邪皆敬之幸也巳二月二十五日瑞金縣知縣惲敬謹上與王廣信書簣山先生閣下前月旌斾駐南昌先生所以慰藉敬者良厚甚感甚感承命作西園記幕府豪儁海内賢士大夫衆矣而以屬不肖不肖雖庸劣何敢固辭然竊有復于先生者記之體始于禹貢記地之名也考工記記工作之法也坊記表記樂記檀弓記言記事之法也其體當辭􅂤而意之曲折能盡之是故退之畫記汴州水門記其正也子厚八記正而之變矣其發也以興其行也以致雜詞賦家言故其體卑其餘唐宋元明諸名家作記如作序如作論而而開其始者亦退之新修滕王閣記是也退之守袁州不能至洪故爲文不得不如是今先生所築之西園敬未􅀗于燕間之日與先生銜盃酒彈琴賦詩逶迤遊處其閒若是則所作之記亦如新修退之滕王閣之記而已夫滕王閣一也三王作賦序記于前退之作記于後可言者三王旣言之矣退之恥蹈之故破壞文體而不顧蓋陳陳之惡甚于破壞如不羈之士尙可與言而膩顔帢高齒􅄚挾􅊵園冊子論古于大雅之堂未有不粲千人之齒者也夫退之于三王若是今敬後退之千餘載西園去滕王閣七百里而爲記乃蹈退之其粲千人之齒又當何如然而西園者敬固未常至也則欲如子厚之八記有所不能如汴州水門記有所不能如畫記有所不能今所呈本不得已之作也而文采又劣甚先生庶諒其謹愼而有以教正之六月十八日惲敬謹上秋潭外集序敬爲縣官於越東及南楚幾及十年常意汲長孺恥爲令其生平伉直而已而古者聖賢豪傑皆屈身爲之於是欲於其閒求深博非常之士以圖爲天下之故夫天下者縣之積也未有不能治小而能爲其大者乃久之而於越得一人曰李賡芸許齋於楚得一人曰彭淑秋潭許齋爲人和而詳其治一以休息爲務秋潭沈毅好切言高論所厯崇仁弋陽瑞金吉水浮梁振綱舉凡􅁵條捜目祈於大適而後已二人皆喜學問能文章許齋與敬無交獨於衆中察其爲人之所以然秋潭於敬過從無時所言皆相勉以不及然秋潭獨身在楚十有九年不遷許齋則公􅀸多引重天子亦不以常吏視之雖止遷軍司馬假守大府不可謂得行其志而秋潭益卑滯矣秋潭得上考且滿三年復不遷奏換臨川其子弟與及門刻其爲縣官雜文曰秋潭外集敬讀而悲之以爲吾秋潭而所施止於如是後之人見其書當亦有所􅁣然也已沿霸山圖詩序余少讀退之南山詩及子厚萬石亭記小邱記喜其比形􅀋情卓詭排蕩及長始知其法自周秦以來體物者皆用之非退之子厚詩文之至者也莊子曰芻狗之已陳也行者踐其首脊蘇者取而㸑之而已昔人之已言其諸亦能言者之芻狗乎瑞金多石山往往一石爲一巒一石爲一嶺一厓惟沿霸諸山皆千萬石爲一巒一嶺一厓余數過欲狀之終無以自別于退之子厚之所言者爰使戸曹史賴穀分爲十圖以盡其勢而余與諸同志舉觴而詠之至退之以重望自山陽改官京曹方有大行之志故其詩恢悅子厚􅀒釁遠謫故其文淸瀏而迫隘余小生樂志下僚所言亦有相稱者焉南華九老會詩譜序嘉慶元年詔徴孝廉方正之士武進以莊宇逵達甫應達甫辭之不􅀗自是不應進士舉曰吾愧此名甚無厭是􅇳詔旨也敬時吏於浙聞而賢之四年敬請檄吏部復往浙就吏過達甫達甫以南華九老會詩譜命敬敘其後九老會者達甫之祖勁菴先生與宗之致仕者共九人皆宜祿夀子孫於燕間爲會以衎之者也敬觀其所爲詩始知九人皆淸白恬退去時俗尙古昔於是知達甫之賢爲有所自矣已而思之士當年少氣壯束修自進曰吾將以爲天下也一旦宦達矣名溢於朝祿豐於室又相率引去以爲高其進也將以謀其實也而以名飾之其退也實已至矣而名可惟吾之所取此豈聖賢者之所許耶達甫未通籍其高尙宜矣如九老者當求其治民之道勤愼爲國之意所以不愧去者何在不當徒羨其退也已又思之古之纖人其初非有他也不過􅄝進不喜退耳君子則進不得已也退常不可已而已是故過於進將爲患失之鄙夫過於退不失爲引身之君子敬今仕宦方始恐進退皆􅀒無以復見達甫自今日以往庶幾其念之哉是達甫之益我也已莊達甫攝山采藥圖序攝山在金陵迤東四十里江總持棲霞寺碑曰山多藥草可以攝生故名曰攝山莊達甫遊而樂之爲攝山采藥圖其友惲敬子居爲之序序曰吾始聞達甫之名于張臯文臯文不妄譽人而以達甫爲有道之士及見達甫其貌􅂶然其色油然而其神端然若有不可干者更七年復見達甫克然油然者猶是而窮窮然而歛休休然而止達甫於道其益進耶吾聞古之有道者其血脉心志事爲無不治也故年夀可至大齊記曰親親而仁民仁民而愛物曰能盡其性能盡人之性能盡物之性是也至秦漢方士乃有不死藥之說是故由至人言之以人治物之生也由方士言之以物治人之生也以物治人之生必其生本不全生本不全則物之能治與不能治俱在不可知之數矣是故以金石或暴吾氣以禽獸蟲魚或亂吾神以草木或瘠吾形槁吾藏自有方士以來效可覩也列子曰肆之而已勿雝勿閼莊子曰安時而處順哀樂不能入也彼二子者于道未爲至也然言養生若此無他說也達甫志古之道躬敦潔之行其于二子不相師也而豈爲二子之不爲者耶雖然達甫之于世蓋泊然矣陟山之高循水之深此圖其有所托耶抑性情有得乎此而不能喻之人也是又非吾之所能盡也已小河馬氏譜序敬年十九從先府君授經小河馬氏後十年子寛從而子由復往授經故敬兄弟於馬氏多同舍生及受業弟子嘉慶二年馬氏修其宗支譜徵序於敬按譜明永樂中始輯迄今凡十一修矣敬爲之條其前後去其衍復得若干卷序曰小河著姓王氏馬氏爲最王氏凡二十一望或自殷或自周或自齊自魏今天下多冒太原瑯邪傎矣馬氏專望扶風自趙將馬服君然馬適氏馬師氏乘馬氏騶馬氏馬矢氏世無有行者其諸皆冒馬氏歟今小河馬氏由小河而上之爲臨安由臨安而上之爲和州由和州而上之爲扶風皆明白有原委其自馬服者爲猶信且其譜自扶風至臨安爲繫以屬之而表不及焉以爲不可盡信也自臨安至小河爲繫以屬之而表及焉以爲可信也夫以遠爲不可盡信以近爲可信則譜信矣譜信而後宗無淆宗無淆而後子孫可以親可以殺可以孝弟此不易之理也蘇洵氏之言曰觀吾譜者孝弟之心可以油然生矣夫所謂孝弟者其究極何哉居田里則率仁義以化其鄕守爵祿則率仁義以化其官如是爾矣敬旣與馬氏交又善其譜之可信故推其義如此羅坊鄕塾記自北宋以後天下府州縣學之師皆注於吏部弟子則提舉遴而進之期會考課皆束以官中三尺之法故其敝師與弟子相羈縻而已書院盛于南宋師弟子皆有道德者聚同志以爲學其後大者屬之行臺省小者屬府之守州之刺史縣之令長師多得之游揚請謁弟子以當事者之好惡爲去取往來其敝也不歸於盡廢不止新喻緱山書院始於康熙三十二年有屋二十楹田二頃其所入不足以豐學人又以年久規法多損失縣之士李世輔等請建鄕塾於羅坊凡鳩資若干萬買田若干頃爲屋若干楹嗚呼世輔之意則善矣然有不得不爲世輔進者大率府州縣學官學也書院私而歸之官之學也鄕塾私學也官則其情易疎私則其法易紊豈可不思其卒哉且今之程於學以爲之等者經義詞賦策論而已其善教之則經義詞賦策論皆可以騐其修身齊家治國平天下之所得不然又何取乎是哉爰爲之定其條敎之有益者而爲之記西園記敬行天下山水浙西嚴陵江上最爲淸遠其山南至衢州西折入廣信衢州之南廣信之西山多赤而瘠無夷猶澄徹之觀唯廣信淸遠如嚴陵江敬前自浙往貴州過廣信樂之今不至已十五年而朝暮之頃開欞拓幔巡廊廡涉籬落常若有廣信之山遇于吾目中者諸城王簣山先生以曹郞岀守是􅀖因事至南昌過敬言及廣信之山且言治西有廢園周幾五百弓多古樹暇日稍理之窪者爲池高者爲山爲亭一爲廊一爲草堂三左右雜時花藥羅羅然而古樹數十章亦如得知己遇勝遊濯然有異於昔堂之四圍皆山也顔之曰見山常與有性情能文章者遊詠其閒而以記屬敬敬思子瞻凌虛臺記近于傲子厚永州新堂記近于諛傲與諛皆非也然子厚比政事言之子瞻感􅁣廢興而已豈非子瞻爲失而子厚爲得邪夫守令未有不宜于民而可自逸于山水者簣山先生至廣信未幾而治行之善達于遠邇敬知四圍之山不騰笑于堂上矣遂書所言而爲之記曹孝子小傳曹孝子名良輔陽湖人幼孤父遺屋一閒孝子業薙髪養母母病聞人言縣西觀音山有仙人草能治冒大雪走厓下求得之母病愈更十年復病孝子復往求恍惚見僧伽藍所事觀音尊者謂曰汝母不起矣汝孝葯聽持去然無益也此後三年汝當來吾所孝子得葯持歸母已氣絶鬻屋以葬因寓其姊之夫家三年而孝子卒鄭清如先生曰仙人草華于雪中華赤者黃金色爲緣白華青綠生厓石􅂩子弟妻爲父母爲兄爲夫求皆得之他不能得也論曰世多事觀音尊者敬嘗觀法華普門品􅀡喻言耳元沙門以爲見優婆夷身益飾妄不可信然孝子所感何哉誠之至則物生焉天地之道也錢塘天竺山自宋祀尊者無虚禱以天下人之心信之至七百餘年其應宜矣敬于是知聖人之所以動天地􅆀萬物者亦非有異道也書圖欽寶事乾隆四十六年囘子馬明生煽􅅍事未起就禽送蘭州獄其徒蘇四十三統賊數萬來圍城涼州總兵圖欽寶以兵三千赴援不得入圖欽寶者索倫人從誠謀英勇公大學士阿桂平大小金川宿將也時布政使王廷贊率民兵固守誅馬明生於堞下賊氣懾攻不利退屯城西南黄華山山東塹深澗澗東爲龍尾山尾注澗身環城南迤而東圖欽寶乘賊退入城復岀營龍尾山扼賊衝要賊不敢攻城戸部尙書和珅者始用奉命視師至軍之日促戰圖欽寶諫不聽跪而請曰賊氣尙盛兵過澗澗斗絕不可退悉糜爛矣總兵已諜探山後路兵得貫賊屯由山後歸乃可今諜未反勢必敗且事重上會遣大將軍來大將軍者大學士阿桂也和珅聞圖欽寶需大將軍遂叱曰汝梗令邪明日不戰吾斬若矣圖欽寶起至軍門泣曰死耳如軍事何旣明日率五百人過澗賊披靡轉戰益深隔山望塵坌益遠賊嘩甚壯勇侯海蘭察遂望塵坌奪入期抜岀圖欽寶圖欽寶已盡没而圖欽寶所遣諜適至乃力戰自山後路還入城是時和珅立馬龍尾山觀戰賊伏精騎襲之龍尾山大營隨和珅入城城復閉後大將軍至斷黃華山汲道賊亂連戰破之禽蘇四十三而購圖欽寶尸卒不可得得所服禪招魂以殮軍中皆下泣焉朱石君尚書梅石觀生圖頌代張臯文有大比邱出閻浮提得自在身于是身中因心爲因緣眼爲緣和合諸色日光月光及燈爥光照上照下大千世界所有衆生生滅顚倒有色住色有想住想無色無想住無色想因生得住因住得生如是生住亦俱變滅如是變滅復爲生住於是比邱發大慈悲隨諸有生觀無生法生旣無有無亦歸無于無無無我生衆生一切自在吾問比邱生旣云無觀于何着眼觀住眼心觀住心心眼住觀復非無義譬如如來住世演教五十六年其住世時生則爲有有則非無若言此生于無無中因無忽有卽此忽有已非無無若言此生于有執有亦歸無無當其未歸己定爲有若言此生卽有爲無卽無爲有非無非有已將無有對作因緣于無無義亦爲歧誤是知比邱無生之說無有是處有大尊師隨九種仙跨月躡日入人間世于人間世見諸種種不淨因緣守尸鍊尸作逆理法常于屏處授受祕宻妄語坎離作諸譬况令被徒衆如入千門重㬪屋壁迷不得岀豈知有形終于腐朽雀鼠五年鵲兎十年如是相乘及百千年百千萬年各有因緣非可强者其中能智不爲􅆷損或加節養于定數外得更延久如何祕爲長生妙訣又或矯說殺生長生學死不死以此貪戀遂成墜落心覯眼遇涉諸魔怪于是尊師發大慈悲隨諸有生觀長生法以形納氣以氣納神神得氣得形得委脫合體虚漠爲性命根先後天地無不存者吾問尊師長生之理旣同虛無虛無無體無形氣住則此形氣必非長生如何又言納形納氣若言形氣歸納虚無形氣旣無已名爲死若言性命不立形氣形氣澌泯性命長生則彼凡夫亦同澌泯如何不言性命常在若言性命必修鍊成始不隨形同歸澌泯則此性命純藉作爲于其本體虛無之說亦爲歧誤是知尊師長生之說無有是處惟吾導師大人先生隨衆生生心生形生無障碍法如微妙華生大雪中胚胎蓓蕾應時怒茁上下參差因風動搖日喜露歡一切因緣如是如是如陂陁石安着大地水沃不入火藏不􅅡雲蒸濕浮苔妍草英厯落布􅇴藴積金寶光怪發鬰一切因緣如是如是無錫宣頴達麗中吳縣徐敦仁愛杉先祖大雲山房古文兩集共八卷咸豐庚申歳家藏原板燬於兵燹今念孫重刻於蜀又行笥中携有尺牘一卷附置於後其通例向刻卷末今列於卷首以便省覽同治八年秋七月孫念孫謹記與朱幹臣東垣之遊已二十五年鄙人雖有一日之長然彼此切磨斯道之常耳吾弟前書稱老夫子大人鄙意頗不願從俗何也古者弟子面稱師曰子其爲他人言之不面稱曰夫子顔淵夫子循循然子貢夫子之文章與子太叔吾早從夫子不及此臾駢夫子禮于賈季從同皆非面稱也至戰國時方面稱夫子漢唐亦有此稱然不必弟子明嚴分宜當國其門下諛之始有老夫子之稱後人又加以大人諛而又諛鄙人不願以此施之于人尤不願人以此施之于我雖岀之于口筆之于書人必以爲矯異吾弟必不以爲矯異也自漢傳經者曰先曰生曰先生皆祖春秋以來之號後唐之韓門宋之程門皆此稱也將來吾弟來書止稱古山先生何如凡同志皆示之與朱幹臣七載之別如一須臾比聞令德勤修義問宣暢慰甚慰甚敬于先儒之說至四十始樂觀之然無躬行之得故所見惝怳其大端是非則頗能辨之前在都中吾弟問王龍溪天泉成道記得失時未見其書未有以答至瑞金始得見之乃禪之下乘語也沙門如宗杲等已高龍溪數籌然龍溪語錄亦有驚動透快鞭䇿學者之言擇之可也聞湯敦甫深于此事前達一書至今未復殊爲懸望往歲託秋農之事吾弟手爲料量節其所出則僕于所入易檢所全甚大感何如之僕近狀如常詳秋農書中可互觀也答秦撫軍古名人畫無不古穆深厚精能奇邁卽逸品亦無率爾之作故一望可知且紙絹必精丹墨必得法再以各家宗法求之可干不失一然骨董牙人尙可顚倒强辨惟以時代制度折之則不能辨矣承示畫卷四匣每匣分考呈還鄙見未必是以大雅垂詢非世俗苟爲藏弆之見敢竭其愚惟原諒之趙千里九如圖下筆謹細人物有古意非吳下俗工所能然結搆平近少士大夫氣絹亦非六七百年之物其裂處皆人力爲之非自然也當是前朝内院所作耳卷尾臣趙伯駒進上六小字殊不佳千里宗臣不當稱趙伯駒宋亦無欵書進上者千里別畫皆稱臣伯駒奉聖旨畫可證也圖後光堯書天保詩精麗可觀其體甚似光堯然意味凡下以光堯各石刻較之有逕廷焉宋帝王畫多有押書惟手勅有押若冩經語及題畫不必押贗者見光堯各手勅仿爲之不知不合法也光堯書之後記紹興庚申乃紹興十一年范石湖隆興中方遷秘書正字楊誠齋湻熙中方遷右司郎中周益公亦湻熙中方遷起居郞豈有前數十年已官兩府侍從之理卷中各結銜可笑也又進士結銜始于明在宋無之奉旨亦始于明宋多稱奉聖旨贗者大都不諳故事是以有山谷冩誠齋詩天寶稱年各謬誤也卷後鮮于伯機王元美兩跋更凡下其贗不待言米襄陽山水畫無氣韻已失神矣字係􅀟鈎印章一手僞刻印色亦一色其􅑽褫則高手也趙子昻晝錦堂記子昻一日書萬字何至拒手猙􅶃如此書欵及用印均不合法王小癡桃源圖本朝有兩黃璧其一江西人字元白以冩照名其一廣東人卽小癡也此圖有意致而墨非歙製水用嶺北者故氣韻不雅馴其畫樹則形跡矣與饒陶南月之三日得手書具知一切吾弟就試至十三科而不與解額此天下不可解之事然有可解者謬種流傳巳數十年夫已氏所錄文􅃈猥益甚豈能錄吾弟淵雅雄古之文耶然方元英羅江東之名至今不滅其時成名而去靑紫被體者當不下千萬人胥歸于臭腐天道未嘗不公也敬于古今士君子之所知能者尙有菽麥之辨吾弟當翩然而至商略其然否其樂當不啻如造朝堂進退百司而使天下大治也獻歲于南昌專俟或僕不至南昌吾弟亦買舟南上以踐此諾將使兒子輩受業門下伫望伫望與周菊伻軍門客次始識淸顔嗣後彼此投謁均致相左然稠人廣坐未常不心儀閣下及蕭宜黃朱安義諸君子慺慺之誠不可解也春中發棹南還舟駐䖍州大兄奉檄穀山乃成邂逅何快如之貴治山多田少民氣凋敝與敝邑相當然大兄通才遠識定可轉移若敬者坐困五年言之有愧昔人曰東南民力竭矣以今觀之官力其尙有餘耶前倉猝舟行致以􅃈事奉托方深惶悚大兄乃給札來人足徵精審所謂謝幼慶使才履􅄚亦得其任也答顧研麓前月接奉手書復示大著敬服敬服敬前客眞定小韓先生方分守淸河常山左右有名士名幕名宦之語敬始知鄕前輩中有如是文章政事不可及者往歲留滯章門知閣下爲先生令子綽有家風然未知淸才遠想能盡空凡跡眞爲喜而不寐也敬于詩文埋頭三十年以頑鈍無所得然好之不已將來萍蓬流轉或得乍合當與閣下窮日夜討論以相證此吾輩未忘之結習也蒙鈔示匡謬正俗兩條而平頭干氊槴中遺失亦由敬之不愼可愧之至希復鈔示爲感答顧研麓頃奉手書具知一切委題尊照勉力應命此後題詠者必多但此題不可著跡一著跡非腐卽滯矣同人必以此告庶無冬烘之詞玷佳卷也尊大人詩集略爲詮次未知有當否若付梓之時一切行欵敬當盡其愚葢刻書大忌體例不一也如集首下行載尊名稱恭錄皆不妥葢其地宜載尊大人名與字尊名校刋當在每卷之後不可凌襍又凡御製詩目下書恭錄家集宜避最爲􅂃要其餘不合法者尙多梓時細定可耳古者一集不再序今時賢屢序徒爲聲氣而已一何可笑尊大人集已有三序敬意削其不可者二篇留一篇改其不合法字句冠集如敬再作是㬪床架屋深可不必裁之裁之如以鄙意爲然明年省中付梓或石城付梓皆可盡其愚也與聞茂才往歲聞尊府君捐館深爲駭悼來書以伐石之辭非下走不足以信尊府君之言行下走何人敢當斯語耶此事榛蕪五百餘年近代所稱作者尙各有短長而世之名公鉅􅀸上牽功令下沿習俗益卑猥不可言狀下走以處下位可以力求古人尺度而才又劣弱不足以達其所見甚愧甚愧也然于尊府君有一日之知􅁩不敢辭謹序草稿如別紙金石文字一語不可輕下題識尤不可率爾舉人不當結銜止書勅授文林郞可也漢人金石文三公稱公餘皆稱君唐人則監司以上有稱公者曾爲之屬也尊府君銜應照來式入石至下走列銜宜書見官其餘俗人結銜累累雖一品詒笑大方不可從也答黎楷屏往歲仁弟移入行省敬奉檄還縣未及言別至今歉然年逼事稠前書乃書記屬草曹史寫送荒陋可弞發春得手報讀之殊增内愧藉悉興居萬福德懋業勤復爲欣慰敬吳下小生未嫻時務名公卿諒其心跡誠􅀡每加意優容敬事過輙悔昔人知四十九年之非敬今知五十年之非矣受事後以柔道拊循而蠧役預請退卯在鄕婪索者聞輿過遺衣物而逃鷹鸇不如鸞鳳斯言當不吾欺治下如此事上能折節行之豈有不諒者耶彌勒贊甚佳此體自諸經偈語發源北宋張無盡等祖禰之至有明益大其流與􅀺楷屏夏間朝夕過從吟琴讀書之外復窺仁弟立身之謹而能斷擇交之和而能別眞令鄙人有珠玉在前之歎至詩之爲道仁弟旣好而習之其意不患不精其才不患不博然仁弟喜禪敬請進以禪言之卽心卽佛者格與調之說也非心非佛者不必格與調之說也這老漢惑亂人憑他非心非佛我這裏是卽心卽佛者格與調皆至不旁睨不格與調之說也近時袁子才有格調增一分則性情減一分之說鄙意以爲無性情之格調必成詩囚無格調之性情則東坡所謂飮私酒喫瘴死牛肉發聲矣蓮水出於子才之門而其詩渾雅前書所謂無琵琶聲也可知非廢格調專任性情矣試以鄙意商之然乎否乎以禪言詩自嚴滄浪而虞山大之已成窠臼敬復云云者以爲仁弟所喜耳與吳良園往歲于廖觀察處得手書知有粤中之行當卽作報後竟未聞油旌過嶺殊爲懸繫也敬勞勩一生無所成立可愧可愧待質之事姻朋共引翼之得免隕越竊念敬於口舌之事不能容人而常爲所容仕宦貨財之事不能緩急人而常爲人所緩急如此不悔悟眞敝人矣曉帆并各相知處希用鄙意釋之與福子申往歲由九江太守官封遞到手書知仁弟赴官粤東喜慰之至後詢之贛州則騶從早已過山未得一見敘六年中刖愫并不及專遣童奴祗候道周甚爲歉歉由江西各府九江極北贛州極南而瑞金又在贛州之東去九江二千里是以仁弟所發書到瑞金計一月有餘致此差誤今歲得手書亦由九江遞到然自贛州北至九江復自九江南至瑞金往返四千里矣嗣後當止託贛縣邱君可速到也粤東官事如焦原火發非一手所能撲漏防雨潰非一簣所能障雖然天下事皆天下人爲之非仁弟之望而誰望耶方今制府精鍊撫軍和厚可大有爲之時敬方傾耳而聽也順德近接省會民情土俗仁弟必一一措置得宜無煩進說所念念者張藥房久爲昔友其二子聞甚有才仁弟其有以敎之夫人油幢想同南指令郞君讀書何如京中逋負想不至多多葢此物一累則才爲所局德亦爲所拘敬卽已覆之前車故詢及此耳敬隨常調官爲衣食計無謂之至至瑞金後鬚已蒼白日中昏昏欲卧曉卧不能起已頺然就衰眞無志於世癸甲乙三載連得三女頗能聰慧堂上康强細弱皆安善子寛十一月二十九日到署今歲敎兒子輩讀書子由理内外之事頗爲竭蹶葢瑞金所入之數公使之銀已去其三之二也目下因三命之案赴南昌如可退不復戀此雞肋矣與廖永亭月初侍老母至贛諸􅀩厚念感謝感謝舍利䙞子舟中藉禦嚴寒近至縣巳漸和煦而仁弟方將北行今冬出都必需此是以專人奉上非介介也仁弟所示古銅器乃夷矛頭耳敬作古兵器圖考附呈可按圖索之古有以玉石爲兵者自􅃖尤以後皆以銅爲兵考工記斧斤戈㦸大刀殺矢之齊皆銅也戰國始兼用鐵而用銅至西漢尙行漢書食貨志收銅勿令作兵韓延壽傳取官銅作刀劎鉤鐔是也所示夷矛頭製甚巧而銅不精其西漢所鑄歟投壺古皆並席危坐手投之矢用棘今京師士大夫削竹爲矢並足立自上擊矢入壺失古意矣所詢演禽之書此出近世古無是書也以十二生配十二支始于論衡物勢篇以日月五星加二十八宿見於西域宿曜經皆鄙淺無深義至以二十八禽配二十八宿乃自十二生附會之明人方著其說今演禽書中屨舉許眞君當由近世道士所演孔子之時豈有是耶不可信也仁弟不恥下問故一一詳之附上素心兩器惜無磁斗然巳伏盆不必易也與廖聽橋去歲十二月在贛見大姪行止安詳言語平正甚爲欣喜又見書法大進惟未見近日文字耳承示銅器均非佳者其大雷紋花觚近今俗工所鑄也銅洗無銘識工亦不細大姪能多讀書則自能辨矣敬回縣後悤悤年事殊無好懷幸闔署均安善而巳􅋯仙詩稿前曾略窺津涘淸老之作時賢所難至作序之說前諾未忘然此事不可草草苐一須􅋯仙不請他人作序及自序方可爲之蓋古法無重序也今時疊􅃺架屋以爲聲氣不知見笑于大方之家其二須盡讀其所作方有運思遣辭徑路否則公家言耳其三亦須稍識􅋯仙生平踪跡及交遊之人方能不諂不凟葢以言諛人以文諛人皆非君子之事也其四作􅋯仙詩集序自當􅋯仙專致一書不可大姪代爲請序四者皆不易之理也大姪有俠腸有豪氣有勝情有遠志然每事必須于不易之理斟酌盡善則成大器矣靑面手本乃官場惡模樣敬與大姪如一家骨肉豈可用此兹謹璧還嗣後不可復用也與徐􅋯仙䖍州得晤如見王長史劉尹一流人鄙人塵容俗狀不滌自去矣大集悾愡中稍一涉獵沈著老脫無一語不自古人來無一語似古人非三折肱不能至聞聽橋有付刻之說此天下所快覩也前從聽橋索得夢樓太守集一部舟中反復觀之夢樓詩名五十年豈無所得然敬頗有未當意者以其意太淺詞太華用筆太巧也尊見以爲本朝詩人近體似唐古體多似宋鄙意國風之諷大小雅之正周頌之和魯頌商頌之奮厲皆爲聖人所取唐亦可宋亦不惡惟忽似唐忽似宋進退無據則爲可笑誠如尊見耳答曹侍郞去歲吳萬載到江西得奉手書藉悉台侯萬福當卽肅復由姚秋農修􅁧呈達矣今至章門當局不以爲狂以爲狷和之者亦復不少先生以爲然乎否乎前二十年在都張皋文王悔生諸人目爲亦狂亦狷亦隘亦不恭至今已年五十矣自視茫然豈敢自附于有不爲之說然人人之云必達之先生者先生知我必有以進我也瑞金去章門一千餘里邸鈔數月始一至朝廷政治在下位者聞不聞俱無所輕重惟一二大君子心甚懸懸而先生則敬之所企仰者一切動定望詳悉見示近得劉海峯先生集筆力淸宕然細加檢點于理多有未足先生以爲何如與舒白香前登舟之後復得天香館暢飮坐中蓮水楷屏又俱雅流可謂快意越日發棹爲風水所阻不及二十里便泊舟每日如是至前月初三日方至南城十五日方至甯都二十五日至瑞金溽暑奔馳面目可想惟得免分校不致再勞往返而途次廣昌得家慈書精神如常仍能燈下讀書一家細弱俱平善可慰仁弟記注耳文章之事工部所謂天成著力雕鐫便覿面千里儷體尙然何况散行然此事如禪宗篐桶脫落布袋打失之後信口接機頭頭是道無一滴水外散乃爲天成􅀂未到此境界一鬆口便屬亂統矣是以敬觀古今之文越天成越有法度如史記千古以爲疎濶而柳子厚獨以潔許之今讀伯夷屈原等列傳重疊拉雜及删其一字一句則其意不全可見古人所得矣至所謂疎古乃通身枝葉扶疎氣象渾雅非不檢之謂也敬于此事如禪宗看話頭參知識葢三十年惜鈍根所得不過如此然于近世文人病痛多能言之其最粗者如袁中郞等乃卑薄􅂀聰明交遊客能之徐文長等乃􅃈異沠風狂才子能之艾干子等乃描摹沠佔畢小儒能之侯朝宗魏叔子進乎此矣然槍棓氣重歸熙甫汪苕文方靈臯進乎此矣然袍袖氣重能捭脫此數家則掉臂遊行另有蹊徑亦不妨仍落此數家不染習氣者入習氣亦不染卽禪宗入魔法也恭勤墓志銘及萬公祠記在春州處便中可索觀并正之與舒白香前月天香鄰館飮酒之後卽解維東還果堂先生來始知仁弟復有敗意事天始旣置白香于愉適之外今乃置白香于憂患之中如之何如之何稽生有言又讀老莊重增其放敬以爲善老莊者愉適憂患不能于之則性情皆本然者耳得其和則有之豈至增其放哉仁弟于老莊可謂善矣以鄙言爲何如近有調蔣權伯詩無一語是老莊然得老莊至處錄呈是正可爲知者道耳二十三日往潯陽歸途遊天池視壁間第一語卽知爲仁弟詩二僧同行皆大笑也與鄧過庭得手書具知一切今年秋闈敬不料能整齊如此方悔前之力辭入􅄕爲過于避事然夫已氏者素日悉其能榜前已豫料多屈滯矣足下淸才何慮不達遲速命也何足介懷况年力富甚方將遠追賈董近躡歐曾豈效小生俗儒硜硜望售耶丁贊府舊交不可輕吿去温南城爲人詳宻且可近奉晨昏二者望大雅裁奪至寒署荒陋又處嶺徼無可推轂足下如不棄翩然來儀止可商訂古今若溝渠之水圖潤百里足下亦知其力不任此也與裘春州前曾與蓮士先生商恭勤墓志其意以未竟用爲綱領兹已擬就錄呈大裁敬卽日錄寄京師矣于文襄所作文達公墓志乃墓表體袁子才所作文達公神道碑又襍墓志體其間書法不合處甚多鄙作雖弇鄙不足以揄揚恭勤然不敢妄下一語也其書法旣以墨圍别之仍標義于行首非敢如東方先生之自譽不過望將來天下操筆墨者不率爾而已奏疏文集附上三江圖考擬欲作一文辨之暫存敬處可也答陳雲渠大著淸刻幽雋得山谷誠齋諸老筆意俗人不能措手也鄙見詩文當從一家入至能兼諸家然後自成家高明以爲何如佳處已用墨圍圍之未信者細書卷中一人之論未足槪諸君子暇中自定之敬至貴處已一載今數日内連診三命案復有逆倫者深用自愧至貧乏非所計也彭躬菴文氣甚和而鋒不可犯邱􅀖士文奇澹不蹈襲前人一語一意明季年多異才吾宗遜菴先生文亦然然皆非正宗擇之可也答陳雲渠前過黃安山水淸佳可以遊賞若治形冢之說應於此處求之縣東同登之山土氣麤獷未必善也輿中閱後漢書如馬援袁紹傳不讓孟堅董卓傳閱之殊苦不了了鄙見如是未知高明意中何如承祚三國志魏繁於吳吳繁於蜀地勢事蹟不得不然帝魏之說本不足憑卷帙多寡更不必置論魯肅傳有但諸將軍單刀俱會之言非雜劇妄題然詩文中難用凡經史事世俗所習知習言者宜用意鍛鍊之或暗用或翻用不得不然識之答陳雲渠十四日得手書並闈藝三篇首藝前已于貫汀處見之加墨圍􅀉還矣是必雋之作次藝三藝亦佳深以爲喜不意十五日晩間省中題名錄至則相知中無一人雋者大奇大奇此科文如仲岳之才氣貫汀之淸拔允中之愜適守齋之瀟灑與吾弟之平正駘蕩皆宜雋而不雋豈果有命耶雖然君子盡其在我者而已其他則何尤焉今晨貫汀來適敬讀張雎陽列傳因同讀之爲之氣充神溢如置身靑雲中下視高爵厚祿與糠粃何異况區區一舉哉睢陽豪傑忠義之士能使一干餘年後如此則上自聖賢下及一技一能之士其有得于後世雖淺深大小不同而引人著勝地則一也少遲當來署中快談數日貴體想可如常敬自八月中旬患手疔至今腕弱頭暈不能自作報書因令小胥抄錄前玉箸篆及草書頗有進境疾後又廢令叔挽聯尙未寫也答陳雲渠得手書推許過甚不敢當不敢當敬少時詩學太白後漸入香山東坡所嗛嗛不足者太似耳析骨還父割肉還母方能現淸凈身說法詩何獨不然至文亦太似韓曾高深處尙不及未知何時能自立一家也象山之說益不敢當不敢當昨與相知言及近事敬吿以陽明先生曰州之事幾敗于賓僚何况不如陽明者豈敢望象山耶前書所言藥玉卽罐子玉雖精華不可寶漢銅有贗而宋銅無贗故可寶吾弟在縣有翰林公相投契之言恐吾弟􅅭其所寶故爲此隱語耳答陳雲渠得手書知體中違和竟不應舉謹疾之道必當如是今天下淸才正學多矣使皆不應舉如吾弟豈非有心斯世者所當慮耶然家庭大和文史足用仰不愧古仰不愧今吾弟固有以自樂矣敬交代之事籌畫三干有餘可以集事復因多年命案爲大府撦撏幾于車覆少定當北行世路茫茫未知脫駕何地也與李守齋得手書辭旨淸妙卽此便非俗人所辨不俗與俗如水火陰陽夫已氏豈有大雅之識耶敬八月中已决饒陶南與足下之不能雋矣闈卷加墨圈奉還勿使俗人見彼方謂吾輩相標榜耳然敬所以吿足下者曰安命曰力學而已固非絶人以不可知亦非求人之必知于天下後世尙然况科名一事耶得閒可來荒署作十日遊敬亦將示以所得也答楊貫汀允中來知吾弟與雲渠俱以疾不應舉繼卽得手書所云同同深爲歎惜今歲江西闈又失二奇矣雲渠來書波委雲連動蕩可喜吾弟書緻潔如玉映徹如水晶其人可知其人可知敬古文一支當在綿水左右然老重下筆及一瀉千里之處尙望留意焉是道止爭識力耳與鄒立夫前日見過以諸事沓來未得永日談笑深以爲歉昨得手書慰甚然何言之謙耶僕與吾弟爲文章道義之交當每事質言毋過爲推挹也大著一册尙未下籖然已繙竟大都瑞金諸詩人多枯槁之士故邊幅不廣雖極高如南岡極雋如狎鷗皆不免此病吾弟氣逸體縱有不可羈的之槪而風回雨止仍復寂然此得天之最厚者由是而充之排金門上玉堂與時賢頡頏再充之吞曹劉奪蘇李與古人頡頏分内事耳然不可自高自高則所見浮不可自阻自阻則所進淺浮與淺則下筆俳巧甜俗粗率皆來擾之而且自以爲名家大家矣吾弟用吾所戒久久行之何慮不傳傳何慮不遠以敬爲識途之馬則不敢辭若以敬爲千里之驥而附之恐亦百步而止耳賢于十步幾何今少年人詩集序至四五題辭至數十無謂之至俟吾弟至四十敬不過七十當爲作序今且以此書書之卷首如何答鄒立夫前席間問及沈休文韻書此久巳亡失明未嶺外妄男子乃僞撰行世朱錫鬯檢討廣韻序常言之世間學問不可盡卽考訂一家巳有僞學俗學僻學種種不同非多讀書親近大君子不能别也吾弟少年自勉而已來書問等韻之學此事近儒江愼修先生四聲切韻表最爲詳愼其勝前人處有數條字母用三十六不妄意增減一也韻用二百六部不用十二攝二也入韻分系各韻皆推明其故三也翻切用音􅀋母位取切之音和不用舌頭舌上輕脣重脣之􅀋隔四也淸濁次淸最濁用字標明不用黑白圍之暗記五也吾弟守此用力足矣不必他求葢音韻易淆求宻反疎求全反漏取其師承之詳愼者從之可也不然齒牙爲猾甯有旣耶來書問字彚所列之二圖其第一圖自公至鳩四十韻各爲一章緯以四聲經以字母三十二所謂韻法􅀡圖得之新安者也第二圖平上去各爲二章入爲一章上列字母三十六旁列各呼讀所謂韻法橫圖得之宣城者也前一圖删知徹澄孃四母并合敷非二母于微母上增一虚位故不用字母本字而以一至三十二掩之眞說也來書問字典所列之三圖其第一圖共一章別開口闔口正韻副韻而以十二攝經之第二圖十二攝各爲一章而以三十六字母緯之與第一圖相發明葢一人之作也第三圖十二攝分爲二十四章而開口闔口分廣狹通侷四門卽第一圖之開闔也十二攝各有内外卽第一圖之正副也字彚字典各圖之義不過如此大抵古人翻切生于雙聲叠韻後因􅀟聲有字母因􅑋韻有韻書旣有字母韻書卽可列之爲圖易于標射葢有翻切而後有圖非有圖始可翻切也然方言之不同今古音之各異雖聖人不能齊焉故古人所作各圖人自爲學家自爲書互相攻詆如邵堯夫司馬君實諸大儒所傳之圖尙各有岀入何况近時之學哉善學者求其能詳愼者用之如四聲切韻及音韻闡微古音表皆可用也來書問三合之說考華嚴四十二字母有三合一音曰揭多羅乃三合爲一母耳古人翻切皆止二合無三合之法三合四合至本朝始大行來書又問發送收之說此一音具三音欲音之準耳非三音合一音如揭多羅也錢辛眉先生日西域字母婆羅門書用十四字湟槃經用二十五字華嚴經四十二字若三十六宇者乃唐末人爲之此通人之論也其集中答問及養新錄論字母者遣曹史寫送可留意焉吾弟爲學愼無速求多當以漸積之則多矣小畜懿文德之義也况君子多乎哉與邱恰亭乙巳夏首始識尊顔鄙見以爲少年貴公子中年豪客老年巧宦而巳殊有不足之意往歲過贛而二兄適被劾窺二兄意言之間非猶夫豪客巧宦之􅅐次也然後不以悠悠視二兄及今歲至章門始知二兄之爲人非敬之所能及也二兄才甚奇氣甚高而遇甚蹇不得巳黽勉于君子之所務馳騖于衆人之所爭胸次中其有必不願人知而人亦不能知者乎敬奔走半天下所遇之人多矣今僻處嶺嶠願通言于二兄使知江西有一惲子居則邱怡亭亦非萬萬人不能知者二兄必爲之酣然而笑瞿然而傷也與章澧南四月中旬疾中草草叙話卽卧輿中南返旋至雩都至贛幾兩月矣奔馳之苦所不堪言回縣後得書深爲欣慰承見示海峯樓文集二十餘年前在京師一中舎處見之今細檢量論事論人未得其平論理未得其正大抵筆銳于本師方望溪先生而疎樸不及才則有餘于弟子姚姬傳先生矣前閣下以潔目之鄙見太史公之潔全在用意捭落千端萬緒至宇句不妨有可議者今海峯宇句極潔而意不免蕪近非眞潔也姬傳以才短不敢放言高論海峯則無所不敢矣懼其破道也又好語科名得失酒食徵逐匈中得無滓穢太淸耶狂瞽之言未必有當惟閣下擇之與湯敦甫春間得復書儒者之氣盎然楮墨及讀其辭益知先生之所養非歲年所能至也瑞金去京師六千里去江西省城一千五百里所傳聞多不實然時于邸抄中見先生名則爲之一喜及閱事實皆先生所齟齬者想有道必不介然然敬辱在下風爲不甯者久之又不詳其事始末何以能乘流雲御飛鴻一盡其拳拳于先生之前耶近作數首在來􅀸所亦不足觀覽故未寫送舎弟子寛在都惟先生進而敎之如敬身受益也與楊鹿柴前所送采菽堂古詩并郭茂倩樂府下走意欲以數日點定病􅂴未涉筆昨見兒子穀架頭歸愚尙書古詩源其􅀧定頗無大謬足下可照錄一過則所􅀗多矣貴邑謝南岡先生詩甚佳七言少遜然其格尙在狎鷗亭集之上也足下自號鹿柴主人而欲引鹿門柴桑之事此則甚非龎陶二公皆衰年處亂各有所寄足下方當壯盛侍奉庭闈于二公何所似耶若如王右丞裴蜀州之偃仰輞川是亦曾􅀧異乎三子之意矣下走以此意爲之說足下當亦犁然于心若其他穿鑿之言則非大雅所尙下走理不可陳也與余鐵香得書知侍奉萬福興居勝常甚慰甚慰至試事得失不願吾弟介然也君子遇失意爲人必有所進小人遇失意爲人必有所退吾所見人才得天下大半如吾弟天資傑出可以上追古人所不可料者講習無專門之師結契無高世之士以放蕩爲筆墨上流以詭僞爲酬酢公法浮沈于詩盟酒社之中滅沒于高科上爵之内而已今不稱意必反而思起而悔求其是者去其非者方將掉韓歐之鞅叩朱陸之門摩范富之壘而何爲介然􅁘千里開函當爲氣盛勉之而已與胡桐雲前者騶從遠臨甚慰甚慰復蒙惠賜荔枝二盒瓊玉之膏溢于齒頰逮及童稚感何如之昔彭淵才以海棠香國爲善州敬前在渝水聞檄調瑞金賓客皆言過遠不可往敬答以但往可飽噉荔枝乃三年之内荔枝熟時皆不在署今始得償願眞不虚瑞金一行矣大著淸新雅飭惜敬不敢當耳數次泚筆欲爲和章皆爲吏事敗意稍暇當勉强爲之也墨􅀸太守風流照映不愧昔賢敬常謂翠庭先生爲道學而不迂墨􅀸太守爲文苑爲循吏而不矜不肆乃甯化必傳之人也墨􅀸于閣下爲大人行閣下朝夕相從與孫蓮水舟中執手不及暢言翼日解維順流東下每逢勝賞追挹高懷安得如先生者數十人分住山水佳處爲惲子居作主人耶十月下旬過金陵見令郞甚英尙可喜略觀制義及排律詩各數首辭意俱有法門氣甚淸暀然鄙意不願其爲作家之文葢少年當以才子之文爲主壯年老年再入作家方得此中法華三昧也令郞挽留作竟日談敬以欲訪覺修吏部卽往城北而竟未遇覺修來舟中又未遇彼此奔馳可弞也十一月至家婆羅巷賃屋已爲主人索去老母寄居江鄉幸大小俱藉庇平安無勞遠念誦贈詩至還扶白髪看娑羅之句老母甚爲解顔敬歲底中寒大病正月十三日方北行二月初十日過德州吾鄕劉申甫孝廉先行一日屬淵如分巡設饌作痛飮而敬酣卧車中竟行至二十里坡方覺其爲可弞益甚于金陵之事矣申甫文定公之孫治經行文俱冠流輩將來相遇可交也與瞿秩山一別十三年敬髪已華矣如何如何聞大兄家居之時始終不入州郡此事吾鄕葢難言之得一二有志者挽回甚幸甚幸趙恭毅劉文定去人其間豈甚遠耶曩者同赴禮闈敬與仲甫皆好爲議論大兄退然默然而已然爲部郞則辭賑差爲侍御則劾朝審而家居又能如此是躬行則常在前口語則常在後古人所尙非大兄而誰惜蜀中險遠不得親見設施然可信其必異乎人之爲矣瑞金多頂兇案敬前後六年力反之于是各案皆遲延至銷去加三級紀錄七次罰俸二千三百兩若再回任將何級何紀錄抵銷眞不可不慮又舊日會匪未淨私硝私磺充斥雖屢次設法淸理而根株難盡望之如畏途兩淮都轉廖復堂先生係敬舉主如維陽有可休息之處便當棄官而歸然古人有言仙人尙肯􅁘否耶以敬負累欲望之都轉一人亦非易易事也與秦筠谷半載灌城晨夕過從朋友之樂乃借􅃣葢之地商􅃀性情慰甚慰甚歸途復藉緩急得無阻滯月丙巳抵縣矣小峴先生未及修書以鄕閭大君子不可一札申候如南華老人所云竿牘而已是以遲遲仁弟必賞契此言也長甯有風調氣格此次過䖍彼此相左竟未得見仁弟北上之事所以處人已甚能得其平然世人必有以爲迂者敬常謂今之士大夫不病其迂病其常不迂且以其不迂排人之迂此吏治之所以日偷士大夫之氣節所以日壞在有志者自免之耳劉于宋之案官吏役皆欲蔽罪此人其􅁈惟敬一人知之而不能白之眞可恥然格殺賊盜罪止杖耳敬何必苦爭使再延緩致斃囹圄仁弟顧我厚故敢陳之如此銀三十兩希付司籍敬有所需可再貸也與左仲甫丙寅秋中曾得手書至今五載有餘矣中間敬一離任三調省其奔走可知兼之賓從雨散傔僕無解事者又時病時起是以不及通問二兄必諒之也去冬舟過皖江遇通判鄒君詢知二兄興居深爲喜幸至都都人士皆道二兄之美比之張趙比之應劉何快如之敬駑下之資露才揚已蹭蹬半生幸老母康强細弱均安善四月中摒擋出都如維揚有可休息之地移家過江與南山南北山北何異若不如願則一身挂帆西上當如武侯出師先爲可退之地也秋間旌斾在皖或可一遇世事日多舊交日少日多與陳寶摩前在瑞金兩奉手書均未作答非敢爲無禮及遺忘也敬于大兄言之不誠不如不言言之不盡不如不言誠乎盡乎幕中賓客無任此者况瑞金竟無賓客􅁘大兄必知我諒我也前書并示懷舊詩後并示全集全集爲人持去昨至都雲伯復以見詒得盡讀之大兄胸次本高故下語翛然自得不求異今人今人自不能及不求避古人古人自不能掩非尋常詩人所解也敬質性粗獷又埋沒風塵之中此事輸大兄一百籌矣雖然古今詩人少年多失之華中年多失之整老年多失之平淺華之中而實寓焉整之中而變寓焉平淺之中而高與深寓焉斯善矣敬與大兄已近老年宜如何如何望大兄之敎我也二十年前長安道中所遇貴賤死生不可一一數而最相知者皋文竟作古人仲甫雖轉官而泥淖益深無以自樂賓麓朝夕吟咏上游以其方正時以吏事累之惟大兄擅性情之勝得朋友之樂富山水之遊饒魚酒之味人生百年如此足矣爲轅駒爲檻羊于事何益敬前就知縣本意一岀卽還不意牽挽遂至于此上游五次欲調首縣皆爲人所阻敬之迂愚豈任首縣􅁘五十老翁房中並無侍者而且謗之曰娶同官孤女爲妾三次力辭分校而且謗之曰多門弟子求薦達者訪獲傳習邪敎之犯而且謗之曰邀功曰日前何以容奸民楞嚴曰因地不眞果招迂曲敬心􅇎如康樂故内根不淨外塵雖不來而塵之影巳如波之泛火之然不必怨尤亦無可怨尤也子由鬚髪皆白子寛同車入都而一事無成或作中州之遊敬或回江西或別圖去就未定也與趙石農前日旌旆入都得快瀉匈臆惲子居又得數日浩落矣而廖永亭適至如飮醇酒酌東西二尊均爲異味大奇大奇仁兄所乘索倫馬幾於周家八尺以上殊有駿氣敬久官南中腰脚疲軟又笨車日行百里單􅀐隨車不必善馬是以不敢拜惠能於馬庌中擇一中者見賜最得力也薩哈克卽古大宛馬極高然離索倫東西萬里不知索倫薩哈克馬俱高大抑卽薩哈克馬中國誤呼索倫并望示知頤園先生淸望冠世出都時當往一見永亭十八日已出都留朱提爲敬治行裝諸事沓來近日略有端緒矣茫茫天壤知已幾人以惲子居三十年埋頭故紙中燕齊之士當亦爲之短氣也與趙石農前送馬圉人回州曾有書奉謝并陳一切想達左右敬羈滯五月戴昆禾大兄假朱提四百子寛別假三百于二十一日料理南行矣拙集文旣不佳刻工以時促甚觕率兹呈已裝者一部大兄存案頭如見惲子居進退抑揚議論指畫于大兄前也外未裝者十部内一部大兄批示見寄餘九部分贈諸同志有能指摘瑕疪千里相告者卽敬之師也勿吝勿吝此事天下公器不可樹門戸近有言漢人文多如經註唐宋文乃漢之變體者吾誰欺欺天乎漢人文如經註者止經師自序之文其他奏疏上書記事言情之文具在皆與唐宋之文出入者也推而上之聖人之六經文之最􅀄者矣唐宋諸大家悉與之相肖儀禮之細謹考工記之峭宕其相肖者如畫記說車是也若漢之經師肖六經何體耶且文固不論相肖也敬不敢黨伐惟大兄裁之
